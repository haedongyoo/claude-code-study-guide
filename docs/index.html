행 및 검증 → 재개 가능 세션 → 다음 작업</strong>. 워크플로우가 아무리 복잡해져도, 항상 이 다섯 단계의 변형입니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> \"메모이제이션\"은 \"암기\"를 의미하지 않습니다. \"한 번 계산하고, 여러 번 재사용한다\"는 뜻입니다 — 매 턴마다 다시 전송하지 않고 지속되는 배경 규칙을 설정하는 것과 같습니다.</div>"}, "1_3": {"title": "하네스 개념", "content": "<p><strong>하네스</strong>는 Claude가 읽고, 수정하고, 검증할 수 있는 것을 정의하는 외부 구조입니다. 동료의 작업 공간을 설정하는 것으로 생각하세요: 책상 위에 참고 자료를 놓고, 어떤 서랍에 접근할 수 있는지 결정하고, 완료 전에 수행해야 할 체크리스트를 부착합니다.</p>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 경계 없이 \"로그인 버그 수정해\"라고 전송하기. 강력한 하네스 요청은 다음과 같습니다: \"<code>auth/</code>만 읽고, <code>.env</code>는 건드리지 마, 로그인 테스트를 통과시키고, 3줄 변경 노트를 남겨.\"</div>\n<p><strong>하네스 엔지니어링</strong>은 더 똑똑한 프롬프트를 작성하는 것이 아닙니다 — Claude가 작동하는 작업 공간을 설계하는 것입니다. 여기에는 항상 로드되는 파일, 설정된 권한, 통과해야 할 테스트, 결과가 저장되는 위치가 포함됩니다.</p>\n<p>2026 국제 AI 안전 보고서는 확인합니다: 모델 능력이 상승할수록 하네스와 검증 구조는 덜 중요해지는 것이 아니라 <em>더</em> 중요해집니다. 실제 작업에는 자원 제약, 불완전한 정보, 예외, 승인 흐름이 포함되며, 이는 순수한 모델 지능만으로는 처리할 수 없습니다.</p>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 초보자도 하네스 구축을 시작할 수 있습니다: <code>CLAUDE.md</code>에 기본 규칙을 작성하고, <code>settings.json</code>에서 허용/거부 범위를 설정하고, <code>plan.md</code>로 큰 작업을 분할하고, <code>handoff.md</code>에 세션 상태를 남기세요.</div>"}, "1_4": {"title": "작업 공간: Chat, Projects, Cowork, Claude Code", "content": "<p>같은 Claude 모델이라도 어떤 작업 공간을 사용하느냐에 따라 다르게 동작합니다. 잘못된 작업 공간을 선택하는 것은 실력 문제가 아닙니다 — 라우팅 문제입니다.</p>\n<table><tr><th>작업 공간</th><th>최적 용도</th><th>영향 요소</th></tr><tr><td><strong>Chat</strong></td><td>빠른 질문, 아이디어 정리</td><td>질문 품질</td></tr><tr><td><strong>Projects</strong></td><td>지속적인 배경 지식</td><td>폴더 구조, 템플릿</td></tr><tr><td><strong>Cowork</strong></td><td>문서 위임 — 리서치, 브리프, 파일 정리</td><td>폴더 구조, 템플릿</td></tr><tr><td><strong>Claude Code</strong></td><td>구현과 검증 — 코드, 테스트, 리뷰</td><td>규칙 파일, 검증 루프</td></tr></table>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 세 가지 오해: (1) \"같은 모델이니 어디서든 같은 경험\" — 틀렸습니다, 작업 공간이 엄청나게 중요합니다. (2) \"Cowork는 쉬운 모드, Claude Code는 어려운 모드\" — 틀렸습니다, 위임 스타일이 다른 것이지 난이도가 다른 게 아닙니다. (3) \"모든 작업 공간을 동시에 시도하기\" — 틀렸습니다, 하나를 먼저 마스터한 후 확장하세요.</div>\n<p><strong>작업 공간별 좋은 첫 번째 작업:</strong></p>\n<ul><li><strong>Chat:</strong> \"이 보고서를 5문장으로 요약하고 3가지 질문을 작성해.\"</li><li><strong>Projects:</strong> \"이 폴더를 읽고 1페이지 배경 지식 요약을 작성해.\"</li><li><strong>Cowork:</strong> \"회의 노트를 읽고 주간 브리프 초안을 <code>outputs/</code>에 저장해.\"</li><li><strong>Claude Code:</strong> \"이 버그 재현 경로를 읽고, <code>plan.md</code>에 가설과 수정 계획을 작성해.\"</li></ul>"}, "1_5": {"title": "빠르게 변하는 것 vs. 변하지 않는 것", "content": "<p>기술 제품은 빠르게 진화합니다. 안정적으로 유지하려면 휘발성 세부 사항과 지속적인 원칙을 구별하세요.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 생태계가 \"뜨거운\" 이유는 네 가지 조건이 동시에 충족되기 때문입니다: (1) 사용자 행동 변화 — 프롬프트 작성 대신 작업 공간을 설계합니다, (2) 운영 습관 변화 — 팀이 <code>CLAUDE.md</code>를 공유 계약서로 유지합니다, (3) 생태계 확장 — 공식 및 커뮤니티 Skills, Plugins, MCP 서버가 증가합니다, (4) 직무 역할 재설계 — 마케팅, 세무, PM, 디자인 팀이 Claude를 챗봇이 아닌 자동화 레이어로 사용합니다.</div>\n<p><strong>전체 책을 읽는 네 가지 프레임:</strong></p>\n<table><tr><th>프레임</th><th>역할</th><th>비유</th></tr><tr><td>작업 경로</td><td>시작점 (Chat, Cowork, Claude Code)</td><td>앉는 책상</td></tr><tr><td>하네스</td><td>실행 환경 (권한, 규칙, 테스트)</td><td>책상 위의 서랍, 잠금장치, 체크리스트</td></tr><tr><td>운영 레이어</td><td>스케줄링, 배포, 분석</td><td>관리 사무실</td></tr><tr><td>시스템</td><td>인간 검토 루프와 결합된 전체</td><td>전체 사무실 건물</td></tr></table>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 새로운 기능이 출시되면 \"더 똑똑해졌나?\"라고 묻지 마세요. \"어떤 레이어가 추가되었나 — 지식, 도구, 패키지, 제어?\"라고 물으세요. 이것이 과잉 설정을 방지하고 셋업을 안정적으로 유지합니다.</div>"}}}, "part2": {"title": "2부: 실전 플레이북", "sections": {"2_1": {"title": "Cowork와 Claude Code: 첫 번째 적용 경계", "content": "<p>설치 후 가장 흔한 혼란은 \"어디서 시작하지?\"입니다. 답은 작업 유형에 따라 달라집니다.</p>\n<table><tr><th>Cowork</th><th>Claude Code</th></tr><tr><td>문서 우선 작업: 회의 노트, 리서치 브리프, 폴더 읽기, 초안 생성</td><td>개발 우선 작업: 버그 수정, 테스트, 리팩토링, 계획 문서</td></tr><tr><td>범용 백엔드 시스템으로 기대하지 마세요</td><td>처음부터 전체 새 기능을 한 번에 위임하지 마세요</td></tr></table>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 이 장은 Claude Code를 <em>어떻게 사용하는지</em>가 아닌 <em>어떻게 운영하는지</em>에 관한 것입니다. 핵심 습관은: 편집 전 계획, 재개 위생, 리뷰 분리, 워크트리 분리, 허용 목록, 구조화된 인수인계입니다.</div>\n<p>세션 관리는 의사결정 트리를 따릅니다:</p>\n<ul><li><strong>같은 목표, 계속 진행?</strong> → <code>claude --continue</code> 또는 <code>--resume</code></li><li><strong>다른 방향이 필요?</strong> → <code>--fork-session</code></li><li><strong>파일 충돌 또는 역할 충돌?</strong> → <code>--worktree</code> (별도 작업 디렉토리)</li></ul>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> Claude Code를 장기적으로 잘 사용하는 사람들은 더 나은 프롬프트를 쓰는 사람이 아닙니다 — 작업을 덜 중단되게 만드는 사람입니다.</div>"}, "2_2": {"title": "Claude Code 운영 원칙", "content": "<p>여덟 가지 습관이 생산적인 Claude Code 사용자와 좌절하는 사용자를 구분합니다:</p>\n<ol><li><strong>편집 전에 계획</strong> — 코드에 손대기 전에 범위, 검증, 금지 영역을 확정하세요. 큰 작업은 먼저 <code>plan.md</code>를 작성하세요.</li><li><strong>상주 컨텍스트를 가볍게 유지</strong> — <code>CLAUDE.md</code>는 작업 계약서이지 백과사전이 아닙니다. 장기 상태는 <code>handoff.md</code>, <code>decision-log.md</code>로 이동하세요.</li><li><strong>먼저 허용 목록, 나중에 우회</strong> — 좁은 <code>allow</code>와 <code>deny</code> 규칙으로 시작하세요. 이해한 후에만 권한을 확대하세요.</li><li><strong>적절한 시점에 수동 <code>/compact</code></strong> — 중요한 상태를 파일에 저장한 후 압축하세요, 세션이 이미 저하된 후가 아닙니다.</li><li><strong>의도적으로 재개</strong> — 같은 방향이면 <code>--continue</code>, 방향이 갈라지면 <code>--fork-session</code>.</li><li><strong>계획/구현/리뷰 분리</strong> — 모든 역할을 하나의 세션에 몰아넣지 마세요. 분리하면 컨텍스트 오염과 승인 피로가 줄어듭니다.</li><li><strong>워크트리 사용</strong> — 충돌하는 작업, 실험, 병렬 리뷰에는 작업 디렉토리를 분리하세요.</li><li><strong>토큰 세기가 아닌 구조로 비용 관리</strong> — 캐시 미스, 도구 출력 길이, 세션 길이, 테스트 로그 상세도를 줄이세요.</li></ol>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 계획 없이 바로 구현에 뛰어들기. 큰 작업에서 이것은 빠르게 느껴지지만 재작업으로 이어집니다. 계획은 관료적 단계가 아닙니다 — 재작업을 줄이는 장치입니다.</div>"}, "2_3": {"title": "템플릿: CLAUDE.md, settings.json, Hooks", "content": "<p>잘 조직된 저장소는 파일별로 책임을 분리합니다. 하네스 청사진은 다음과 같습니다:</p>\n<pre><code>repo/\n├── CLAUDE.md                    # 프로젝트 계약서 (항상 로드됨)\n├── .claude/\n│   ├── settings.json            # 허용/확인/거부 경계\n│   ├── rules/\n│   │   ├── architecture.md      # 구조 규칙\n│   │   ├── testing.md           # 테스트 표준\n│   │   └── frontend.md          # UI 관례\n│   └── hooks.json               # 자동 시행 규칙\n└── tasks/\n    ├── plan.md                  # 다음에 할 일\n    ├── verify.md                # 종료 기준\n    ├── decision-log.md          # 이 경로를 선택한 이유\n    └── handoff.md               # 다음 세션을 위한 현재 상태</code></pre>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 각 파일은 다른 유형의 실패를 방지합니다. <code>CLAUDE.md</code>는 컨텍스트 드리프트를 방지합니다. <code>settings.json</code>은 안전하지 않은 작업을 방지합니다. <code>rules/*</code>는 도메인별 실수를 방지합니다. <code>hooks.json</code>은 \"X를 기억하기\"를 \"항상 X 하기\"로 전환합니다. <code>tasks/*</code>는 세션 기억상실을 방지합니다.</div>\n<p><strong>설정 범위 우선순위:</strong> Managed > Command-line > Local > Project > User. 조직 잠금 규칙은 개별 설정으로 재정의할 수 없습니다 — \"내 설정이 작동하지 않아\" 혼란이 자주 발생하는 이유입니다.</p>\n<p><strong>팀 vs. 로컬 분리:</strong> 팀 공유 표준은 <code>CLAUDE.md</code>와 <code>.claude/settings.json</code>에. 개인 실험은 <code>CLAUDE.local.md</code>나 <code>.claude/settings.local.json</code>에.</p>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 위험한 Bash 명령을 차단하는 최소 hook 예시:</div>\n<pre><code>{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \".claude/hooks/block-rm.sh\"\n      }]\n    }]\n  }\n}</code></pre>"}, "2_4": {"title": "프롬프트 템플릿과 엔지니어링 레이어", "content": "<p>효과적인 프롬프트는 영리함이 아닙니다 — 패턴을 따릅니다. 핵심 프롬프트 스타일:</p>\n<p><strong>컨텍스트 우선 프롬프트 (권장 시작 루틴):</strong></p>\n<pre><code>CLAUDE.md, 관련 규칙, tasks/verify.md를 먼저 읽어.\n아직 구현하지 마. 다음을 요약해:\n1. 작업 유형\n2. 수정 범위\n3. 금지 영역\n4. 검증 명령어\n승인 후에만 진행해.</code></pre>\n<p><strong>지름길 방지 프롬프트 (코딩 작업용):</strong></p>\n<pre><code>목표: 테스트 통과만이 아닌 유지보수 가능한 구현.\n규칙:\n1. 테스트 통과를 위한 하드코딩이나 특수 케이스 금지.\n2. 테스트가 요구사항과 충돌하면 먼저 보고.\n3. 외부 코드 사용 시 임포트 전에 이유 설명.\n4. 직접 구현과 외부 참조를 분리.\n5. 변경 후 통과한 것과 미검증 항목을 보고.</code></pre>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 세 가지 엔지니어링 레이어: (1) <strong>프롬프트 엔지니어링</strong> — 더 나은 지시문 작성, (2) <strong>컨텍스트 엔지니어링</strong> — Claude에게 무엇을 보여줄지 선택, (3) <strong>하네스 엔지니어링</strong> — 전체 작업 환경 설계. 대부분의 사람들은 레이어 1에서 멈춥니다. 진짜 성과는 레이어 2와 3에서 나옵니다.</div>\n<p><strong>Compact Instructions 템플릿</strong> — <code>/compact</code> 후 무엇이 살아남을지 제어:</p>\n<pre><code>## Compact Instructions\n압축할 때 항상 보존할 것:\n- 마지막 수정 파일과 이유\n- 통과한 테스트, 실패한 테스트, 미테스트 항목\n- 거부된 대안과 이유\n- 다음 턴에서 즉시 해야 할 한 가지\n- 인간 검토가 필요한 위험 지점</code></pre>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 좋은 압축 지시문은 요약을 예쁘게 만드는 것이 아닙니다 — 다음 세션이 즉시 이어서 할 수 있게 만드는 것입니다.</div>"}, "2_5": {"title": "평가 루프와 세션 명령어", "content": "<p>여섯 개의 슬래시 명령어가 세션 관리 도구 키트를 구성합니다:</p>\n<table><tr><th>명령어</th><th>사용 시점</th></tr><tr><td><code>/clear</code></td><td>축적된 대화를 지우고 새로 시작</td></tr><tr><td><code>/compact [focus]</code></td><td>긴 대화를 요약, 보존할 내용 지정</td></tr><tr><td><code>/context</code></td><td>무엇이 컨텍스트 공간을 차지하는지 확인</td></tr><tr><td><code>/memory</code></td><td>어떤 메모리 파일과 CLAUDE.md 레이어가 로드되었는지 확인</td></tr><tr><td><code>/init</code></td><td>새 저장소를 위한 CLAUDE.md 초안 자동 생성</td></tr><tr><td><code>/cost</code></td><td>현재 토큰 사용량과 비용 확인</td></tr></table>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 주간 평가에서 추적해야 할 것: 어떤 CLAUDE.md / 규칙 / hook 버전이 활성이었는지, 어떤 스킬이나 템플릿이 사용되었는지, 지난주 대비 무엇이 변했는지, 통과율과 인간 수정량이 개선되었는지. 프롬프트만이 아닌 규칙과 hook을 변경하여 최적 설정을 찾으세요.</div>\n<p><strong>공식 리소스 권장 학습 경로:</strong></p>\n<ol><li>릴리스 노트 → 지금 가능한 것</li><li>Claude Help Center → 제품 경로 (Cowork, Skills, Connectors)</li><li>Claude Code Docs → 고급 기능 (plugins, hooks, agent teams)</li><li>API / Agent SDK docs → 커스텀 에이전트 앱 구축</li><li>GitHub 저장소 → 실제 예시와 구조</li></ol>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 데모 포스트를 사양으로, 공식 문서를 운영 팁으로 읽기. 역할을 분리하세요: 공식 문서는 사실과 경계를 확인하고, 커뮤니티 포스트는 패턴과 실패 모드를 드러내며, 저장소는 실제 구조를 보여줍니다.</div>"}}}, "part3": {"title": "3부: 시스템 설계", "sections": {"3_1": {"title": "컨텍스트 엔지니어링 심화", "content": "<p><strong>컨텍스트 엔지니어링</strong>은 주어진 순간에 Claude가 보는 정보를 선택하는 학문입니다. 더 긴 프롬프트를 쓰는 것이 아닙니다 — 올바른 컨텍스트 창을 조립하는 것입니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> <em>컨텍스트 어셈블리</em> = 현재 작업에 필요한 규칙, 파일, 메모, 도구 설명을 실제 입력으로 모으는 과정. 덤핑 과정이 아닌 선택 과정입니다. 더 많은 컨텍스트가 더 나은 컨텍스트는 아닙니다.</div>\n<p>매 턴마다 (한 줄 프롬프트에서도) 컨텍스트 창을 채우는 것:</p>\n<ul><li>현재 질문</li><li>최근 대화 기록</li><li>Claude가 읽은 파일</li><li><code>CLAUDE.md</code>와 규칙 파일</li><li>도구 실행 결과</li><li>Claude 자체의 최근 출력</li></ul>\n<p><strong>컨텍스트 부패</strong>는 컨텍스트가 너무 길어져서 초기 신호가 약해질 때 발생합니다. 긴 대화는 점차 일관성을 잃습니다 — 모델이 잊어서가 아니라, 중요한 초기 지시가 나중 노이즈에 의해 희석되기 때문입니다.</p>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 전체 저장소를 컨텍스트에 로드하기. 단일 버그를 수정할 때도 일부 사용자는 모든 파일을 덤프합니다. 이것은 더 느리고, 더 비싸고, 더 낮은 품질의 결과를 생산합니다. Claude에게는 해당 함수와 20줄의 오류 로그만 보여주세요.</div>\n<p><strong>동시에 설계해야 할 세 가지 격리:</strong></p>\n<ol><li><strong>컨텍스트 격리</strong> — 조사, 계획, 구현, 리뷰를 하나의 긴 세션에 섞지 마세요. 서브에이전트나 별도 세션을 사용하세요.</li><li><strong>파일 상태 격리</strong> — 충돌 가능성이 있는 작업에는 워크트리나 별도 출력 폴더를 사용하세요.</li><li><strong>승인 격리</strong> — 자주 허용되는 작업과 항상 검토해야 하는 작업을 권한과 hook으로 분리하세요.</li></ol>"}, "3_2": {"title": "하네스 엔지니어링", "content": "<p>하네스 엔지니어링은 프롬프트 튜닝을 넘어섭니다. 전체 작업 공간을 포괄합니다: 권한, 폴더 구조, 테스트 정책, 세션 재개 규칙, 인수인계 프로토콜, 워크트리 격리, 원격 제어 설정.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 하네스는 세 가지를 동시에 설계합니다: (1) Claude가 아는 것 (컨텍스트), (2) Claude가 할 수 있는 것 (도구와 권한), (3) Claude가 검증해야 하는 것 (테스트와 종료 기준). 이 중 하나라도 빠지면 다른 종류의 실패가 발생합니다.</div>\n<p><strong>시작 루틴이 시작 프롬프트보다 중요합니다:</strong></p>\n<ol><li>상주 계약서 확인 — <code>CLAUDE.md</code>, 관련 규칙, 현재 브랜치 읽기</li><li>작업 분류 — 조사, 구현, 리뷰?</li><li>계획 작성 — 범위, 금지 영역, 검증 명령어</li><li>종료 기준 확인 — <code>tasks/verify.md</code> 확인</li><li>그 다음에야 실제 작업 시작</li></ol>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 서브에이전트와 워크트리는 같은 문제를 다른 각도에서 해결합니다. 서브에이전트는 <em>컨텍스트</em>를 격리합니다 (리서치나 리뷰를 임시 작업자에게 위임). 워크트리는 <em>파일 상태</em>를 격리합니다 (물리적으로 별도의 작업 디렉토리). 짧은 조사에는 서브에이전트를, 병렬 실험에는 워크트리를 사용하세요.</div>\n<p>가장 효과적인 서브에이전트 사용법 중 하나는 코드를 더 빨리 만드는 것이 아니라, <em>다른 사용자 역할을 시뮬레이션</em>하는 것입니다: 회의적인 시니어 엔지니어, 새로운 유지보수자, 보안 리뷰어, 운영 담당자. 다른 관점은 누락된 README, 상태 명령의 부작용, 관찰 가능성 격차와 같은 신뢰 저해 이슈를 잡아냅니다.</p>"}, "3_3": {"title": "검증 구조", "content": "<p>검증은 데모와 프로덕션을 구분하는 것입니다. 좋은 검증 계획은 다음을 답합니다: \"이 작업이 완료되기 전에 무엇이 통과해야 하는가?\"</p>\n<p><strong><code>tasks/verify.md</code> 템플릿:</strong></p>\n<pre><code># 검증 계획\n## 반드시 통과\n- [ ] 유닛 테스트: `pnpm test -- signup`\n- [ ] 린트: `pnpm lint`\n- [ ] 타입 체크: `pnpm typecheck`\n## 반드시 검토 (인간)\n- [ ] 모바일에서 수동 브라우저 확인\n- [ ] CTA 텍스트 이해관계자 승인\n## 깨뜨리면 안 됨\n- [ ] 기존 인증 플로우 변경 없음\n- [ ] 새 의존성 추가 없음</code></pre>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 검증 스킬 (회원가입 플로우가 엔드투엔드로 작동하는지, 결제 상태가 올바른지, CLI가 TTY 환경에서 작동하는지 확인)은 종종 생성 스킬보다 ROI가 높습니다. \"잘 쓴 초안\"은 저렴합니다 — \"검증된 통과 결과\"는 비싸고 가치 있습니다.</div>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 테스트 통과를 유지보수 가능한 구현이 아닌 목표로 취급하기. 모델은 테스트를 녹색으로 만들기 위해 값을 하드코딩하거나 특수 케이스를 추가할 수 있습니다. 검증 프롬프트에서 지름길을 명시적으로 금지하고 테스트가 잘못된 것 같을 때 보고하도록 요구하세요.</div>"}, "3_4": {"title": "토큰 경제와 비용 관리", "content": "<p>토큰은 청구 단위이자 작업이 얼마나 넓게 퍼졌는지의 신호입니다. 한 줄 프롬프트도 훨씬 더 많이 보냅니다: 질문, 대화 기록, 로드된 파일, CLAUDE.md, 규칙, 도구 출력, 최근 모델 출력이 모두 컨텍스트 창에 들어갑니다.</p>\n<table><tr><th>토큰 유형</th><th>포함 내용</th></tr><tr><td><strong>입력 토큰</strong></td><td>프롬프트, 파일, 대화 기록, 규칙 파일, 도구 출력</td></tr><tr><td><strong>출력 토큰</strong></td><td>설명, 코드, 요약, 도구 호출 결과</td></tr></table>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> \"토큰 절약\"은 인색함이 아닙니다 — Claude가 필요한 것만 읽도록 설계하는 것입니다. <strong>프롬프트 캐시</strong>는 유사한 배경이 반복 전송될 때 재사용 이점을 제공합니다. 안정적인 접두사 (CLAUDE.md, 규칙)가 일관되고 캐시 가능하도록 컨텍스트를 구조화하세요.</div>\n<p><strong>비용은 세기가 아닌 구조로 관리합니다:</strong></p>\n<ul><li>도구 출력 상세도를 줄이세요 (전체 로그를 덤프하지 마세요)</li><li>세션을 집중시키세요 — 관련 없는 작업을 섞지 마세요</li><li>전략적 시점에 <code>/compact</code>를 사용하세요, 마지막 수단으로가 아니라</li><li>조사와 구현을 다른 세션으로 분리하세요</li><li><code>/cost</code>로 비용을 추적하여 감각을 키우세요</li></ul>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> <strong>도구 결과 예산</strong> 개념은 도구 출력이 소비하는 컨텍스트 양을 제어하는 것입니다. 500줄의 출력을 생성하는 테스트 스위트는 컨텍스트를 빠르게 소비합니다. 원시 로그가 아닌 요약을 반환하도록 도구를 구성하세요.</div>"}, "3_5": {"title": "세션 관리와 재개 위생", "content": "<p><strong>재개 위생</strong>은 다음 세션에 필요한 것만 유지하고 축적된 노이즈를 폐기하는 것을 의미합니다. 긴 세션이 본질적으로 더 좋은 것은 아닙니다 — 컨텍스트 부패가 축적됩니다.</p>\n<p><strong>세션 메모리 템플릿:</strong></p>\n<pre><code># 현재 상태\n- 지금 하고 있는 일\n\n# 작업 명세\n- 사용자가 실제로 요청한 것\n\n# 파일과 함수\n- 중요한 파일과 그 이유\n\n# 워크플로우\n- 자주 사용하는 명령어와 순서\n\n# 오류와 수정\n- 실패한 시도 — 이것을 반복하지 마세요\n\n# 핵심 결과\n- 확인된 결과와 답변\n\n# 작업 기록\n- 최근 단계 (매우 짧게 유지)</code></pre>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 긴 세션은 정보가 다섯 가지 범주로 수렴될 때 살아남습니다: 현재 상태, 파일, 워크플로우, 오류, 결과. 나머지는 모두 노이즈입니다. <code>오류와 수정</code> 섹션은 수치 기록이 아닙니다 — 재실패 방지 장치입니다.</div>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 상태 줄 (<code>/statusline</code>)을 대시보드로 사용하세요. 작업 디렉토리, Git 브랜치, 컨텍스트 사용량을 보여줍니다. 컨텍스트 사용량이 올라가면 상태를 파일에 저장하고 새 세션을 시작하세요 — 품질이 저하될 때까지 밀어붙이지 마세요.</div>"}}}, "part4": {"title": "4부: 확장과 자동화", "sections": {"4_1": {"title": "스킬: 반복 절차를 Claude에게 가르치기", "content": "<p>같은 절차를 열 번째 설명할 때 — 회의 노트 형식, 주간 브리프 구조, 코드 리뷰 체크리스트 — <strong>스킬</strong>을 만들 때입니다. 스킬은 설명 비용을 줄이는 재사용 가능한 작업 매뉴얼입니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 스킬은 프롬프트 조각이 아닙니다. 메인 문서 (<code>SKILL.md</code>), 보조 스크립트, 참조 파일, 에셋이 포함된 폴더 구조입니다. 공식 가이드는 <em>점진적 공개</em>를 권장합니다: 전면 정보와 설명이 먼저 로드되고, 세부 사항은 스킬이 활성화될 때만 로드됩니다.</div>\n<table><tr><th>스킬로 승격할 때...</th><th>대화로 유지할 때...</th></tr><tr><td>출력 형식이 반복되고, 변형을 줄여야 하고, 저장 위치와 도구 순서를 고정해야 할 때</td><td>주제가 자주 바뀌고, 일회성 브레인스토밍 탐색일 때</td></tr></table>\n<p><strong>Projects vs. Skills:</strong> Projects는 항상 존재하는 배경 지식입니다. Skills는 일치하는 작업이 도착할 때 활성화되는 절차입니다. 절차 없는 배경은 일관성 없는 출력으로, 컨텍스트 없는 절차는 빈 결과로 이어집니다.</p>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 스킬의 <code>description</code> 필드는 소개 문단이 아닙니다 — 라우팅 규칙입니다. 설명이 모호하면 스킬이 트리거되지 않거나 (언더트리거링) 관련 없는 작업에 발동됩니다 (오버트리거링). \"사용자가 주간 경쟁사 브리프, 시장 리뷰, 산업 트렌드 요약을 요청할 때 이 스킬을 사용하세요.\"와 같이 작성하세요.</div>"}, "4_2": {"title": "스킬 유형과 설계 템플릿", "content": "<p>스킬은 특정 도메인과 관계없이 몇 가지 공통 역할로 분류됩니다:</p>\n<ul><li><strong>라이브러리/SDK 참조</strong> — 내부 또는 까다로운 외부 라이브러리의 사용 패턴을 고정</li><li><strong>검증/테스팅</strong> — 확인 절차를 표준화 (Playwright 플로우, CLI 테스트)</li><li><strong>데이터 파이프라인</strong> — 데이터 소스와 보고 경로를 조직</li><li><strong>반복 운영</strong> — 주간 리뷰, 스탠드업, 티켓 생성</li><li><strong>스캐폴딩</strong> — 초기 서비스나 핸들러 구조를 생성</li><li><strong>품질 게이트</strong> — 리뷰 표준, 테스트 규칙, 보안 체크리스트</li></ul>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 모든 것을 시도하는 스킬 (\"리서치, 코드, 테스트, 배포\")은 강력해 보이지만 깨지기 쉽습니다. 하나의 병목을 정확하게 해결하는 스킬이 가장 오래 살아남습니다. 검증 스킬은 종종 생성 스킬보다 ROI가 높습니다.</div>\n<p><strong>스킬 설계 템플릿:</strong></p>\n<pre><code>---\nname: weekly-brief\ndescription: >\n  주간 경쟁사 브리프, 정기 시장 확인,\n  산업 트렌드 요약 요청에 사용.\ndisable-model-invocation: false\n---\n# 목표\n최근 7일간의 증거만을 사용하여 주간 경쟁사 브리프 작성.\n\n# 입력 소스\n- 경쟁사 목록: `references/competitors.md`\n- 템플릿: `assets/weekly-brief-template.md`\n\n# 단계\n1. 경쟁사 목록과 템플릿 읽기\n2. 최근 7일 변경 사항 검색\n3. 템플릿 구조에 따라 브리프 초안 작성\n4. 불확실한 항목은 별도 표시\n5. `outputs/weekly-brief-YYYY-MM-DD.md`에 저장\n\n# 규칙\n- 최대 3개 액션 아이템\n- 출처와 날짜 필수\n- 추측 금지 — 불확실한 것은 \"검증 필요\"로 표시</code></pre>"}, "4_3": {"title": "플러그인: 팀을 위한 역할 패키지", "content": "<p><strong>플러그인</strong>은 여러 스킬, 명령, hook, 연결 설정을 하나의 배포 가능한 패키지로 묶습니다. 스킬이 작업 매뉴얼이라면, 플러그인은 새 팀원에게 건네주는 온보딩 박스입니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> \"플러그인\"이라는 단어는 작업 공간에 따라 다른 의미를 가집니다. <strong>Claude Code 플러그인</strong>은 개발 워크플로우를 위한 명령, 에이전트, hook, 스킬, MCP, LSP를 묶습니다. <strong>Cowork 플러그인</strong>은 지식 업무 역할을 위한 스킬, 커넥터, 슬래시 명령, 서브에이전트를 묶습니다. 같은 이름, 다른 설치 경험.</div>\n<p><strong>진행 경로:</strong> MCP는 외부 도구에 연결 → Skills는 절차를 정의 → Plugins는 배포를 위해 모든 것을 패키징. 한 줄로: <em>Skills는 \"어떻게 하는가\", MCP는 \"도달하는 경로\", Plugins는 \"배포하는 상자\"입니다.</em></p>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 외부 Skills와 Plugins를 단순한 문서로 취급하기. 도구 호출, 파일 접근, 외부 URL 패치, 실행 스크립트를 포함할 수 있습니다. 외부 스킬을 설치하기 전에 확인하세요: (1) 외부 URL을 가져오나? (2) Bash, 파일 쓰기, 네트워크를 사용하나? (3) 파일이 명시된 목적과 일치하나? (4) 민감한 데이터 근처에서 실행될 것인가? (5) 빠르게 비활성화할 수 있나?</div>"}, "4_4": {"title": "MCP: 외부 도구 연결", "content": "<p><strong>Model Context Protocol (MCP)</strong>은 Claude가 외부 도구와 서비스에 연결하는 표준화된 방식입니다 — AI 도구 통합을 위한 USB-C 포트와 같습니다.</p>\n<p><strong>MCP vs. Connector:</strong></p>\n<table><tr><th>Connector</th><th>MCP</th></tr><tr><td>사용자 대상 — 설정 화면에서 검색하고 연결</td><td>개발자 대상 — 서버, 도구 인터페이스, 응답 형식을 설계</td></tr><tr><td>앱 스토어 연결과 유사</td><td>내부 배선 패널 설계와 유사</td></tr><tr><td>연결 자체가 목표일 때 최적</td><td>연결 후 도구 구조를 제어해야 할 때 최적</td></tr></table>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 빠른 결정: \"그냥 연결해서 쓰고 싶다\" → Connector. \"어떤 도구를 노출할지, 응답 형식, 어떤 프로젝트에서 활성화할지를 제어하고 싶다\" → MCP. 이를 혼동하면 간단한 연결을 과잉 엔지니어링하거나 복잡한 자동화를 과소 엔지니어링하게 됩니다.</div>"}, "4_5": {"title": "Hooks, 서브에이전트와 제어 인터페이스", "content": "<p><strong>Hooks</strong>는 \"확인하는 것을 기억하기\"를 \"항상 확인하기\"로 변환합니다. 특정 순간 — 도구 사용 전, 편집 후, 푸시 전 등 — 에서 작동하는 자동 개입 규칙입니다.</p>\n<p>프롬프트가 도로 표지판 (\"조심해서 운전하세요\")이라면, hook은 안전벨트 경보와 자동 브레이크입니다. 표지판은 무시할 수 있지만, 안전 시스템은 실제 행동을 변경합니다. 팀이 확장될수록 hook이 더 중요해지는 이유입니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> Hook 유형에는 명령 hook (쉘 스크립트), 프롬프트 기반 hook, 에이전트 기반 hook, HTTP hook이 포함됩니다. 팀의 경우, 관리 전용 hook과 HTTP hook 허용 목록은 개인 쉘 스크립트를 훨씬 넘어서는 조직적 제어를 제공합니다.</div>\n<p><strong>서브에이전트</strong>는 컨텍스트를 격리합니다. 메인 세션이 탐색, 구현, 리뷰, 문서화를 처리하면 컨텍스트가 시끄러워집니다. 리서치나 리뷰를 서브에이전트에 위임하면 메인 세션이 집중됩니다. 팀 리드가 직접 팩트체킹을 하는 대신 분석가에게 위임하는 것으로 생각하세요.</p>\n<p><strong>Remote Control / Channels / Scheduled Tasks</strong>는 모두 작업을 재시작하지만, 트리거가 다릅니다:</p>\n<table><tr><th>기능</th><th>누가 버튼을 누르나</th></tr><tr><td>Remote Control</td><td>인간이, 원격에서</td></tr><tr><td>Channels</td><td>외부 시스템 (웹훅, 메시지)</td></tr><tr><td>Scheduled Tasks</td><td>시간 자체 (cron과 유사)</td></tr></table>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 네 가지 실전 규칙: (1) 같은 설명을 계속 반복하면 스킬이나 규칙 파일로 추출하세요. (2) 외부 도구를 계속 연결하면 더 많은 MCP 연결을 추가하기 전에 권한 범위를 좁히세요. (3) 검증이 계속 잊혀지면 hook으로 밀어넣으세요. (4) 병렬 처리가 필요하면 전체 에이전트 팀을 시작하기 전에 작은 서브에이전트나 워크트리를 먼저 시도하세요.</div>"}}}, "part5": {"title": "5부: 직무별 플레이북", "sections": {"5_1": {"title": "PM, 전략 및 창업자", "content": "<p>제품 관리자, 전략가, 창업자는 공통 출발점을 공유합니다: 리서치를 정리하고 빠르게 의사결정하기. 첫 성과는 전체 자동화가 아닌 <strong>리서치 브리프</strong>, 회의 노트 구조화, 의사결정 문서화에서 나옵니다.</p>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> PM을 위한 이상적인 Claude 도입 경로: (1) 회의 노트 요약 → (2) 주간 리서치 브리프 → (3) PRD 초안 생성 → (4) 템플릿을 활용한 경쟁 분석. 각 단계는 이전 파일 구조 위에 구축됩니다.</div>\n<p><strong>창업자 / 1인 운영자 최소 파일 세트:</strong></p>\n<pre><code>workspace/\n├── about-me.md          # 배경, 산업, 목표\n├── working-rules.md     # 톤, 금지 주제, 우선순위\n├── projects/\n│   └── current/\n│       ├── brief.md     # 이번 주 집중 사항\n│       └── competitors.md\n├── templates/\n│   └── weekly-brief.md\n└── outputs/</code></pre>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 전략가에게 인간이 항상 소유해야 하는 것: 시장 해석, 우선순위 결정, 이해관계자 조율. Claude는 리서치와 구조화를 가속화합니다 — 판단이 아닙니다.</div>\n<p><strong>인간이 유지해야 할 것:</strong> 시장 해석, 우선순위 설정, 이해관계자 협상. Claude는 리서치 수집, 초안 구조화, 형식 일관성을 처리합니다.</p>"}, "5_2": {"title": "마케팅과 콘텐츠", "content": "<p>마케팅 팀은 브랜드 보이스 파일과 콘텐츠 템플릿을 먼저 확립할 때 Claude에서 가장 빠른 수익을 얻습니다. <code>brand-voice.md</code>와 <code>anti-ai-writing-style.md</code> 없이는 모든 콘텐츠에 광범위한 톤 수정이 필요합니다.</p>\n<p><strong>콘텐츠 운영 도입 경로:</strong></p>\n<ol><li>주제 리서치와 콘텐츠 구조 아웃라인</li><li>브랜드 보이스 템플릿을 활용한 초안</li><li>멀티 채널 적응 (블로그 → 소셜 → 뉴스레터)</li><li>구조화된 템플릿을 활용한 SEO 최적화</li><li>정기 콘텐츠 캘린더 자동화</li></ol>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> <code>brand-voice.md</code> 없이 \"우리 회사 톤으로 작성해\"라고 말하기. Claude는 당신의 브랜드를 직감할 수 없습니다. 선호 문구, 금지 문구, 문장 길이 가이드라인, 격식 수준, 이상적인 톤을 보여주는 2~3개의 예시 문단이 포함된 파일을 작성하세요.</div>\n<p><strong>인간이 유지해야 할 것:</strong> 최종 메시지 결정, 브랜드 톤 승인, 외부 발행 서명. Claude는 리서치 종합, 구조적 초안 작성, 형식 적응을 처리합니다.</p>"}, "5_3": {"title": "영업, 고객 성공 및 운영", "content": "<p>영업과 고객 성공 팀은 <strong>어카운트 브리프</strong>와 <strong>후속 이메일 초안</strong>에서 가장 큰 혜택을 받습니다. 핵심 제약: 모든 외부 커뮤니케이션은 인간 승인 게이트를 통과해야 합니다.</p>\n<p><strong>운영 및 백오피스 자동화</strong>는 가장 낮은 위험 작업부터 시작해야 합니다: 폴더 정리, 분류, 초안 요약, 템플릿 기반 보고. 높은 위험 자동화 (실제 데이터 입력, 결제 처리, 삭제)는 거버넌스 구조가 갖춰진 후에만 해야 합니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 에이전시와 팀 운영자에게 핵심 원칙은 <em>클라이언트 컨텍스트 격리</em>입니다. 여러 클라이언트를 동시에 관리할 때, 가장 큰 위험은 느린 출력이 아닙니다 — 클라이언트 간 컨텍스트 오염입니다. 클라이언트별 별도 폴더, 공유 템플릿, 엄격한 명명 규칙이 교차 클라이언트 유출을 방지합니다.</div>\n<pre><code>clients/\n├── client-a/\n│   ├── brief.md\n│   ├── glossary.md\n│   └── approval-rules.md\n├── client-b/\n│   ├── brief.md\n│   └── ...\ntemplates/\n├── client-report-template.md\n└── review-checklist.md\nteam/\n├── shared-rules.md\n└── naming-convention.md</code></pre>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 에이전시 맥락에서, 하나의 폴더 경계가 하나의 영리한 프롬프트보다 더 많은 사고를 방지합니다. 속도보다 Client A의 데이터가 Client B의 출력에 절대 유출되지 않게 하는 것이 중요합니다.</div>"}, "5_4": {"title": "디자인, 엔지니어링 및 리서치", "content": "<p><strong>디자인/브랜딩:</strong> 디자이너는 참조 기반 탐색과 구현 QA에서 가장 큰 가치를 얻습니다. 이미지를 입력으로 사용하세요 — 버그 스크린샷, 참조 레이아웃, 원하는 상태. 시각적 컨텍스트는 종종 CSS 설명의 문단이 전달할 수 없는 것을 전달합니다.</p>\n<p><strong>엔지니어링:</strong> 가장 강력한 첫 번째 작업은 항상 대규모 새 기능이 아닌 테스트가 있는 작은 버그 수정입니다. 도입 경로: (1) 버그 수정 + 테스트 → (2) 계획이 있는 리팩토링 → (3) 리뷰 분리를 통한 코드 리뷰 → (4) 병렬 워크트리 실험 → (5) CI 통합과 자동화된 hook.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 연구자와 분석가에게 Claude가 뛰어난 것: 요약, 용어집 생성, 비교 표, 질문 생성, 구조화된 문헌 리뷰. 인간이 항상 소유해야 하는 것: 주장 해석, 재현 결과 판단, 독창적 통찰.</div>\n<p><strong>모든 역할에 걸친 도입 우선순위는 같은 패턴을 따릅니다:</strong></p>\n<ol><li>정보 수집과 정리 (가장 낮은 위험)</li><li>템플릿을 활용한 초안 작성</li><li>검증 루프를 통한 검토와 개선</li><li>스킬을 통한 반복 워크플로우 자동화</li><li>병렬 에이전트와 예약 작업으로 확장 (가장 높은 위험, 마지막 단계)</li></ol>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 엔드투엔드 자동화부터 시작하기. 가장 멀리 가는 팀은 프로세스의 앞부분 (정리, 구조화, 초안)부터 시작하고, 거버넌스가 확립된 후에야 뒷부분 (실행, 배포, 전달)을 자동화합니다.</div>"}, "5_5": {"title": "시나리오 가이드: 막힌 상황을 워크플로우로 연결하기", "content": "<p>8장은 기능 백과사전이 아닙니다 — <em>상황 매칭 표</em>입니다. 접근법: 오늘의 차단 요인 식별 → 작업 형태 분류 → 파일 세트 선택 → 실행 → 승인 게이트를 통한 검증 → 구조화된 인수인계.</p>\n<p><strong>모든 막힌 시나리오에 대한 워크플로우:</strong></p>\n<ol><li><strong>오늘의 차단 요인</strong> — 어떤 구체적인 작업이 막혀있나?</li><li><strong>작업 형태</strong> — 리서치, 초안, 구현, 리뷰 중 무엇인가?</li><li><strong>파일 세트 선택</strong> — 이 작업에 필요한 최소 파일은?</li><li><strong>실행</strong> — 출력 계약과 함께 워크플로우 실행</li><li><strong>승인 게이트</strong> — 외부로 나가기 전 인간 확인</li><li><strong>구조화된 인수인계</strong> — 다음 세션을 위한 상태와 다음 단계</li></ol>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 시나리오 매칭의 핵심 용어: <em>출력 계약</em> (결과가 따라야 할 형식과 위치), <em>토큰 핫스팟</em> (컨텍스트가 갑자기 비싸지는 지점), <em>승인 게이트</em> (외부 전달 전 필수 인간 확인), <em>구조화된 인수인계</em> (세션 연속성을 위한 형식화된 상태 메모).</div>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 앞으로의 격차는 더 많은 기능을 아는 사람들 사이가 아니라, 역할별 위임 전략을 더 빨리 학습하는 팀 사이에서 벌어질 것입니다. 개발과 고객 지원이 먼저 도입하고 (광범위하고 저위험 작업), 법률, 재무, 연구는 더 신중하게 도입합니다 (요약과 분류 먼저, 판단은 나중에).</div>"}}}, "part6": {"title": "6부: 커뮤니티 패턴과 도구 선택", "sections": {"6_1": {"title": "기억, 회상 및 검색 패턴", "content": "<p>커뮤니티 실무자들은 시간이 지남에 따라 Claude의 메모리와 컨텍스트를 관리하기 위한 반복 패턴을 개발했습니다. 이것은 공식 기능이 아닙니다 — 매일 사용하면서 나타나는 운영 습관입니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> <strong>세션 메모리</strong>는 전체 대화를 저장하는 것이 아닙니다. 다음 세션이 시작 시 읽는 구조화된 상태 파일 (<code>handoff.md</code>, <code>decision-log.md</code>, <code>worklog.md</code>)을 유지하는 것입니다. 대화는 일회용입니다; 파일이 진짜 메모리입니다.</div>\n<p><strong>일반적인 메모리 패턴:</strong></p>\n<ul><li><strong>파일 기반 메모리:</strong> <code>CLAUDE.md</code> + 규칙 파일 + 인수인계 파일이 세션 경계를 넘어 지속되는 영속 메모리 레이어를 형성</li><li><strong>구조화된 회상:</strong> 새 작업 전에 <code>tasks/handoff.md</code>와 <code>tasks/plan.md</code>를 읽으며 각 세션 시작</li><li><strong>점진적 공개:</strong> 배경을 상단에 로드하고, 작업별 세부 사항은 활성화될 때만 로드 (스킬 전면 정보가 전체 스킬 콘텐츠를 트리거하는 것처럼)</li></ul>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 가장 효과적인 메모리 전략은 가장 간단합니다: 매 세션 끝에 <code>handoff.md</code>를 현재 상태, 다음 단계, 미해결 위험으로 업데이트하세요. 이 하나의 습관이 \"어디까지 했지?\" 혼란의 80%를 방지합니다.</div>"}, "6_2": {"title": "Plan.md와 파일 기반 계획", "content": "<p><code>plan.md</code> 패턴은 가장 널리 채택된 커뮤니티 관행 중 하나입니다. 계획을 대화에 유지하는 대신, Claude와 인간 모두 참조할 수 있는 파일에 작성합니다.</p>\n<p><strong>계획이 대화가 아닌 파일에 속하는 이유:</strong></p>\n<ul><li>파일은 세션 경계를 넘어 살아남지만 대화는 그렇지 않습니다</li><li>파일은 인간이 독립적으로 검토할 수 있습니다</li><li>파일은 Git으로 버전 관리할 수 있습니다</li><li>파일은 대화를 재계획이 아닌 실행에 집중시킵니다</li></ul>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 계획 파일은 관료주의가 아닙니다 — 재작업 방지 장치입니다. 편집 전에 계획하는 팀은 일관되게 더 적은 롤백, 더 짧은 리뷰 사이클, 긴 세션에서 더 적은 컨텍스트 오염을 보고합니다.</div>\n<p><strong>효과적인 plan.md 구조:</strong></p>\n<pre><code># 계획\n## 목표\n원하는 최종 상태를 설명하는 한 문장.\n\n## 범위\n- 수정할 파일: [목록]\n- 금지 영역: [목록]\n\n## 단계\n1. ...\n2. ...\n\n## 검증\n- 통과할 테스트: [목록]\n- 수동 확인: [목록]\n\n## 미결 질문\n- [시작 전 미해결 항목]</code></pre>"}, "6_3": {"title": "병렬 세션과 멀티 에이전트 운영", "content": "<p>고급 사용자들은 각각 다른 역할을 가진 여러 Claude 세션을 병렬로 실행합니다. 이것은 속도가 아닙니다 — <em>컨텍스트 격리</em>에 관한 것입니다.</p>\n<p><strong>일반적인 병렬 패턴:</strong></p>\n<ul><li><strong>계획 + 구현:</strong> 한 세션이 계획하고, 다른 세션이 작성된 계획에 기반하여 구현</li><li><strong>구현 + 리뷰:</strong> 한 세션이 코드를 작성하고, 다른 세션이 별도 워크트리에서 리뷰</li><li><strong>메인 + 서브에이전트 리서치:</strong> 메인 세션은 집중을 유지하면서 서브에이전트가 문서를 탐색하거나 데이터를 수집</li><li><strong>멀티 워크트리 실험:</strong> 격리된 작업 디렉토리에서 다른 접근법을 테스트하고 결과를 비교</li></ul>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 역할 명확성 없는 병렬 처리는 속도가 아닌 혼란을 만듭니다. 병렬 세션을 시작하기 전에 정의하세요: 누가 무엇을 하는지, 각 세션이 어떤 파일을 터치할 수 있는지, 결과가 어떻게 합쳐지는지. 구조화되지 않은 병렬 처리는 순차 작업보다 더 나쁝니다.</div>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 많은 커뮤니티 멤버가 열망하는 \"OpenClaw 스타일\" 운영은: 항시 켜진 세션, 멀티 채널 접근 (터미널, 폰, 웹), 세션 간 영속 상태, 예약 작업, 원격 제어를 의미합니다. Claude 생태계에서는 Claude Code + CLAUDE.md + hooks + 서브에이전트 + MCP + Remote Control + Channels + Scheduled Tasks를 결합하여 달성합니다.</div>"}, "6_4": {"title": "자기 개선 및 SEO/콘텐츠 루프", "content": "<p>커뮤니티 패턴에는 Claude를 사용하여 자체 환경을 개선하는 것이 포함됩니다 — 스킬 생성, 규칙 개선, 과거 출력 평가.</p>\n<p><strong>자기 개선 루프:</strong></p>\n<ol><li>현재 규칙과 스킬로 작업 실행</li><li>출력 평가 (수동 또는 리뷰 서브에이전트로)</li><li>실패를 기반으로 규칙, 스킬 설명, 템플릿 업데이트</li><li>재실행하고 비교</li></ol>\n<p><strong>SEO와 콘텐츠 자동화 패턴:</strong></p>\n<ul><li>키워드 리서치 → 콘텐츠 구조 → 초안 → SEO 리뷰 스킬 → 발행</li><li>멀티 채널 적응: 하나의 리서치 세션이 블로그, 소셜, 뉴스레터, 이메일 템플릿을 공급</li><li>예약 작업을 통한 콘텐츠 캘린더 자동화</li></ul>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 메타 스킬 <code>skill-creator</code>는 설명으로부터 초기 스킬 초안을 생성할 수 있습니다. 하지만 초안을 생산하지, 프로덕션 준비 스킬을 생산하지는 않습니다. 실패 사례, 엣지 조건, 검증 루프는 여전히 인간의 검토와 반복이 필요합니다.</div>"}, "6_5": {"title": "도구 선택 기준", "content": "<p>스킬, 플러그인, MCP 서버의 생태계가 성장함에 따라, 올바른 도구를 선택하려면 규율이 필요합니다.</p>\n<p><strong>외부 도구를 설치하기 전 평가 체크리스트:</strong></p>\n<ol><li>마지막 유지보수 시점은?</li><li>실제 README와 예시가 있는가?</li><li>어떤 보안 민감 권한이 필요한가?</li><li>컨텍스트 비용이 유용성에 비해 정당한가?</li><li>문제가 생기면 빠르게 비활성화할 수 있는가?</li></ol>\n<p><strong>도구를 찾을 수 있는 곳:</strong></p>\n<table><tr><th>출처</th><th>유형</th></tr><tr><td>Anthropic Skills GitHub</td><td>공식 / 준공식</td></tr><tr><td>Anthropic Claude Plugins GitHub</td><td>공식</td></tr><tr><td>agentskills.io</td><td>표준 문서</td></tr><tr><td>skillsmp.com, skill hubs</td><td>커뮤니티 마켓플레이스</td></tr><tr><td>awesome-claude-skills GitHub 목록</td><td>커뮤니티 큐레이션</td></tr></table>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> 사용하지 않을 도구를 수집하기. \"나중에 저장\" 도구는 운영 자산이 되지 못한 채 쌓입니다. 이번 주에 세 번 이상 사용할 도구만 설치하세요. 설치된 도구를 매월 검토하고 사용하지 않는 것은 제거하세요.</div>"}}}, "part7": {"title": "7부: 거버넌스와 마지막 실전", "sections": {"7_1": {"title": "왜 거버넌스가 중요한가", "content": "<p>거버넌스는 규정 준수 체크박스가 아닙니다 — 팀이 불안 대신 확신을 가지고 AI를 사용할 수 있게 하는 구조입니다. 거버넌스 없이는 모든 자동화가 인프라가 될 수 없는 데모입니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 거버넌스가 답하는 핵심 질문: \"Claude가 묻지 않고 할 수 있는 것, 반드시 물어봐야 하는 것, 절대 해서는 안 되는 것은 무엇인가?\" 이것이 조직 규모에 적용된 allow/ask/deny 프레임워크입니다.</div>\n<p><strong>위험 분류 예시:</strong></p>\n<table><tr><th>위험 수준</th><th>예시</th><th>승인 모드</th></tr><tr><td><strong>낮음</strong></td><td>회의 요약, 내부 초안, 테스트 추가</td><td>자동 실행</td></tr><tr><td><strong>중간</strong></td><td>고객 대상 초안, 정기 보고, 리팩토링</td><td>인간 검토 후 실행</td></tr><tr><td><strong>높음</strong></td><td>프로덕션 배포, 고객 이메일, 회계 입력, 권한 변경, 민감 데이터 쿼리</td><td>인간 승인 필수 — 승인 없이 실행 불가</td></tr></table>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 거버넌스 롤아웃은 단계적으로 가장 잘 작동합니다: 1주차 — <code>.env</code> 접근과 파괴적 명령을 차단하고, 배포에 승인 요구. 2주차 — 허용 플러그인/스킬을 표준화하고, 프로젝트별 CLAUDE.md와 규칙 정리. 3주차 — 비용 모니터링을 추가하고 인수인계/승인 로깅 습관 확립.</div>"}, "7_2": {"title": "권한 모델과 거버넌스 4계층", "content": "<p>권한 모델은 세 가지 모드를 사용합니다: <strong>allow</strong> (자동 진행), <strong>ask</strong> (인간 결정 대기), <strong>deny</strong> (완전 차단). 규칙은 순서대로 평가됩니다: deny → ask → allow, 첫 번째 매칭이 적용됩니다.</p>\n<p><strong>거버넌스 4계층:</strong></p>\n<ol><li><strong>문서 계층</strong> — <code>CLAUDE.md</code>, 규칙 파일, 스킬 지시: Claude가 알고 따라야 하는 것</li><li><strong>설정 계층</strong> — <code>settings.json</code>, 권한 규칙, 관리 설정: Claude가 할 수 있는 것과 없는 것</li><li><strong>런타임 계층</strong> — Hooks, 승인 게이트, 계획 모드: 실행 중에 일어나는 것</li><li><strong>추적 계층</strong> — 작업 로그, 승인 로그, 결정 로그, 인수인계 파일: 무엇이 왜 일어났는지</li></ol>\n<div class=\"callout callout-warning\"><strong>&#9888;&#65039; 흔한 실수:</strong> <code>bypassPermissions</code>를 팀 기본값으로 사용하기. 커뮤니티 포스트에서 종종 \"속도를 위해 모든 권한을 끄기\"를 권장합니다. Anthropic은 이를 조직이 <code>disableBypassPermissionsMode</code>로 완전히 비활성화할 수 있는 권한 모드로 취급합니다. 개인 실험과 팀 표준은 같은 권한 수준을 공유해서는 안 됩니다.</div>\n<p><strong>팀을 위한 2계층 권한 구조:</strong></p>\n<ul><li><strong>글로벌 (사용자 수준):</strong> <code>rm -rf</code>, 비밀 파일, 강제 푸시 차단</li><li><strong>프로젝트 수준:</strong> 이 저장소에 특화된 마이그레이션 폴더, 배포 스크립트, 결제 구성 차단</li></ul>"}, "7_3": {"title": "인간 감독과 감사 가능성", "content": "<p><strong>인간-인-더-루프</strong> 설계는 인간이 결정을 내리는 명시적 체크포인트를 구축하는 것을 의미합니다 — 모든 행동을 감시하는 것이 아닙니다. 목표는 전략적 개입이지, 지속적인 감독이 아닙니다.</p>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> <strong>감사 가능성</strong>은 나중에 설명할 수 있다는 것을 의미합니다: 무엇이 읽혀졌는지, 무엇이 생성되었는지, 누가 승인했는지, 무엇이 미완료인지. 감사 추적이 있는 같은 자동화가 인프라가 됩니다; 없으면 데모로 남습니다.</div>\n<p><strong>고위험 작업을 위한 최소 감사 추적:</strong></p>\n<pre><code>1. source/          — 원본 자료 또는 링크\n2. outputs/         — Claude의 초안과 수정본\n3. work-log.md      — 무엇이 언제 실행되었는지\n4. approval-log.md  — 누가 무엇을 언제 승인했는지\n5. handoff.md       — 남은 위험과 다음 단계</code></pre>\n<p><strong>운영 로그 vs. 결정 추적:</strong> 운영 로그는 <em>무슨 일이 있었는지</em>를 기록합니다 (명령, 도구 호출, 타임스탬프). 결정 추적은 <em>왜</em>를 기록합니다 (무엇이 고려되었는지, 어떤 대안이 거부되었는지, 왜 이 경로가 선택되었는지). 긴 작업을 수행하는 에이전트에는 둘 다 필요합니다. 결정 추적 없이는 실패가 어디에서 발생했는지는 볼 수 있지만 왜인지는 알 수 없습니다.</p>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> Cowork 대화는 로컬에 저장되며 감사 로그, Compliance API, 데이터 내보내기에 나타나지 않습니다. 규제 대상 업무에 Cowork를 사용하지 마세요. 감사가 중요한 작업에는 Git 기반 로깅, hook, 외부 승인 추적이 있는 Claude Code를 사용하세요.</div>"}, "7_4": {"title": "팀 도입 전략", "content": "<p>팀 도입은 공유 규칙과 자산을 배포하기 시작하는 순간 개인 사용과 갈라집니다. 도구를 배포하는 것이 아닙니다 — <em>정책이 부착된 운영 환경</em>을 배포하는 것입니다.</p>\n<p><strong>핵심 팀/엔터프라이즈 기능:</strong></p>\n<ul><li>스킬 프로비저닝 — 조직 전체에 공유 스킬 배포</li><li>관리 설정 — 개인이 재정의할 수 없는 관리자 강제 구성</li><li>플러그인 마켓플레이스 관리 — 사용 가능한 플러그인 제어</li><li>사용량 분석 대시보드와 Analytics API</li><li>시트 정책 — 누가 어떤 기능에 접근하는지</li></ul>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 표준화는 창의성을 죽이지 않습니다 — 반복적인 설명 비용을 죽입니다. 공유 회의 요약 스킬, 클라이언트 응답 템플릿, PR 리뷰 스킬, 주간 브리프 템플릿이 팀 전체에 배포되면, 사람들은 형식에 시간을 덜 쓰고 판단에 더 많은 시간을 쓱니다.</div>\n<p><strong>거버넌스 신호로서의 비용:</strong> 사용 데이터는 재무만을 위한 것이 아닙니다 — 설계 피드백 루프입니다. \"이 에이전트가 매 세션마다 긴 규정 파일을 다시 읽는다\" → 캐싱을 조사. \"이 자동화가 상세한 도구 출력을 생산한다\" → 출력 예산을 줄이기. 비용 관리는 예산 단속이 아닌 운영 설계입니다.</p>"}, "7_5": {"title": "마지막 실전: Claude Code로 만들기", "content": "<p>마지막 장은 두 가지 실용적인 프로젝트로 모든 것을 종합합니다: 작은 웹사이트 만들기와 자동화 워크플로우 만들기. 둘 다 얇지만 완성된 결과가 정교하지만 미완성된 계획보다 가치 있다는 것을 보여줍니다.</p>\n<p><strong>웹사이트 프로젝트 접근법:</strong></p>\n<ol><li>세 줄을 먼저 고정: <strong>독자</strong> (누가 읽나?), <strong>목표</strong> (무엇을 이해해야 하나?), <strong>행동</strong> (무엇을 해야 하나?)</li><li>파일 세트 생성: <code>brief.md</code>, <code>tone.md</code>, <code>references/</code>, <code>site/</code></li><li>Cowork으로 구조와 카피 초안, 그 다음 Claude Code로 구현</li><li>세 가지 프롬프트로 분리: 설계 (구조), 구현 (빌드), 리뷰 (검증)</li></ol>\n<p><strong>자동화 프로젝트 접근법:</strong></p>\n<ol><li>\"언제 실행할 것인가\" 전에 입력 경계와 출력 계약을 정의</li><li>성공 = 재실행 시 동일 형식, 첫 성공만이 아님</li><li>고위험 단계는 반드시 인간 승인을 통과</li></ol>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 생태계가 향하는 다섯 방향: (1) 대화식 → 비동기 운영, (2) 팝업 승인 → 정책 기반 승인, (3) 긴 트랜스크립트 → 구조화된 작업 상태, (4) 단일 작업 공간 → 멀티 작업 공간 연속성, (5) 프롬프트 트릭 → 분석과 평가 루프가 있는 측정 가능한 운영.</div>\n<p><strong>배포 체크리스트:</strong></p>\n<ul><li>기본 작업 공간 선택 (터미널, IDE, 데스크톱, 웹)?</li><li><code>CLAUDE.md</code>와 규칙이 역할별로 분리?</li><li>권한과 hook이 실제 위험 경계를 커버?</li><li><code>plan.md</code>, <code>verify.md</code>, <code>handoff.md</code>가 준비?</li><li>구현과 리뷰 간 리뷰 분리?</li><li>비용과 실패 측정이 확립?</li><li>팀을 위한 범위 분리 (user/project/local/managed)?</li></ul>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 이 책의 결론은 간단합니다: Claude Code를 잘 사용하는 사람들은 긴 프롬프트를 쓰는 사람이 아닙니다 — 컨텍스트를 안정화하고, 토큰과 캐시를 관리하고, 권한을 좁히고, 리뷰 분리와 인수인계를 습관으로 만드는 사람입니다. 하나의 얇은 완성된 결과와 그것을 재생산할 구조가 어떤 수의 인상적인 데모보다 가치 있습니다.</div>"}}}, "glossary": {"title": "확장 용어집", "sections": {"G_1": {"title": "컨텍스트 및 어셈블리 용어", "content": "<p>이 용어들은 Claude의 작업 메모리 내에서 정보가 어떻게 수집, 관리, 저하되는지를 설명합니다.</p>\n<table><tr><th>용어</th><th>정의</th></tr><tr><td><strong>컨텍스트 어셈블리</strong></td><td>현재 작업에 필요한 규칙, 파일, 메모, 도구 설명을 실제 입력 컨텍스트로 모으는 과정. 덤핑이 아닌 선택 과정.</td></tr><tr><td><strong>컨텍스트 부패</strong></td><td>컨텍스트가 길어질수록 초기 신호가 약해지는 현상. 긴 대화는 중요한 초기 지시가 나중 콘텐츠에 의해 희석되면서 점차 일관성을 잃음.</td></tr><tr><td><strong>메모이제이션 컨텍스트</strong></td><td>매번 재설명할 필요 없이 턴 간에 유지되는 배경 정보. \"한 번 계산, 여러 번 재사용.\"</td></tr><tr><td><strong>프롬프트 캐시</strong></td><td>유사한 컨텍스트 접두사가 반복 전송될 때 재사용 이점을 제공하는 메커니즘. 안정적인 접두사 (CLAUDE.md, 규칙)를 일관되게 유지하여 캐시 히트를 극대화해야 함.</td></tr><tr><td><strong>토큰 경제</strong></td><td>어떤 정보를 영구 로드하고, 어떤 것을 필요 시 로드하고, 어떤 것을 줄일지 결정하는 규율 — 품질과 비용의 균형.</td></tr><tr><td><strong>도구 결과 예산</strong></td><td>도구 출력이 소비하는 컨텍스트 공간을 제어하는 관행. 긴 로그와 상세한 결과는 컨텍스트 창을 소비하고 품질을 저하시킴.</td></tr></table>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 컨텍스트 어셈블리는 \"많을수록 좋다\"가 아닙니다. 현재 작업에 중요한 것만 포함하는 선택적 과정입니다. 도구 결과 예산은 선택 사항이 아닙니다 — 하나의 상세한 테스트 실행이 컨텍스트 창의 절반을 소비하는 것을 방지하는 것입니다.</div>"}, "G_2": {"title": "세션 및 연속성 용어", "content": "<table><tr><th>용어</th><th>정의</th></tr><tr><td><strong>재개 가능 세션</strong></td><td>연결 끔김이나 세션 변경 후 저장된 상태 파일을 사용하여 중단된 지점부터 이어서 작업하는 능력.</td></tr><tr><td><strong>재개 위생</strong></td><td>재개 전에 상태를 정리하는 습관 — 다음 세션에 필요한 것만 유지하고 축적된 노이즈를 폐기.</td></tr><tr><td><strong>세션 메모리</strong></td><td>계속을 위해 보존된 구조화된 상태: 현재 상태, 중요 파일, 워크플로우, 오류, 결과. 원시 대화 기록이 아님.</td></tr><tr><td><strong>인수인계</strong></td><td>다음 세션이나 사람을 위해 남긴 형식화된 메모, 현재 상태, 다음 단계, 미해결 위험 포함.</td></tr><tr><td><strong>슬래시 명령</strong></td><td>Claude Code 내에서 사용되는 세션 관리 명령어: <code>/compact</code>, <code>/clear</code>, <code>/context</code>, <code>/memory</code>, <code>/cost</code>.</td></tr><tr><td><strong>세션 포크</strong></td><td>현재 방향이 분기되어야 할 때 새 세션 브랜치를 생성, 원래 세션 상태를 보존.</td></tr><tr><td><strong>백그라운드 실행</strong></td><td>터미널을 떠난 후에도 계속되는 작업 — 세션이 활성 인간 모니터링 없이 계속 실행.</td></tr></table>"}, "G_3": {"title": "하네스 및 구조 용어", "content": "<table><tr><th>용어</th><th>정의</th></tr><tr><td><strong>하네스</strong></td><td>Claude가 읽고, 수정하고, 검증할 수 있는 것을 정의하는 외부 구조. 동료의 작업 공간과 같음: 참고 자료, 접근 가능한 서랍, 체크리스트.</td></tr><tr><td><strong>하네스 엔지니어링</strong></td><td>전체 작업 환경 설계 — 더 나은 프롬프트만이 아닌, Claude가 작동하는 규칙, 권한, 파일, 검증 구조.</td></tr><tr><td><strong>CLAUDE.md</strong></td><td>프로젝트 계약서 파일 — 항상 로드되며, 실행 명령, 금지 경계, 구조적 설명을 포함.</td></tr><tr><td><strong>워크트리</strong></td><td>같은 저장소에서 별도의 작업 디렉토리, 파일 충돌 없이 병렬 작업에 사용.</td></tr><tr><td><strong>계획 모드</strong></td><td>탐색과 실행을 분리하는 패턴 — Claude가 편집 전에 계획하여 잘못된 가정의 구현을 줄임.</td></tr><tr><td><strong>리뷰 분리</strong></td><td>구현과 리뷰를 다른 세션으로 분리하여 컨텍스트 오염과 승인 피로를 줄임.</td></tr><tr><td><strong>에이전틱 루프</strong></td><td>반복 사이클: 읽기 → 판단 → 도구 사용 → 계속. 단일 질문-답변이 아닌 여러 턴에 걸친 작업.</td></tr></table>"}, "G_4": {"title": "확장 및 도구 용어", "content": "<table><tr><th>용어</th><th>정의</th></tr><tr><td><strong>스킬</strong></td><td>반복 작업을 표준화하는 재사용 가능한 절차 파일(폴더). 지시, 스크립트, 참조, 에셋을 포함.</td></tr><tr><td><strong>플러그인</strong></td><td>스킬, 명령, hook, 연결 설정을 묶은 배포 가능한 패키지. 팀을 위한 \"온보딩 박스\".</td></tr><tr><td><strong>MCP (Model Context Protocol)</strong></td><td>Claude가 외부 도구와 서비스에 도달하기 위한 표준화된 연결 프로토콜. AI 도구 통합을 위한 USB-C와 같음.</td></tr><tr><td><strong>커넥터</strong></td><td>외부 서비스(Notion, Drive, Slack)에 연결하기 위한 사용자 대상 인터페이스. MCP보다 간단하고 제어력이 적음.</td></tr><tr><td><strong>Hook</strong></td><td>특정 순간(도구 사용 전, 편집 후, 푸시 전)에 작동하는 자동 개입 규칙. \"확인하는 것을 기억\"을 \"항상 확인\"으로 전환.</td></tr><tr><td><strong>서브에이전트</strong></td><td>격리된 컨텍스트를 가진 현재 세션 내의 보조 작업자. 메인 세션을 오염시키지 않고 리서치, 리뷰, 위험 확인에 사용.</td></tr><tr><td><strong>에이전트 팀</strong></td><td>메시지 교환과 작업 할당을 통해 병렬로 운영되는 여러 세션 — 리드와 멤버가 있는 실제 팀처럼.</td></tr><tr><td><strong>제어 인터페이스</strong></td><td>사용자가 작업 행동을 조정할 수 있는 곳 — 기능 목록이 아닌 워크플로우에 개입할 수 있는 지점.</td></tr></table>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 빠른 결정 프레임워크: \"매번 같은 형식?\" → 스킬. \"외부 데이터 필요?\" → MCP/커넥터. \"전체 팀에 배포?\" → 플러그인. \"자동으로 검증해야 함?\" → Hook. \"병렬 컨텍스트 필요?\" → 서브에이전트/워크트리.</div>"}, "G_5": {"title": "거버넌스 및 안전 용어", "content": "<table><tr><th>용어</th><th>정의</th></tr><tr><td><strong>권한 게이트</strong></td><td>허용, 확인, 거부 사이의 경계 — 모든 행동 실행 전에 평가됨.</td></tr><tr><td><strong>승인 게이트</strong></td><td>다음 단계가 진행되기 전 인간 서명이 필요한 체크포인트. 외부 커뮤니케이션, 배포, 데이터 수정에 필수적.</td></tr><tr><td><strong>허용 목록</strong></td><td>특정하게 허용된 항목(명령, 사용자, 도메인)만 통과시키는 정책. 특정 위협을 차단하는 것보다 안전.</td></tr><tr><td><strong>감사 가능성</strong></td><td>나중에 설명할 수 있는 능력: 무엇이 읽혀졌는지, 무엇이 변경되었는지, 누가 승인했는지, 무엇이 남았는지. 지속 가능한 자동화의 기반.</td></tr><tr><td><strong>정렬 위장</strong></td><td>모델이 지시를 따르는 것처럼 보이면서 내부적으로 다른 목적을 유지하는 연구 개념. 실용적 시사점: 모델 준수만 신뢰하지 마세요 — 외부 검증을 구축하세요.</td></tr><tr><td><strong>자율성</strong></td><td>인간 개입 없이 작업이 얼마나 진행될 수 있는지. 높은 자율성은 더 강한 검증, 승인, 권한 경계를 요구.</td></tr><tr><td><strong>에이전시</strong></td><td>무엇을, 언제, 어떤 제약으로 위임할지 선택하는 인간의 주도권. 더 많은 명령을 내리는 것이 아닌 더 나은 위임 결정을 내리는 것.</td></tr><tr><td><strong>도구 오케스트레이션</strong></td><td>어떤 도구를 어떤 순서로 어떤 파라미터로 호출할지 결정하는 레이어.</td></tr></table>\n<div class=\"callout callout-concept\"><strong>&#128204; 핵심 개념:</strong> 관찰 가능성 (대시보드와 분석을 통해 시스템 상태를 보는 것)과 감사 가능성 (사후에 무슨 일이 왜 일어났는지 설명하는 것)은 다릅니다. 둘 다 필요합니다: 운영 효율성을 위한 관찰 가능성, 책임성과 신뢰를 위한 감사 가능성.</div>"}, "G_6": {"title": "생태계 및 인프라 용어", "content": "<table><tr><th>용어</th><th>정의</th></tr><tr><td><strong>LLM OS</strong></td><td>새롭게 부상하는 작업 레이어에 대한 은유: 모델을 둘러싼 컨텍스트, 도구, 권한, 메모리가 OS가 프로그램, 파일, 권한, 장치를 관리하는 것과 유사.</td></tr><tr><td><strong>Software 3.0</strong></td><td>자연어 자체가 프로그래밍 인터페이스가 되고 있다는 개념 — 작업 지시가 코드임.</td></tr><tr><td><strong>바이브 코딩</strong></td><td>자연어를 통해 코드를 생성하는 것, 이제 테스팅, 리뷰, 리팩토링, 문서화, 배포까지 포함하도록 확장됨.</td></tr><tr><td><strong>원격 제어</strong></td><td>인간이 원격에서 (다른 장치, 다른 위치) 실행 중인 세션을 재개하거나 조종하는 것.</td></tr><tr><td><strong>채널</strong></td><td>외부 시스템이 Claude에 이벤트를 푸시 (웹훅, 메시지) — 트리거가 인간이 아닌 외부에서 옴.</td></tr><tr><td><strong>예약 작업</strong></td><td>시간 트리거 자동화 — 시계가 작업을 시작하는 cron과 유사한 실행.</td></tr><tr><td><strong>Agent SDK</strong></td><td>자체 제품 내에서 Claude를 실행 엔진으로 사용하여 커스텀 에이전트 애플리케이션을 구축하기 위한 개발자 도구.</td></tr><tr><td><strong>적응형 사고</strong></td><td>Claude가 작업 복잡성에 따라 추론 깊이를 조정 — 어려운 작업에는 더 깊게, 단순한 작업에는 짧게 사고.</td></tr></table>\n<div class=\"callout callout-tip\"><strong>&#128161; 실전 팁:</strong> 용어에 혼란스러울 때 물어보세요: \"이것은 작업이 어떻게 흐르는지(메커니즘), 실수가 어떻게 방지되는지(안전), 세션이 어떻게 유지되는지(연속성) 중 무엇에 관한 것인가?\" 이 세 가지 버킷 정신 모델이 Claude Code 용어의 대다수를 커버합니다.</div>"}}}}, "quizzes": {"part1": [{"question": "Claude Code harness에서 '메모이제이션 컨텍스트'란 무엇을 의미하는가?", "options": ["모든 대화 기록을 데이터베이스에 영구 저장하는 것", "매번 다시 설명하지 않아도 되도록 배경 컨텍스트를 턴 간에 재사용하는 것", "사용자의 개인 선호도를 기억하는 것", "더 빠른 성능을 위해 API 응답을 캐시하는 것"], "answer": 1, "explanation": "메모이제이션 컨텍스트란 배경 정보를 턴 간에 유지하여, 매번 Claude에게 다시 설명하지 않아도 되게 하는 것을 의미합니다."}, {"question": "1부에서 소개하는 네 가지 핵심 용어는 무엇인가?", "options": ["API, CLI, MCP, VM", "프롬프트, 컨텍스트, 응답, token", "메모이제이션 컨텍스트, 도구 오케스트레이션, 권한 게이트, 재개 가능 세션", "Skill, Plugin, Hook, Subagent"], "answer": 2, "explanation": "1부에서는 메모이제이션 컨텍스트(재사용 가능한 배경), 도구 오케스트레이션(도구 조율), 권한 게이트(allow/ask/deny), 재개 가능 세션(중단 지점부터 이어서 작업)의 네 가지 개념을 소개합니다."}, {"question": "Claude Code에서 'harness'란 무엇인가?", "options": ["Claude 서버에 연결하는 물리적 장치", "Claude가 읽고, 수정하고, 검증할 수 있는 것을 정의하는 외부 구조", "유닛 테스트를 실행하기 위한 테스팅 프레임워크", "Claude Code의 그래픽 사용자 인터페이스"], "answer": 1, "explanation": "harness는 경계와 검증 규칙을 정의합니다. 참고 자료가 올려진 책상, 접근 가능한 서랍, 체크리스트가 갖춰진 작업 공간을 설정하는 것과 같습니다."}, {"question": "이 책이 다른 Claude 제품보다 Claude Code에 집중하는 이유는 무엇인가?", "options": ["Claude Code가 가장 저렴한 제품이기 때문에", "Claude Code의 전 세계 사용자가 가장 많기 때문에", "파일, 규칙, 검증, 권한, 도구 연결을 한 곳에서 통합하기 때문에", "Claude Code가 한국에서 유일하게 이용 가능한 제품이기 때문에"], "answer": 2, "explanation": "Claude Code는 파일 접근, 규칙, 검증, 권한, 재개 가능 세션, 외부 도구 연결을 하나로 결합합니다. Cowork, Skill, Plugin은 이 핵심 harness의 확장입니다."}, {"question": "약한 harness 요청과 강한 harness 요청의 차이는 무엇인가?", "options": ["약한 것은 token을 덜 쓰고, 강한 것은 더 많이 쓴다", "약한 것: '버그 수정해.' 강한 것: 'auth/만 읽고, .env는 건드리지 마, 로그인 테스트를 통과시키고, 변경 노트를 남겨.'", "약한 것은 초보자, 강한 것은 전문가를 의미한다", "차이가 없다"], "answer": 1, "explanation": "약한 harness는 경계를 전혀 지정하지 않습니다. 강한 harness는 읽을 파일, 건드리지 말아야 할 파일, 통과해야 할 테스트, 남겨야 할 문서를 구체적으로 명시합니다."}], "part2": [{"question": "큰 작업을 위해 Claude Code 세션을 시작할 때 가장 먼저 권장되는 행동은?", "options": ["모든 컨텍스트를 담아 최대한 긴 프롬프트를 작성한다", "CLAUDE.md, 관련 규칙, verify.md를 읽고 — 구현 전에 작업 범위를 요약한다", "시간을 절약하기 위해 즉시 코딩을 시작한다", "더 빠른 워크플로우를 위해 모든 권한을 해제한다"], "answer": 1, "explanation": "시작 루틴이 시작 프롬프트보다 중요합니다. 구현 전에 프로젝트 계약서, 규칙, 종료 기준을 읽으면 재작업과 잘못된 방향의 구현을 방지할 수 있습니다."}, {"question": "Skill과 Plugin의 차이는 무엇인가?", "options": ["이름만 다를 뿐 같은 것이다", "Skill은 코딩용, Plugin은 문서용이다", "Skill은 재사용 가능한 절차이고, Plugin은 팀 배포를 위해 Skill, 명령, Hook, 연결 설정을 묶은 패키지다", "Plugin은 무료이고, Skill은 유료다"], "answer": 2, "explanation": "Skill은 '어떻게 하는가'(절차)를 정의합니다. Plugin은 Skill, 도구, Hook, 연결 설정을 배포 가능한 패키지로 묶습니다 — 팀원을 위한 온보딩 박스와 같습니다."}, {"question": "CLAUDE.md를 포괄적으로 작성하는 대신 간결하게 유지해야 하는 이유는?", "options": ["디스크 공간을 절약하기 위해", "Claude가 짧은 파일만 읽을 수 있기 때문에", "작업 계약서이지 백과사전이 아니기 때문 — 긴 상주 컨텍스트는 token을 낭비하고 중요한 규칙을 희석시킨다", "짧은 파일이 브라우저에서 더 빨리 로드되기 때문에"], "answer": 2, "explanation": "CLAUDE.md는 매 턴마다 로드됩니다. 간결하게 유지하면 중요한 규칙이 눈에 잘 띕니다. 장기 상태는 handoff.md, decision-log.md, 기타 작업 파일에 보관하세요."}, {"question": "Claude Code 운영에서 '리뷰 분리(review split)'란 무엇을 의미하는가?", "options": ["코드 리뷰를 여러 개의 풀 리퀘스트로 나누는 것", "컨텍스트 오염을 줄이기 위해 구현과 리뷰를 별도 세션으로 분리하는 것", "두 명이 같은 코드를 리뷰하는 것", "팀 간에 리뷰 예산을 나누는 것"], "answer": 1, "explanation": "리뷰 분리는 계획, 구현, 리뷰를 하나의 세션에 몰아넣지 않는 것을 의미합니다. 세션을 분리하면 컨텍스트 오염과 승인 피로가 줄어듭니다."}, {"question": "Claude Code에서 /compact 실행 후 살아남는 것은 무엇인가?", "options": ["모든 것 — /compact는 단지 화면 표시를 짧게 만들 뿐이다", "마지막 5개의 메시지만", "Compact Instructions에 지정된 것: 마지막으로 수정한 파일, 테스트 결과, 거부된 대안, 다음 행동, 위험 지점", "아무것도 없다 — /compact는 세션 전체를 초기화한다"], "answer": 2, "explanation": "Compact Instructions가 압축 후 어떤 정보가 살아남을지 결정합니다. 지정하지 않으면 중요한 컨텍스트가 사라질 수 있습니다. 좋은 지시문은 다음 턴이 즉시 이어서 작업할 수 있도록 상태를 보존합니다."}], "part3": [{"question": "Claude Code 세션에서 '컨텍스트 부패(Context Rot)'란 무엇인가?", "options": ["Claude의 API 키가 만료될 때", "디스크의 파일이 손상될 때", "컨텍스트가 길어질수록 초기 지시가 약해지고, 나중에 추가된 내용에 희석되는 현상", "대화가 실수로 삭제될 때"], "answer": 2, "explanation": "컨텍스트 부패는 대화가 길어질수록 발생합니다. 중요한 초기 신호가 이후에 축적된 내용에 희석되어 품질이 저하됩니다. 모델이 '잊어버린' 것이 아닙니다."}, {"question": "harness가 동시에 설계해야 하는 세 가지 격리 유형은 무엇인가?", "options": ["입력 격리, 출력 격리, 화면 격리", "컨텍스트 격리, 파일 상태 격리, 승인 격리", "네트워크 격리, 디스크 격리, 메모리 격리", "사용자 격리, 모델 격리, 도구 격리"], "answer": 1, "explanation": "컨텍스트 격리는 세션 비대화를, 파일 상태 격리는 덮어쓰기와 충돌을, 승인 격리는 안전한 작업과 위험한 작업의 혼용을 방지합니다. 각각 다른 종류의 실패를 방지합니다."}, {"question": "검증 Skill이 생성 Skill보다 ROI가 높은 이유는 무엇인가?", "options": ["검증 라이선스가 더 비싸기 때문에", "모델은 생성에서 실수를 절대 하지 않기 때문에", "'잘 쓴 초안'은 저렴하지만, '검증된 통과 결과'는 진정으로 가치 있고 달성하기 어렵기 때문에", "검증에 필요한 연산이 더 적기 때문에"], "answer": 2, "explanation": "생성은 초안을 만들고, 검증은 그것이 실제로 작동하는지 확인합니다. 회원가입 플로우가 완료되는지, 결제 상태가 올바른지, CLI가 TTY 환경에서 작동하는지 확인하는 것이 더 많은 코드를 생성하는 것보다 가치 있습니다."}, {"question": "Prompt Cache란 무엇이며, 어떻게 활용할 수 있는가?", "options": ["Claude의 응답을 오프라인 사용을 위해 저장하는 브라우저 캐시", "자주 사용하는 API 사용자를 위한 할인", "유사한 컨텍스트 접두사가 반복 전송될 때 연산을 재사용하는 메커니즘 — 안정적인 내용을 앞에 두어야 한다", "Claude가 자동으로 읽는 메모리 파일"], "answer": 2, "explanation": "Prompt Cache의 이점은 안정적인 접두사(CLAUDE.md, 규칙)를 턴마다 일관되게 유지하는 데서 옵니다. 접두사가 일치하면 연산을 재사용하여 비용과 시간을 절약할 수 있습니다."}, {"question": "Claude Code 세션에서 /compact를 언제 사용해야 하는가?", "options": ["세션이 완전히 끝났을 때 마지막으로", "중요한 상태를 파일에 저장한 후, 세션 품질이 저하되기 전에", "오류 메시지가 나타날 때만", "절대 사용하지 않는다 — 중요한 컨텍스트가 삭제된다"], "answer": 1, "explanation": "세션이 이미 망가진 후가 아닌, 중요한 상태를 파일에 저장한 뒤 전략적으로 압축하세요. 좋은 시점에 압축하면 긴 세션 내내 품질을 유지할 수 있습니다."}], "part4": [{"question": "반복 작업을 Skill로 승격해야 하는 시점은 언제인가?", "options": ["작업이 매우 복잡할 때", "출력 형식이 반복되고, 변형을 줄여야 하며, 저장 위치와 도구 순서를 고정해야 할 때", "팀에게 자동화 능력을 보여주고 싶을 때", "Anthropic이 공식 Skill 템플릿을 제공할 때만"], "answer": 1, "explanation": "Skill을 만들어야 한다는 신호는 출력 형식의 반복, 일관성 확보의 필요성, 고정된 저장 위치와 도구 순서입니다. 일회성 탐색은 대화로 유지하는 것이 낫습니다."}, {"question": "MCP와 Connector의 결정적인 차이는 무엇인가?", "options": ["MCP는 무료이고, Connector는 유료다", "MCP는 오래된 기술이고, Connector는 최신 기술이다", "Connector는 사용자용 앱 연결이고, MCP는 도구 구조, 응답 형식, 프로젝트별 활성화를 개발자 수준에서 제어한다", "차이가 없다 — 같은 기능이다"], "answer": 2, "explanation": "Connector는 간단한 UI 기반 연결(앱 스토어 같은)입니다. MCP는 더 깊은 제어를 제공합니다: 어떤 서버, 어떤 도구를 노출할지, 응답 형식, 프로젝트 범위 활성화. 빠른 연결에는 Connector, 시스템 설계에는 MCP를 사용하세요."}, {"question": "Skill의 'description' 필드가 중요한 이유는 무엇인가?", "options": ["마케팅 자료에 표시되기 때문에", "Skill의 파일 크기를 결정하기 때문에", "라우팅 규칙 역할을 하기 때문에 — 설명이 모호하면 언더트리거링 또는 오버트리거링이 발생한다", "문서 목적으로만 사용되기 때문에"], "answer": 2, "explanation": "description 필드는 Claude가 세션 시작 시 읽고 Skill을 활성화할지 결정하는 기준입니다. 설명이 모호하면 Skill이 전혀 발동되지 않거나(언더트리거링) 관련 없는 작업에 발동됩니다(오버트리거링)."}, {"question": "외부 Skill을 설치하기 전에 확인해야 할 사항은?", "options": ["GitHub 별점만 확인한다", "외부 URL 패치 여부, 강력한 도구(Bash/네트워크) 사용 여부, 명시된 목적과의 일치 여부, 민감한 데이터 근처 실행 여부, 빠른 비활성화 가능 여부", "README 파일만 확인한다", "아무것도 확인하지 않는다 — 공개된 Skill은 모두 안전하다"], "answer": 1, "explanation": "외부 Skill에는 도구 호출, 파일 접근, 외부 URL 패치가 포함될 수 있습니다. 단순한 문서 가져오기가 아닌 소규모 소프트웨어 설치로 취급하여 보안 검토를 해야 합니다."}, {"question": "자동차 비유에서 Hook은 무엇에 비유되는가?", "options": ["핸들 — 방향을 제어한다", "가속 페달 — 더 빠르게 만든다", "안전벨트 경보와 자동 브레이크 — 무시할 수 있는 도로 표지판과 달리 실제 행동을 변경한다", "백미러 — 무슨 일이 있었는지 볼 수 있게 한다"], "answer": 2, "explanation": "프롬프트는 도로 표지판(무시 가능)과 같습니다. Hook은 안전벨트 경보와 자동 브레이크와 같습니다 — 시스템 수준에서 규칙을 강제하여 모델의 준수 여부에 관계없이 실제 행동을 변경합니다."}], "part5": [{"question": "거의 모든 직무에서 권장되는 첫 번째 도입 단계는?", "options": ["즉시 완전한 자동화 파이프라인을 구축한다", "이용 가능한 모든 Plugin과 MCP 연결을 설치한다", "정보 수집과 정리부터 시작한다 — 리서치 브리프, 회의 노트, 문서 구조화", "팀원을 AI 에이전트로 대체한다"], "answer": 2, "explanation": "모든 직무(PM, 마케팅, 영업, 엔지니어링, 리서치)에서 첫 번째 단계는 항상 정보 수집과 정리입니다. 위험도가 가장 낮고 빈도가 높은 작업으로 워크플로우에 대한 신뢰를 쌓습니다."}, {"question": "여러 클라이언트를 관리하는 에이전시/팀 운영자에게 가장 중요한 원칙은?", "options": ["빠른 납품 속도", "최신 모델 사용", "클라이언트 컨텍스트 격리 — 클라이언트 간 데이터와 컨텍스트의 유출 방지", "설치된 Plugin 수 극대화"], "answer": 2, "explanation": "클라이언트 컨텍스트 격리가 최우선 사항입니다. 폴더 경계 하나가 영리한 프롬프트 하나보다 더 많은 사고를 방지합니다. 속도보다 클라이언트 A의 데이터가 클라이언트 B의 출력에 절대 유출되지 않는 것이 중요합니다."}, {"question": "직무에 관계없이 인간이 항상 통제권을 유지해야 하는 것은?", "options": ["모든 단일 초안 수정", "모든 파일 명명 결정", "최종 책임: 승인 결정, 외부 커뮤니케이션, 현실적 결과를 수반하는 판단", "token 계산과 비용 관리"], "answer": 2, "explanation": "AI는 반복적인 구조화와 초안 작성을 가속화합니다. 인간이 유지해야 할 것: 시장 해석(PM), 브랜드 톤 승인(마케팅), 외부 발송 결정(영업), 배포 결정(엔지니어링), 법적 판단(컴플라이언스)."}, {"question": "시나리오 가이드에서 '출력 계약(output contract)'이란 무엇인가?", "options": ["사용자와 Anthropic 간의 법적 계약", "결과가 따라야 할 형식과 저장 위치에 대한 사전 약속", "Claude가 출력할 수 있는 token 수의 한도", "Claude API 출력의 요금"], "answer": 1, "explanation": "출력 계약은 결과가 저장될 위치, 형식, 따라야 할 구조를 지정합니다. 여러 실행에 걸쳐 결과가 흩어지거나 일관성을 잃는 것을 방지합니다."}, {"question": "현재 가장 강한 AI 도입 신호를 보이는 작업은 무엇인가?", "options": ["육체 노동 및 복잡한 대면 협상", "프로그래밍, 데이터 입력, 고객 지원, 반복적인 문서 검토, 채널별 콘텐츠 적응", "소프트웨어 엔지니어링만", "인간 감독이 필요 없는 작업"], "answer": 1, "explanation": "높은 도입률은 디지털 텍스트, 구조화된 판단, 기존 디지털 데이터, 반복 가능한 형식, 명확한 품질 기준과 상관관계가 있습니다. 육체적 작업과 고위험 전문 판단은 더 천천히 도입됩니다."}], "part6": [{"question": "Claude Code 세션에서 가장 효과적인 메모리 전략은 무엇인가?", "options": ["매 세션 후 전체 대화 기록을 저장한다", "Claude의 내장 메모리가 모든 것을 기억하도록 의존한다", "매 세션 끝에 handoff.md를 현재 상태, 다음 단계, 미해결 위험으로 업데이트한다", "/memory를 사용하여 모든 정보를 영구 저장한다"], "answer": 2, "explanation": "가장 단순하고 효과적인 메모리 전략: 세션 종료 시 handoff.md를 업데이트하는 것입니다. 이 하나의 습관이 '어디까지 했지?' 혼란의 80%를 방지합니다. 대화는 일회용이고, 파일이 진짜 메모리입니다."}, {"question": "계획을 대화 안에 두지 않고 파일에 작성해야 하는 이유는?", "options": ["파일이 대화 token보다 저렴하기 때문에", "파일은 세션 경계를 넘어 살아남고, 독립적으로 검토하고, 버전 관리하고, 대화를 실행에 집중하게 하기 때문에", "Claude는 대화 형식의 계획을 이해하지 못하기 때문에", "파일 계획과 대화 계획은 차이가 없다"], "answer": 1, "explanation": "파일 기반 계획은 세션을 넘어 지속되고, 인간이 독립적으로 검토할 수 있으며, Git 버전 관리가 가능하고, 대화를 재계획이 아닌 실행에 집중하게 합니다."}, {"question": "Claude 세션을 병렬로 실행할 때 핵심 원칙은 무엇인가?", "options": ["최대 속도를 위해 가능한 많은 세션을 실행한다", "모든 세션에 같은 파일과 디렉토리를 사용한다", "역할을 먼저 정의한다: 누가 무엇을 하는지, 각 세션이 어떤 파일을 건드리는지, 결과가 어떻게 합쳐지는지", "병렬 세션은 권장되지 않는다"], "answer": 2, "explanation": "역할 명확성 없는 병렬 처리는 혼란을 만듭니다. 병렬 세션을 시작하기 전에 책임, 파일 경계, 병합 전략을 정의하세요. 구조화되지 않은 병렬 처리는 순차 작업보다 더 나쁩니다."}, {"question": "외부 도구(Skill, Plugin, MCP 서버)를 설치하기 전에 확인해야 할 사항은?", "options": ["다운로드 횟수만 확인한다", "마지막 유지보수 시점, README 품질, 필요한 보안 권한, 컨텍스트 비용 대비 유용성, 비활성화 용이성", "로고가 멋있는지 확인한다", "아무것도 확인하지 않는다 — 마켓플레이스가 품질을 보장한다"], "answer": 1, "explanation": "다섯 가지 기준: 최근 유지보수 여부, 문서 품질, 보안 민감 권한, 비용 대비 효익, 비활성화 용이성. '나중에 저장'한 도구는 운영 자산이 되지 못한 채 쌓이기만 합니다."}, {"question": "커뮤니티에서 'OpenClaw 스타일' 운영이란 무엇을 의미하는가?", "options": ["특정 경쟁사 제품 사용", "예약 작업과 원격 제어 기능을 갖춘 항시 접근 가능한 멀티 채널 영속 상태 작업 시스템", "Claude의 무료 티어 사용", "특정 코딩 프레임워크"], "answer": 1, "explanation": "'OpenClaw 스타일'은 운영 목표를 설명합니다: 항상 접근 가능하고, 끊기지 않는 세션, 시간/이벤트 기반 작업, 내장된 Skill, 안전 경계가 있는 원격 제어. Claude 생태계에서는 Claude Code + Hook + MCP + Remote Control + Scheduled Tasks를 결합하여 달성합니다."}], "part7": [{"question": "Claude Code의 거버넌스 모델에서 세 가지 권한 모드는 무엇인가?", "options": ["읽기, 쓰기, 실행", "관리자, 사용자, 게스트", "Allow(자동 진행), Ask(인간 판단 대기), Deny(완전 차단)", "Public, Private, Protected"], "answer": 2, "explanation": "권한 모델은 allow/ask/deny를 사용하며, deny → ask → allow 순서로 평가되어 첫 번째 일치하는 규칙이 적용됩니다. 이를 통해 Claude가 자율적으로 할 수 있는 것을 세밀하게 제어합니다."}, {"question": "거버넌스 4계층은 무엇인가?", "options": ["프론트엔드, 백엔드, 데이터베이스, 네트워크", "문서 계층(CLAUDE.md/규칙), 설정 계층(권한), 런타임 계층(Hook/승인), 추적 계층(로그/결정)", "사용자, 팀, 조직, 엔터프라이즈", "입력, 처리, 출력, 저장"], "answer": 1, "explanation": "문서 계층은 지식을 정의하고, 설정 계층은 경계를 정의하며, 런타임 계층은 실행 시점 제어를 담당하고, 추적 계층은 무엇이 왜 일어났는지 기록합니다. 네 계층 모두 합쳐져야 완전한 거버넌스가 됩니다."}, {"question": "AI 자동화에서 감사 가능성(auditability)이 중요한 이유는 무엇인가?", "options": ["법으로만 요구되기 때문에", "데모를 더 전문적으로 보이게 하기 때문에", "감사 추적이 있는 같은 자동화는 인프라가 되고, 없으면 확장할 수 없는 데모로 남기 때문에", "감사 가능성은 대부분의 팀에 중요하지 않다"], "answer": 2, "explanation": "감사 가능성은 무엇이 읽혔는지, 무엇이 생성되었는지, 누가 승인했는지, 무엇이 남아있는지를 설명할 수 있는 것을 의미합니다. 없으면 자동화가 개인 데모에서 신뢰할 수 있는 팀 인프라로 전환될 수 없습니다."}, {"question": "관찰 가능성(observability)과 감사 가능성(auditability)의 차이는 무엇인가?", "options": ["같은 것이다", "관찰 가능성은 개발자용, 감사 가능성은 관리자용이다", "관찰 가능성은 현재 시스템 상태를 보여주고(대시보드), 감사 가능성은 무슨 일이 왜 일어났는지 설명한다(책임을 위한 이벤트 기록)", "관찰 가능성이 감사 가능성보다 더 비싸다"], "answer": 2, "explanation": "관찰 가능성은 운영 효율성을 위한 대시보드(사용량, 비용, 패턴)입니다. 감사 가능성은 책임을 위한 이벤트 기록(누가 무엇을, 왜, 어떤 승인으로 했는지)입니다. 조직에는 둘 다 필요합니다."}, {"question": "Claude Code로 만들기를 다루는 마지막 장의 핵심 원칙은 무엇인가?", "options": ["항상 이용 가능한 가장 고급 기능을 사용한다", "얇지만 완성된 결과물 하나와 그것을 재현할 수 있는 구조가 어떤 수의 인상적인 데모보다 가치 있다", "속도가 품질보다 중요하다", "개발자만 Claude Code로 구축해야 한다"], "answer": 1, "explanation": "결론: 브리프, 템플릿, 리뷰 분리, 인수인계를 갖추고 다음 주에도 재현 가능한 얇은 웹사이트나 자동화 워크플로우 하나가 어떤 정교한 미완성 계획보다 더 가치 있습니다."}], "glossary": [{"question": "'컨텍스트 어셈블리(Context Assembly)'란 무엇인가?", "options": ["이용 가능한 모든 Plugin을 한 번에 설치하는 것", "현재 작업에 필요한 규칙, 파일, 도구 설명만을 선별하여 입력 컨텍스트로 모으는 과정", "최대한 긴 프롬프트를 작성하는 것", "전체 코드베이스를 대화에 복사하는 것"], "answer": 1, "explanation": "컨텍스트 어셈블리는 덤핑이 아닌 선택 과정입니다. 현재 작업에 필요한 것만 모으는 것을 의미합니다 — 더 많은 컨텍스트가 더 나은 컨텍스트는 아닙니다."}, {"question": "'재개 위생(Resume Hygiene)'이란 무엇을 의미하는가?", "options": ["취업 면접 전에 이력서를 정리하는 것", "Claude를 사용하기 전에 컴퓨터를 재시작하는 것", "작업을 재개하기 전에 다음 세션에 필요한 것만 남기고 축적된 노이즈를 제거하는 것", "타이핑하면서 손 소독제를 사용하는 것"], "answer": 2, "explanation": "재개 위생은 재개 전에 상태를 정리하는 것을 의미합니다 — 필수 컨텍스트를 유지하면서 이전 세션의 노이즈를 제거합니다. 긴 세션이 본질적으로 더 좋은 것은 아닙니다. 깔끔한 인수인계가 더 중요합니다."}, {"question": "Hook은 프롬프트 지시와 어떻게 다른가?", "options": ["Hook은 실행 비용이 더 비싸다", "Hook은 시스템 수준에서 규칙을 강제하고(자동 브레이크), 프롬프트 지시는 무시될 수 있는 제안이다(도로 표지판)", "Hook은 Cowork에서만 작동하고 Claude Code에서는 작동하지 않는다", "실질적인 차이가 없다"], "answer": 1, "explanation": "프롬프트는 행동을 요청하고, Hook은 이를 강제합니다. '편집 후 린트 실행'이라는 프롬프트는 건너뛸 수 있습니다. 매 파일 편집 후 린트를 실행하도록 설정된 Hook은 항상 실행됩니다."}, {"question": "Skill, Plugin, MCP의 관계는 무엇인가?", "options": ["같은 기능의 세 가지 이름이다", "Skill은 절차를 정의하고, MCP는 외부 도구에 연결하며, Plugin은 팀 배포를 위해 모든 것을 패키징한다", "Plugin이 가장 저렴하고, MCP가 중간, Skill이 가장 비싸다", "항상 함께 사용해야 한다"], "answer": 1, "explanation": "Skill은 '어떻게 하는가'(절차), MCP는 '외부 도구에 도달하는 경로'(연결), Plugin은 '모든 것을 배포하는 박스'(팀을 위한 패키지)입니다. 이 세 가지는 서로 보완합니다."}, {"question": "Claude Code 용어가 혼란스러울 때 도움이 되는 세 가지 버킷 멘탈 모델은 무엇인가?", "options": ["비용, 속도, 품질", "입력, 처리, 출력", "메커니즘(작업 흐름), 안전(실수 방지), 연속성(세션 유지)", "프론트엔드, 백엔드, 데이터베이스"], "answer": 2, "explanation": "거의 모든 Claude Code 용어는 세 가지 범주에 속합니다: 메커니즘(에이전틱 루프, 컨텍스트 어셈블리, 도구 오케스트레이션), 안전(권한, Hook, 승인 게이트), 연속성(세션 메모리, 인수인계, 재개 위생)."}]}}, "ru": {"ui": {"title": "Учебное руководство по Claude Code", "search_placeholder": "Поиск...", "next": "Далее →", "prev": "← Назад", "quiz_title": "Тест для самопроверки", "progress": "Прогресс", "expand_all": "Развернуть все", "collapse_all": "Свернуть все", "retry": "Повторить", "score": "{correct}/{total} верно", "mark_complete": "Отметить как прочитанное", "completed": "Завершено"}, "parts": {"part1": {"title": "Часть 1: Основы", "sections": {"1_1": {"title": "Почему экосистема переживает подъём", "content": "<p>Ландшафт ИИ сместился от вопроса «какая модель умнее» к вопросу «какой инструмент с наименьшими усилиями соединяет файлы, тесты, Git, браузер и внешние сервисы». Именно поэтому Claude Code, Codex и Gemini CLI рассматриваются вместе — конкуренция теперь идёт за <strong>рабочие пути</strong>, а не за результаты тестов.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Claude Code — это не просто приложение для написания кода. Это <em>work harness</em>, объединяющий memoized context, оркестрацию инструментов, Permission Gate и возобновляемые сессии. Cowork, Skills, Plugins и Scheduled Tasks — расширения этого основного harness за пределы разработки.\n      </div>\n\n      <p>Исследования подтверждают этот курс. METR сообщает о быстром росте горизонтов агентских задач, а Anthropic отмечает, что реальный разрыв в производительности определяется структурой задач и привычками верификации, а не названиями моделей. Вопрос больше не в том, «насколько умна модель?», а в том, «кто быстрее освоит правила делегирования и verification harness?»</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Начните с вопроса: «Моя задача основана на вопросах, документах или реализации?» Этот единственный вопрос определяет, следует ли использовать Chat, Projects, Cowork или Claude Code.\n      </div>\n\n      <table>\n        <tr><th>Что меняется быстро</th><th>Что остаётся</th></tr>\n        <tr><td>Расположение меню, уровни планов, статус превью, названия функций</td><td>Какой рабочий путь использовать, как разделять файлы и верификацию, где размещать точки контроля человека</td></tr>\n      </table>"}, "1_2": {"title": "Четыре ключевых понятия", "content": "<p>Прежде чем углубляться, усвойте четыре понятия. Каждая глава строится на них.</p>\n\n      <table>\n        <tr><th>Термин</th><th>Значение</th></tr>\n        <tr><td><strong>Memoized Context</strong></td><td>Фоновая информация, сохраняемая между ходами, чтобы не объяснять всё заново</td></tr>\n        <tr><td><strong>Tool Orchestration</strong></td><td>Слой, решающий, какие инструменты использовать и в каком порядке</td></tr>\n        <tr><td><strong>Permission Gate</strong></td><td>Граница, разделяющая allow, ask и deny до начала выполнения</td></tr>\n        <tr><td><strong>Resumable Session</strong></td><td>Возможность продолжить с места остановки даже после разрыва соединения</td></tr>\n      </table>\n\n      <p>Они образуют конвейер: <strong>Запрос пользователя → Memoized Context → Tool Orchestration → Permission Gate → Выполнение и верификация → Resumable Session → Следующая задача</strong>. Как бы сложен ни был рабочий процесс, он всегда является вариацией этих пяти этапов.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> «Memoized» не значит «memorized» (запомненный). Это означает «вычислено однажды, используется многократно» — как установка фоновых правил, сохраняющихся на протяжении всего диалога без повторной отправки.\n      </div>"}, "1_3": {"title": "Концепция Harness", "content": "<p><strong>Harness</strong> — это внешняя структура, определяющая, что Claude может читать, изменять и проверять. Представьте её как организацию рабочего места коллеги: вы раскладываете справочные материалы на столе, решаете, какие ящики доступны, и прикрепляете чек-лист, который нужно выполнить перед завершением.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Отправить «Исправь баг входа» без каких-либо ограничений. Сильный запрос к harness выглядит так: «Читай только <code>auth/</code>, не трогай <code>.env</code>, пройди тесты входа, оставь заметку об изменениях в 3 строки».\n      </div>\n\n      <p><strong>Harness Engineering</strong> — это не написание более умных промптов, а проектирование рабочего пространства, в котором работает Claude. Сюда входят: какие файлы всегда загружаются, какие разрешения установлены, какие тесты должны пройти и где хранятся результаты.</p>\n\n      <p>Международный доклад по безопасности ИИ 2026 подтверждает: по мере роста возможностей модели структуры harness и верификации становятся <em>более</em> важными, а не менее. Реальные задачи включают ресурсные ограничения, неполную информацию, исключения и процессы согласования, с которыми интеллект модели сам по себе не справится.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Даже новички могут начать создавать harness: записать базовые правила в <code>CLAUDE.md</code>, установить области allow/deny в <code>settings.json</code>, разбить большие задачи с помощью <code>plan.md</code> и оставлять состояние сессии в <code>handoff.md</code>.\n      </div>"}, "1_4": {"title": "Рабочие поверхности: Chat, Projects, Cowork, Claude Code", "content": "<p>Одна и та же модель Claude ведёт себя по-разному в зависимости от используемой поверхности. Выбор неправильной поверхности — это не проблема навыков, а проблема маршрутизации.</p>\n\n      <table>\n        <tr><th>Поверхность</th><th>Лучше всего для</th><th>Определяется</th></tr>\n        <tr><td><strong>Chat</strong></td><td>Быстрые вопросы, сортировка идей</td><td>Качеством вопроса</td></tr>\n        <tr><td><strong>Projects</strong></td><td>Постоянные фоновые знания</td><td>Структурой папок, шаблонами</td></tr>\n        <tr><td><strong>Cowork</strong></td><td>Делегирование документов — исследования, брифы, организация файлов</td><td>Структурой папок, шаблонами</td></tr>\n        <tr><td><strong>Claude Code</strong></td><td>Реализация и верификация — код, тесты, ревью</td><td>Файлами правил, циклами верификации</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Три заблуждения: (1) «Одна модель — одинаковый опыт везде» — неверно, поверхность имеет огромное значение. (2) «Cowork — лёгкий режим, Claude Code — сложный» — неверно, они различаются стилем делегирования, а не сложностью. (3) «Попробуй все поверхности сразу» — неверно, сначала освойте одну, затем расширяйтесь.\n      </div>\n\n      <p><strong>Хорошие первые задачи для каждой поверхности:</strong></p>\n      <ul>\n        <li><strong>Chat:</strong> «Резюмируй этот отчёт в 5 предложениях с 3 вопросами».</li>\n        <li><strong>Projects:</strong> «Прочитай эту папку и создай одностраничное резюме базовых знаний».</li>\n        <li><strong>Cowork:</strong> «Прочитай заметки совещания и сохрани черновик еженедельного брифа в <code>outputs/</code>».</li>\n        <li><strong>Claude Code:</strong> «Прочитай путь воспроизведения бага, затем напиши гипотезу и план исправления в <code>plan.md</code>».</li>\n      </ul>"}, "1_5": {"title": "Что меняется быстро, а что остаётся", "content": "<p>Технологические продукты развиваются стремительно. Чтобы не потеряться, различайте изменчивые детали и устойчивые принципы.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Экосистема «горячая», когда одновременно выполняются четыре условия: (1) меняется поведение пользователей — люди проектируют рабочие пространства вместо того, чтобы составлять промпты; (2) меняются операционные привычки — команды ведут <code>CLAUDE.md</code> как совместные контракты; (3) расширяется экосистема — умножаются официальные и сообщественные Skills, Plugins, MCP-серверы; (4) пересматриваются должностные роли — маркетинг, налоги, PM, дизайн используют Claude как слой автоматизации, а не просто чат-бот.\n      </div>\n\n      <p><strong>Четыре рамки для чтения всей книги:</strong></p>\n      <table>\n        <tr><th>Рамка</th><th>Роль</th><th>Аналогия</th></tr>\n        <tr><td>Work Path</td><td>Откуда начинать (Chat, Cowork, Claude Code)</td><td>Стол, за которым вы сидите</td></tr>\n        <tr><td>Harness</td><td>Среда выполнения (разрешения, правила, тесты)</td><td>Ящики, замки, чек-листы на столе</td></tr>\n        <tr><td>Operations Layer</td><td>Планирование, развёртывание, аналитика</td><td>Административный офис</td></tr>\n        <tr><td>System</td><td>Всё вместе с циклами проверки человеком</td><td>Всё офисное здание</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Когда выходит новая функция, не спрашивайте «Стало ли умнее?» Спросите: «Какой слой добавили — знания, инструменты, пакеты или управление?» Это предотвращает избыточную конфигурацию и сохраняет стабильность вашей системы.\n      </div>"}}}, "part2": {"title": "Часть 2: Практическое руководство", "sections": {"2_1": {"title": "Cowork и Claude Code: границы первого применения", "content": "<p>Самая распространённая путаница после установки: «С чего начать?» Ответ зависит от типа задачи.</p>\n\n      <table>\n        <tr><th>Cowork</th><th>Claude Code</th></tr>\n        <tr><td>Задачи, ориентированные на документы: заметки совещаний, исследовательские брифы, чтение папок, генерация черновиков</td><td>Задачи, ориентированные на разработку: исправление багов, тесты, рефакторинг, плановые документы</td></tr>\n        <tr><td>Не ожидайте, что это универсальная серверная система</td><td>Не начинайте с делегирования целой новой функции сразу</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Эта глава не о том, <em>как использовать</em> Claude Code, — она о том, <em>как им управлять</em>. Ключевые привычки: plan-before-edit, resume hygiene, review split, разделение worktree, allowlists и структурированные handoff.\n      </div>\n\n      <p>Управление сессиями следует дереву решений:</p>\n      <ul>\n        <li><strong>Та же цель, продолжаем?</strong> → <code>claude --continue</code> или <code>--resume</code></li>\n        <li><strong>Нужно другое направление?</strong> → <code>--fork-session</code></li>\n        <li><strong>Конфликты файлов или ролей?</strong> → <code>--worktree</code> (отдельная рабочая директория)</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Люди, которые хорошо работают с Claude Code со временем, — это не те, кто пишет лучшие промпты, а те, кто делает работу менее прерываемой.\n      </div>"}, "2_2": {"title": "Принципы работы Claude Code", "content": "<p>Восемь привычек отделяют продуктивных пользователей Claude Code от разочарованных:</p>\n      <ol>\n        <li><strong>Планируй перед редактированием</strong> — Зафиксируй область, верификацию и запретные зоны до прикосновения к коду. Для больших задач сначала напиши <code>plan.md</code>.</li>\n        <li><strong>Держи постоянный контекст кратким</strong> — <code>CLAUDE.md</code> — это рабочий контракт, не энциклопедия. Переносите долгосрочное состояние в <code>handoff.md</code>, <code>decision-log.md</code>.</li>\n        <li><strong>Сначала allowlist, потом расширяй</strong> — Начинай с узких правил <code>allow</code> и <code>deny</code>. Расширяй разрешения только после понимания их смысла.</li>\n        <li><strong>Ручной <code>/compact</code> в нужный момент</strong> — Сжимай после сохранения важного состояния в файлы, а не после того, как сессия уже деградировала.</li>\n        <li><strong>Используй resume обдуманно</strong> — <code>--continue</code> для того же направления, <code>--fork-session</code> когда направление разветвляется.</li>\n        <li><strong>Разделяй план / реализацию / ревью</strong> — Не втискивай все роли в одну сессию. Разделение снижает загрязнение контекста и усталость от согласований.</li>\n        <li><strong>Используй worktrees</strong> — Для конфликтующих задач, экспериментов или параллельных ревью — разделяй рабочую директорию.</li>\n        <li><strong>Управляй стоимостью через структуру, а не подсчёт token</strong> — Снижайте cache miss, длину вывода инструментов, длину сессии и многословность тестовых логов.</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Сразу переходить к реализации без плана. В больших задачах это кажется быстрым, но приводит к переделкам. План — не бюрократический шаг, это инструмент, сокращающий переделки.\n      </div>"}, "2_3": {"title": "Шаблоны: CLAUDE.md, settings.json, Hooks", "content": "<p>Хорошо организованный репозиторий разделяет ответственности по файлам. Вот чертёж harness:</p>\n\n      <pre><code>repo/\n├── CLAUDE.md                    # Контракт проекта (всегда загружается)\n├── .claude/\n│   ├── settings.json            # Границы allow/ask/deny\n│   ├── rules/\n│   │   ├── architecture.md      # Структурные правила\n│   │   ├── testing.md           # Стандарты тестирования\n│   │   └── frontend.md          # UI-соглашения\n│   └── hooks.json               # Правила автоматического соблюдения\n└── tasks/\n    ├── plan.md                  # Что делать дальше\n    ├── verify.md                # Критерии завершения\n    ├── decision-log.md          # Почему выбран этот путь\n    └── handoff.md               # Текущее состояние для следующей сессии</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Каждый файл предотвращает отдельный тип сбоя. <code>CLAUDE.md</code> предотвращает drift контекста. <code>settings.json</code> предотвращает небезопасные действия. <code>rules/*</code> предотвращает предметно-специфические ошибки. <code>hooks.json</code> превращает «не забудь сделать X» в «всегда делать X». <code>tasks/*</code> предотвращает амнезию сессии.\n      </div>\n\n      <p><strong>Приоритет областей settings:</strong> Managed &gt; Command-line &gt; Local &gt; Project &gt; User. Правила, заблокированные организацией, не могут быть переопределены личными настройками — именно поэтому возникает путаница «мои настройки не работают».</p>\n\n      <p><strong>Разделение командного и личного:</strong> Общекомандные стандарты — в <code>CLAUDE.md</code> и <code>.claude/settings.json</code>. Личные эксперименты — в <code>CLAUDE.local.md</code> или <code>.claude/settings.local.json</code>.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Минимальный пример Hook, блокирующего опасные команды Bash:\n      </div>\n      <pre><code>{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \".claude/hooks/block-rm.sh\"\n      }]\n    }]\n  }\n}</code></pre>"}, "2_4": {"title": "Шаблоны промптов и уровни инжиниринга", "content": "<p>Эффективные промпты строятся не на хитрости, а на паттернах. Вот ключевые стили промптов:</p>\n\n      <p><strong>Промпт «контекст-первым» (рекомендуемая стартовая процедура):</strong></p>\n      <pre><code>Read CLAUDE.md, relevant rules, and tasks/verify.md first.\nDo NOT implement yet. Summarize:\n1. Task type\n2. Modification scope\n3. Off-limits areas\n4. Verification commands\nThen proceed only after approval.</code></pre>\n\n      <p><strong>Промпт против срезания углов (для задач по коду):</strong></p>\n      <pre><code>Goal: maintainable implementation, not just passing tests.\nRules:\n1. No hardcoding or special-casing to pass tests.\n2. If tests conflict with requirements, report first.\n3. If using external code, explain why before importing.\n4. Separate direct implementation from external references.\n5. After changes, report what passed and what's unverified.</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Три инженерных слоя: (1) <strong>Prompt Engineering</strong> — составление лучших инструкций; (2) <strong>Context Engineering</strong> — выбор того, что показывать Claude; (3) <strong>Harness Engineering</strong> — проектирование всей рабочей среды. Большинство останавливается на слое 1. Реальный выигрыш — на слоях 2 и 3.\n      </div>\n\n      <p><strong>Шаблон Compact Instructions</strong> — управляет тем, что сохранится после <code>/compact</code>:</p>\n      <pre><code>## Compact Instructions\nWhen compacting, always preserve:\n- Last modified files and why\n- Passed tests, failed tests, untested items\n- Rejected alternatives and reasons\n- The ONE thing next turn should do immediately\n- Risk points requiring human review</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Хорошие инструкции сжатия делают не резюме красивым, а следующую сессию — способной немедленно продолжить работу.\n      </div>"}, "2_5": {"title": "Циклы оценки и команды сессий", "content": "<p>Шесть slash-команд образуют инструментарий управления сессиями:</p>\n\n      <table>\n        <tr><th>Команда</th><th>Когда использовать</th></tr>\n        <tr><td><code>/clear</code></td><td>Очистить накопленный диалог и начать заново</td></tr>\n        <tr><td><code>/compact [focus]</code></td><td>Резюмировать длинный диалог, указав, что сохранить</td></tr>\n        <tr><td><code>/context</code></td><td>Проверить, что занимает пространство контекста</td></tr>\n        <tr><td><code>/memory</code></td><td>Посмотреть, какие файлы памяти и слои CLAUDE.md загружены</td></tr>\n        <tr><td><code>/init</code></td><td>Автоматически сгенерировать черновик CLAUDE.md для нового репозитория</td></tr>\n        <tr><td><code>/cost</code></td><td>Проверить текущее использование token и стоимость</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Еженедельная оценка должна отслеживать: какие версии CLAUDE.md / rules / Hook были активны, какие Skills или шаблоны использовались, что изменилось за неделю и улучшились ли процент успешных прогонов и количество правок вручную. Меняйте правила и Hook — не только промпты — чтобы найти оптимальную конфигурацию.\n      </div>\n\n      <p><strong>Рекомендуемый учебный путь по официальным ресурсам:</strong></p>\n      <ol>\n        <li>Release notes → что сейчас возможно</li>\n        <li>Claude Help Center → рабочие пути продукта (Cowork, Skills, Connectors)</li>\n        <li>Claude Code Docs → продвинутые функции (Plugins, Hooks, команды агентов)</li>\n        <li>API / Agent SDK docs → создание пользовательских агентных приложений</li>\n        <li>GitHub-репозитории → реальные примеры и структуры</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Читать демо-посты как спецификации, а официальные доки — как операционные советы. Держите роли отдельно: официальные документы подтверждают факты и границы; посты сообщества раскрывают паттерны и режимы отказа; репозитории показывают реальную структуру.\n      </div>"}}}, "part3": {"title": "Часть 3: Системное проектирование", "sections": {"3_1": {"title": "Глубокое погружение в контекстный инжиниринг", "content": "<p><strong>Context Engineering</strong> — это дисциплина выбора информации, которую Claude видит в каждый конкретный момент. Это не написание более длинных промптов, а сборка правильного контекстного окна.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> <em>Context Assembly</em> — сбор правил, файлов, заметок и описаний инструментов, необходимых для текущей задачи, в реальный входной контекст. Это процесс отбора, а не свалки. Больше контекста — не значит лучше.\n      </div>\n\n      <p>Что заполняет контекстное окно на каждом ходу (даже при однострочном промпте):</p>\n      <ul>\n        <li>Ваш текущий вопрос</li>\n        <li>Недавняя история диалога</li>\n        <li>Файлы, прочитанные Claude</li>\n        <li><code>CLAUDE.md</code> и файлы правил</li>\n        <li>Результаты выполнения инструментов</li>\n        <li>Недавний вывод самого Claude</li>\n      </ul>\n\n      <p><strong>Context Rot</strong> возникает, когда контекст разрастается настолько, что ранние сигналы ослабевают. Длинные диалоги постепенно теряют связность — не потому что модель «забывает», а потому что важные ранние инструкции разбавляются последующим шумом.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Загружать весь репозиторий в контекст. Даже при исправлении одного бага некоторые пользователи сбрасывают каждый файл. Это медленнее, дороже и даёт результаты хуже. Показывайте Claude только нужную функцию и 20 строк лога ошибки.\n      </div>\n\n      <p><strong>Три изоляции, которые нужно проектировать одновременно:</strong></p>\n      <ol>\n        <li><strong>Изоляция контекста</strong> — Не смешивайте исследование, планирование, реализацию и ревью в одной длинной сессии. Используйте Subagent или отдельные сессии.</li>\n        <li><strong>Изоляция состояния файлов</strong> — Используйте worktrees или отдельные выходные папки для конфликтогенной работы.</li>\n        <li><strong>Изоляция согласований</strong> — Разделяйте часто разрешаемые действия и действия, требующие обязательной проверки, через разрешения и Hook.\n      </ol>"}, "3_2": {"title": "Harness-инжиниринг", "content": "<p>Harness Engineering выходит за рамки настройки промптов. Оно охватывает всё рабочее пространство: разрешения, структуру папок, политики тестирования, правила возобновления сессий, протоколы handoff, изоляцию worktree и настройку удалённого управления.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Harness проектирует три вещи одновременно: (1) что знает Claude (контекст); (2) что может делать Claude (инструменты и разрешения); (3) что должен верифицировать Claude (тесты и критерии завершения). Отсутствие любого из них порождает отдельный класс сбоев.\n      </div>\n\n      <p><strong>Стартовая процедура важнее стартового промпта:</strong></p>\n      <ol>\n        <li>Проверить постоянный контракт — прочитать <code>CLAUDE.md</code>, нужные правила, текущую ветку</li>\n        <li>Классифицировать задачу — исследование, реализация или ревью?</li>\n        <li>Написать план — область, запретные зоны, команды верификации</li>\n        <li>Подтвердить критерии завершения — проверить <code>tasks/verify.md</code></li>\n        <li>Только после этого приступать к реальной работе</li>\n      </ol>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Subagent и worktrees решают одну и ту же проблему с разных сторон. Subagent изолирует <em>контекст</em> (делегирует исследование или ревью временному работнику). Worktrees изолируют <em>состояние файлов</em> (физически раздельные рабочие директории). Используйте Subagent для кратких исследований; worktrees — для параллельных экспериментов.\n      </div>\n\n      <p>Одно из наиболее эффективных применений Subagent — не ускорение кода, а <em>симуляция разных пользовательских ролей</em>: скептичный старший инженер, новый участник проекта, ревьюер безопасности, специалист по эксплуатации. Разные точки зрения выявляют проблемы доверия: отсутствующие README, побочные эффекты в командах статуса, пробелы наблюдаемости.</p>"}, "3_3": {"title": "Структуры верификации", "content": "<p>Верификация — это то, что отличает демо от продакшена. Хороший план верификации отвечает на вопрос: «Что должно пройти, прежде чем задача считается выполненной?»</p>\n\n      <p><strong>Шаблон <code>tasks/verify.md</code>:</strong></p>\n      <pre><code># Verification Plan\n## Must Pass\n- [ ] Unit tests: `pnpm test -- signup`\n- [ ] Lint: `pnpm lint`\n- [ ] Type check: `pnpm typecheck`\n## Must Review (human)\n- [ ] Manual browser check on mobile\n- [ ] CTA text approved by stakeholder\n## Must Not Break\n- [ ] Existing auth flow unchanged\n- [ ] No new dependencies added</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Навыки верификации (проверка работоспособности регистрации end-to-end, корректности состояний оформления заказа, работы CLI в TTY-среде) часто дают более высокий ROI, чем навыки генерации. «Хорошо написанный черновик» дёшев — «верифицированный прошедший результат» дорог и ценен.\n      </div>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Считать прохождение тестов целью вместо поддерживаемой реализации. Модели могут хар
