<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Study Guide</title>
  <style>
/* ============================================================
   Study Guide — Design System & Component Styles
   Clean, textbook-like. Borders over shadows. Blue accent.
   ============================================================ */

/* --- Design Tokens (Light Mode Default) --- */
:root {
  /* Spacing: 4px base unit */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;
  --sp-10: 40px;
  --sp-12: 48px;
  --sp-16: 64px;

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
    "Noto Sans", "Noto Sans KR", "Noto Sans SC", "Noto Sans Devanagari",
    "Helvetica Neue", Arial, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono",
    "Cascadia Code", Menlo, Consolas, "DejaVu Sans Mono", monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.3125rem;
  --text-2xl: 1.625rem;
  --text-3xl: 2rem;
  --line-height: 1.65;

  /* Text hierarchy — warm grays */
  --text-primary: #1a1a1a;
  --text-secondary: #4a4a4a;
  --text-tertiary: #6b6b6b;
  --text-muted: #9a9a9a;

  /* Surfaces */
  --surface-base: #ffffff;
  --surface-elevated: #f8f8f8;
  --surface-overlay: #ffffff;

  /* Borders — subtle rgba */
  --border-default: rgba(0, 0, 0, 0.1);
  --border-subtle: rgba(0, 0, 0, 0.06);
  --border-strong: rgba(0, 0, 0, 0.18);

  /* Accent / brand */
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #eff6ff;
  --accent-muted: rgba(37, 99, 235, 0.1);

  /* Semantic */
  --success: #16a34a;
  --success-light: #f0fdf4;
  --error: #dc2626;
  --error-light: #fef2f2;
  --warning: #d97706;
  --warning-light: #fffbeb;

  /* Layout */
  --sidebar-width: 260px;
  --header-height: 56px;
  --content-max: 820px;
  --radius: 6px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;

  /* Focus ring */
  --focus-ring: 0 0 0 2px var(--surface-base), 0 0 0 4px var(--accent);
}

/* --- Dark Mode --- */
html.dark {
  --text-primary: #e8e8e8;
  --text-secondary: #b0b0b0;
  --text-tertiary: #888888;
  --text-muted: #606060;

  --surface-base: #141414;
  --surface-elevated: #1c1c1c;
  --surface-overlay: #1e1e1e;

  /* Slightly more visible borders in dark mode */
  --border-default: rgba(255, 255, 255, 0.12);
  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.22);

  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-light: rgba(59, 130, 246, 0.1);
  --accent-muted: rgba(59, 130, 246, 0.08);

  /* Slightly desaturated semantic colors for dark mode */
  --success: #4ade80;
  --success-light: rgba(74, 222, 128, 0.1);
  --error: #f87171;
  --error-light: rgba(248, 113, 113, 0.1);
  --warning: #fbbf24;
  --warning-light: rgba(251, 191, 36, 0.1);
}

/* --- Reset & Base --- */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--line-height);
  color: var(--text-primary);
  background: var(--surface-base);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  height: 100vh;
}

a {
  color: var(--accent);
  text-decoration: none;
  transition: color var(--transition-fast);
}

a:hover {
  text-decoration: underline;
}

/* Global focus-visible for keyboard navigation */
:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--radius);
}

/* Remove focus ring from mouse clicks */
:focus:not(:focus-visible) {
  outline: none;
  box-shadow: none;
}

img {
  max-width: 100%;
  display: block;
}

button {
  cursor: pointer;
  font: inherit;
  border: none;
  background: none;
  color: inherit;
}

code,
pre {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
}

code {
  background: var(--surface-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
  padding: 2px 6px;
  font-size: 0.875em;
}

pre {
  background: var(--surface-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  padding: var(--sp-4) var(--sp-5);
  overflow-x: auto;
  line-height: 1.55;
  -webkit-overflow-scrolling: touch;
  tab-size: 2;
}

pre code {
  background: none;
  border: none;
  padding: 0;
  border-radius: 0;
  font-size: var(--text-sm);
}

/* --- App Layout --- */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* --- Header --- */
.header {
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  height: var(--header-height);
  padding: 0 var(--sp-6);
  border-bottom: 1px solid var(--border-default);
  background: var(--surface-base);
  flex-shrink: 0;
  z-index: 20;
}

.header-title {
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  letter-spacing: -0.02em;
}

.header-title span {
  color: var(--accent);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-left: auto;
}

/* Search trigger in header */
.search-trigger {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: var(--text-sm);
  background: var(--surface-base);
  transition: border-color var(--transition-fast);
  min-width: 180px;
}

.search-trigger:hover {
  border-color: var(--border-strong);
  color: var(--text-secondary);
}

.search-trigger:focus-visible {
  box-shadow: var(--focus-ring);
}

.search-trigger kbd {
  font-family: var(--font-sans);
  font-size: var(--text-xs);
  background: var(--surface-elevated);
  border: 1px solid var(--border-default);
  border-radius: 3px;
  padding: 1px 5px;
  margin-left: auto;
}

/* Theme toggle */
.theme-toggle {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  transition: background var(--transition-fast);
  font-size: var(--text-lg);
}

.theme-toggle:hover {
  background: var(--accent-muted);
}

.theme-toggle:active {
  background: var(--accent-light);
}

.theme-toggle:focus-visible {
  box-shadow: var(--focus-ring);
}

/* --- Layout Body --- */
.layout-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* --- Sidebar --- */
.sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  border-right: 1px solid var(--border-default);
  background: var(--surface-base);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-4) 0;
}

.sidebar-nav::-webkit-scrollbar {
  width: 4px;
}

.sidebar-nav::-webkit-scrollbar-thumb {
  background: var(--border-default);
  border-radius: 2px;
}

/* Nav items */
.nav-section {
  padding: 0;
  list-style: none;
}

.nav-item {
  display: flex;
  align-items: baseline;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-5);
  font-size: var(--text-sm);
  color: var(--text-secondary);
  cursor: pointer;
  transition: color var(--transition-fast), background var(--transition-fast);
  border-left: 3px solid transparent;
  line-height: 1.4;
}

.nav-item:hover {
  color: var(--text-primary);
  background: var(--accent-muted);
}

.nav-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 500;
}

.nav-item-chapters {
  font-size: var(--text-xs);
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Sidebar progress */
.sidebar-progress {
  padding: var(--sp-4) var(--sp-5);
  border-top: 1px solid var(--border-subtle);
}

.sidebar-progress-label {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-bottom: var(--sp-2);
}

/* --- Content --- */
.content {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-8) var(--sp-8);
}

.content-inner {
  max-width: var(--content-max);
  margin: 0 auto;
}

/* --- Tab Bar --- */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border-default);
  margin-bottom: var(--sp-6);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.tab-bar::-webkit-scrollbar {
  display: none;
}

.tab {
  padding: var(--sp-3) var(--sp-5);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--text-tertiary);
  border-bottom: 2px solid transparent;
  transition: color var(--transition-fast), border-color var(--transition-fast);
  margin-bottom: -1px;
  white-space: nowrap;
  flex-shrink: 0;
}

.tab:hover {
  color: var(--text-primary);
}

.tab:active {
  color: var(--accent);
}

.tab:focus-visible {
  box-shadow: var(--focus-ring);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* --- Article --- */
.article-area h1 {
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: var(--sp-2);
  letter-spacing: -0.025em;
  line-height: 1.2;
}

.article-area h2 {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--text-primary);
  margin-top: var(--sp-10);
  margin-bottom: var(--sp-4);
  letter-spacing: -0.02em;
  line-height: 1.3;
}

.article-area h3 {
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: var(--sp-8);
  margin-bottom: var(--sp-3);
  letter-spacing: -0.01em;
}

.article-area p {
  margin-bottom: var(--sp-4);
  color: var(--text-secondary);
}

.article-area ul,
.article-area ol {
  margin-bottom: var(--sp-4);
  padding-left: var(--sp-6);
  color: var(--text-secondary);
}

.article-area li {
  margin-bottom: var(--sp-2);
}

.article-area li + li {
  margin-top: var(--sp-1);
}

/* --- Accordion --- */
.accordion {
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  margin-bottom: var(--sp-4);
  overflow: hidden;
}

.accordion + .accordion {
  margin-top: calc(-1 * var(--sp-1));
}

.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: var(--sp-3) var(--sp-4);
  font-size: var(--text-base);
  font-weight: 500;
  color: var(--text-primary);
  background: var(--surface-base);
  text-align: left;
  transition: background var(--transition-fast), color var(--transition-fast);
}

.accordion-header:hover {
  background: var(--accent-muted);
}

.accordion-header:active {
  background: var(--accent-light);
}

.accordion-header:focus-visible {
  box-shadow: inset var(--focus-ring);
}

.accordion-header::after {
  content: "";
  width: 6px;
  height: 6px;
  border-right: 1.5px solid var(--text-muted);
  border-bottom: 1.5px solid var(--text-muted);
  transform: rotate(-45deg);
  transition: transform var(--transition-base);
  flex-shrink: 0;
  margin-left: var(--sp-3);
}

.accordion.open .accordion-header::after {
  transform: rotate(45deg);
}

.accordion-body {
  display: none;
  padding: var(--sp-4);
  border-top: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-size: var(--text-base);
}

.accordion.open .accordion-body {
  display: block;
}

/* --- Callouts --- */
.callout {
  padding: var(--sp-4);
  border: 1px solid var(--border-default);
  border-left-width: 3px;
  border-radius: var(--radius);
  margin-bottom: var(--sp-4);
  font-size: var(--text-sm);
  line-height: var(--line-height);
}

.callout-title {
  font-weight: 600;
  font-size: var(--text-sm);
  margin-bottom: var(--sp-2);
}

/* Concept: blue accent */
.callout-concept {
  border-left-color: var(--accent);
  background: var(--accent-light);
}

.callout-concept .callout-title {
  color: var(--accent);
}

/* Tip: amber */
.callout-tip {
  border-left-color: var(--warning);
  background: var(--warning-light);
}

.callout-tip .callout-title {
  color: var(--warning);
}

/* Warning: red */
.callout-warning {
  border-left-color: var(--error);
  background: var(--error-light);
}

.callout-warning .callout-title {
  color: var(--error);
}

/* --- Quiz Trigger --- */
.quiz-trigger-wrap {
  text-align: center;
  padding: var(--sp-8) 0;
  margin-top: var(--sp-6);
  border-top: 1px solid var(--border-subtle);
}

.quiz-trigger-btn {
  padding: var(--sp-3) var(--sp-8);
  font-size: var(--text-sm);
  font-weight: 600;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition-fast);
}

.quiz-trigger-btn:hover {
  background: var(--accent-hover);
}

/* --- Quiz --- */
.quiz-section {
  display: none;
}

.quiz-section.active {
  display: block;
}

.quiz-card {
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  padding: var(--sp-6);
  margin-bottom: var(--sp-6);
}

.quiz-card-question {
  font-size: var(--text-base);
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: var(--sp-4);
  line-height: 1.5;
}

.quiz-card-number {
  font-size: var(--text-xs);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--sp-2);
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
}

.quiz-option {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  font-size: var(--text-sm);
  color: var(--text-secondary);
  text-align: left;
  width: 100%;
  transition: border-color var(--transition-fast), background var(--transition-fast), color var(--transition-fast), opacity var(--transition-fast);
}

.quiz-option:hover:not(:disabled) {
  border-color: var(--border-strong);
  background: var(--accent-muted);
  color: var(--text-primary);
}

.quiz-option:active:not(:disabled) {
  background: var(--accent-light);
}

.quiz-option:focus-visible {
  box-shadow: var(--focus-ring);
}

.quiz-option.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--text-primary);
}

.quiz-option.correct {
  border-color: var(--success);
  background: var(--success-light);
  color: var(--success);
}

.quiz-option.incorrect {
  border-color: var(--error);
  background: var(--error-light);
  color: var(--error);
}

/* Disabled state after answering */
.quiz-card.answered .quiz-option {
  cursor: default;
  pointer-events: none;
}

.quiz-card.answered .quiz-option:not(.correct):not(.incorrect) {
  opacity: 0.5;
}

.quiz-option-letter {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border-default);
  border-radius: 50%;
  font-size: var(--text-xs);
  font-weight: 600;
  flex-shrink: 0;
}

.quiz-option.correct .quiz-option-letter {
  border-color: var(--success);
  background: var(--success);
  color: #fff;
}

.quiz-option.incorrect .quiz-option-letter {
  border-color: var(--error);
  background: var(--error);
  color: #fff;
}

.quiz-explanation {
  margin-top: var(--sp-4);
  padding: var(--sp-3) var(--sp-4);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  background: var(--surface-elevated);
  font-size: var(--text-sm);
  color: var(--text-secondary);
  display: none;
}

.quiz-explanation.visible {
  display: block;
}

.quiz-title {
  font-size: var(--text-xl);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: var(--sp-6);
  padding-bottom: var(--sp-4);
  border-bottom: 1px solid var(--border-subtle);
}

.quiz-score {
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  padding: var(--sp-4) var(--sp-6);
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  margin-bottom: var(--sp-6);
  background: var(--surface-elevated);
}

.quiz-score-text {
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--text-primary);
}

.quiz-retry-btn {
  padding: var(--sp-2) var(--sp-4);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition-fast);
}

.quiz-retry-btn:hover {
  background: var(--accent-hover);
}

.quiz-retry-btn:active {
  background: var(--accent);
  transform: scale(0.98);
}

.quiz-retry-btn:focus-visible {
  box-shadow: var(--focus-ring);
}

/* --- Expand All / Collapse All --- */
.expand-all-btn {
  padding: var(--sp-2) var(--sp-4);
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  background: var(--surface-base);
  color: var(--text-secondary);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  transition: border-color var(--transition-fast), background var(--transition-fast);
}

.expand-all-btn:hover {
  border-color: var(--border-strong);
  background: var(--accent-muted);
}

.expand-all-btn:active {
  background: var(--accent-light);
}

.expand-all-btn:focus-visible {
  box-shadow: var(--focus-ring);
}

.part-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--sp-3);
  margin-bottom: var(--sp-6);
}

.part-subtitle {
  font-size: var(--text-sm);
  color: var(--text-muted);
}

.part-controls {
  margin-left: auto;
}

/* --- Section Checkbox --- */
.section-check {
  margin-left: auto;
  display: flex;
  align-items: center;
  cursor: pointer;
  flex-shrink: 0;
}

.section-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}

/* --- Progress Bar --- */
.progress-bar {
  height: 4px;
  background: var(--border-subtle);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 400ms ease;
  width: 0%;
}

/* --- Search Overlay --- */
.search-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 15vh;
}

.search-overlay.open {
  display: flex;
}

.search-dialog {
  width: 560px;
  max-width: 90vw;
  max-height: 60vh;
  background: var(--surface-overlay);
  border: 1px solid var(--border-default);
  border-radius: calc(var(--radius) * 2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.search-input-wrap {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-4);
  border-bottom: 1px solid var(--border-subtle);
}

.search-input-wrap svg {
  flex-shrink: 0;
  color: var(--text-muted);
}

.search-input {
  width: 100%;
  border: none;
  outline: none;
  background: none;
  font-size: var(--text-base);
  color: var(--text-primary);
  font-family: var(--font-sans);
}

.search-input::placeholder {

  <script>
const INLINED = true;
const INLINED_I18N = {"en": {"ui": {"title": "Claude Code Study Guide", "search_placeholder": "Search...", "next": "Next →", "prev": "← Previous", "quiz_title": "Self-Check Quiz", "progress": "Progress", "expand_all": "Expand All", "collapse_all": "Collapse All", "retry": "Retry", "score": "{correct}/{total} correct", "mark_complete": "Mark as read", "completed": "Completed"}, "parts": {"part1": {"title": "Part 1: Building Fundamentals", "sections": {"1_1": {"title": "Why the Ecosystem Is Hot", "content": "<p>The AI landscape shifted from \"which model is smarter\" to \"which tool connects files, tests, Git, browser, and external services with the least friction.\" This is why Claude Code, Codex, and Gemini CLI are discussed together — the competition is now about <strong>work paths</strong>, not benchmark scores.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Claude Code is not just a coding app. It is a <em>work harness</em> combining memoized context, tool orchestration, permission gates, and resumable sessions. Cowork, Skills, Plugins, and Scheduled Tasks are extensions of this core harness into non-coding work.\n      </div>\n\n      <p>Research confirms this direction. METR reports that agent task horizons are growing rapidly, and Anthropic notes that the real performance gap comes from task structure and verification habits, not model names. The question is no longer \"how smart is the model?\" but \"who learns delegation rules and verification harnesses faster?\"</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Start by asking: \"Is my task question-based, document-based, or implementation-based?\" This single question determines whether you should use Chat, Projects, Cowork, or Claude Code.\n      </div>\n\n      <table>\n        <tr><th>What Changes Fast</th><th>What Lasts</th></tr>\n        <tr><td>Menu locations, plan tiers, preview status, feature names</td><td>Which work path to use, how to separate files and verification, where to place human checkpoints</td></tr>\n      </table>"}, "1_2": {"title": "Four Key Terms to Remember", "content": "<p>Before diving deeper, internalize these four terms. Every chapter builds on them.</p>\n\n      <table>\n        <tr><th>Term</th><th>Meaning</th></tr>\n        <tr><td><strong>Memoized Context</strong></td><td>Background info held across turns so you don't re-explain every time</td></tr>\n        <tr><td><strong>Tool Orchestration</strong></td><td>The layer that decides which tools to use, in what order</td></tr>\n        <tr><td><strong>Permission Gate</strong></td><td>The boundary that separates allow, ask, and deny before execution</td></tr>\n        <tr><td><strong>Resumable Session</strong></td><td>The ability to pick up where you left off, even after disconnection</td></tr>\n      </table>\n\n      <p>These form a pipeline: <strong>User Request → Memoized Context → Tool Orchestration → Permission Gate → Execution & Verification → Resumable Session → Next Task</strong>. No matter how complex a workflow gets, it is always a variation of these five stages.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> \"Memoized\" doesn't mean \"memorized.\" It means \"computed once, reused many times\" — like setting background rules that persist across every turn without re-sending them.\n      </div>"}, "1_3": {"title": "The Harness Concept", "content": "<p>A <strong>harness</strong> is the outer structure that defines what Claude can read, modify, and verify. Think of it as setting up a colleague's workspace: you place reference materials on the desk, decide which drawers are accessible, and attach a checklist to complete before finishing.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Sending \"Fix the login bug\" with no boundaries. A strong harness request looks like: \"Read only <code>auth/</code>, don't touch <code>.env</code>, pass login tests, leave a 3-line change note.\"\n      </div>\n\n      <p><strong>Harness Engineering</strong> is not about writing smarter prompts — it is about designing the workspace where Claude operates. It includes: which files are always loaded, what permissions are set, what tests must pass, and where results are stored.</p>\n\n      <p>The International AI Safety Report 2026 confirms: as model capabilities rise, harness and verification structures become <em>more</em> important, not less. Real-world tasks involve resource constraints, incomplete information, exceptions, and approval flows that raw model intelligence cannot handle alone.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Even beginners can start building a harness: write basic rules in <code>CLAUDE.md</code>, set allow/deny scopes in <code>settings.json</code>, split big tasks with <code>plan.md</code>, and leave session state in <code>handoff.md</code>.\n      </div>"}, "1_4": {"title": "Work Surfaces: Chat, Projects, Cowork, Claude Code", "content": "<p>The same Claude model behaves differently depending on which surface you use. Choosing the wrong surface is not a skill problem — it is a routing problem.</p>\n\n      <table>\n        <tr><th>Surface</th><th>Best For</th><th>Influenced By</th></tr>\n        <tr><td><strong>Chat</strong></td><td>Quick questions, idea sorting</td><td>Question quality</td></tr>\n        <tr><td><strong>Projects</strong></td><td>Persistent background knowledge</td><td>Folder structure, templates</td></tr>\n        <tr><td><strong>Cowork</strong></td><td>Document delegation — research, briefs, file organization</td><td>Folder structure, templates</td></tr>\n        <tr><td><strong>Claude Code</strong></td><td>Implementation and verification — code, tests, reviews</td><td>Rule files, verification loops</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Three misconceptions: (1) \"Same model means same experience everywhere\" — wrong, the surface matters enormously. (2) \"Cowork is easy mode, Claude Code is hard mode\" — wrong, they differ by delegation style, not difficulty. (3) \"Try all surfaces at once\" — wrong, master one first then expand.\n      </div>\n\n      <p><strong>Good first tasks by surface:</strong></p>\n      <ul>\n        <li><strong>Chat:</strong> \"Summarize this report in 5 sentences with 3 questions.\"</li>\n        <li><strong>Projects:</strong> \"Read this folder and create a one-page background knowledge summary.\"</li>\n        <li><strong>Cowork:</strong> \"Read meeting notes and save a weekly brief draft to <code>outputs/</code>.\"</li>\n        <li><strong>Claude Code:</strong> \"Read this bug reproduction path, then write a hypothesis and fix plan in <code>plan.md</code>.\"</li>\n      </ul>"}, "1_5": {"title": "What Changes Fast vs. What Stays", "content": "<p>Technology products evolve rapidly. To stay grounded, distinguish between volatile details and lasting principles.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> The ecosystem is \"hot\" when four conditions are met simultaneously: (1) user behavior changes — people design workspaces instead of crafting prompts, (2) operational habits change — teams maintain <code>CLAUDE.md</code> as shared contracts, (3) the ecosystem expands — official and community skills, plugins, MCP servers multiply, (4) job roles are redesigned — marketing, tax, PM, design teams use Claude as an automation layer, not just a chatbot.\n      </div>\n\n      <p><strong>The four frames for reading the entire book:</strong></p>\n      <table>\n        <tr><th>Frame</th><th>Role</th><th>Analogy</th></tr>\n        <tr><td>Work Path</td><td>Where you start (Chat, Cowork, Claude Code)</td><td>The desk you sit at</td></tr>\n        <tr><td>Harness</td><td>The execution environment (permissions, rules, tests)</td><td>Drawers, locks, checklists on the desk</td></tr>\n        <tr><td>Operations Layer</td><td>Scheduling, deployment, analytics</td><td>The admin office</td></tr>\n        <tr><td>System</td><td>Everything combined with human review loops</td><td>The entire office building</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> When a new feature launches, don't ask \"Is it smarter?\" Ask: \"Which layer did they add — knowledge, tools, packages, or controls?\" This prevents over-configuration and keeps your setup stable.\n      </div>"}}}, "part2": {"title": "Part 2: Practical Playbook", "sections": {"2_1": {"title": "Cowork & Claude Code: First Application Boundaries", "content": "<p>The most common confusion after installation is: \"Where do I start?\" The answer depends on your task type.</p>\n\n      <table>\n        <tr><th>Cowork</th><th>Claude Code</th></tr>\n        <tr><td>Document-first tasks: meeting notes, research briefs, folder reading, draft generation</td><td>Development-first tasks: bug fixes, tests, refactoring, plan documents</td></tr>\n        <tr><td>Don't expect it to be a universal backend system</td><td>Don't start by delegating an entire new feature at once</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> This chapter is not about <em>how to use</em> Claude Code — it is about <em>how to operate</em> it. The core habits are: plan-before-edit, resume hygiene, review split, worktree separation, allowlists, and structured handoffs.\n      </div>\n\n      <p>Session management follows a decision tree:</p>\n      <ul>\n        <li><strong>Same goal, continuing?</strong> → <code>claude --continue</code> or <code>--resume</code></li>\n        <li><strong>Need a different direction?</strong> → <code>--fork-session</code></li>\n        <li><strong>File conflicts or role conflicts?</strong> → <code>--worktree</code> (separate working directory)</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> People who use Claude Code well over time are not people who write better prompts — they are people who make work less interruptible.\n      </div>"}, "2_2": {"title": "Claude Code Operating Principles", "content": "<p>Eight habits separate productive Claude Code users from frustrated ones:</p>\n      <ol>\n        <li><strong>Plan before edit</strong> — Fix scope, verification, and no-go zones before touching code. For big tasks, write <code>plan.md</code> first.</li>\n        <li><strong>Keep resident context thin</strong> — <code>CLAUDE.md</code> is a work contract, not an encyclopedia. Move long-term state to <code>handoff.md</code>, <code>decision-log.md</code>.</li>\n        <li><strong>Allowlist first, bypass later</strong> — Start with narrow <code>allow</code> and <code>deny</code> rules. Only widen permissions after understanding them.</li>\n        <li><strong>Manual <code>/compact</code> at the right time</strong> — Compress after saving important state to files, not after the session has already degraded.</li>\n        <li><strong>Use resume deliberately</strong> — <code>--continue</code> for same direction, <code>--fork-session</code> when direction splits.</li>\n        <li><strong>Separate plan / implement / review</strong> — Don't cram all roles into one session. Split reduces context pollution and approval fatigue.</li>\n        <li><strong>Use worktrees</strong> — For conflicting work, experiments, or parallel reviews, separate the working directory.</li>\n        <li><strong>Manage cost by structure, not token counting</strong> — Reduce cache misses, tool output length, session length, and test log verbosity.</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Jumping straight to implementation without a plan. In big tasks, this feels fast but leads to rework. The plan is not a bureaucratic step — it is a device that reduces rework.\n      </div>"}, "2_3": {"title": "Templates: CLAUDE.md, settings.json, Hooks", "content": "<p>A well-organized repository separates responsibilities across files. Here is the harness blueprint:</p>\n\n      <pre><code>repo/\n├── CLAUDE.md                    # Project contract (always loaded)\n├── .claude/\n│   ├── settings.json            # Allow/ask/deny boundaries\n│   ├── rules/\n│   │   ├── architecture.md      # Structure rules\n│   │   ├── testing.md           # Test standards\n│   │   └── frontend.md          # UI conventions\n│   └── hooks.json               # Auto-enforcement rules\n└── tasks/\n    ├── plan.md                  # What to do next\n    ├── verify.md                # Exit criteria\n    ├── decision-log.md          # Why this path was chosen\n    └── handoff.md               # Current state for next session</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Each file prevents a different type of failure. <code>CLAUDE.md</code> prevents context drift. <code>settings.json</code> prevents unsafe actions. <code>rules/*</code> prevents domain-specific mistakes. <code>hooks.json</code> turns \"remember to do X\" into \"always do X.\" <code>tasks/*</code> prevents session amnesia.\n      </div>\n\n      <p><strong>Settings scope priority:</strong> Managed &gt; Command-line &gt; Local &gt; Project &gt; User. Organization-locked rules cannot be overridden by individual settings — this is why \"my setting doesn't work\" confusion often happens.</p>\n\n      <p><strong>Team vs. local separation:</strong> Team-shared standards go in <code>CLAUDE.md</code> and <code>.claude/settings.json</code>. Personal experiments go in <code>CLAUDE.local.md</code> or <code>.claude/settings.local.json</code>.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> A minimal hook example that blocks dangerous Bash commands:\n      </div>\n      <pre><code>{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \".claude/hooks/block-rm.sh\"\n      }]\n    }]\n  }\n}</code></pre>"}, "2_4": {"title": "Prompt Templates & Engineering Layers", "content": "<p>Effective prompts are not about cleverness — they follow patterns. Here are the key prompt styles:</p>\n\n      <p><strong>Context-first prompt (recommended start routine):</strong></p>\n      <pre><code>Read CLAUDE.md, relevant rules, and tasks/verify.md first.\nDo NOT implement yet. Summarize:\n1. Task type\n2. Modification scope\n3. Off-limits areas\n4. Verification commands\nThen proceed only after approval.</code></pre>\n\n      <p><strong>Shortcut-prevention prompt (for coding tasks):</strong></p>\n      <pre><code>Goal: maintainable implementation, not just passing tests.\nRules:\n1. No hardcoding or special-casing to pass tests.\n2. If tests conflict with requirements, report first.\n3. If using external code, explain why before importing.\n4. Separate direct implementation from external references.\n5. After changes, report what passed and what's unverified.</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> The three engineering layers: (1) <strong>Prompt Engineering</strong> — crafting better instructions, (2) <strong>Context Engineering</strong> — choosing what to show Claude, (3) <strong>Harness Engineering</strong> — designing the entire work environment. Most people stop at layer 1. The real gains come from layers 2 and 3.\n      </div>\n\n      <p><strong>Compact Instructions template</strong> — controls what survives after <code>/compact</code>:</p>\n      <pre><code>## Compact Instructions\nWhen compacting, always preserve:\n- Last modified files and why\n- Passed tests, failed tests, untested items\n- Rejected alternatives and reasons\n- The ONE thing next turn should do immediately\n- Risk points requiring human review</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Good compression instructions don't make summaries pretty — they make the next session able to continue immediately.\n      </div>"}, "2_5": {"title": "Evaluation Loops & Session Commands", "content": "<p>Six slash commands form your session management toolkit:</p>\n\n      <table>\n        <tr><th>Command</th><th>When to Use</th></tr>\n        <tr><td><code>/clear</code></td><td>Wipe accumulated conversation and restart fresh</td></tr>\n        <tr><td><code>/compact [focus]</code></td><td>Summarize long conversation, specifying what to keep</td></tr>\n        <tr><td><code>/context</code></td><td>Check what is consuming context space</td></tr>\n        <tr><td><code>/memory</code></td><td>See which memory files and CLAUDE.md layers are loaded</td></tr>\n        <tr><td><code>/init</code></td><td>Auto-generate a CLAUDE.md draft for a new repository</td></tr>\n        <tr><td><code>/cost</code></td><td>Check current token usage and cost</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Weekly evaluation should track: which CLAUDE.md / rules / hook versions were active, which skills or templates were used, what changed from last week, and whether pass rates and human correction amounts improved. Change rules and hooks — not just prompts — to find your optimal configuration.\n      </div>\n\n      <p><strong>Recommended learning path for official resources:</strong></p>\n      <ol>\n        <li>Release notes → what's possible now</li>\n        <li>Claude Help Center → product paths (Cowork, Skills, Connectors)</li>\n        <li>Claude Code Docs → advanced features (plugins, hooks, agent teams)</li>\n        <li>API / Agent SDK docs → building custom agent applications</li>\n        <li>GitHub repositories → real examples and structures</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Reading demo posts as specifications, or official docs as operational tips. Keep the roles separate: official docs confirm facts and boundaries; community posts reveal patterns and failure modes; repositories show actual structure.\n      </div>"}}}, "part3": {"title": "Part 3: System Design", "sections": {"3_1": {"title": "Context Engineering Deep Dive", "content": "<p><strong>Context Engineering</strong> is the discipline of choosing what information Claude sees at any given moment. It is not about writing longer prompts — it is about assembling the right context window.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> <em>Context Assembly</em> = gathering the rules, files, memos, and tool descriptions needed for the current task into the actual input. It is a selection process, not a dumping process. More context is not better context.\n      </div>\n\n      <p>What fills the context window on every turn (even a one-line prompt):</p>\n      <ul>\n        <li>Your current question</li>\n        <li>Recent conversation history</li>\n        <li>Files Claude has read</li>\n        <li><code>CLAUDE.md</code> and rule files</li>\n        <li>Tool execution results</li>\n        <li>Claude's own recent output</li>\n      </ul>\n\n      <p><strong>Context Rot</strong> occurs when the context grows so long that early signals weaken. Long conversations gradually lose coherence — not because the model forgets, but because important early instructions get diluted by later noise.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Loading the entire repository into context. Even when fixing a single bug, some users dump every file. This is slower, more expensive, and produces lower quality results. Show Claude only the function and the 20 lines of error log it needs.\n      </div>\n\n      <p><strong>Three isolations to design simultaneously:</strong></p>\n      <ol>\n        <li><strong>Context isolation</strong> — Don't mix investigation, planning, implementation, and review in one long session. Use subagents or separate sessions.</li>\n        <li><strong>File state isolation</strong> — Use worktrees or separate output folders for conflict-prone work.</li>\n        <li><strong>Approval isolation</strong> — Separate frequently-allowed actions from always-review actions via permissions and hooks.</li>\n      </ol>"}, "3_2": {"title": "Harness Engineering", "content": "<p>Harness Engineering goes beyond prompt tuning. It encompasses the entire workspace: permissions, folder structure, test policies, session resume rules, handoff protocols, worktree isolation, and remote control setup.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> A harness designs three things at once: (1) what Claude knows (context), (2) what Claude can do (tools and permissions), (3) what Claude must verify (tests and exit criteria). Missing any one of these creates a different class of failure.\n      </div>\n\n      <p><strong>The start routine matters more than the start prompt:</strong></p>\n      <ol>\n        <li>Check resident contract — read <code>CLAUDE.md</code>, relevant rules, current branch</li>\n        <li>Classify the task — investigation, implementation, or review?</li>\n        <li>Write the plan — scope, off-limits areas, verification commands</li>\n        <li>Confirm exit criteria — check <code>tasks/verify.md</code></li>\n        <li>Only then begin actual work</li>\n      </ol>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Subagents and worktrees solve the same problem from different angles. Subagents isolate <em>context</em> (delegate research or review to a temporary worker). Worktrees isolate <em>file state</em> (physically separate working directories). Use subagents for brief investigations; use worktrees for parallel experiments.\n      </div>\n\n      <p>One of the most effective subagent uses is not making code faster, but <em>simulating different user roles</em>: a skeptical senior engineer, a new maintainer, a security reviewer, an ops person. Different perspectives catch trust-breaking issues like missing READMEs, side effects in status commands, and observability gaps.</p>"}, "3_3": {"title": "Verification Structures", "content": "<p>Verification is what separates demos from production. A good verification plan answers: \"What must pass before this task is done?\"</p>\n\n      <p><strong>The <code>tasks/verify.md</code> template:</strong></p>\n      <pre><code># Verification Plan\n## Must Pass\n- [ ] Unit tests: `pnpm test -- signup`\n- [ ] Lint: `pnpm lint`\n- [ ] Type check: `pnpm typecheck`\n## Must Review (human)\n- [ ] Manual browser check on mobile\n- [ ] CTA text approved by stakeholder\n## Must Not Break\n- [ ] Existing auth flow unchanged\n- [ ] No new dependencies added</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Verification skills (checking that signup flows work end-to-end, that checkout states are correct, that CLI works in TTY environments) often have higher ROI than generation skills. A \"well-written draft\" is cheap — a \"verified passing result\" is expensive and valuable.\n      </div>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Treating test passage as the goal rather than maintainable implementation. Models can hardcode values or add special cases to make tests green. Your verification prompt should explicitly forbid shortcuts and require reporting when tests seem wrong.\n      </div>"}, "3_4": {"title": "Token Economics & Cost Management", "content": "<p>Tokens are both a billing unit and a signal for how wide your task has spread. Even a one-line prompt sends much more: the question, conversation history, loaded files, CLAUDE.md, rules, tool outputs, and recent model output all enter the context window.</p>\n\n      <table>\n        <tr><th>Token Type</th><th>What It Includes</th></tr>\n        <tr><td><strong>Input tokens</strong></td><td>Prompts, files, conversation history, rule files, tool outputs</td></tr>\n        <tr><td><strong>Output tokens</strong></td><td>Explanations, code, summaries, tool call results</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> \"Saving tokens\" is not about being stingy — it is about designing so Claude reads only what it needs. The <strong>Prompt Cache</strong> provides reuse benefits when similar backgrounds are sent repeatedly. Structure your context so the stable prefix (CLAUDE.md, rules) stays consistent and cacheable.\n      </div>\n\n      <p><strong>Cost is managed by structure, not by counting:</strong></p>\n      <ul>\n        <li>Reduce tool output verbosity (don't dump entire logs)</li>\n        <li>Keep sessions focused — don't mix unrelated tasks</li>\n        <li>Use <code>/compact</code> at strategic points, not as a last resort</li>\n        <li>Separate investigation from implementation into different sessions</li>\n        <li>Track cost with <code>/cost</code> to build intuition</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> The <strong>Tool Result Budget</strong> concept means controlling how much context tool outputs consume. A test suite that dumps 500 lines of output eats your context fast. Configure tools to return summaries, not raw logs.\n      </div>"}, "3_5": {"title": "Session Management & Resume Hygiene", "content": "<p><strong>Resume Hygiene</strong> means keeping only what the next session needs and discarding accumulated noise. Long sessions are not inherently better — they accumulate context rot.</p>\n\n      <p><strong>Session Memory template:</strong></p>\n      <pre><code># Current State\n- What I'm doing right now\n\n# Task Specification\n- What the user actually requested\n\n# Files and Functions\n- Important files and why they matter\n\n# Workflow\n- Frequently used commands and order\n\n# Errors &amp; Corrections\n- Failed attempts — do NOT repeat these\n\n# Key Results\n- Confirmed results and answers\n\n# Worklog\n- Recent steps (keep very short)</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Long sessions survive when information converges into five categories: current state, files, workflow, errors, and results. Everything else is noise. The <code>Errors &amp; Corrections</code> section is not a shame log — it is a re-failure prevention device.\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Use the status line (<code>/statusline</code>) as a dashboard. It shows working directory, Git branch, and context usage. When context usage climbs, save state to files and start a fresh session — don't push through until quality degrades.\n      </div>"}}}, "part4": {"title": "Part 4: Extensions & Automation", "sections": {"4_1": {"title": "Skills: Teaching Claude Repeatable Procedures", "content": "<p>When you explain the same procedure for the tenth time — meeting note format, weekly brief structure, code review checklist — it is time to create a <strong>Skill</strong>. A Skill is a reusable work manual that reduces explanation cost.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Skills are not prompt snippets. They are folder structures with a main document (<code>SKILL.md</code>), supporting scripts, reference files, and assets. The official guide recommends <em>progressive disclosure</em>: the frontmatter and description load first; details load only when the skill activates.\n      </div>\n\n      <table>\n        <tr><th>Promote to Skill When...</th><th>Keep as Conversation When...</th></tr>\n        <tr><td>Output format repeats, variation needs to shrink, storage location and tool order need fixing</td><td>The topic changes often, it's a one-time brainstorming exploration</td></tr>\n      </table>\n\n      <p><strong>Projects vs. Skills:</strong> Projects are background knowledge that's always present. Skills are procedures activated when a matching task arrives. Background without procedure leads to inconsistent output; procedure without context leads to empty results.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> The skill's <code>description</code> field is not an introduction paragraph — it is a routing rule. If the description is vague, the skill either never triggers (undertriggering) or fires for unrelated tasks (overtriggering). Write descriptions like: \"Use this skill when the user asks for a weekly competitor brief, market review, or industry trend summary.\"\n      </div>"}, "4_2": {"title": "Skill Types & Design Template", "content": "<p>Skills cluster into a few common roles regardless of their specific domain:</p>\n      <ul>\n        <li><strong>Library/SDK reference</strong> — Fixes usage patterns for internal or tricky external libraries</li>\n        <li><strong>Verification/testing</strong> — Standardizes checking procedures (Playwright flows, CLI tests)</li>\n        <li><strong>Data pipeline</strong> — Organizes data sources and report paths</li>\n        <li><strong>Recurring operations</strong> — Weekly reviews, standups, ticket creation</li>\n        <li><strong>Scaffolding</strong> — Generates initial service or handler structures</li>\n        <li><strong>Quality gate</strong> — Review standards, test rules, security checklists</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Skills that try to do everything (\"research, code, test, and deploy\") seem powerful but are fragile. Skills that solve one bottleneck precisely survive longest. Verification skills often have higher ROI than generation skills.\n      </div>\n\n      <p><strong>Skill Design Template:</strong></p>\n      <pre><code>---\nname: weekly-brief\ndescription: >\n  Use for weekly competitor briefs, recurring market checks,\n  and industry trend summary requests.\ndisable-model-invocation: false\n---\n# Goal\nCreate a weekly competitor brief using only the last 7 days of evidence.\n\n# Input Sources\n- Competitor list: `references/competitors.md`\n- Template: `assets/weekly-brief-template.md`\n\n# Steps\n1. Read competitor list and template\n2. Search for changes in the last 7 days\n3. Draft brief following template structure\n4. Flag uncertain items separately\n5. Save to `outputs/weekly-brief-YYYY-MM-DD.md`\n\n# Rules\n- Max 3 action items\n- Sources and dates required\n- No speculation — mark unknowns as \"Needs verification\"</code></pre>"}, "4_3": {"title": "Plugins: Role Packages for Teams", "content": "<p>A <strong>Plugin</strong> bundles multiple skills, commands, hooks, and connection settings into a single deployable package. If a Skill is a work manual, a Plugin is the onboarding box you hand to a new team member.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> The word \"plugin\" means different things depending on the surface. <strong>Claude Code plugins</strong> bundle commands, agents, hooks, skills, MCP, and LSP for development workflows. <strong>Cowork plugins</strong> bundle skills, connectors, slash commands, and sub-agents for knowledge work roles. Same name, different installation experience.\n      </div>\n\n      <p><strong>The progression:</strong> MCP connects to external tools → Skills define procedures → Plugins package everything for deployment. In one line: <em>Skills are \"how to do it,\" MCP is \"the path to reach it,\" Plugins are \"the box that deploys it.\"</em></p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Treating external Skills and Plugins as just documents. They can contain tool calls, file access, external URL fetches, and execution scripts. Before installing any external skill, check: (1) Does it fetch external URLs? (2) Does it use Bash, file writes, or network? (3) Do its files match its stated purpose? (4) Will it run near sensitive data? (5) Can you disable it quickly?\n      </div>"}, "4_4": {"title": "MCP: External Tool Connections", "content": "<p><strong>Model Context Protocol (MCP)</strong> is the standardized way Claude connects to external tools and services — like a USB-C port for AI tool integration.</p>\n\n      <p><strong>MCP vs. Connector:</strong></p>\n      <table>\n        <tr><th>Connector</th><th>MCP</th></tr>\n        <tr><td>User-facing — search and connect from a settings screen</td><td>Developer-facing — design server, tool interface, and response format</td></tr>\n        <tr><td>Like an app store connection</td><td>Like designing the internal wiring panel</td></tr>\n        <tr><td>Best when connection itself is the goal</td><td>Best when you need control over tool structure post-connection</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Quick decision: \"I just want to connect and use it\" → Connector. \"I want to control which tools are exposed, response formats, and which projects activate it\" → MCP. Mixing them up leads to either over-engineering simple connections or under-engineering complex automation.\n      </div>"}, "4_5": {"title": "Hooks, Subagents & Control Surfaces", "content": "<p><strong>Hooks</strong> transform \"remember to check\" into \"always check.\" They are automatic intervention rules at specific moments — pre-tool-use, post-edit, pre-push, etc.</p>\n\n      <p>If prompts are road signs (\"please drive carefully\"), hooks are seatbelt alarms and automatic braking. Signs can be ignored; safety systems change actual behavior. This is why hooks matter more as teams scale.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Hook types include command hooks (shell scripts), prompt-based hooks, agent-based hooks, and HTTP hooks. For teams, managed-only hooks and HTTP hook allowlists provide organizational control that goes far beyond personal shell scripts.\n      </div>\n\n      <p><strong>Subagents</strong> isolate context. When the main session handles exploration, implementation, review, and documentation, context gets noisy. Delegating research or review to a subagent keeps the main session focused. Think: team lead delegates fact-checking to an analyst instead of doing it personally.</p>\n\n      <p><strong>Remote Control / Channels / Scheduled Tasks</strong> all re-start work, but the trigger differs:</p>\n      <table>\n        <tr><th>Feature</th><th>Who Pushes the Button</th></tr>\n        <tr><td>Remote Control</td><td>A human, from a distance</td></tr>\n        <tr><td>Channels</td><td>An external system (webhook, message)</td></tr>\n        <tr><td>Scheduled Tasks</td><td>Time itself (cron-like)</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Four practical rules: (1) If you keep repeating the same explanation, extract it to a Skill or rule file. (2) If you keep connecting external tools, narrow permission scope before adding more MCP connections. (3) If verification keeps being forgotten, push it to hooks. (4) If you need parallelism, try a small subagent or worktree before launching full agent teams.\n      </div>"}}}, "part5": {"title": "Part 5: Role-Based Playbooks", "sections": {"5_1": {"title": "PM, Strategy & Founders", "content": "<p>Product managers, strategists, and founders share a common starting point: organizing research and making decisions quickly. The first wins come from <strong>research briefs</strong>, meeting note structuring, and decision documentation — not from full automation.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> For PMs, the ideal Claude adoption path is: (1) Meeting note summaries → (2) Weekly research briefs → (3) PRD draft generation → (4) Competitive analysis with templates. Each step builds on the previous file structure.\n      </div>\n\n      <p><strong>Founder / Solo Operator minimum file set:</strong></p>\n      <pre><code>workspace/\n├── about-me.md          # Background, industry, goals\n├── working-rules.md     # Tone, forbidden topics, priorities\n├── projects/\n│   └── current/\n│       ├── brief.md     # This week's focus\n│       └── competitors.md\n├── templates/\n│   └── weekly-brief.md\n└── outputs/</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> For strategists, the human must always own: market interpretation, priority decisions, and stakeholder alignment. Claude accelerates the research and structuring — not the judgment.\n      </div>\n\n      <p><strong>What humans must keep:</strong> Market interpretation, priority setting, and stakeholder negotiation. Claude handles research gathering, draft structuring, and format consistency.</p>"}, "5_2": {"title": "Marketing & Content", "content": "<p>Marketing teams get the fastest returns from Claude when they establish brand voice files and content templates first. Without <code>brand-voice.md</code> and <code>anti-ai-writing-style.md</code>, every piece of content requires extensive tone correction.</p>\n\n      <p><strong>Content operations adoption path:</strong></p>\n      <ol>\n        <li>Topic research and content structure outlines</li>\n        <li>First drafts with brand voice templates</li>\n        <li>Multi-channel adaptation (blog → social → newsletter)</li>\n        <li>SEO optimization with structured templates</li>\n        <li>Regular content calendar automation</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Saying \"write in our company tone\" without providing a <code>brand-voice.md</code>. Claude cannot intuit your brand. Create a file with: preferred phrases, forbidden phrases, sentence length guidelines, formality level, and 2–3 example paragraphs showing the ideal tone.\n      </div>\n\n      <p><strong>What humans must keep:</strong> Final message decisions, brand tone approval, and external publication sign-off. Claude handles research synthesis, structural drafting, and format adaptation.</p>"}, "5_3": {"title": "Sales, Customer Success & Operations", "content": "<p>Sales and customer success teams benefit most from <strong>account briefs</strong> and <strong>follow-up email drafts</strong>. The key constraint: all external communications must pass through human approval gates.</p>\n\n      <p><strong>Operations and back-office automation</strong> should start with the lowest-risk tasks: folder organization, classification, draft summaries, and template-based reports. High-risk automation (actual data entry, payment processing, deletion) should only come after governance structures are in place.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> For agency and team operators, the critical principle is <em>client context isolation</em>. When managing multiple clients simultaneously, the biggest risk is not slow output — it is context contamination between clients. Separate folders per client, shared templates, and strict naming conventions prevent cross-client leakage.\n      </div>\n\n      <pre><code>clients/\n├── client-a/\n│   ├── brief.md\n│   ├── glossary.md\n│   └── approval-rules.md\n├── client-b/\n│   ├── brief.md\n│   └── ...\ntemplates/\n├── client-report-template.md\n└── review-checklist.md\nteam/\n├── shared-rules.md\n└── naming-convention.md</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> In an agency context, one folder boundary prevents more accidents than one clever prompt. Speed matters less than making sure Client A's data never leaks into Client B's output.\n      </div>"}, "5_4": {"title": "Design, Engineering & Research", "content": "<p><strong>Design/Branding:</strong> Designers get the most value from reference-based exploration and implementation QA. Use images as input — screenshots of bugs, reference layouts, desired states. Visual context often communicates what paragraphs of CSS descriptions cannot.</p>\n\n      <p><strong>Engineering:</strong> The strongest first task is always a small bug fix with a test, not a large new feature. The adoption path: (1) bug fix + test → (2) refactoring with plan → (3) code review with review split → (4) parallel worktree experiments → (5) CI integration and automated hooks.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> For researchers and analysts, Claude excels at: summarization, glossary creation, comparison tables, question generation, and structured literature reviews. The human must always own: claim interpretation, reproduction result judgment, and original insight.\n      </div>\n\n      <p><strong>Adoption priority across all roles follows the same pattern:</strong></p>\n      <ol>\n        <li>Gather and organize information (lowest risk)</li>\n        <li>Create first drafts with templates</li>\n        <li>Review and refine with verification loops</li>\n        <li>Automate recurring workflows with skills</li>\n        <li>Scale with parallel agents and scheduled tasks (highest risk, last step)</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Starting with end-to-end automation. The teams that go farthest start with the front-end of the process (organizing, structuring, drafting) and only automate the back-end (execution, deployment, delivery) after governance is established.\n      </div>"}, "5_5": {"title": "Scenario Guide: Matching Blockers to Workflows", "content": "<p>Chapter 8 is not a feature encyclopedia — it is a <em>situation matching table</em>. The approach: identify today's blocker → classify the task shape → select the file set → execute → verify through approval gate → leave a structured handoff.</p>\n\n      <p><strong>The workflow for any blocked scenario:</strong></p>\n      <ol>\n        <li><strong>Today's blocker</strong> — What specific task is stuck?</li>\n        <li><strong>Task shape</strong> — Is it research, drafting, implementation, or review?</li>\n        <li><strong>File set selection</strong> — Which minimum files does this task need?</li>\n        <li><strong>Execution</strong> — Run the workflow with output contract</li>\n        <li><strong>Approval gate</strong> — Human checks before anything goes external</li>\n        <li><strong>Structured handoff</strong> — State and next steps for the next session</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Key terms for scenario matching: <em>output contract</em> (what format and location results must follow), <em>token hotspot</em> (where context suddenly gets expensive), <em>approval gate</em> (mandatory human check before external delivery), and <em>structured handoff</em> (formatted state memo for session continuity).\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> The gap ahead will widen not between people who know more features, but between teams that learn role-specific delegation strategies faster. Development and customer support adopt first (broad, low-risk tasks); legal, finance, and research adopt more cautiously (summary and classification first, judgment later).\n      </div>"}}}, "part6": {"title": "Part 6: Community Patterns & Tools", "sections": {"6_1": {"title": "Memory, Recall & Search Patterns", "content": "<p>Community practitioners have developed recurring patterns for managing Claude's memory and context over time. These are not official features — they are operational habits that emerge from heavy daily use.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> <strong>Session Memory</strong> is not about saving entire conversations. It is about maintaining structured state files (<code>handoff.md</code>, <code>decision-log.md</code>, <code>worklog.md</code>) that the next session reads on startup. The conversation is disposable; the files are the real memory.\n      </div>\n\n      <p><strong>Common memory patterns:</strong></p>\n      <ul>\n        <li><strong>File-based memory:</strong> <code>CLAUDE.md</code> + rule files + handoff files form a persistent memory layer that survives session boundaries</li>\n        <li><strong>Structured recall:</strong> Starting each session by reading <code>tasks/handoff.md</code> and <code>tasks/plan.md</code> before any new work</li>\n        <li><strong>Progressive disclosure:</strong> Loading background at the top, task-specific details only when activated (like skill frontmatter triggering full skill content)</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> The most effective memory strategy is the simplest: at the end of every session, update <code>handoff.md</code> with current state, next steps, and unresolved risks. This single habit prevents 80% of \"where was I?\" confusion.\n      </div>"}, "6_2": {"title": "Plan.md & File-Based Planning", "content": "<p>The <code>plan.md</code> pattern is one of the most widely adopted community practices. Instead of keeping the plan in conversation, write it to a file that both Claude and humans can reference.</p>\n\n      <p><strong>Why plans belong in files, not conversations:</strong></p>\n      <ul>\n        <li>Files survive session boundaries; conversations don't</li>\n        <li>Files can be reviewed by humans independently</li>\n        <li>Files can be version-controlled with Git</li>\n        <li>Files keep the conversation focused on execution, not re-planning</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> The plan file is not bureaucracy — it is a rework-prevention device. Teams that plan before editing consistently report fewer rollbacks, shorter review cycles, and less context pollution in long sessions.\n      </div>\n\n      <p><strong>Effective plan.md structure:</strong></p>\n      <pre><code># Plan\n## Goal\nOne sentence describing the desired end state.\n\n## Scope\n- Files to modify: [list]\n- Off-limits: [list]\n\n## Steps\n1. ...\n2. ...\n\n## Verification\n- Tests to pass: [list]\n- Manual checks: [list]\n\n## Open Questions\n- [Any unresolved items before starting]</code></pre>"}, "6_3": {"title": "Parallel Sessions & Multi-Agent Operations", "content": "<p>Advanced users run multiple Claude sessions in parallel, each with a different role. This is not about speed — it is about <em>context isolation</em>.</p>\n\n      <p><strong>Common parallel patterns:</strong></p>\n      <ul>\n        <li><strong>Plan + Implement:</strong> One session plans, another implements based on the written plan</li>\n        <li><strong>Implement + Review:</strong> One session writes code, another reviews in a separate worktree</li>\n        <li><strong>Main + Subagent research:</strong> Main session stays focused while a subagent explores documentation or gathers data</li>\n        <li><strong>Multi-worktree experiments:</strong> Test different approaches in isolated working directories, compare results</li>\n      </ul>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Parallelism without role clarity creates chaos, not speed. Before launching parallel sessions, define: who does what, which files each session can touch, and how results merge back. Unstructured parallelism is worse than sequential work.\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> The \"OpenClaw-style\" operation that many community members aspire to means: always-on sessions, multi-channel access (terminal, phone, web), persistent state across sessions, scheduled tasks, and remote control. In the Claude ecosystem, you achieve this by combining Claude Code + CLAUDE.md + hooks + subagents + MCP + Remote Control + Channels + Scheduled Tasks.\n      </div>"}, "6_4": {"title": "Self-Improvement & SEO/Content Loops", "content": "<p>Community patterns include using Claude to improve its own environment — creating skills, refining rules, and evaluating past outputs.</p>\n\n      <p><strong>Self-improvement loop:</strong></p>\n      <ol>\n        <li>Run a task with current rules and skills</li>\n        <li>Evaluate the output (manually or with a review subagent)</li>\n        <li>Update rules, skill descriptions, or templates based on failures</li>\n        <li>Re-run and compare</li>\n      </ol>\n\n      <p><strong>SEO and content automation patterns:</strong></p>\n      <ul>\n        <li>Keyword research → content structure → draft → SEO review skill → publication</li>\n        <li>Multi-channel adaptation: one research session feeds blog, social, newsletter, and email templates</li>\n        <li>Content calendar automation with scheduled tasks</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> The meta-skill <code>skill-creator</code> can generate initial skill drafts from descriptions. However, it produces first drafts, not production-ready skills. Failure cases, edge conditions, and verification loops still require human review and iteration.\n      </div>"}, "6_5": {"title": "Tool Selection Criteria", "content": "<p>With growing ecosystems of skills, plugins, and MCP servers, selecting the right tools requires discipline.</p>\n\n      <p><strong>Evaluation checklist before installing any external tool:</strong></p>\n      <ol>\n        <li>When was it last maintained?</li>\n        <li>Does it have real README and examples?</li>\n        <li>What security-sensitive permissions does it need?</li>\n        <li>Is the context cost justified by the utility?</li>\n        <li>Can you disable it quickly if something goes wrong?</li>\n      </ol>\n\n      <p><strong>Where to find tools:</strong></p>\n      <table>\n        <tr><th>Source</th><th>Type</th></tr>\n        <tr><td>Anthropic Skills GitHub</td><td>Official / semi-official</td></tr>\n        <tr><td>Anthropic Claude Plugins GitHub</td><td>Official</td></tr>\n        <tr><td>agentskills.io</td><td>Standards documentation</td></tr>\n        <tr><td>skillsmp.com, skill hubs</td><td>Community marketplace</td></tr>\n        <tr><td>awesome-claude-skills lists on GitHub</td><td>Community curated</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Collecting tools you never use. \"Saved for later\" tools pile up without becoming operational assets. Only install tools you will use three or more times this week. Review your installed tools monthly and remove unused ones.\n      </div>"}}}, "part7": {"title": "Part 7: Governance & Final Practice", "sections": {"7_1": {"title": "Why Governance Matters", "content": "<p>Governance is not a compliance checkbox — it is the structure that lets teams use AI with confidence instead of anxiety. Without governance, every automation is a demo that cannot become infrastructure.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> The core question governance answers: \"What can Claude do without asking, what must it ask about, and what must it never do?\" This is the allow/ask/deny framework applied at organizational scale.\n      </div>\n\n      <p><strong>Risk classification example:</strong></p>\n      <table>\n        <tr><th>Risk Level</th><th>Examples</th><th>Approval Mode</th></tr>\n        <tr><td><strong>Low</strong></td><td>Meeting summaries, internal drafts, test additions</td><td>Auto-execute</td></tr>\n        <tr><td><strong>Medium</strong></td><td>Customer-facing drafts, regular reports, refactoring</td><td>Human review then execute</td></tr>\n        <tr><td><strong>High</strong></td><td>Production deployment, customer emails, accounting entries, permission changes, sensitive data queries</td><td>Human approval required — no execution without it</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Governance rollout works best in phases: Week 1 — block <code>.env</code> access and destructive commands, require approval for deployments. Week 2 — standardize allowed plugins/skills, organize CLAUDE.md and rules per project. Week 3 — add cost monitoring and establish handoff/approval logging habits.\n      </div>"}, "7_2": {"title": "Permission Models & Four Governance Layers", "content": "<p>The permission model uses three modes: <strong>allow</strong> (proceed automatically), <strong>ask</strong> (pause for human decision), and <strong>deny</strong> (block completely). Rules are evaluated in order: deny → ask → allow, with the first match applying.</p>\n\n      <p><strong>The four governance layers:</strong></p>\n      <ol>\n        <li><strong>Document layer</strong> — <code>CLAUDE.md</code>, rule files, skill instructions: what Claude should know and follow</li>\n        <li><strong>Settings layer</strong> — <code>settings.json</code>, permission rules, managed settings: what Claude can and cannot do</li>\n        <li><strong>Runtime layer</strong> — Hooks, approval gates, plan mode: what happens during execution</li>\n        <li><strong>Trace layer</strong> — Work logs, approval logs, decision logs, handoff files: what happened and why</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Common Mistake:</strong> Using <code>bypassPermissions</code> as a team default. Community posts often recommend \"turn off all permissions for speed.\" Anthropic treats this as a permission mode that organizations can disable entirely via <code>disableBypassPermissionsMode</code>. Individual experiments and team standards should never share the same permission level.\n      </div>\n\n      <p><strong>Two-layer permission structure for teams:</strong></p>\n      <ul>\n        <li><strong>Global (user-level):</strong> Block <code>rm -rf</code>, secret files, force pushes</li>\n        <li><strong>Project-level:</strong> Block migration folders, deployment scripts, payment configs specific to this repository</li>\n      </ul>"}, "7_3": {"title": "Human-in-the-Loop & Auditability", "content": "<p><strong>Human-in-the-loop</strong> design means building explicit checkpoints where humans make decisions — not hovering over every action. The goal is strategic intervention, not constant supervision.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> <strong>Auditability</strong> means being able to explain later: what was read, what was created, who approved it, and what remains unfinished. Same automation with audit trails becomes infrastructure; without them, it remains a demo.\n      </div>\n\n      <p><strong>Minimum audit trail for high-stakes work:</strong></p>\n      <pre><code>1. source/          — Original materials or links\n2. outputs/         — Claude's drafts and revisions\n3. work-log.md      — What was executed and when\n4. approval-log.md  — Who approved what and when\n5. handoff.md       — Remaining risks and next steps</code></pre>\n\n      <p><strong>Operations logs vs. decision traces:</strong> Operations logs record <em>what happened</em> (commands, tool calls, timestamps). Decision traces record <em>why</em> (what was considered, what alternatives were rejected, why this path was chosen). Agents working on long tasks need both. Without decision traces, you can see where failure occurred but not why.</p>\n\n      <p><strong>Incident review template:</strong></p>\n      <pre><code># Incident Review\n- When was it discovered?\n- Which automation / session was involved?\n- What were the input materials?\n- Which approval point was missing?\n- What rule, hook, or permission needs to change?</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Cowork conversations are stored locally and do not appear in Audit Logs, Compliance API, or Data Exports. Do not use Cowork for regulated workloads. For audit-critical work, use Claude Code with Git-based logging, hooks, and external approval tracking.\n      </div>"}, "7_4": {"title": "Team Adoption Strategy", "content": "<p>Team adoption diverges from individual use the moment you start deploying shared rules and assets. It is not about distributing a tool — it is about deploying an <em>operating environment with policies attached</em>.</p>\n\n      <p><strong>Key team/enterprise capabilities:</strong></p>\n      <ul>\n        <li>Skills provisioning — deploy shared skills organization-wide</li>\n        <li>Managed settings — admin-enforced configurations that individuals cannot override</li>\n        <li>Plugin marketplace management — control which plugins are available</li>\n        <li>Usage analytics dashboard and Analytics API</li>\n        <li>Seat policies — who gets access to which features</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Standardization does not kill creativity — it kills repetitive explanation cost. When shared meeting summary skills, client response templates, PR review skills, and weekly brief templates are deployed team-wide, people spend less time on format and more time on judgment.\n      </div>\n\n      <p><strong>External skill adoption flow for organizations:</strong></p>\n      <ol>\n        <li>Verify the source</li>\n        <li>Review included files and tool scope</li>\n        <li>Test in a sandbox or isolated workspace</li>\n        <li>Reduce permissions to the minimum needed</li>\n        <li>Only then deploy to team/organization-managed distribution</li>\n      </ol>\n\n      <p><strong>Cost as a governance signal:</strong> Usage data is not just for finance — it is a design feedback loop. \"This agent re-reads a long regulation file every session\" → investigate caching. \"This automation produces verbose tool output\" → trim the output budget. Cost management is operational design, not budget policing.</p>"}, "7_5": {"title": "Final Practice: Building with Claude Code", "content": "<p>The final chapter brings everything together with two practical projects: building a small website and building an automation workflow. Both demonstrate that thin, completed results are more valuable than elaborate unfinished plans.</p>\n\n      <p><strong>Website project approach:</strong></p>\n      <ol>\n        <li>Fix three lines first: <strong>Reader</strong> (who reads this?), <strong>Goal</strong> (what should they understand?), <strong>Action</strong> (what should they do?)</li>\n        <li>Create file set: <code>brief.md</code>, <code>tone.md</code>, <code>references/</code>, <code>site/</code></li>\n        <li>Use Cowork to draft structure and copy, then Claude Code to implement</li>\n        <li>Split into three prompts: design (structure), implement (build), review (verify)</
