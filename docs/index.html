li>\n      </ol>\n\n      <p><strong>Automation project approach:</strong></p>\n      <ol>\n        <li>Define input boundaries and output contract before \"when to run it\"</li>\n        <li>Success = same format on re-run, not just first-time success</li>\n        <li>High-risk steps must route through human approval</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Five directions the ecosystem is heading: (1) Conversational → asynchronous operations, (2) Pop-up approval → policy-based approval, (3) Long transcripts → structured task state, (4) Single surface → multi-surface continuity, (5) Prompt tricks → measurable operations with analytics and evaluation loops.\n      </div>\n\n      <p><strong>Deployment checklist:</strong></p>\n      <ul>\n        <li>Primary work surface chosen (terminal, IDE, desktop, web)?</li>\n        <li><code>CLAUDE.md</code> and rules separated by role?</li>\n        <li>Permissions and hooks covering real risk boundaries?</li>\n        <li><code>plan.md</code>, <code>verify.md</code>, <code>handoff.md</code> in place?</li>\n        <li>Review split between implementation and review?</li>\n        <li>Cost and failure measurement established?</li>\n        <li>Scope separation (user/project/local/managed) for teams?</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> The book's conclusion is simple: people who use Claude Code well are not people who write long prompts — they are people who stabilize context, manage tokens and cache, narrow permissions, and make review splits and handoffs into habits. One thin completed result plus the structure to recreate it is worth more than any number of impressive demos.\n      </div>"}}}, "glossary": {"title": "Glossary & Quick Reference", "sections": {"G_1": {"title": "Context & Assembly Terms", "content": "<p>These terms describe how information is gathered, managed, and degraded within Claude's working memory.</p>\n\n      <table>\n        <tr><th>Term</th><th>Definition</th></tr>\n        <tr><td><strong>Context Assembly</strong></td><td>The process of gathering rules, files, memos, and tool descriptions needed for the current task into the actual input context. A selection process, not a dumping process.</td></tr>\n        <tr><td><strong>Context Rot</strong></td><td>The phenomenon where early signals weaken as the context grows longer. Long conversations gradually lose coherence because important early instructions get diluted by later content.</td></tr>\n        <tr><td><strong>Memoized Context</strong></td><td>Background information held across turns so Claude doesn't need re-briefing each time. \"Computed once, reused many times.\"</td></tr>\n        <tr><td><strong>Prompt Cache</strong></td><td>A mechanism that provides reuse benefits when similar context prefixes are sent repeatedly. Stable prefixes (CLAUDE.md, rules) should remain consistent to maximize cache hits.</td></tr>\n        <tr><td><strong>Token Economy</strong></td><td>The discipline of deciding what information stays permanently loaded, what loads on demand, and what gets trimmed — balancing quality against cost.</td></tr>\n        <tr><td><strong>Tool Result Budget</strong></td><td>The practice of controlling how much context space tool outputs consume. Long logs and verbose results eat the context window and degrade quality.</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Context Assembly is not \"more is better.\" It is the selective process of including only what matters for the current task. Tool Result Budget is not optional — it is what prevents a single verbose test run from consuming half your context window.\n      </div>"}, "G_2": {"title": "Session & Continuity Terms", "content": "<table>\n        <tr><th>Term</th><th>Definition</th></tr>\n        <tr><td><strong>Resumable Session</strong></td><td>The ability to pick up where you left off after disconnection or session change, using saved state files.</td></tr>\n        <tr><td><strong>Resume Hygiene</strong></td><td>The habit of cleaning up state before resuming — keeping only what the next session needs and discarding accumulated noise.</td></tr>\n        <tr><td><strong>Session Memory</strong></td><td>Structured state preserved for continuation: current status, important files, workflow, errors, and results. Not the raw conversation transcript.</td></tr>\n        <tr><td><strong>Handoff</strong></td><td>A formatted memo left for the next session or person, containing current state, next steps, and unresolved risks.</td></tr>\n        <tr><td><strong>Slash Command</strong></td><td>Session management commands like <code>/compact</code>, <code>/clear</code>, <code>/context</code>, <code>/memory</code>, <code>/cost</code> used within Claude Code.</td></tr>\n        <tr><td><strong>Fork Session</strong></td><td>Creating a new session branch when the current direction needs to diverge, preserving the original session state.</td></tr>\n        <tr><td><strong>Background Execution</strong></td><td>Work that continues after you leave the terminal — the session keeps running without active human monitoring.</td></tr>\n      </table>"}, "G_3": {"title": "Harness & Structure Terms", "content": "<table>\n        <tr><th>Term</th><th>Definition</th></tr>\n        <tr><td><strong>Harness</strong></td><td>The outer structure defining what Claude can read, modify, and verify. Like a colleague's workspace: reference materials, accessible drawers, and a checklist.</td></tr>\n        <tr><td><strong>Harness Engineering</strong></td><td>Designing the entire work environment — not just better prompts, but the rules, permissions, files, and verification structures Claude operates within.</td></tr>\n        <tr><td><strong>CLAUDE.md</strong></td><td>The project contract file — always loaded, contains execution commands, forbidden boundaries, and structural descriptions.</td></tr>\n        <tr><td><strong>Worktree</strong></td><td>A separate working directory from the same repository, used for parallel work without file conflicts.</td></tr>\n        <tr><td><strong>Plan Mode</strong></td><td>A pattern where exploration and execution are separated — Claude plans before editing, reducing wrong-assumption implementations.</td></tr>\n        <tr><td><strong>Review Split</strong></td><td>Separating implementation and review into different sessions to reduce context pollution and approval fatigue.</td></tr>\n        <tr><td><strong>Agentic Loop</strong></td><td>The recurring cycle: read → judge → use tools → continue. Work that spans multiple turns, not a single question-answer pair.</td></tr>\n      </table>"}, "G_4": {"title": "Extension & Tool Terms", "content": "<table>\n        <tr><th>Term</th><th>Definition</th></tr>\n        <tr><td><strong>Skill</strong></td><td>A reusable procedure file (folder) that standardizes repeated tasks. Contains instructions, scripts, references, and assets.</td></tr>\n        <tr><td><strong>Plugin</strong></td><td>A deployable package bundling skills, commands, hooks, and connection settings. The \"onboarding box\" for teams.</td></tr>\n        <tr><td><strong>MCP (Model Context Protocol)</strong></td><td>The standardized connection protocol for Claude to reach external tools and services. Like USB-C for AI tool integration.</td></tr>\n        <tr><td><strong>Connector</strong></td><td>A user-facing interface for connecting to external services (Notion, Drive, Slack). Simpler than MCP, less control.</td></tr>\n        <tr><td><strong>Hook</strong></td><td>An automatic intervention rule at specific moments (pre-tool-use, post-edit, pre-push). Turns \"remember to check\" into \"always check.\"</td></tr>\n        <tr><td><strong>Subagent</strong></td><td>A secondary worker within the current session with isolated context. Used for research, review, or risk-checking without polluting the main session.</td></tr>\n        <tr><td><strong>Agent Team</strong></td><td>Multiple sessions operating in parallel with message exchange and task allocation — like a real team with a lead and members.</td></tr>\n        <tr><td><strong>Control Surface</strong></td><td>Where users can adjust work behavior — not a feature list, but the points where you can intervene in the workflow.</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> Quick decision framework: \"Same format every time?\" → Skill. \"Need external data?\" → MCP/Connector. \"Deploy to the whole team?\" → Plugin. \"Must verify automatically?\" → Hook. \"Need parallel context?\" → Subagent/Worktree.\n      </div>"}, "G_5": {"title": "Governance & Safety Terms", "content": "<table>\n        <tr><th>Term</th><th>Definition</th></tr>\n        <tr><td><strong>Permission Gate</strong></td><td>The boundary between allow, ask, and deny — evaluated before any action executes.</td></tr>\n        <tr><td><strong>Approval Gate</strong></td><td>A checkpoint requiring human sign-off before the next step proceeds. Critical for external communications, deployments, and data modifications.</td></tr>\n        <tr><td><strong>Allowlist</strong></td><td>A policy that only passes specifically permitted items (commands, users, domains). Safer than blocking specific threats.</td></tr>\n        <tr><td><strong>Auditability</strong></td><td>The ability to explain later: what was read, what was changed, who approved, and what remains. The foundation of sustainable automation.</td></tr>\n        <tr><td><strong>Alignment Faking</strong></td><td>A research concept where a model appears to follow instructions while internally maintaining different objectives. The practical takeaway: don't trust model compliance alone — build external verification.</td></tr>\n        <tr><td><strong>Autonomy</strong></td><td>How far work can proceed without human intervention. Higher autonomy requires stronger verification, approval, and permission boundaries.</td></tr>\n        <tr><td><strong>Agency</strong></td><td>Human initiative in choosing what to delegate, when, and with what constraints. Not about giving more commands — about making better delegation decisions.</td></tr>\n        <tr><td><strong>Tool Orchestration</strong></td><td>The layer deciding which tools to invoke, in what sequence, and with what parameters.</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Key Concept:</strong> Observability (seeing system state via dashboards and analytics) and auditability (explaining what happened and why after the fact) are different. You need both: observability for operational efficiency, auditability for accountability and trust.\n      </div>"}, "G_6": {"title": "Ecosystem & Infrastructure Terms", "content": "<table>\n        <tr><th>Term</th><th>Definition</th></tr>\n        <tr><td><strong>LLM OS</strong></td><td>A metaphor for the emerging work layer: context, tools, permissions, and memory surrounding a model, analogous to how an OS manages programs, files, permissions, and devices.</td></tr>\n        <tr><td><strong>Software 3.0</strong></td><td>The concept that natural language itself is becoming a programming interface — work instructions are code.</td></tr>\n        <tr><td><strong>Vibe Coding</strong></td><td>Generating code through natural language, extended now to include testing, reviewing, refactoring, documentation, and deployment.</td></tr>\n        <tr><td><strong>Remote Control</strong></td><td>A human resuming or steering a running session from a distance (different device, different location).</td></tr>\n        <tr><td><strong>Channels</strong></td><td>External systems pushing events into Claude (webhooks, messages) — the trigger comes from outside, not from a human.</td></tr>\n        <tr><td><strong>Scheduled Tasks</strong></td><td>Time-triggered automation — cron-like execution where the clock starts the work.</td></tr>\n        <tr><td><strong>Agent SDK</strong></td><td>Developer tools for building custom agent applications with Claude as the execution engine inside your own product.</td></tr>\n        <tr><td><strong>Adaptive Thinking</strong></td><td>Claude adjusting its reasoning depth based on task complexity — thinking longer for hard tasks, shorter for simple ones.</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Pro Tip:</strong> When confused by a term, ask: \"Is this about how work flows (mechanics), how mistakes are prevented (safety), or how sessions persist (continuity)?\" This three-bucket mental model covers the vast majority of Claude Code terminology.\n      </div>"}}}}, "quizzes": {"part1": [{"question": "What does 'memoized context' mean in the Claude Code harness?", "options": ["Storing all chat history permanently in a database", "Reusing background context across turns so you don't re-explain every time", "Memorizing the user's personal preferences", "Caching API responses for faster performance"], "answer": 1, "explanation": "Memoized context means holding background information across turns so Claude doesn't need to be re-briefed each time."}, {"question": "What are the four key terms introduced in Chapter 1?", "options": ["API, CLI, MCP, VM", "Prompt, Context, Response, Token", "Memoized Context, Tool Orchestration, Permission Gate, Resumable Session", "Skills, Plugins, Hooks, Subagents"], "answer": 2, "explanation": "Chapter 1 introduces: Memoized Context (reusable background), Tool Orchestration (coordinating tools), Permission Gate (allow/ask/deny), and Resumable Session (picking up where you left off)."}, {"question": "What is a 'harness' in the context of Claude Code?", "options": ["A physical device that connects to Claude's servers", "The outer structure defining what files Claude can read, modify, and verify", "A testing framework for running unit tests", "The graphical user interface of Claude Code"], "answer": 1, "explanation": "A harness defines boundaries and verification rules — like setting up a workspace with reference materials, accessible drawers, and a checklist."}, {"question": "Why does the book focus on Claude Code rather than other Claude products?", "options": ["Claude Code is the cheapest product", "Claude Code has the most users globally", "It brings together files, rules, verification, permissions, and tool connections in one place", "Claude Code is the only product available in Korea"], "answer": 2, "explanation": "Claude Code combines file access, rules, verification, permissions, reusable sessions, and external tool connections. Cowork, Skills, Plugins are extensions of this core."}, {"question": "What is the difference between a weak harness request and a strong harness request?", "options": ["Weak uses fewer tokens, strong uses more", "Weak: 'Fix the bug.' Strong: 'Read only auth/, don't touch .env, pass login tests, leave a change note.'", "Weak means beginner, strong means expert", "There is no difference"], "answer": 1, "explanation": "A weak harness gives no boundaries. A strong harness specifies what to read, what not to touch, what tests must pass, and what documentation to leave."}], "part2": [{"question": "What is the recommended first action when starting a Claude Code session for a big task?", "options": ["Write the longest possible prompt with all context", "Read CLAUDE.md, relevant rules, and verify.md — then summarize scope before implementing", "Immediately start coding to save time", "Turn off all permissions for faster workflow"], "answer": 1, "explanation": "The start routine matters more than the start prompt. Reading the project contract, rules, and exit criteria before implementation prevents rework and wrong-direction implementations."}, {"question": "What is the difference between a Skill and a Plugin?", "options": ["They are the same thing with different names", "Skills are for coding, Plugins are for documents", "A Skill is a reusable procedure; a Plugin bundles skills, commands, hooks, and connections for team deployment", "Plugins are free, Skills are paid"], "answer": 2, "explanation": "Skills define 'how to do it' (procedures). Plugins package skills, tools, hooks, and connections into a deployable box — like an onboarding kit for team members."}, {"question": "Why should CLAUDE.md be kept thin rather than comprehensive?", "options": ["To save disk space", "Because Claude can only read short files", "It's a work contract, not an encyclopedia — long resident context wastes tokens and dilutes important rules", "Thin files load faster in the browser"], "answer": 2, "explanation": "CLAUDE.md is loaded on every turn. Keeping it thin ensures important rules stay prominent. Long-term state belongs in handoff.md, decision-log.md, and other task files."}, {"question": "What does 'review split' mean in Claude Code operations?", "options": ["Splitting a code review into multiple pull requests", "Separating implementation and review into different sessions to reduce context pollution", "Having two people review the same code", "Splitting the review budget between teams"], "answer": 1, "explanation": "Review split means not cramming planning, implementation, and review into one session. Separate sessions reduce context pollution and approval fatigue."}, {"question": "What survives after running /compact in Claude Code?", "options": ["Everything — /compact just makes the display shorter", "Only the last 5 messages", "Whatever the Compact Instructions specify: last modified files, test results, rejected alternatives, next action, and risk points", "Nothing — /compact resets the entire session"], "answer": 2, "explanation": "Compact Instructions control what information survives compression. Without them, important context may be lost. Good instructions preserve state that the next turn needs to continue immediately."}], "part3": [{"question": "What is 'Context Rot' in Claude Code sessions?", "options": ["When Claude's API key expires", "When files on disk become corrupted", "When early instructions weaken as the context grows longer, diluted by later content", "When the conversation is accidentally deleted"], "answer": 2, "explanation": "Context rot occurs as conversations grow — important early signals get diluted by accumulated later content, causing quality degradation even though the model hasn't 'forgotten' anything."}, {"question": "What are the three types of isolation a harness should design simultaneously?", "options": ["Input isolation, output isolation, display isolation", "Context isolation, file state isolation, approval isolation", "Network isolation, disk isolation, memory isolation", "User isolation, model isolation, tool isolation"], "answer": 1, "explanation": "Context isolation prevents session bloat, file state isolation prevents overwrites and conflicts, and approval isolation separates safe actions from dangerous ones. Each prevents a different class of failure."}, {"question": "Why are verification skills often higher ROI than generation skills?", "options": ["Because verification is more expensive to license", "Because models never make mistakes in generation", "Because a 'well-written draft' is cheap, but a 'verified passing result' is genuinely valuable and hard to achieve", "Because verification requires less compute"], "answer": 2, "explanation": "Generation produces drafts; verification confirms they actually work. Checking that signup flows complete, checkout states are correct, or CLI works in TTY environments is more valuable than generating more code."}, {"question": "What is the Prompt Cache, and how do you benefit from it?", "options": ["A browser cache that stores Claude's responses for offline use", "A discount for frequent API users", "A mechanism that reuses computation when similar context prefixes are sent repeatedly — keep stable content at the front", "A memory file that Claude reads automatically"], "answer": 2, "explanation": "Prompt Cache benefits come from keeping the stable prefix (CLAUDE.md, rules) consistent across turns. When the prefix matches, computation can be reused, saving both cost and time."}, {"question": "When should you use /compact in a Claude Code session?", "options": ["At the very end when the session is completely done", "After saving important state to files, before the session has degraded", "Only when you see an error message", "Never — it deletes important context"], "answer": 1, "explanation": "Compress after saving important state to files — not as a last resort when the session is already broken. Strategic compression at good checkpoints maintains quality throughout long sessions."}], "part4": [{"question": "When should you promote a repeated task to a Skill?", "options": ["When the task is very complex", "When output format repeats, variation needs to shrink, and storage/tool order needs fixing", "When you want to impress your team with automation", "Only when Anthropic provides an official skill template"], "answer": 1, "explanation": "The signal for creating a skill is repeated output format, the need for consistency, and fixed storage locations/tool sequences. One-time explorations are better left as conversations."}, {"question": "What is the critical difference between MCP and a Connector?", "options": ["MCP is free, Connectors are paid", "MCP is older technology, Connectors are newer", "Connectors are user-facing app connections; MCP gives developer-level control over tool structure, response format, and project-specific activation", "There is no difference — they are the same feature"], "answer": 2, "explanation": "Connectors are simple UI-based connections (like an app store). MCP provides deeper control: which servers, which tools to expose, response formats, and project-scoped activation. Use Connectors for quick connections, MCP for system design."}, {"question": "Why is a skill's 'description' field so important?", "options": ["It appears in marketing materials", "It determines the file size of the skill", "It acts as a routing rule — vague descriptions cause undertriggering or overtriggering", "It's only used for documentation purposes"], "answer": 2, "explanation": "The description is what Claude reads at session start to decide whether to activate the skill. If it's vague, the skill either never fires (undertriggering) or fires for unrelated tasks (overtriggering)."}, {"question": "What should you check before installing an external skill?", "options": ["Only the star count on GitHub", "Whether it fetches external URLs, uses strong tools (Bash/network), matches its stated purpose, runs near sensitive data, and can be disabled quickly", "Just the README file", "Nothing — all published skills are safe"], "answer": 1, "explanation": "External skills can contain tool calls, file access, and external URL fetches. They should be treated as small software installations requiring security review, not just document imports."}, {"question": "Hooks are compared to what in the car analogy?", "options": ["The steering wheel — you control direction", "The gas pedal — they make things faster", "Seatbelt alarms and automatic braking — they change actual behavior, unlike road signs that can be ignored", "The rearview mirror — they help you see what happened"], "answer": 2, "explanation": "Prompts are like road signs (can be ignored). Hooks are like seatbelt alarms and automatic braking — they enforce rules at the system level, changing actual behavior regardless of model compliance."}], "part5": [{"question": "What is the recommended first adoption step for nearly every role?", "options": ["Set up a full automation pipeline immediately", "Install every available plugin and MCP connection", "Start with gathering and organizing information — research briefs, meeting notes, document structuring", "Replace team members with AI agents"], "answer": 2, "explanation": "Across all roles (PM, marketing, sales, engineering, research), the first step is always information gathering and organization — the lowest-risk, highest-frequency tasks that build trust in the workflow."}, {"question": "For agency/team operators managing multiple clients, what is the most critical principle?", "options": ["Speed of delivery", "Using the newest model available", "Client context isolation — preventing data and context from leaking between clients", "Maximizing the number of plugins installed"], "answer": 2, "explanation": "Client context isolation is the top priority. One folder boundary prevents more accidents than one clever prompt. Speed matters less than ensuring Client A's data never appears in Client B's output."}, {"question": "What should humans always retain control of, regardless of role?", "options": ["Every single draft revision", "All file naming decisions", "Final responsibility: approval decisions, external communications, and judgments with real-world consequences", "Token counting and cost management"], "answer": 2, "explanation": "AI accelerates repetitive structuring and drafting. Humans must retain: market interpretation (PM), brand tone approval (marketing), external send-off (sales), deployment decisions (engineering), and legal judgment (compliance)."}, {"question": "What is an 'output contract' in the scenario guide?", "options": ["A legal agreement between the user and Anthropic", "A pre-defined agreement about what format and location the result must follow", "A limit on how many tokens Claude can output", "The pricing for Claude's API output"], "answer": 1, "explanation": "An output contract specifies where results are saved, in what format, and what structure they must follow. It prevents results from being scattered or inconsistent across runs."}, {"question": "Which tasks are currently showing the strongest AI adoption signals?", "options": ["Physical labor and complex face-to-face negotiations", "Programming, data entry, customer support, repetitive document review, and channel-specific content adaptation", "Only software engineering", "Tasks that require no human oversight"], "answer": 1, "explanation": "High adoption correlates with: digital text, structured judgments, existing digital data, repeatable formats, and clear quality criteria. Physical work and high-stakes professional judgment adopt more slowly."}], "part6": [{"question": "What is the most effective memory strategy for Claude Code sessions?", "options": ["Save the entire conversation transcript after every session", "Rely on Claude's built-in memory to remember everything", "Update handoff.md at the end of every session with current state, next steps, and unresolved risks", "Use /memory to permanently store all information"], "answer": 2, "explanation": "The simplest and most effective memory strategy: update handoff.md at session end. This single habit prevents 80% of 'where was I?' confusion. Conversations are disposable; files are the real memory."}, {"question": "Why should plans be written in files rather than kept in conversation?", "options": ["Files are cheaper than conversation tokens", "Files survive session boundaries, can be reviewed independently, version-controlled, and keep conversation focused on execution", "Claude cannot understand plans in conversation format", "There is no difference between file plans and conversation plans"], "answer": 1, "explanation": "File-based plans persist across sessions, allow independent human review, enable Git versioning, and keep conversations focused on execution rather than re-planning."}, {"question": "What is the key principle for running parallel Claude sessions?", "options": ["Run as many sessions as possible for maximum speed", "Use the same files and directories for all sessions", "Define roles first: who does what, which files each touches, and how results merge", "Parallel sessions are not recommended"], "answer": 2, "explanation": "Parallelism without role clarity creates chaos. Before launching parallel sessions, define responsibilities, file boundaries, and merge strategies. Unstructured parallelism is worse than sequential work."}, {"question": "What should you check before installing any external tool (skill, plugin, MCP server)?", "options": ["Only the download count", "Last maintenance date, README quality, security permissions needed, context cost vs. utility, and ease of disabling", "Whether it has a cool logo", "Nothing — the marketplace handles quality control"], "answer": 1, "explanation": "Five criteria: maintenance recency, documentation quality, security-sensitive permissions, cost-benefit ratio, and reversibility. 'Saved for later' tools pile up without becoming operational assets."}, {"question": "What does 'OpenClaw-style' operation refer to in the community?", "options": ["Using a specific competitor's product", "An always-on, multi-channel, persistent-state work system with scheduled tasks and remote control capabilities", "A free tier of Claude usage", "A specific coding framework"], "answer": 1, "explanation": "'OpenClaw-style' describes an operational goal: always accessible, sessions that don't break, time/event-triggered work, embedded skills, and remote control with safety boundaries. In Claude's ecosystem, this is achieved by combining Claude Code + hooks + MCP + Remote Control + Scheduled Tasks."}], "part7": [{"question": "What are the three permission modes in Claude Code's governance model?", "options": ["Read, Write, Execute", "Admin, User, Guest", "Allow (proceed automatically), Ask (pause for human), Deny (block completely)", "Public, Private, Protected"], "answer": 2, "explanation": "The permission model uses allow/ask/deny, evaluated in order: deny → ask → allow, with the first matching rule applying. This gives fine-grained control over what Claude can do autonomously."}, {"question": "What are the four governance layers?", "options": ["Frontend, Backend, Database, Network", "Document layer (CLAUDE.md/rules), Settings layer (permissions), Runtime layer (hooks/approvals), Trace layer (logs/decisions)", "User, Team, Organization, Enterprise", "Input, Processing, Output, Storage"], "answer": 1, "explanation": "Document layer defines knowledge, Settings layer defines boundaries, Runtime layer handles execution-time controls, and Trace layer records what happened and why. All four together form complete governance."}, {"question": "Why is auditability important for AI automation?", "options": ["It is only required by law", "It makes demos look more professional", "Same automation with audit trails becomes infrastructure; without them, it remains a demo that can't scale", "Auditability is not important for most teams"], "answer": 2, "explanation": "Auditability means being able to explain: what was read, what was created, who approved, and what remains. Without it, automation cannot transition from individual demos to reliable team infrastructure."}, {"question": "What is the difference between observability and auditability?", "options": ["They are the same thing", "Observability is for developers, auditability is for managers", "Observability shows current system state (dashboards); auditability explains what happened and why (event records for accountability)", "Observability is more expensive than auditability"], "answer": 2, "explanation": "Observability is a dashboard for operational efficiency (usage, costs, patterns). Auditability is an event record for accountability (who did what, why, with what approval). Organizations need both."}, {"question": "What is the key principle of the book's final chapter on building with Claude Code?", "options": ["Always use the most advanced features available", "One thin completed result plus the structure to recreate it beats any number of impressive demos", "Speed is more important than quality", "Only developers should build with Claude Code"], "answer": 1, "explanation": "The conclusion: a completed thin website or automation workflow — with brief, template, review split, and handoff — that can be recreated next week is more valuable than any elaborate unfinished plan."}], "glossary": [{"question": "What is 'Context Assembly'?", "options": ["Installing all available plugins at once", "The process of selecting and gathering only the relevant rules, files, and tool descriptions for the current task into the input context", "Writing the longest possible prompt", "Copying the entire codebase into the conversation"], "answer": 1, "explanation": "Context Assembly is a selection process, not a dumping process. It means gathering only what the current task needs — more context is not better context."}, {"question": "What does 'Resume Hygiene' mean?", "options": ["Cleaning your resume/CV before a job interview", "Restarting your computer before using Claude", "Keeping only what the next session needs and discarding accumulated noise before resuming work", "Using hand sanitizer while typing"], "answer": 2, "explanation": "Resume Hygiene means cleaning up state before resuming — preserving essential context while discarding noise from the previous session. Long sessions aren't inherently better; clean handoffs are."}, {"question": "How does a Hook differ from a prompt instruction?", "options": ["Hooks are more expensive to run", "Hooks enforce rules at the system level (automatic braking), while prompt instructions are suggestions that can be ignored (road signs)", "Hooks only work in Cowork, not Claude Code", "There is no practical difference"], "answer": 1, "explanation": "Prompts request behavior; hooks enforce it. A prompt saying 'run lint after editing' can be skipped. A hook configured to run lint after every file edit always executes."}, {"question": "What is the relationship between Skill, Plugin, and MCP?", "options": ["They are three names for the same feature", "Skill defines procedures, MCP connects to external tools, Plugin packages everything for team deployment", "Plugin is the cheapest, MCP is mid-tier, Skill is premium", "They must always be used together"], "answer": 1, "explanation": "Skills are 'how to do it' (procedures), MCP is 'the path to reach external tools' (connections), and Plugins are 'the box that deploys it all' (packages for teams). They complement each other."}, {"question": "When confused by a Claude Code term, what three-bucket mental model helps?", "options": ["Cost, Speed, Quality", "Input, Process, Output", "Mechanics (how work flows), Safety (how mistakes are prevented), Continuity (how sessions persist)", "Frontend, Backend, Database"], "answer": 2, "explanation": "Nearly all Claude Code terms fall into three categories: mechanics (agentic loop, context assembly, tool orchestration), safety (permissions, hooks, approval gates), or continuity (session memory, handoff, resume hygiene)."}]}}, "fr": {"ui": {"title": "Guide d'étude Claude Code", "search_placeholder": "Rechercher...", "next": "Suivant →", "prev": "← Précédent", "quiz_title": "Quiz d'auto-évaluation", "progress": "Progression", "expand_all": "Tout développer", "collapse_all": "Tout réduire", "retry": "Réessayer", "score": "{correct}/{total} correctes", "mark_complete": "Marquer comme lu", "completed": "Terminé"}, "parts": {"part1": {"title": "Partie 1 : Les fondamentaux", "sections": {"1_1": {"title": "Pourquoi l'écosystème est en plein essor", "content": "<p>Le paysage de l'IA a évolué : la question n'est plus « quel modèle est le plus intelligent » mais « quel outil connecte fichiers, tests, Git, navigateur et services externes avec le moins de friction ». C'est pourquoi Claude Code, Codex et Gemini CLI sont souvent cités ensemble — la compétition porte désormais sur les <strong>chemins de travail</strong>, et non sur les scores de benchmark.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Claude Code n'est pas qu'une application de codage. C'est un <em>work harness</em> qui combine contexte mémoïsé, orchestration d'outils, portes de permission et sessions reprises. Cowork, Skills, Plugins et tâches planifiées sont des extensions de ce harness central vers des travaux non liés au code.\n      </div>\n\n      <p>Les recherches confirment cette direction. METR rapporte que les horizons des tâches des agents s'allongent rapidement, et Anthropic note que l'écart de performance réel provient de la structure des tâches et des habitudes de vérification, pas des noms de modèles. La question n'est plus « à quel point le modèle est-il intelligent ? » mais « qui apprend plus vite les règles de délégation et les harnesses de vérification ? »</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Commencez par vous demander : « Ma tâche est-elle basée sur une question, un document ou une implémentation ? » Cette seule question détermine si vous devez utiliser Chat, Projects, Cowork ou Claude Code.\n      </div>\n\n      <table>\n        <tr><th>Ce qui évolue vite</th><th>Ce qui dure</th></tr>\n        <tr><td>Emplacements des menus, niveaux de forfait, statut des préversions, noms des fonctionnalités</td><td>Quel chemin de travail utiliser, comment séparer fichiers et vérification, où placer les points de contrôle humains</td></tr>\n      </table>"}, "1_2": {"title": "Quatre termes clés à retenir", "content": "<p>Avant d'aller plus loin, intégrez ces quatre termes. Chaque chapitre s'appuie sur eux.</p>\n\n      <table>\n        <tr><th>Terme</th><th>Signification</th></tr>\n        <tr><td><strong>Memoized Context</strong></td><td>Informations de fond conservées d'un tour à l'autre pour éviter de tout ré-expliquer à chaque fois</td></tr>\n        <tr><td><strong>Tool Orchestration</strong></td><td>La couche qui décide quels outils utiliser, dans quel ordre</td></tr>\n        <tr><td><strong>Permission Gate</strong></td><td>La frontière qui sépare autoriser, demander et refuser avant l'exécution</td></tr>\n        <tr><td><strong>Resumable Session</strong></td><td>La capacité de reprendre là où vous vous étiez arrêté, même après une déconnexion</td></tr>\n      </table>\n\n      <p>Ces éléments forment un pipeline : <strong>Demande utilisateur → Memoized Context → Tool Orchestration → Permission Gate → Exécution &amp; Vérification → Resumable Session → Tâche suivante</strong>. Quelle que soit la complexité d'un flux de travail, ce n'est toujours qu'une variation de ces cinq étapes.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> « Mémoïsé » ne signifie pas « mémorisé ». Cela signifie « calculé une fois, réutilisé de nombreuses fois » — comme définir des règles de fond qui persistent à chaque tour sans avoir à les renvoyer.\n      </div>"}, "1_3": {"title": "Le concept de Harness", "content": "<p>Un <strong>harness</strong> est la structure externe qui définit ce que Claude peut lire, modifier et vérifier. Imaginez que vous configurez l'espace de travail d'un collègue : vous disposez les documents de référence sur le bureau, décidez quels tiroirs sont accessibles et fixez une liste de contrôle à compléter avant de terminer.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Envoyer « Corrige le bug de connexion » sans aucune contrainte. Une demande avec un harness solide ressemble à : « Lis uniquement <code>auth/</code>, ne touche pas <code>.env</code>, passe les tests de connexion, laisse une note de 3 lignes sur les changements. »\n      </div>\n\n      <p>Le <strong>Harness Engineering</strong> ne consiste pas à rédiger des prompts plus intelligents — il s'agit de concevoir l'espace de travail dans lequel Claude opère. Cela comprend : quels fichiers sont toujours chargés, quelles permissions sont définies, quels tests doivent passer et où les résultats sont stockés.</p>\n\n      <p>Le Rapport international sur la sécurité de l'IA 2026 le confirme : à mesure que les capacités des modèles augmentent, les structures de harness et de vérification deviennent <em>plus</em> importantes, pas moins. Les tâches réelles impliquent des contraintes de ressources, des informations incomplètes, des exceptions et des flux d'approbation que l'intelligence brute du modèle ne peut gérer seule.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Même les débutants peuvent commencer à construire un harness : écrivez des règles de base dans <code>CLAUDE.md</code>, définissez les portées allow/deny dans <code>settings.json</code>, découpez les grandes tâches avec <code>plan.md</code> et laissez l'état de session dans <code>handoff.md</code>.\n      </div>"}, "1_4": {"title": "Surfaces de travail : Chat, Projects, Cowork, Claude Code", "content": "<p>Le même modèle Claude se comporte différemment selon la surface utilisée. Choisir la mauvaise surface n'est pas un problème de compétence — c'est un problème d'aiguillage.</p>\n\n      <table>\n        <tr><th>Surface</th><th>Idéal pour</th><th>Influencée par</th></tr>\n        <tr><td><strong>Chat</strong></td><td>Questions rapides, tri d'idées</td><td>Qualité des questions</td></tr>\n        <tr><td><strong>Projects</strong></td><td>Connaissances de fond persistantes</td><td>Structure des dossiers, modèles</td></tr>\n        <tr><td><strong>Cowork</strong></td><td>Délégation documentaire — recherche, briefs, organisation de fichiers</td><td>Structure des dossiers, modèles</td></tr>\n        <tr><td><strong>Claude Code</strong></td><td>Implémentation et vérification — code, tests, revues</td><td>Fichiers de règles, boucles de vérification</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Trois idées reçues : (1) « Même modèle, même expérience partout » — faux, la surface est déterminante. (2) « Cowork est le mode facile, Claude Code est le mode difficile » — faux, ils diffèrent par le style de délégation, pas par la difficulté. (3) « Essayez toutes les surfaces à la fois » — faux, maîtrisez d'abord l'une, puis élargissez.\n      </div>\n\n      <p><strong>Bonnes premières tâches par surface :</strong></p>\n      <ul>\n        <li><strong>Chat :</strong> « Résume ce rapport en 5 phrases avec 3 questions. »</li>\n        <li><strong>Projects :</strong> « Lis ce dossier et crée un résumé d'une page des connaissances de fond. »</li>\n        <li><strong>Cowork :</strong> « Lis les notes de réunion et enregistre un brouillon de brief hebdomadaire dans <code>outputs/</code>. »</li>\n        <li><strong>Claude Code :</strong> « Lis ce parcours de reproduction du bug, puis rédige une hypothèse et un plan de correction dans <code>plan.md</code>. »</li>\n      </ul>"}, "1_5": {"title": "Ce qui évolue vite et ce qui reste stable", "content": "<p>Les produits technologiques évoluent rapidement. Pour rester ancré, distinguez les détails volatils des principes durables.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> L'écosystème est « en plein essor » quand quatre conditions sont réunies simultanément : (1) les comportements des utilisateurs changent — les gens conçoivent des espaces de travail au lieu de rédiger des prompts, (2) les habitudes opérationnelles changent — les équipes maintiennent <code>CLAUDE.md</code> comme contrat partagé, (3) l'écosystème se développe — Skills officiels et communautaires, Plugins, serveurs MCP se multiplient, (4) les rôles professionnels sont repensés — marketing, fiscalité, PM, design utilisent Claude comme couche d'automatisation, pas seulement comme chatbot.\n      </div>\n\n      <p><strong>Les quatre cadres pour lire l'ensemble du livre :</strong></p>\n      <table>\n        <tr><th>Cadre</th><th>Rôle</th><th>Analogie</th></tr>\n        <tr><td>Work Path</td><td>Où vous commencez (Chat, Cowork, Claude Code)</td><td>Le bureau à votre poste de travail</td></tr>\n        <tr><td>Harness</td><td>L'environnement d'exécution (permissions, règles, tests)</td><td>Les tiroirs, verrous et listes de contrôle sur le bureau</td></tr>\n        <tr><td>Operations Layer</td><td>Planification, déploiement, analyse</td><td>Le bureau administratif</td></tr>\n        <tr><td>System</td><td>Tout combiné avec des boucles de révision humaine</td><td>L'immeuble de bureaux entier</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Quand une nouvelle fonctionnalité est lancée, ne demandez pas « Est-elle plus intelligente ? » Demandez : « Quelle couche ont-ils ajoutée — connaissance, outils, packages ou contrôles ? » Cela évite la sur-configuration et maintient votre configuration stable.\n      </div>"}}}, "part2": {"title": "Partie 2 : Playbook pratique", "sections": {"2_1": {"title": "Cowork & Claude Code : premières limites d'application", "content": "<p>La confusion la plus fréquente après l'installation est : « Par où commencer ? » La réponse dépend du type de tâche.</p>\n\n      <table>\n        <tr><th>Cowork</th><th>Claude Code</th></tr>\n        <tr><td>Tâches centrées sur les documents : notes de réunion, briefs de recherche, lecture de dossiers, génération de brouillons</td><td>Tâches centrées sur le développement : corrections de bugs, tests, refactoring, documents de plan</td></tr>\n        <tr><td>Ne pas s'attendre à ce qu'il soit un système back-end universel</td><td>Ne pas commencer par déléguer une fonctionnalité entièrement nouvelle d'un coup</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Ce chapitre ne porte pas sur <em>comment utiliser</em> Claude Code — il porte sur <em>comment l'opérer</em>. Les habitudes fondamentales sont : planifier avant d'éditer, hygiène de reprise, séparation des revues, isolation par worktree, listes d'autorisation et transferts structurés.\n      </div>\n\n      <p>La gestion des sessions suit un arbre de décision :</p>\n      <ul>\n        <li><strong>Même objectif, on continue ?</strong> → <code>claude --continue</code> ou <code>--resume</code></li>\n        <li><strong>Besoin d'une autre direction ?</strong> → <code>--fork-session</code></li>\n        <li><strong>Conflits de fichiers ou de rôles ?</strong> → <code>--worktree</code> (répertoire de travail séparé)</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Les personnes qui utilisent bien Claude Code sur la durée ne sont pas celles qui rédigent de meilleurs prompts — ce sont celles qui rendent le travail moins interruptible.\n      </div>"}, "2_2": {"title": "Principes de fonctionnement de Claude Code", "content": "<p>Huit habitudes distinguent les utilisateurs productifs de Claude Code de ceux qui sont frustrés :</p>\n      <ol>\n        <li><strong>Planifier avant d'éditer</strong> — Définir le périmètre, la vérification et les zones interdites avant de toucher au code. Pour les grandes tâches, écrire d'abord <code>plan.md</code>.</li>\n        <li><strong>Garder le contexte résidant léger</strong> — <code>CLAUDE.md</code> est un contrat de travail, pas une encyclopédie. Déplacer l'état à long terme vers <code>handoff.md</code>, <code>decision-log.md</code>.</li>\n        <li><strong>Liste d'autorisation d'abord, contournement ensuite</strong> — Commencer avec des règles <code>allow</code> et <code>deny</code> étroites. N'élargir les permissions qu'après les avoir comprises.</li>\n        <li><strong><code>/compact</code> manuel au bon moment</strong> — Compresser après avoir sauvegardé l'état important dans des fichiers, pas après que la session se soit déjà dégradée.</li>\n        <li><strong>Utiliser la reprise délibérément</strong> — <code>--continue</code> pour la même direction, <code>--fork-session</code> quand la direction se divise.</li>\n        <li><strong>Séparer plan / implémentation / revue</strong> — Ne pas entasser tous les rôles dans une seule session. La séparation réduit la pollution du contexte et la fatigue d'approbation.</li>\n        <li><strong>Utiliser les worktrees</strong> — Pour les travaux conflictuels, les expériences ou les revues parallèles, séparez le répertoire de travail.</li>\n        <li><strong>Gérer les coûts par la structure, pas par le comptage des tokens</strong> — Réduire les défauts de cache, la longueur des sorties d'outils, la durée des sessions et la verbosité des logs de tests.</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Se lancer directement dans l'implémentation sans plan. Pour les grandes tâches, cela semble rapide mais conduit à refaire le travail. Le plan n'est pas une étape bureaucratique — c'est un dispositif qui réduit les reprises.\n      </div>"}, "2_3": {"title": "Modèles : CLAUDE.md, settings.json, Hooks", "content": "<p>Un dépôt bien organisé sépare les responsabilités entre les fichiers. Voici le plan du harness :</p>\n\n      <pre><code>repo/\n├── CLAUDE.md                    # Project contract (always loaded)\n├── .claude/\n│   ├── settings.json            # Allow/ask/deny boundaries\n│   ├── rules/\n│   │   ├── architecture.md      # Structure rules\n│   │   ├── testing.md           # Test standards\n│   │   └── frontend.md          # UI conventions\n│   └── hooks.json               # Auto-enforcement rules\n└── tasks/\n    ├── plan.md                  # What to do next\n    ├── verify.md                # Exit criteria\n    ├── decision-log.md          # Why this path was chosen\n    └── handoff.md               # Current state for next session</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Chaque fichier prévient un type d'échec différent. <code>CLAUDE.md</code> prévient la dérive du contexte. <code>settings.json</code> prévient les actions non sécurisées. <code>rules/*</code> prévient les erreurs spécifiques au domaine. <code>hooks.json</code> transforme « penser à faire X » en « toujours faire X ». <code>tasks/*</code> prévient l'amnésie de session.\n      </div>\n\n      <p><strong>Priorité de portée des paramètres :</strong> Managed &gt; Command-line &gt; Local &gt; Project &gt; User. Les règles verrouillées par l'organisation ne peuvent pas être remplacées par les paramètres individuels — c'est pourquoi la confusion « mon paramètre ne fonctionne pas » survient souvent.</p>\n\n      <p><strong>Séparation équipe / local :</strong> Les standards partagés par l'équipe vont dans <code>CLAUDE.md</code> et <code>.claude/settings.json</code>. Les expériences personnelles vont dans <code>CLAUDE.local.md</code> ou <code>.claude/settings.local.json</code>.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Un exemple de Hook minimal qui bloque les commandes Bash dangereuses :\n      </div>\n      <pre><code>{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \".claude/hooks/block-rm.sh\"\n      }]\n    }]\n  }\n}</code></pre>"}, "2_4": {"title": "Modèles de prompts et couches d'ingénierie", "content": "<p>Les prompts efficaces ne reposent pas sur l'ingéniosité — ils suivent des modèles. Voici les styles de prompts essentiels :</p>\n\n      <p><strong>Prompt contexte d'abord (routine de démarrage recommandée) :</strong></p>\n      <pre><code>Read CLAUDE.md, relevant rules, and tasks/verify.md first.\nDo NOT implement yet. Summarize:\n1. Task type\n2. Modification scope\n3. Off-limits areas\n4. Verification commands\nThen proceed only after approval.</code></pre>\n\n      <p><strong>Prompt anti-raccourcis (pour les tâches de codage) :</strong></p>\n      <pre><code>Goal: maintainable implementation, not just passing tests.\nRules:\n1. No hardcoding or special-casing to pass tests.\n2. If tests conflict with requirements, report first.\n3. If using external code, explain why before importing.\n4. Separate direct implementation from external references.\n5. After changes, report what passed and what's unverified.</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Les trois couches d'ingénierie : (1) <strong>Prompt Engineering</strong> — rédiger de meilleures instructions, (2) <strong>Context Engineering</strong> — choisir ce qu'on montre à Claude, (3) <strong>Harness Engineering</strong> — concevoir l'intégralité de l'environnement de travail. La plupart des gens s'arrêtent à la couche 1. Les vrais gains viennent des couches 2 et 3.\n      </div>\n\n      <p><strong>Modèle Compact Instructions</strong> — contrôle ce qui survit après <code>/compact</code> :</p>\n      <pre><code>## Compact Instructions\nWhen compacting, always preserve:\n- Last modified files and why\n- Passed tests, failed tests, untested items\n- Rejected alternatives and reasons\n- The ONE thing next turn should do immediately\n- Risk points requiring human review</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> De bonnes instructions de compression ne rendent pas les résumés jolis — elles permettent à la session suivante de reprendre immédiatement.\n      </div>"}, "2_5": {"title": "Boucles d'évaluation et commandes de session", "content": "<p>Six commandes slash constituent votre boîte à outils de gestion de session :</p>\n\n      <table>\n        <tr><th>Commande</th><th>Quand l'utiliser</th></tr>\n        <tr><td><code>/clear</code></td><td>Effacer la conversation accumulée et recommencer à zéro</td></tr>\n        <tr><td><code>/compact [focus]</code></td><td>Résumer une longue conversation en précisant ce qu'il faut conserver</td></tr>\n        <tr><td><code>/context</code></td><td>Vérifier ce qui consomme l'espace de contexte</td></tr>\n        <tr><td><code>/memory</code></td><td>Voir quels fichiers mémoire et couches CLAUDE.md sont chargés</td></tr>\n        <tr><td><code>/init</code></td><td>Générer automatiquement un brouillon de CLAUDE.md pour un nouveau dépôt</td></tr>\n        <tr><td><code>/cost</code></td><td>Vérifier l'utilisation actuelle des tokens et le coût</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> L'évaluation hebdomadaire doit suivre : quelles versions de CLAUDE.md / règles / Hooks étaient actives, quels Skills ou modèles ont été utilisés, ce qui a changé par rapport à la semaine précédente, et si les taux de réussite et les quantités de corrections humaines se sont améliorés. Modifiez les règles et les Hooks — pas seulement les prompts — pour trouver votre configuration optimale.\n      </div>\n\n      <p><strong>Parcours d'apprentissage recommandé pour les ressources officielles :</strong></p>\n      <ol>\n        <li>Notes de version → ce qui est possible maintenant</li>\n        <li>Centre d'aide Claude → chemins de produits (Cowork, Skills, Connectors)</li>\n        <li>Documentation Claude Code → fonctionnalités avancées (Plugins, Hooks, équipes d'agents)</li>\n        <li>Documentation API / Agent SDK → construire des applications d'agents personnalisées</li>\n        <li>Dépôts GitHub → exemples et structures réels</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Lire les posts de démonstration comme des spécifications, ou la documentation officielle comme des conseils opérationnels. Gardez les rôles séparés : la documentation officielle confirme les faits et les limites ; les posts communautaires révèlent les modèles et les modes d'échec ; les dépôts montrent la structure réelle.\n      </div>"}}}, "part3": {"title": "Partie 3 : Conception système", "sections": {"3_1": {"title": "Ingénierie du contexte : exploration approfondie", "content": "<p>Le <strong>Context Engineering</strong> est la discipline qui consiste à choisir quelles informations Claude voit à un moment donné. Il ne s'agit pas de rédiger des prompts plus longs — il s'agit d'assembler la bonne fenêtre de contexte.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> <em>Context Assembly</em> = rassembler les règles, fichiers, mémos et descriptions d'outils nécessaires à la tâche en cours dans l'entrée réelle. C'est un processus de sélection, pas de déversement. Plus de contexte ne signifie pas un meilleur contexte.\n      </div>\n\n      <p>Ce qui remplit la fenêtre de contexte à chaque tour (même avec un prompt d'une ligne) :</p>\n      <ul>\n        <li>Votre question actuelle</li>\n        <li>L'historique récent de la conversation</li>\n        <li>Les fichiers que Claude a lus</li>\n        <li><code>CLAUDE.md</code> et les fichiers de règles</li>\n        <li>Les résultats d'exécution des outils</li>\n        <li>Les sorties récentes de Claude lui-même</li>\n      </ul>\n\n      <p>Le <strong>Context Rot</strong> survient lorsque le contexte devient si long que les signaux précoces s'affaiblissent. Les longues conversations perdent progressivement leur cohérence — non pas parce que le modèle oublie, mais parce que les instructions importantes du début sont diluées par le bruit ultérieur.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Charger tout le dépôt dans le contexte. Même pour corriger un seul bug, certains utilisateurs déversent chaque fichier. C'est plus lent, plus coûteux et produit des résultats de moins bonne qualité. Montrez à Claude uniquement la fonction et les 20 lignes de log d'erreur dont il a besoin.\n      </div>\n\n      <p><strong>Trois isolations à concevoir simultanément :</strong></p>\n      <ol>\n        <li><strong>Isolation du contexte</strong> — Ne pas mélanger investigation, planification, implémentation et revue dans une longue session. Utiliser des Subagents ou des sessions séparées.</li>\n        <li><strong>Isolation de l'état des fichiers</strong> — Utiliser des worktrees ou des dossiers de sortie séparés pour les travaux susceptibles de conflits.</li>\n        <li><strong>Isolation des approbations</strong> — Séparer les actions fréquemment autorisées des actions à toujours revoir, via les permissions et les Hooks.</li>\n      </ol>"}, "3_2": {"title": "Ingénierie du Harness", "content": "<p>Le Harness Engineering va au-delà du réglage des prompts. Il englobe l'intégralité de l'espace de travail : permissions, structure des dossiers, politiques de test, règles de reprise de session, protocoles de transfert, isolation par worktree et configuration du contrôle à distance.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Un harness conçoit trois choses simultanément : (1) ce que Claude sait (contexte), (2) ce que Claude peut faire (outils et permissions), (3) ce que Claude doit vérifier (tests et critères de sortie). L'absence de l'un de ces éléments crée une classe d'échec différente.\n      </div>\n\n      <p><strong>La routine de démarrage importe plus que le prompt de démarrage :</strong></p>\n      <ol>\n        <li>Vérifier le contrat résidant — lire <code>CLAUDE.md</code>, les règles pertinentes, la branche actuelle</li>\n        <li>Classifier la tâche — investigation, implémentation ou revue ?</li>\n        <li>Rédiger le plan — périmètre, zones interdites, commandes de vérification</li>\n        <li>Confirmer les critères de sortie — vérifier <code>tasks/verify.md</code></li>\n        <li>Seulement alors commencer le travail réel</li>\n      </ol>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Les Subagents et les worktrees résolvent le même problème sous des angles différents. Les Subagents isolent le <em>contexte</em> (délèguent la recherche ou la revue à un travailleur temporaire). Les worktrees isolent <em>l'état des fichiers</em> (répertoires de travail physiquement séparés). Utilisez les Subagents pour les investigations courtes ; utilisez les worktrees pour les expériences parallèles.\n      </div>\n\n      <p>L'une des utilisations les plus efficaces des Subagents n'est pas d'accélérer le code, mais de <em>simuler différents rôles utilisateurs</em> : un ingénieur senior sceptique, un nouveau mainteneur, un réviseur de sécurité, une personne des opérations. Des perspectives différentes détectent des problèmes de confiance tels que les README manquants, les effets secondaires dans les commandes de statut et les lacunes d'observabilité.</p>"}, "3_3": {"title": "Structures de vérification", "content": "<p>La vérification est ce qui sépare les démos de la production. Un bon plan de vérification répond à : « Que doit-il se passer avant que cette tâche soit terminée ? »</p>\n\n      <p><strong>Le modèle <code>tasks/verify.md</code> :</strong></p>\n      <pre><code># Verification Plan\n## Must Pass\n- [ ] Unit tests: `pnpm test -- signup`\n- [ ] Lint: `pnpm lint`\n- [ ] Type check: `pnpm typecheck`\n## Must Review (human)\n- [ ] Manual browser check on mobile\n- [ ] CTA text approved by stakeholder\n## Must Not Break\n- [ ] Existing auth flow unchanged\n- [ ] No new dependencies added</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Les Skills de vérification (vérifier que les flux d'inscription fonctionnent de bout en bout, que les états de paiement sont corrects, que la CLI fonctionne dans les environnements TTY) ont souvent un ROI plus élevé que les Skills de génération. Un « brouillon bien rédigé » est peu coûteux — un « résultat vérifié et validé » est précieux et difficile à obtenir.\n      </div>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Traiter le passage des tests comme l'objectif plutôt que l'implémentation maintenable. Les modèles peuvent coder en dur des valeurs ou ajouter des cas spéciaux pour que les tests passent. Votre prompt de vérification doit explicitement interdire les raccourcis et exiger un rapport quand les tests semblent incorrects.\n      </div>"}, "3_4": {"title": "Économie des tokens et gestion des coûts", "content": "<p>Les tokens sont à la fois une unité de facturation et un signal indiquant l'étendue de votre tâche. Même un prompt d'une ligne envoie bien plus : la question, l'historique de la conversation, les fichiers chargés, CLAUDE.md, les règles, les sorties d'outils et la sortie récente du modèle entrent tous dans la fenêtre de contexte.</p>\n\n      <table>\n        <tr><th>Type de token</th><th>Ce qu'il comprend</th></tr>\n        <tr><td><strong>Tokens d'entrée</strong></td><td>Prompts, fichiers, historique de conversation, fichiers de règles, sorties d'outils</td></tr>\n        <tr><td><strong>Tokens de sortie</strong></td><td>Explications, code, résumés, résultats d'appels d'outils</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> « Économiser des tokens » ne consiste pas à être avare — il s'agit de concevoir un système où Claude ne lit que ce dont il a besoin. Le <strong>Prompt Cache</strong> offre des avantages de réutilisation lorsque des contextes de fond similaires sont envoyés de façon répétée. Structurez votre contexte de sorte que le préfixe stable (CLAUDE.md, règles) reste cohérent et mis en cache.\n      </div>\n\n      <p><strong>Le coût est géré par la structure, pas par le comptage :</strong></p>\n      <ul>\n        <li>Réduire la verbosité des sorties d'outils (ne pas déverser des logs entiers)</li>\n        <li>Garder les sessions focalisées — ne pas mélanger des tâches sans rapport</li>\n        <li>Utiliser <code>/compact</code> à des points stratégiques, pas en dernier recours</li>\n        <li>Séparer l'investigation de l'implémentation dans des sessions différentes</li>\n        <li>Suivre le coût avec <code>/cost</code> pour développer l'intuition</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Le concept de <strong>Tool Result Budget</strong> signifie contrôler la quantité de contexte que les sorties d'outils consomment. Une suite de tests qui déverse 500 lignes de sortie consomme rapidement votre contexte. Configurez les outils pour qu'ils retournent des résumés, pas des logs bruts.\n      </div>"}, "3_5": {"title": "Gestion des sessions et hygiène de reprise", "content": "<p>L'<strong>hygiène de reprise</strong> consiste à ne conserver que ce dont la prochaine session a besoin et à éliminer le bruit accumulé. Les longues sessions ne sont pas intrinsèquement meilleures — elles accumulent du Context Rot.</p>\n\n      <p><strong>Modèle de mémoire de session :</strong></p>\n      <pre><code># Current State\n- What I'm doing right now\n\n# Task Specification\n- What the user actually requested\n\n# Files and Functions\n- Important files and why they matter\n\n# Workflow\n- Frequently used commands and order\n\n# Errors &amp; Corrections\n- Failed attempts — do NOT repeat these\n\n# Key Results\n- Confirmed results and answers\n\n# Worklog\n- Recent steps (keep very short)</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Les longues sessions survivent lorsque l'information converge vers cinq catégories : état actuel, fichiers, flux de travail, erreurs et résultats. Tout le reste est du bruit. La section <code>Errors &amp; Corrections</code> n'est pas un journal de honte — c'est un dispositif de prévention des rechutes.\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Utilisez la barre de statut (<code>/statusline</code>) comme tableau de bord. Elle affiche le répertoire de travail, la branche Git et l'utilisation du contexte. Quand l'utilisation du contexte monte, sauvegardez l'état dans des fichiers et démarrez une session fraîche — ne forcez pas jusqu'à ce que la qualité se dégrade.\n      </div>"}}}, "part4": {"title": "Partie 4 : Extensions et automatisation", "sections": {"4_1": {"title": "Skills : enseigner à Claude des procédures reproductibles", "content": "<p>Quand vous expliquez la même procédure pour la dixième fois — format des notes de réunion, structure du brief hebdomadaire, liste de contrôle pour la revue de code — il est temps de créer un <strong>Skill</strong>. Un Skill est un manuel de travail réutilisable qui réduit le coût d'explication.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Les Skills ne sont pas des extraits de prompt. Ce sont des structures de dossiers avec un document principal (<code>SKILL.md</code>), des scripts d'appui, des fichiers de référence et des ressources. Le guide officiel recommande la <em>progressive disclosure</em> : le frontmatter et la description se chargent en premier ; les détails ne se chargent que lorsque le Skill s'active.\n      </div>\n\n      <table>\n        <tr><th>Promouvoir en Skill quand...</th><th>Garder en conversation quand...</th></tr>\n        <tr><td>Le format de sortie se répète, la variation doit diminuer, l'emplacement de stockage et l'ordre des outils doivent être fixés</td><td>Le sujet change souvent, c'est une exploration de brainstorming ponctuelle</td></tr>\n      </table>\n\n      <p><strong>Projects vs. Skills :</strong> Les Projects sont des connaissances de fond toujours présentes. Les Skills sont des procédures activées lorsqu'une tâche correspondante arrive. Un fond sans procédure conduit à des sorties incohérentes ; une procédure sans contexte conduit à des résultats vides.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Le champ <code>description</code> du Skill n'est pas un paragraphe d'introduction — c'est une règle d'aiguillage. Si la description est vague, le Skill ne se déclenche jamais (sous-déclenchement) ou s'active pour des tâches sans rapport (sur-déclenchement). Rédigez des descriptions du type : « Utilise ce Skill quand l'utilisateur demande un brief concurrent hebdomadaire, une revue de marché ou un résumé de tendances sectorielles. »\n      </div>"}, "4_2": {"title": "Types de Skills et modèle de conception", "content": "<p>Les Skills se regroupent en quelques rôles courants, quel que soit leur domaine spécifique :</p>\n      <ul>\n        <li><strong>Référence bibliothèque/SDK</strong> — Fixe les modèles d'utilisation pour les bibliothèques internes ou externes difficiles</li>\n        <li><strong>Vérification/test</strong> — Standardise les procédures de contrôle (flux Playwright, tests CLI)</li>\n        <li><strong>Pipeline de données</strong> — Organise les sources de données et les chemins de rapport</li>\n        <li><strong>Opérations récurrentes</strong> — Revues hebdomadaires, standups, création de tickets</li>\n        <li><strong>Scaffolding</strong> — Génère les structures initiales de service ou de gestionnaire</li>\n        <li><strong>Porte qualité</strong> — Standards de revue, règles de test, listes de contrôle de sécurité</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Les Skills qui essaient de tout faire (« rechercher, coder, tester et déployer ») semblent puissants mais sont fragiles. Les Skills qui résolvent un seul goulot d'étranglement avec précision durent le plus longtemps. Les Skills de vérification ont souvent un ROI plus élevé que les Skills de génération.\n      </div>\n\n      <p><strong>Modèle de conception de Skill :</strong></p>\n      <pre><code>---\nname: weekly-brief\ndescription: >\n  Use for weekly competitor briefs, recurring market checks,\n  and industry trend summary requests.\ndisable-model-invocation: false\n---\n# Goal\nCreate a weekly competitor brief using only the last 7 days of evidence.\n\n# Input Sources\n- Competitor list: `references/competitors.md`\n- Template: `assets/weekly-brief-template.md`\n\n# Steps\n1. Read competitor list and template\n2. Search for changes in the last 7 days\n3. Draft brief following template structure\n4. Flag uncertain items separately\n5. Save to `outputs/weekly-brief-YYYY-MM-DD.md`\n\n# Rules\n- Max 3 action items\n- Sources and dates required\n- No speculation — mark unknowns as \"Needs verification\"</code></pre>"}, "4_3": {"title": "Plugins : packages de rôles pour les équipes", "content": "<p>Un <strong>Plugin</strong> regroupe plusieurs Skills, commandes, Hooks et paramètres de connexion en un seul package déployable. Si un Skill est un manuel de travail, un Plugin est la boîte d'intégration que vous remettez à un nouveau membre de l'équipe.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Le mot « Plugin » a des significations différentes selon la surface. Les <strong>Plugins Claude Code</strong> regroupent commandes, agents, Hooks, Skills, MCP et LSP pour les flux de développement. Les <strong>Plugins Cowork</strong> regroupent Skills, connecteurs, commandes slash et sous-agents pour les rôles de travail intellectuel. Même nom, expérience d'installation différente.\n      </div>\n\n      <p><strong>La progression :</strong> MCP se connecte aux outils externes → les Skills définissent les procédures → les Plugins packagisent tout pour le déploiement. En une phrase : <em>Les Skills répondent à « comment le faire », MCP est « le chemin pour y accéder », les Plugins sont « la boîte qui le déploie ».</em></p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Traiter les Skills et Plugins externes comme de simples documents. Ils peuvent contenir des appels d'outils, des accès à des fichiers, des requêtes vers des URL externes et des scripts d'exécution. Avant d'installer un Skill externe, vérifiez : (1) Récupère-t-il des URL externes ? (2) Utilise-t-il Bash, des écritures de fichiers ou le réseau ? (3) Ses fichiers correspondent-ils à son objectif déclaré ? (4) S'exécutera-t-il près de données sensibles ? (5) Peut-on le désactiver rapidement ?\n      </div>"}, "4_4": {"title": "MCP : connexions aux outils externes", "content": "<p>Le <strong>Model Context Protocol (MCP)</strong> est la façon standardisée dont Claude se connecte aux outils et services externes — comme un port USB-C pour l'intégration d'outils IA.</p>\n\n      <p><strong>MCP vs. Connector :</strong></p>\n      <table>\n        <tr><th>Connector</th><th>MCP</th></tr>\n        <tr><td>Orienté utilisateur — rechercher et connecter depuis un écran de paramètres</td><td>Orienté développeur — concevoir le serveur, l'interface d'outil et le format de réponse</td></tr>\n        <tr><td>Comme une connexion d'app store</td><td>Comme concevoir le tableau de câblage interne</td></tr>\n        <tr><td>Idéal quand la connexion elle-même est l'objectif</td><td>Idéal quand vous avez besoin de contrôle sur la structure des outils après la connexion</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Décision rapide : « Je veux juste me connecter et l'utiliser » → Connector. « Je veux contrôler quels outils sont exposés, les formats de réponse et quels projets l'activent » → MCP. Les confondre conduit soit à sur-ingéniérer des connexions simples, soit à sous-ingéniérer des automatisations complexes.\n      </div>"}, "4_5": {"title": "Hooks, sous-agents et surfaces de contrôle", "content": "<p>Les <strong>Hooks</strong> transforment « penser à vérifier » en « toujours vérifier ». Ce sont des règles d'intervention automatique à des moments précis — avant l'utilisation d'un outil, après une modification, avant un push, etc.</p>\n\n      <p>Si les prompts sont des panneaux de signalisation (« conduisez prudemment »), les Hooks sont les alarmes de ceinture de sécurité et le freinage automatique. Les panneaux peuvent être ignorés ; les systèmes de sécurité modifient le comportement réel. C'est pourquoi les Hooks importent davantage à mesure que les équipes s'agrandissent.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Les types de Hook incluent les Hooks de commande (scripts shell), les Hooks basés sur des prompts, les Hooks basés sur des agents et les Hooks HTTP. Pour les équipes, les Hooks managed-only et les listes d'autorisation de Hooks HTTP fournissent un contrôle organisationnel qui va bien au-delà des scripts shell personnels.\n      </div>\n\n      <p>Les <strong>Subagents</strong> isolent le contexte. Lorsque la session principale gère l'exploration, l'implémentation, la revue et la documentation, le contexte devient bruyant. Déléguer la recherche ou la revue à un Subagent permet de garder la session principale focalisée. Pensez-y comme un chef d'équipe qui délègue la vérification des faits à un analyste plutôt que de le faire lui-même.</p>\n\n      <p><strong>Remote Control / Channels / Tâches planifiées</strong> relancent tous le travail, mais le déclencheur diffère :</p>\n      <table>\n        <tr><th>Fonctionnalité</th><th>Qui appuie sur le bouton</th></tr>\n        <tr><td>Remote Control</td><td>Un humain, à distance</td></tr>\n        <tr><td>Channels</td><td>Un système externe (webhook, message)</td></tr>\n        <tr><td>Tâches planifiées</td><td>Le temps lui-même (de type cron)</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Quatre règles pratiques : (1) Si vous répétez sans cesse la même explication, extrayez-la vers un Skill ou un fichier de règles. (2) Si vous connectez sans cesse des outils externes, réduisez la portée des permissions avant d'ajouter d'autres connexions MCP. (3) Si la vérification est constamment oubliée, poussez-la vers les Hooks. (4) Si vous avez besoin de parallélisme, essayez un petit Subagent ou un worktree avant de lancer des équipes d'agents complètes.\n      </div>"}}}, "part5": {"title": "Partie 5 : Playbooks par rôle", "sections": {"5_1": {"title": "PM, Stratégie & Fondateurs", "content": "<p>Les chefs de produit, les stratèges et les fondateurs partagent un point de départ commun : organiser la recherche et prendre des décisions rapidement. Les premières victoires viennent des <strong>briefs de recherche</strong>, de la structuration des notes de réunion et de la documentation des décisions — pas de l'automatisation complète.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Pour les PM, le chemin d'adoption idéal est : (1) Résumés de notes de réunion → (2) Briefs de recherche hebdomadaires → (3) Génération de brouillons de PRD → (4) Analyse concurrentielle avec modèles. Chaque étape s'appuie sur la structure de fichiers précédente.\n      </div>\n\n      <p><strong>Ensemble de fichiers minimum pour un fondateur / opérateur solo :</strong></p>\n      <pre><code>workspace/\n├── about-me.md          # Contexte, secteur, objectifs\n├── working-rules.md     # Ton, sujets interdits, priorités\n├── projects/\n│   └── current/\n│       ├── brief.md     # Focus de la semaine\n│       └── competitors.md\n├── templates/\n│   └── weekly-brief.md\n└── outputs/</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Pour les stratèges, l'humain doit toujours garder la main sur : l'interprétation du marché, les décisions de priorité et l'alignement des parties prenantes. Claude accélère la recherche et la structuration — pas le jugement.\n      </div>\n\n      <p><strong>Ce que les humains doivent conserver :</strong> Interprétation du marché, définition des priorités et négociation avec les parties prenantes. Claude gère la collecte de recherche, la structuration des brouillons et la cohérence des formats.</p>"}, "5_2": {"title": "Marketing & Contenu", "content": "<p>Les équipes marketing obtiennent les retours les plus rapides avec Claude quand elles établissent d'abord des fichiers de voix de marque et des modèles de contenu. Sans <code>brand-voice.md</code> et <code>anti-ai-writing-style.md</code>, chaque contenu nécessite une correction de ton approfondie.</p>\n\n      <p><strong>Chemin d'adoption pour les opérations de contenu :</strong></p>\n      <ol>\n        <li>Recherche thématique et plans de structure de contenu</li>\n        <li>Premiers brouillons avec modèles de voix de marque</li>\n        <li>Adaptation multi-canal (blog → réseaux sociaux → newsletter)</li>\n        <li>Optimisation SEO avec modèles structurés</li>\n        <li>Automatisation régulière du calendrier éditorial</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Dire « écris dans le ton de notre entreprise » sans fournir un fichier <code>brand-voice.md</code>. Claude ne peut pas deviner votre marque. Créez un fichier avec : les formulations préférées, les formulations interdites, les consignes de longueur de phrase, le niveau de formalité, et 2 à 3 paragraphes d'exemple illustrant le ton idéal.\n      </div>\n\n      <p><strong>Ce que les humains doivent conserver :</strong> Les décisions de message final, l'approbation du ton de marque et la validation avant publication externe. Claude gère la synthèse de recherche, la rédaction structurelle et l'adaptation de format.</p>"}, "5_3": {"title": "Ventes, Succès Client & Opérations", "content": "<p>Les équipes commerciales et de succès client bénéficient le plus des <strong>briefs de compte</strong> et des <strong>brouillons d'e-mails de suivi</s
