дкодить значения или добавлять специальные случаи, чтобы тесты стали зелёными. Ваш промпт верификации должен явно запрещать срезание углов и требовать отчёта, когда тесты кажутся неправильными.\n      </div>"}, "3_4": {"title": "Экономика токенов и управление затратами", "content": "<p>Token — это и единица тарификации, и сигнал о том, насколько широко распространилась ваша задача. Даже однострочный промпт отправляет куда больше: вопрос, история диалога, загруженные файлы, CLAUDE.md, правила, вывод инструментов и недавний вывод модели — всё входит в контекстное окно.</p>\n\n      <table>\n        <tr><th>Тип token</th><th>Что включает</th></tr>\n        <tr><td><strong>Input tokens</strong></td><td>Промпты, файлы, история диалога, файлы правил, вывод инструментов</td></tr>\n        <tr><td><strong>Output tokens</strong></td><td>Пояснения, код, резюме, результаты вызовов инструментов</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> «Экономия token» — не скупость, а проектирование системы так, чтобы Claude читал только то, что нужно. <strong>Prompt Cache</strong> даёт выгоду повторного использования при регулярной отправке одинаковых фонов. Структурируйте контекст так, чтобы стабильный префикс (CLAUDE.md, rules) оставался согласованным и кешируемым.\n      </div>\n\n      <p><strong>Стоимостью управляют через структуру, а не подсчётом:</strong></p>\n      <ul>\n        <li>Снижайте многословность вывода инструментов (не сбрасывайте целые логи)</li>\n        <li>Держите сессии сфокусированными — не смешивайте несвязанные задачи</li>\n        <li>Используйте <code>/compact</code> стратегически, а не как последнее средство</li>\n        <li>Разделяйте исследование и реализацию в разные сессии</li>\n        <li>Отслеживайте стоимость через <code>/cost</code>, чтобы выработать интуицию</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Концепция <strong>Tool Result Budget</strong> означает контроль над тем, сколько контекста потребляют выводы инструментов. Набор тестов, выдающий 500 строк вывода, быстро съедает контекст. Настройте инструменты на возврат резюме, а не необработанных логов.\n      </div>"}, "3_5": {"title": "Управление сессиями и гигиена возобновления", "content": "<p><strong>Resume Hygiene</strong> означает сохранение только того, что нужно следующей сессии, и отброс накопленного шума. Длинные сессии не лучше по определению — они накапливают context rot.</p>\n\n      <p><strong>Шаблон Session Memory:</strong></p>\n      <pre><code># Current State\n- What I'm doing right now\n\n# Task Specification\n- What the user actually requested\n\n# Files and Functions\n- Important files and why they matter\n\n# Workflow\n- Frequently used commands and order\n\n# Errors &amp; Corrections\n- Failed attempts — do NOT repeat these\n\n# Key Results\n- Confirmed results and answers\n\n# Worklog\n- Recent steps (keep very short)</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Длинные сессии выживают, когда информация конвергирует к пяти категориям: текущее состояние, файлы, рабочий процесс, ошибки и результаты. Всё остальное — шум. Раздел <code>Errors &amp; Corrections</code> — не журнал стыда, а устройство предотвращения повторных сбоев.\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Используйте строку статуса (<code>/statusline</code>) как панель управления. Она показывает рабочую директорию, ветку Git и использование контекста. Когда использование контекста растёт, сохраняйте состояние в файлы и начинайте свежую сессию — не продавливайте до деградации качества.\n      </div>"}}}, "part4": {"title": "Часть 4: Расширения и автоматизация", "sections": {"4_1": {"title": "Skills: обучение Claude повторяемым процедурам", "content": "<p>Когда вы объясняете одну и ту же процедуру в десятый раз — формат заметок совещания, структуру еженедельного брифа, чек-лист ревью кода — пора создать <strong>Skill</strong>. Skill — это многоразовое рабочее руководство, снижающее стоимость объяснений.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Skills — не фрагменты промптов. Это структуры папок с главным документом (<code>SKILL.md</code>), вспомогательными скриптами, справочными файлами и ресурсами. Официальное руководство рекомендует <em>progressive disclosure</em>: frontmatter и описание загружаются первыми; детали загружаются только при активации Skill.\n      </div>\n\n      <table>\n        <tr><th>Когда продвигать до Skill...</th><th>Оставить как диалог, когда...</th></tr>\n        <tr><td>Формат вывода повторяется, нужно сократить вариативность, зафиксировать место хранения и порядок инструментов</td><td>Тема часто меняется, это разовое мозговое штурмирование</td></tr>\n      </table>\n\n      <p><strong>Projects vs. Skills:</strong> Projects — это фоновые знания, всегда присутствующие. Skills — процедуры, активируемые при поступлении подходящей задачи. Фон без процедуры ведёт к непоследовательному выводу; процедура без контекста — к пустым результатам.</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Поле <code>description</code> Skill — не вводный абзац, а правило маршрутизации. Если описание расплывчато, Skill либо никогда не срабатывает (undertriggering), либо запускается для посторонних задач (overtriggering). Пишите описания как: «Используйте этот Skill, когда пользователь просит еженедельный бриф о конкурентах, обзор рынка или сводку отраслевых тенденций».\n      </div>"}, "4_2": {"title": "Типы Skills и шаблон проектирования", "content": "<p>Skills группируются в несколько распространённых ролей вне зависимости от конкретной области:</p>\n      <ul>\n        <li><strong>Library/SDK reference</strong> — Фиксирует паттерны использования внутренних или сложных внешних библиотек</li>\n        <li><strong>Verification/testing</strong> — Стандартизирует процедуры проверки (Playwright flows, CLI tests)</li>\n        <li><strong>Data pipeline</strong> — Организует источники данных и пути отчётов</li>\n        <li><strong>Recurring operations</strong> — Еженедельные обзоры, стендапы, создание тикетов</li>\n        <li><strong>Scaffolding</strong> — Генерирует начальные структуры сервисов или обработчиков</li>\n        <li><strong>Quality gate</strong> — Стандарты ревью, правила тестирования, чек-листы безопасности</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Skills, пытающиеся делать всё («исследование, код, тесты и развёртывание»), кажутся мощными, но хрупки. Skills, точно решающие одно узкое место, живут дольше всего. Verification Skills часто дают более высокий ROI, чем Skills генерации.\n      </div>\n\n      <p><strong>Шаблон проектирования Skill:</strong></p>\n      <pre><code>---\nname: weekly-brief\ndescription: >\n  Use for weekly competitor briefs, recurring market checks,\n  and industry trend summary requests.\ndisable-model-invocation: false\n---\n# Goal\nCreate a weekly competitor brief using only the last 7 days of evidence.\n\n# Input Sources\n- Competitor list: `references/competitors.md`\n- Template: `assets/weekly-brief-template.md`\n\n# Steps\n1. Read competitor list and template\n2. Search for changes in the last 7 days\n3. Draft brief following template structure\n4. Flag uncertain items separately\n5. Save to `outputs/weekly-brief-YYYY-MM-DD.md`\n\n# Rules\n- Max 3 action items\n- Sources and dates required\n- No speculation — mark unknowns as \"Needs verification\"</code></pre>"}, "4_3": {"title": "Plugins: ролевые пакеты для команд", "content": "<p><strong>Plugin</strong> объединяет несколько Skills, команд, Hook и настроек подключений в единый развёртываемый пакет. Если Skill — это рабочее руководство, то Plugin — это ящик для введения в должность нового члена команды.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Слово «plugin» означает разное в зависимости от поверхности. <strong>Claude Code plugins</strong> объединяют команды, агентов, Hook, Skills, MCP и LSP для рабочих процессов разработки. <strong>Cowork plugins</strong> объединяют Skills, коннекторы, slash-команды и Subagent для ролей работы со знаниями. Одно название — разный опыт установки.\n      </div>\n\n      <p><strong>Прогрессия:</strong> MCP подключается к внешним инструментам → Skills определяют процедуры → Plugins упаковывают всё для развёртывания. Одной фразой: <em>Skills — «как это делать», MCP — «путь к нему», Plugins — «ящик, который это развёртывает».</em></p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Воспринимать внешние Skills и Plugins просто как документы. Они могут содержать вызовы инструментов, доступ к файлам, получение внешних URL и исполняемые скрипты. Перед установкой любого внешнего Skill проверьте: (1) Получает ли он внешние URL? (2) Использует ли Bash, запись файлов или сеть? (3) Соответствуют ли его файлы заявленной цели? (4) Будет ли он работать рядом с конфиденциальными данными? (5) Можно ли быстро его отключить?\n      </div>"}, "4_4": {"title": "MCP: подключение внешних инструментов", "content": "<p><strong>Model Context Protocol (MCP)</strong> — стандартизированный способ подключения Claude к внешним инструментам и сервисам — как USB-C для интеграции ИИ-инструментов.</p>\n\n      <p><strong>MCP vs. Connector:</strong></p>\n      <table>\n        <tr><th>Connector</th><th>MCP</th></tr>\n        <tr><td>Ориентирован на пользователя — поиск и подключение через экран настроек</td><td>Ориентирован на разработчика — проектирование сервера, интерфейса инструментов и формата ответа</td></tr>\n        <tr><td>Как подключение через магазин приложений</td><td>Как проектирование внутренней коммутационной панели</td></tr>\n        <tr><td>Лучше, когда само подключение — цель</td><td>Лучше, когда нужен контроль над структурой инструментов после подключения</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Быстрое решение: «Хочу просто подключить и использовать» → Connector. «Хочу контролировать, какие инструменты доступны, форматы ответов и какие проекты активируют» → MCP. Путаница между ними приводит либо к избыточному усложнению простых подключений, либо к недостаточному проектированию сложной автоматизации.\n      </div>"}, "4_5": {"title": "Hooks, субагенты и управляющие поверхности", "content": "<p><strong>Hooks</strong> превращают «не забудь проверить» в «всегда проверять». Это автоматические правила вмешательства в определённые моменты — pre-tool-use, post-edit, pre-push и т. д.</p>\n\n      <p>Если промпты — дорожные знаки («пожалуйста, езжайте осторожно»), то Hook — это сигналы ремня безопасности и автоматическое торможение. Знаки можно игнорировать; системы безопасности меняют реальное поведение. Именно поэтому Hook важнее по мере роста команды.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Типы Hook включают: command hooks (shell-скрипты), prompt-based hooks, agent-based hooks и HTTP hooks. Для команд managed-only hooks и HTTP hook allowlists обеспечивают организационный контроль, выходящий далеко за рамки личных shell-скриптов.\n      </div>\n\n      <p><strong>Subagent</strong> изолирует контекст. Когда основная сессия занимается исследованием, реализацией, ревью и документированием, контекст засоряется. Делегирование исследования или ревью Subagent сохраняет основную сессию сфокусированной. Представьте: тимлид делегирует проверку фактов аналитику вместо того, чтобы делать это лично.</p>\n\n      <p><strong>Remote Control / Channels / Scheduled Tasks</strong> — все перезапускают работу, но триггер разный:</p>\n      <table>\n        <tr><th>Функция</th><th>Кто нажимает кнопку</th></tr>\n        <tr><td>Remote Control</td><td>Человек, дистанционно</td></tr>\n        <tr><td>Channels</td><td>Внешняя система (webhook, сообщение)</td></tr>\n        <tr><td>Scheduled Tasks</td><td>Само время (по типу cron)</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Четыре практических правила: (1) Если вы постоянно повторяете одно и то же объяснение — вынесите в Skill или файл правил. (2) Если вы постоянно подключаете внешние инструменты — сузьте область разрешений перед добавлением новых MCP-подключений. (3) Если верификацию постоянно забывают — перенесите в Hook. (4) Если нужен параллелизм — попробуйте небольшой Subagent или worktree, прежде чем запускать полные команды агентов.\n      </div>"}}}, "part5": {"title": "Часть 5: Руководства по ролям", "sections": {"5_1": {"title": "PM, стратегия и основатели", "content": "<p>Продакт-менеджеры, стратеги и основатели бизнеса начинают с одного и того же: структурирования исследований и быстрого принятия решений. Первые результаты приносят <strong>исследовательские брифы</strong>, структурирование заметок совещаний и документирование решений — но не полная автоматизация.</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Для PM оптимальный путь внедрения Claude выглядит так: (1) резюме заметок совещаний → (2) еженедельные исследовательские брифы → (3) генерация черновиков PRD → (4) конкурентный анализ с шаблонами. Каждый шаг опирается на файловую структуру предыдущего.\n      </div>\n\n      <p><strong>Минимальный набор файлов для основателя / solo-оператора:</strong></p>\n      <pre><code>workspace/\n├── about-me.md          # Биография, отрасль, цели\n├── working-rules.md     # Тон, запретные темы, приоритеты\n├── projects/\n│   └── current/\n│       ├── brief.md     # Фокус этой недели\n│       └── competitors.md\n├── templates/\n│   └── weekly-brief.md\n└── outputs/</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Для стратегов человек всегда должен контролировать: интерпретацию рынка, приоритизацию и согласование со стейкхолдерами. Claude ускоряет сбор данных и структурирование — но не суждение.\n      </div>\n\n      <p><strong>Что остаётся за человеком:</strong> интерпретация рынка, расстановка приоритетов и переговоры со стейкхолдерами. Claude берёт на себя сбор исследований, структурирование черновиков и единообразие форматов.</p>"}, "5_2": {"title": "Маркетинг и контент", "content": "<p>Маркетинговые команды получают наибыстрейший результат от Claude, когда сначала создают файлы с голосом бренда и шаблоны контента. Без <code>brand-voice.md</code> и <code>anti-ai-writing-style.md</code> каждый материал требует обширной коррекции тона.</p>\n\n      <p><strong>Путь внедрения контент-операций:</strong></p>\n      <ol>\n        <li>Исследование тем и структурирование контента</li>\n        <li>Первые черновики с шаблонами голоса бренда</li>\n        <li>Адаптация под несколько каналов (блог → соцсети → рассылка)</li>\n        <li>SEO-оптимизация с помощью структурированных шаблонов</li>\n        <li>Автоматизация регулярного контент-календаря</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Сказать «пиши в тоне нашей компании», не предоставив <code>brand-voice.md</code>. Claude не может угадать ваш бренд интуитивно. Создайте файл с: предпочтительными фразами, запрещёнными фразами, правилами длины предложений, уровнем формальности и 2–3 образцовыми абзацами, демонстрирующими идеальный тон.\n      </div>\n\n      <p><strong>Что остаётся за человеком:</strong> окончательные решения по сообщениям, утверждение тона бренда и финальная публикация. Claude берёт на себя синтез исследований, структурное черновое написание и адаптацию форматов.</p>"}, "5_3": {"title": "Продажи, работа с клиентами и операции", "content": "<p>Команды продаж и работы с клиентами получают наибольшую пользу от <strong>аккаунт-брифов</strong> и <strong>черновиков follow-up писем</strong>. Главное ограничение: все внешние коммуникации должны проходить через Approval Gate с участием человека.</p>\n\n      <p><strong>Автоматизация операций и бэк-офиса</strong> должна начинаться с задач с наименьшим риском: организация папок, классификация, резюме черновиков и отчёты на основе шаблонов. Высокорисковая автоматизация (реальный ввод данных, обработка платежей, удаление) должна внедряться только после создания структур управления.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Для агентств и операторов команд критический принцип — <em>изоляция контекста клиентов</em>. При одновременном ведении нескольких клиентов главный риск не в медленном выводе — а в загрязнении контекста между клиентами. Отдельные папки для каждого клиента, общие шаблоны и строгие соглашения об именовании предотвращают утечки между клиентами.\n      </div>\n\n      <pre><code>clients/\n├── client-a/\n│   ├── brief.md\n│   ├── glossary.md\n│   └── approval-rules.md\n├── client-b/\n│   ├── brief.md\n│   └── ...\ntemplates/\n├── client-report-template.md\n└── review-checklist.md\nteam/\n├── shared-rules.md\n└── naming-convention.md</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> В агентском контексте одна граница папки предотвращает больше инцидентов, чем один умный промпт. Скорость важна меньше, чем уверенность в том, что данные клиента A никогда не окажутся в выводе для клиента B.\n      </div>"}, "5_4": {"title": "Дизайн, инжиниринг и исследования", "content": "<p><strong>Дизайн/брендинг:</strong> Дизайнеры извлекают наибольшую пользу из исследования на основе референсов и QA реализации. Используйте изображения как входные данные — скриншоты ошибок, референсные макеты, желаемые состояния. Визуальный контекст часто передаёт то, что абзацы описаний CSS не могут.</p>\n\n      <p><strong>Инжиниринг:</strong> Самая сильная первая задача — всегда небольшое исправление бага с тестом, а не большая новая функция. Путь внедрения: (1) исправление бага + тест → (2) рефакторинг с планом → (3) ревью кода с review split → (4) параллельные эксперименты с worktree → (5) CI-интеграция и автоматические Hook'и.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Для исследователей и аналитиков Claude превосходит в: суммаризации, создании глоссариев, таблицах сравнения, генерации вопросов и структурированных обзорах литературы. Человек всегда должен контролировать: интерпретацию утверждений, оценку результатов воспроизведения и оригинальный инсайт.\n      </div>\n\n      <p><strong>Приоритет внедрения для всех ролей следует одному паттерну:</strong></p>\n      <ol>\n        <li>Сбор и организация информации (наименьший риск)</li>\n        <li>Создание первых черновиков с шаблонами</li>\n        <li>Ревью и доработка с циклами верификации</li>\n        <li>Автоматизация повторяющихся процессов с помощью Skill'ов</li>\n        <li>Масштабирование с параллельными агентами и Scheduled Tasks (наибольший риск, последний шаг)</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Начинать с сквозной автоматизации. Команды, достигающие наибольшего прогресса, начинают с верхней части процесса (организация, структурирование, черновое написание) и автоматизируют нижнюю часть (выполнение, развёртывание, доставку) только после выстраивания системы управления.\n      </div>"}, "5_5": {"title": "Сценарный справочник: сопоставление блокеров с рабочими процессами", "content": "<p>Глава 8 — не энциклопедия функций, а <em>таблица сопоставления ситуаций</em>. Подход: определите сегодняшний блокер → классифицируйте форму задачи → выберите набор файлов → выполните → верифицируйте через Approval Gate → оставьте структурированный handoff.</p>\n\n      <p><strong>Рабочий процесс для любого заблокированного сценария:</strong></p>\n      <ol>\n        <li><strong>Сегодняшний блокер</strong> — какая конкретная задача застряла?</li>\n        <li><strong>Форма задачи</strong> — это исследование, черновое написание, реализация или ревью?</li>\n        <li><strong>Выбор набора файлов</strong> — какой минимальный набор файлов нужен этой задаче?</li>\n        <li><strong>Выполнение</strong> — запустите рабочий процесс с output contract</li>\n        <li><strong>Approval Gate</strong> — человек проверяет, прежде чем что-либо уйдёт во внешнюю среду</li>\n        <li><strong>Структурированный handoff</strong> — состояние и следующие шаги для следующей сессии</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Ключевые термины для сопоставления сценариев: <em>output contract</em> (какому формату и местоположению должны соответствовать результаты), <em>token hotspot</em> (где контекст внезапно становится дорогостоящим), <em>approval gate</em> (обязательная проверка человеком перед внешней доставкой) и <em>structured handoff</em> (форматированное сводное сообщение о состоянии для непрерывности сессий).\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Разрыв будет расти не между людьми, знающими больше функций, а между командами, которые быстрее осваивают ролевые стратегии делегирования. Разработка и поддержка клиентов внедряются первыми (широкие, низкорисковые задачи); юридические, финансовые и исследовательские функции — более осторожно (сначала резюме и классификация, суждение — позже).\n      </div>"}}}, "part6": {"title": "Часть 6: Паттерны и инструменты сообщества", "sections": {"6_1": {"title": "Паттерны памяти, воспроизведения и поиска", "content": "<p>Практики сообщества выработали повторяющиеся паттерны управления памятью и контекстом Claude. Это не официальные функции — это операционные привычки, возникшие при интенсивном ежедневном использовании.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> <strong>Session Memory</strong> — это не сохранение всей переписки. Это поддержка структурированных файлов состояния (<code>handoff.md</code>, <code>decision-log.md</code>, <code>worklog.md</code>), которые следующая сессия читает при запуске. Переписка одноразова; файлы — это настоящая память.\n      </div>\n\n      <p><strong>Распространённые паттерны памяти:</strong></p>\n      <ul>\n        <li><strong>Файловая память:</strong> <code>CLAUDE.md</code> + файлы правил + handoff-файлы формируют постоянный слой памяти, переживающий границы сессий</li>\n        <li><strong>Структурированное воспроизведение:</strong> начало каждой сессии с чтения <code>tasks/handoff.md</code> и <code>tasks/plan.md</code> до начала любой новой работы</li>\n        <li><strong>Progressive disclosure:</strong> загрузка фона в начале, задачно-специфичных деталей — только при активации (как frontmatter Skill'а запускает полный контент Skill'а)</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Самая эффективная стратегия памяти — самая простая: в конце каждой сессии обновлять <code>handoff.md</code> с текущим состоянием, следующими шагами и нерешёнными рисками. Эта единственная привычка предотвращает 80% путаницы «где я остановился?».\n      </div>"}, "6_2": {"title": "Plan.md и файловое планирование", "content": "<p>Паттерн <code>plan.md</code> — одна из самых широко применяемых практик сообщества. Вместо того чтобы держать план в переписке, запишите его в файл, на который могут ссылаться и Claude, и люди.</p>\n\n      <p><strong>Почему планы должны быть в файлах, а не в переписке:</strong></p>\n      <ul>\n        <li>Файлы переживают границы сессий; переписка — нет</li>\n        <li>Файлы могут независимо просматриваться людьми</li>\n        <li>Файлы поддерживают версионирование через Git</li>\n        <li>Файлы удерживают переписку в фокусе на выполнении, а не на перепланировании</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Файл плана — не бюрократия, а инструмент предотвращения переделок. Команды, планирующие перед редактированием, стабильно сообщают о меньшем числе откатов, более коротких циклах ревью и меньшем загрязнении контекста в длинных сессиях.\n      </div>\n\n      <p><strong>Эффективная структура plan.md:</strong></p>\n      <pre><code># Plan\n## Goal\nОдно предложение, описывающее желаемое конечное состояние.\n\n## Scope\n- Файлы для изменения: [список]\n- Запрещено трогать: [список]\n\n## Steps\n1. ...\n2. ...\n\n## Verification\n- Тесты для прохождения: [список]\n- Ручные проверки: [список]\n\n## Open Questions\n- [Нерешённые вопросы перед началом]</code></pre>"}, "6_3": {"title": "Параллельные сессии и многоагентные операции", "content": "<p>Продвинутые пользователи запускают несколько сессий Claude параллельно, каждую с разной ролью. Это не про скорость — это про <em>изоляцию контекста</em>.</p>\n\n      <p><strong>Распространённые паттерны параллельности:</strong></p>\n      <ul>\n        <li><strong>Планирование + Реализация:</strong> одна сессия планирует, другая реализует на основе написанного плана</li>\n        <li><strong>Реализация + Ревью:</strong> одна сессия пишет код, другая проверяет в отдельном worktree</li>\n        <li><strong>Основная + исследование Subagent'а:</strong> основная сессия остаётся сфокусированной, пока Subagent изучает документацию или собирает данные</li>\n        <li><strong>Эксперименты с несколькими worktree:</strong> тестирование разных подходов в изолированных рабочих директориях, сравнение результатов</li>\n      </ul>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Параллельность без ясности ролей порождает хаос, а не скорость. Перед запуском параллельных сессий определите: кто что делает, каких файлов касается каждая сессия и как результаты сводятся воедино. Неструктурированная параллельность хуже последовательной работы.\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Операция «в стиле OpenClaw», к которой стремятся многие члены сообщества, означает: всегда активные сессии, многоканальный доступ (терминал, телефон, веб), постоянное состояние между сессиями, Scheduled Tasks и Remote Control. В экосистеме Claude это достигается сочетанием Claude Code + CLAUDE.md + Hook'и + Subagent'ы + MCP + Remote Control + Channels + Scheduled Tasks.\n      </div>"}, "6_4": {"title": "Самосовершенствование и циклы SEO/контента", "content": "<p>Паттерны сообщества включают использование Claude для улучшения собственной среды — создания Skill'ов, доработки правил и оценки прошлых результатов.</p>\n\n      <p><strong>Цикл самосовершенствования:</strong></p>\n      <ol>\n        <li>Запустить задачу с текущими правилами и Skill'ами</li>\n        <li>Оценить результат (вручную или с помощью Subagent'а-ревьюера)</li>\n        <li>Обновить правила, описания Skill'ов или шаблоны на основе ошибок</li>\n        <li>Перезапустить и сравнить</li>\n      </ol>\n\n      <p><strong>Паттерны автоматизации SEO и контента:</strong></p>\n      <ul>\n        <li>Исследование ключевых слов → структура контента → черновик → Skill SEO-ревью → публикация</li>\n        <li>Многоканальная адаптация: одна исследовательская сессия питает шаблоны блога, соцсетей, рассылки и email</li>\n        <li>Автоматизация контент-календаря с помощью Scheduled Tasks</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Мета-Skill <code>skill-creator</code> может генерировать начальные черновики Skill'ов из описаний. Однако он создаёт первые черновики, а не готовые к продакшену Skill'и. Случаи сбоев, граничные условия и циклы верификации по-прежнему требуют проверки и итерации человека.\n      </div>"}, "6_5": {"title": "Критерии выбора инструментов", "content": "<p>С расширением экосистем Skill'ов, Plugin'ов и MCP-серверов выбор правильных инструментов требует дисциплины.</p>\n\n      <p><strong>Чек-лист оценки перед установкой любого внешнего инструмента:</strong></p>\n      <ol>\n        <li>Когда он последний раз поддерживался?</li>\n        <li>Есть ли у него реальный README и примеры?</li>\n        <li>Какие чувствительные к безопасности разрешения ему нужны?</li>\n        <li>Оправдывают ли польза затраты на контекст?</li>\n        <li>Можно ли быстро отключить его, если что-то пойдёт не так?</li>\n      </ol>\n\n      <p><strong>Где найти инструменты:</strong></p>\n      <table>\n        <tr><th>Источник</th><th>Тип</th></tr>\n        <tr><td>Anthropic Skills GitHub</td><td>Официальный / полуофициальный</td></tr>\n        <tr><td>Anthropic Claude Plugins GitHub</td><td>Официальный</td></tr>\n        <tr><td>agentskills.io</td><td>Документация стандартов</td></tr>\n        <tr><td>skillsmp.com, skill hubs</td><td>Рынок сообщества</td></tr>\n        <tr><td>awesome-claude-skills списки на GitHub</td><td>Курируется сообществом</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Собирать инструменты, которые никогда не используются. Инструменты «на потом» накапливаются, не становясь операционными активами. Устанавливайте только те инструменты, которые будете использовать три и более раз на этой неделе. Ежемесячно проверяйте установленные инструменты и удаляйте неиспользуемые.\n      </div>"}}}, "part7": {"title": "Часть 7: Управление и итоговая практика", "sections": {"7_1": {"title": "Почему управление важно", "content": "<p>Управление — не галочка в чек-листе соответствия, а структура, позволяющая командам использовать ИИ уверенно, а не тревожно. Без управления каждая автоматизация остаётся демо, которое не может стать инфраструктурой.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Ключевой вопрос, на который отвечает система управления: «Что Claude может делать без запроса, о чём должен спрашивать и чего никогда не должен делать?» Это фреймворк allow/ask/deny, применяемый в масштабах организации.\n      </div>\n\n      <p><strong>Пример классификации рисков:</strong></p>\n      <table>\n        <tr><th>Уровень риска</th><th>Примеры</th><th>Режим одобрения</th></tr>\n        <tr><td><strong>Низкий</strong></td><td>Резюме совещаний, внутренние черновики, добавление тестов</td><td>Автовыполнение</td></tr>\n        <tr><td><strong>Средний</strong></td><td>Черновики для клиентов, регулярные отчёты, рефакторинг</td><td>Проверка человеком, затем выполнение</td></tr>\n        <tr><td><strong>Высокий</strong></td><td>Развёртывание в продакшн, письма клиентам, бухгалтерские записи, изменения разрешений, запросы к конфиденциальным данным</td><td>Требуется одобрение человека — никакого выполнения без него</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Внедрение системы управления лучше работает поэтапно: Неделя 1 — блокировать доступ к <code>.env</code> и деструктивным командам, требовать одобрения для развёртываний. Неделя 2 — стандартизировать разрешённые Plugin'и и Skill'и, организовать CLAUDE.md и правила для каждого проекта. Неделя 3 — добавить мониторинг затрат и выработать привычки ведения журналов handoff и одобрений.\n      </div>"}, "7_2": {"title": "Модели разрешений и четыре уровня управления", "content": "<p>Модель разрешений использует три режима: <strong>allow</strong> (выполнять автоматически), <strong>ask</strong> (приостановить для решения человека) и <strong>deny</strong> (заблокировать полностью). Правила оцениваются по порядку: deny → ask → allow, применяется первое совпадение.</p>\n\n      <p><strong>Четыре уровня управления:</strong></p>\n      <ol>\n        <li><strong>Документный уровень</strong> — <code>CLAUDE.md</code>, файлы правил, инструкции Skill'ов: что Claude должен знать и соблюдать</li>\n        <li><strong>Уровень настроек</strong> — <code>settings.json</code>, правила разрешений, управляемые настройки: что Claude может и не может делать</li>\n        <li><strong>Уровень времени выполнения</strong> — Hook'и, Approval Gate'ы, план-режим: что происходит во время выполнения</li>\n        <li><strong>Трассировочный уровень</strong> — рабочие журналы, журналы одобрений, журналы решений, handoff-файлы: что произошло и почему</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Частая ошибка:</strong> Использование <code>bypassPermissions</code> как командного умолчания. Публикации в сообществе часто рекомендуют «отключить все разрешения для скорости». Anthropic рассматривает это как режим разрешений, который организации могут полностью отключить через <code>disableBypassPermissionsMode</code>. Индивидуальные эксперименты и командные стандарты никогда не должны иметь одинаковый уровень разрешений.\n      </div>\n\n      <p><strong>Двухуровневая структура разрешений для команд:</strong></p>\n      <ul>\n        <li><strong>Глобальный (уровень пользователя):</strong> блокировать <code>rm -rf</code>, секретные файлы, принудительные пуши</li>\n        <li><strong>Уровень проекта:</strong> блокировать папки миграций, скрипты развёртывания, конфигурации платежей для этого конкретного репозитория</li>\n      </ul>"}, "7_3": {"title": "Участие человека и аудируемость", "content": "<p>Дизайн с <strong>участием человека в процессе</strong> означает создание явных контрольных точек, где люди принимают решения — а не постоянный надзор за каждым действием. Цель — стратегическое вмешательство, а не непрерывный контроль.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> <strong>Аудируемость</strong> означает возможность объяснить впоследствии: что было прочитано, что создано, кто одобрил и что осталось незавершённым. Та же автоматизация с журналами аудита становится инфраструктурой; без них — остаётся демо.\n      </div>\n\n      <p><strong>Минимальный журнал аудита для работы с высокими ставками:</strong></p>\n      <pre><code>1. source/          — Исходные материалы или ссылки\n2. outputs/         — Черновики и правки Claude\n3. work-log.md      — Что было выполнено и когда\n4. approval-log.md  — Кто что одобрил и когда\n5. handoff.md       — Оставшиеся риски и следующие шаги</code></pre>\n\n      <p><strong>Операционные журналы против журналов решений:</strong> операционные журналы фиксируют <em>что произошло</em> (команды, вызовы инструментов, временны́е метки). Журналы решений фиксируют <em>почему</em> (что рассматривалось, какие альтернативы были отклонены, почему выбран этот путь). Агентам, работающим над длительными задачами, нужны оба. Без журналов решений можно видеть, где произошёл сбой, но не почему.</p>\n\n      <p><strong>Шаблон разбора инцидента:</strong></p>\n      <pre><code># Incident Review\n- Когда это было обнаружено?\n- Какая автоматизация / сессия была задействована?\n- Каковы были входные материалы?\n- Какая точка одобрения отсутствовала?\n- Какое правило, Hook или разрешение нужно изменить?</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Переписки Cowork хранятся локально и не отображаются в журналах аудита, Compliance API или экспорте данных. Не используйте Cowork для регулируемых рабочих нагрузок. Для критически важных с точки зрения аудита задач используйте Claude Code с журналированием на основе Git, Hook'ами и внешним отслеживанием одобрений.\n      </div>"}, "7_4": {"title": "Стратегия внедрения в команде", "content": "<p>Командное внедрение отличается от индивидуального использования с момента, когда вы начинаете развёртывать общие правила и активы. Речь не о распространении инструмента — а о развёртывании <em>операционной среды с прикреплёнными политиками</em>.</p>\n\n      <p><strong>Ключевые возможности для команд и предприятий:</strong></p>\n      <ul>\n        <li>Предоставление Skill'ов — развёртывание общих Skill'ов по всей организации</li>\n        <li>Управляемые настройки — конфигурации, устанавливаемые администратором и не переопределяемые сотрудниками</li>\n        <li>Управление маркетплейсом Plugin'ов — контроль доступных Plugin'ов</li>\n        <li>Панель аналитики использования и Analytics API</li>\n        <li>Политики доступа — кто имеет доступ к каким функциям</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Стандартизация не убивает творчество — она убивает повторяющиеся затраты на объяснения. Когда общие Skill'и резюме совещаний, шаблоны ответов клиентам, Skill'и ревью PR и шаблоны еженедельных брифов развёртываются по всей команде, люди тратят меньше времени на форматирование и больше на суждение.\n      </div>\n\n      <p><strong>Процесс внедрения внешних Skill'ов для организаций:</strong></p>\n      <ol>\n        <li>Верифицировать источник</li>\n        <li>Проверить включённые файлы и область инструментов</li>\n        <li>Протестировать в песочнице или изолированном рабочем пространстве</li>\n        <li>Свести разрешения к необходимому минимуму</li>\n        <li>Только затем развернуть в управляемое командой/организацией распространение</li>\n      </ol>\n\n      <p><strong>Стоимость как сигнал управления:</strong> данные об использовании нужны не только финансовому отделу — это цикл обратной связи по дизайну. «Этот агент перечитывает длинный нормативный файл каждую сессию» → исследовать кеширование. «Эта автоматизация создаёт многословный вывод инструментов» → урезать бюджет вывода. Управление стоимостью — это операционный дизайн, а не бюджетный надзор.</p>"}, "7_5": {"title": "Итоговая практика: создание с Claude Code", "content": "<p>Финальная глава объединяет всё вместе в двух практических проектах: создание небольшого сайта и создание рабочего процесса автоматизации. Оба демонстрируют, что тонкие завершённые результаты ценнее сложных незаконченных планов.</p>\n\n      <p><strong>Подход к веб-проекту:</strong></p>\n      <ol>\n        <li>Сначала зафиксировать три строки: <strong>Читатель</strong> (кто это читает?), <strong>Цель</strong> (что они должны понять?), <strong>Действие</strong> (что они должны сделать?)</li>\n        <li>Создать набор файлов: <code>brief.md</code>, <code>tone.md</code>, <code>references/</code>, <code>site/</code></li>\n        <li>Использовать Cowork для черновой структуры и текста, затем Claude Code для реализации</li>\n        <li>Разделить на три промпта: дизайн (структура), реализация (сборка), ревью (верификация)</li>\n      </ol>\n\n      <p><strong>Подход к проекту автоматизации:</strong></p>\n      <ol>\n        <li>Определить границы входных данных и output contract прежде «когда запускать»</li>\n        <li>Успех = тот же формат при повторном запуске, а не только при первом</li>\n        <li>Высокорисковые шаги должны направляться через одобрение человека</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Пять направлений развития экосистемы: (1) Разговорные → асинхронные операции, (2) Всплывающие одобрения → одобрения на основе политик, (3) Длинные транскрипты → структурированное состояние задач, (4) Одна поверхность → многоповерхностная непрерывность, (5) Промпт-трюки → измеримые операции с аналитикой и циклами оценки.\n      </div>\n\n      <p><strong>Чек-лист развёртывания:</strong></p>\n      <ul>\n        <li>Выбрана основная рабочая поверхность (терминал, IDE, десктоп, веб)?</li>\n        <li><code>CLAUDE.md</code> и правила разделены по роли?</li>\n        <li>Разрешения и Hook'и покрывают реальные границы рисков?</li>\n        <li><code>plan.md</code>, <code>verify.md</code>, <code>handoff.md</code> на месте?</li>\n        <li>Ревью разделено между реализацией и проверкой?</li>\n        <li>Налажено измерение стоимости и сбоев?</li>\n        <li>Разделение области (пользователь/проект/локальный/управляемый) для команд?</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Вывод книги прост: люди, хорошо работающие с Claude Code, — это не те, кто пишет длинные промпты, а те, кто стабилизирует контекст, управляет token'ами и кешем, сужает разрешения и превращает review split'ы и handoff'ы в привычки. Один тонкий завершённый результат плюс структура для его воссоздания стоят больше любого количества впечатляющих демо.\n      </div>"}}}, "glossary": {"title": "Глоссарий и краткий справочник", "sections": {"G_1": {"title": "Термины контекста и сборки", "content": "<p>Эти термины описывают, как информация собирается, управляется и деградирует в рабочей памяти Claude.</p>\n\n      <table>\n        <tr><th>Термин</th><th>Определение</th></tr>\n        <tr><td><strong>Context Assembly</strong></td><td>Процесс сбора правил, файлов, заметок и описаний инструментов, необходимых для текущей задачи, в фактический входной контекст. Процесс отбора, а не процесс сваливания.</td></tr>\n        <tr><td><strong>Context Rot</strong></td><td>Явление, при котором ранние сигналы ослабевают по мере роста контекста. Длинные переписки постепенно теряют когерентность, потому что важные ранние инструкции разбавляются последующим контентом.</td></tr>\n        <tr><td><strong>Memoized Context</strong></td><td>Фоновая информация, сохраняемая между ходами, чтобы Claude не нужно было вводить в курс дела заново. «Вычислено однажды, используется многократно».</td></tr>\n        <tr><td><strong>Prompt Cache</strong></td><td>Механизм, обеспечивающий преимущества повторного использования при многократной отправке схожих префиксов контекста. Стабильные префиксы (CLAUDE.md, правила) должны оставаться неизменными для максимизации попаданий в кеш.</td></tr>\n        <tr><td><strong>Token Economy</strong></td><td>Дисциплина определения того, какая информация загружается постоянно, какая — по запросу, а какая — обрезается. Баланс качества и стоимости.</td></tr>\n        <tr><td><strong>Tool Result Budget</strong></td><td>Практика контроля того, сколько пространства контекста занимают выводы инструментов. Длинные журналы и многословные результаты поглощают контекстное окно и снижают качество.</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Context Assembly — это не «чем больше, тем лучше». Это избирательный процесс включения только того, что важно для текущей задачи. Tool Result Budget не опционален — именно он предотвращает поглощение половины контекстного окна единственным многословным тестовым запуском.\n      </div>"}, "G_2": {"title": "Термины сессий и непрерывности", "content": "<table>\n        <tr><th>Термин</th><th>Определение</th></tr>\n        <tr><td><strong>Resumable Session</strong></td><td>Возможность продолжить с места остановки после разрыва соединения или смены сессии, используя сохранённые файлы состояния.</td></tr>\n        <tr><td><strong>Resume Hygiene</strong></td><td>Привычка очищать состояние перед возобновлением — сохранять только то, что нужно следующей сессии, и отбрасывать накопившийся шум.</td></tr>\n        <tr><td><strong>Session Memory</strong></td><td>Структурированное состояние, сохраняемое для продолжения: текущий статус, важные файлы, рабочий процесс, ошибки и результаты. Не сырой транскрипт переписки.</td></tr>\n        <tr><td><strong>Handoff</strong></td><td>Форматированная заметка, оставленная следующей сессии или человеку, содержащая текущее состояние, следующие шаги и нерешённые риски.</td></tr>\n        <tr><td><strong>Slash Command</strong></td><td>Команды управления сессией, такие как <code>/compact</code>, <code>/clear</code>, <code>/context</code>, <code>/memory</code>, <code>/cost</code>, используемые в Claude Code.</td></tr>\n        <tr><td><strong>Fork Session</strong></td><td>Создание новой ветки сессии, когда текущее направление нужно изменить, с сохранением состояния исходной сессии.</td></tr>\n        <tr><td><strong>Background Execution</strong></td><td>Работа, продолжающаяся после выхода из терминала — сессия продолжает работать без активного контроля со стороны человека.</td></tr>\n      </table>"}, "G_3": {"title": "Термины Harness и структуры", "content": "<table>\n        <tr><th>Термин</th><th>Определение</th></tr>\n        <tr><td><strong>Harness</strong></td><td>Внешняя структура, определяющая, что Claude может читать, изменять и верифицировать. Как рабочее место коллеги: справочные материалы, доступные ящики и чек-лист.</td></tr>\n        <tr><td><strong>Harness Engineering</strong></td><td>Проектирование всей рабочей среды — не просто лучших промптов, а правил, разрешений, файлов и структур верификации, в которых работает Claude.</td></tr>\n        <tr><td><strong>CLAUDE.md</strong></td><td>Файл контракта проекта — всегда загружается, содержит команды выполнения, запрещённые границы и структурные описания.</td></tr>\n        <tr><td><strong>Worktree</strong></td><td>Отдельная рабочая директория из одного репозитория, используемая для параллельной работы без конфликтов файлов.</td></tr>\n        <tr><td><strong>Plan Mode</strong></td><td>Паттерн, при котором исследование и выполнение разделены — Claude планирует перед редактированием, сокращая реализации, основанные на неверных предположениях.</td></tr>\n        <tr><td><strong>Review Split</strong></td><td>Разделение реализации и ревью на разные сессии для снижения загрязнения контекста и усталости от одобрений.</td></tr>\n        <tr><td><strong>Agentic Loop</strong></td><td>Повторяющийся цикл: читать → оценивать → использовать инструменты → продолжать. Работа, охватывающая несколько ходов, а не пару вопрос-ответ.</td></tr>\n      </table>"}, "G_4": {"title": "Термины расширений и инструментов", "content": "<table>\n        <tr><th>Термин</th><th>Определение</th></tr>\n        <tr><td><strong>Skill</strong></td><td>Многоразовый файл процедуры (папка), стандартизирующий повторяющиеся задачи. Содержит инструкции, скрипты, референсы и активы.</td></tr>\n        <tr><td><strong>Plugin</strong></td><td>Развёртываемый пакет, объединяющий Skill'и, команды, Hook'и и настройки подключений. «Коробка онбординга» для команд.</td></tr>\n        <tr><td><strong>MCP (Model Context Protocol)</strong></td><td>Стандартизированный протокол подключения для доступа Claude к внешним инструментам и сервисам. Как USB-C для интеграции ИИ-инструментов.</td></tr>\n        <tr><td><strong>Connector</strong></td><td>Пользовательский интерфейс для подключения к внешним сервисам (Notion, Drive, Slack). Проще MCP, меньше контроля.</td></tr>\n        <tr><td><strong>Hook</strong></td><td>Правило автоматического вмешательства в определённые моменты (pre-tool-use, post-edit, pre-push). Превращает «не забудь проверить» в «всегда проверяй».</td></tr>\n        <tr><td><strong>Subagent</strong></td><td>Вспомогательный исполнитель в текущей сессии с изолированным контекстом. Используется для исследований, ревью или проверки рисков без загрязнения основной сессии.</td></tr>\n        <tr><td><strong>Agent Team</strong></td><td>Несколько сессий, работающих параллельно с обменом сообщениями и распределением задач — как настоящая команда с руководителем и участниками.</td></tr>\n        <tr><td><strong>Control Surface</strong></td><td>Место, где пользователи могут регулировать рабочее поведение — не список функций, а точки вмешательства в рабочий процесс.</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Быстрая система принятия решений: «Одинаковый формат каждый раз?» → Skill. «Нужны внешние данные?» → MCP/Connector. «Развернуть на всю команду?» → Plugin. «Должна ли проверка быть автоматической?» → Hook. «Нужен параллельный контекст?» → Subagent/Worktree.\n      </div>"}, "G_5": {"title": "Термины управления и безопасности", "content": "<table>\n        <tr><th>Термин</th><th>Определение</th></tr>\n        <tr><td><strong>Permission Gate</strong></td><td>Граница между allow, ask и deny — оценивается перед выполнением любого действия.</td></tr>\n        <tr><td><strong>Approval Gate</strong></td><td>Контрольная точка, требующая подписи человека перед переходом к следующему шагу. Критична для внешних коммуникаций, развёртываний и изменений данных.</td></tr>\n        <tr><td><strong>Allowlist</strong></td><td>Политика, пропускающая только специально разрешённые элементы (команды, пользователи, домены). Безопаснее, чем блокировка конкретных угроз.</td></tr>\n        <tr><td><strong>Auditability</strong></td><td>Возможность объяснить впоследствии: что было прочитано, что изменено, кто одобрил и что осталось. Основа устойчивой автоматизации.</td></tr>\n        <tr><td><strong>Alignment Faking</strong></td><td>Исследовательская концепция, при которой модель, по видимости, следует инструкциям, внутренне преследуя иные цели. Практический вывод: не доверяйте только соответствию модели — создавайте внешнюю верификацию.</td></tr>\n        <tr><td><strong>Autonomy</strong></td><td>Насколько далеко может продвинуться работа без вмешательства человека. Более высокая автономность требует более строгих границ верификации, одобрения и разрешений.</td></tr>\n        <tr><td><strong>Agency</strong></td><td>Инициатива человека в выборе того, что делегировать, когда и с какими ограничениями. Не о том, чтобы давать больше команд — а о том, чтобы принимать лучшие решения о делегировании.</td></tr>\n        <tr><td><strong>Tool Orchestration</strong></td><td>Слой, решающий, какие инструменты вызывать, в какой последовательности и с какими параметрами.</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Ключевая концепция:</strong> Наблюдаемость (видеть состояние системы через панели и аналитику) и аудируемость (объяснять, что произошло и почему, постфактум) — разные вещи. Нужны обе: наблюдаемость для операционной эффективности, аудируемость для подотчётности и доверия.\n      </div>"}, "G_6": {"title": "Термины экосистемы и инфраструктуры", "content": "<table>\n        <tr><th>Термин</th><th>Определение</th></tr>\n        <tr><td><strong>LLM OS</strong></td><td>Метафора для возникающего рабочего слоя: контекст, инструменты, разрешения и память вокруг модели — по аналогии с тем, как ОС управляет программами, файлами, разрешениями и устройствами.</td></tr>\n        <tr><td><strong>Software 3.0</strong></td><td>Концепция, согласно которой естественный язык сам становится программным интерфейсом — рабочие инструкции являются кодом.</td></tr>\n        <tr><td><strong>Vibe Coding</strong></td><td>Генерация кода через естественный язык, теперь расширенная до тестирования, ревью, рефакторинга, документации и развёртывания.</td></tr>\n        <tr><td><strong>Remote Control</strong></td><td>Возобновление или управление работающей сессией человеком на расстоянии (с другого устройства, из другого места).</td></tr>\n        <tr><td><strong>Channels</strong></td><td>Внешние системы, доставляющие события в Claude (вебхуки, сообщения) — триггер приходит снаружи, а не от человека.</td></tr>\n        <tr><td><strong>Scheduled Tasks</strong></td><td>Автоматизация с запуском по времени — cron-подобное выполнение, где работу запускают часы.</td></tr>\n        <tr><td><strong>Agent SDK</strong></td><td>Инструменты для разработчиков, создающих пользовательские агентные приложения с Claude в качестве исполнительного движка внутри собственного продукта.</td></tr>\n        <tr><td><strong>Adaptive Thinking</strong></td><td>Регулировка Claude глубины рассуждений в зависимости от сложности задачи — дольше думает над сложными, короче — над простыми.</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Совет:</strong> Когда термин вызывает замешательство, спросите: «Это о том, как работа выполняется (механика), как предотвращаются ошибки (безопасность) или как сессии сохраняются (непрерывность)?» Эта трёхбакетная ментальная модель охватывает подавляющее большинство терминов Claude Code.\n      </div>"}}}}, "quizzes": {"part1": [{"question": "Что означает «memoized context» в harness Claude Code?", "options": ["Постоянное хранение всей истории чата в базе данных", "Повторное использование фонового контекста между ходами, чтобы не объяснять всё заново", "Запоминание личных предпочтений пользователя", "Кеширование ответов API для более высокой скорости"], "answer": 1, "explanation": "Memoized context означает сохранение фоновой информации между ходами, чтобы Claude не нужно было каждый раз вводить в курс дела."}, {"question": "Какие четыре ключевых термина введены в главе 1?", "options": ["API, CLI, MCP, VM", "Prompt, Context, Response, Token", "Memoized Context, Tool Orchestration, Permission Gate, Resumable Session", "Skills, Plugins, Hooks, Subagents"], "answer": 2, "explanation": "Глава 1 вводит: Memoized Context (многоразовый фон), Tool Orchestration (координация инструментов), Permission Gate (allow/ask/deny), Resumable Session (продолжение с места остановки)."}, {"question": "Что такое «harness» в контексте Claude Code?", "options": ["Физическое устройство, подключающееся к серверам Claude", "Внешняя структура, определяющая, какие файлы Claude может читать, изменять и верифицировать", "Фреймворк тестирования для запуска юнит-тестов", "Графический интерфейс пользователя Claude Code"], "answer": 1, "explanation": "Harness определяет границы и правила верификации — как организация рабочего места со справочными материалами, доступными ящиками и чек-листом."}, {"question": "Почему книга сосредоточена на Claude Code, а не на других продуктах Claude?", "options": ["Claude Code — самый дешёвый продукт", "У Claude Code больше всего пользователей в мире", "Он объединяет файлы, правила, верификацию, разрешения и подключения к инструментам в одном месте", "Claude Code — единственный доступный продукт в Корее"], "answer": 2, "explanation": "Claude Code сочетает доступ к файлам, правила, верификацию, разрешения, возобновляемые сессии и подключения к внешним инструментам. Cowork, Skills, Plugins — расширения этого ядра."}, {"question": "В чём разница между слабым и сильным harness-запросом?", "options": ["Слабый использует меньше token, сильный — больше", "Слабый: «Исправь баг». Сильный: «Читай только auth/, не трогай .env, пройди тесты входа, оставь заметку об изменениях».", "Слабый означает новичок, сильный — эксперт", "Никакой разницы нет"], "answer": 1, "explanation": "Слабый harness не устанавливает границ. Сильный harness указывает, что читать, что не трогать, какие тесты должны пройти и какую документацию оставить."}], "part2": [{"question": "Какое первое действие рекомендуется при начале сессии Claude Code для большой задачи?", "options": ["Написать максимально длинный промпт со всем контекстом", "Прочитать CLAUDE.md, нужные правила и verify.md — затем резюмировать область до начала реализации", "Немедленно начать писать код, чтобы сэкономить время", "Отключить все разрешения для более быстрого рабочего процесса"], "answer": 1, "explanation": "Стартовая процедура важнее стартового промпта. Чтение контракта проекта, правил и критериев завершения до реализации предотвращает переделки и реализацию в неправильном направлении."}, {"question": "В чём разница между Skill и Plugin?", "options": ["Это одно и то же, только с разными названиями", "Skills — для кода, Plugins — для документов", "Skill — многоразовая процедура; Plugin объединяет Skills, команды, Hook и подключения для развёртывания в команде", "Plugins — бесплатные, Skills — платные"], "answer": 2, "explanation": "Skills определяют «как делать» (процедуры). Plugins упаковывают Skills, инструменты, Hook и подключения в развёртываемый ящик — как набор для введения новых членов команды в должность."}, {"question": "Почему CLAUDE.md следует держать кратким, а не исчерпывающим?", "options": ["Чтобы сэкономить место на диске", "Потому что Claude может читать только короткие файлы", "Это рабочий контракт, а не энциклопедия — длинный постоянный контекст тратит token и разбавляет важные правила", "Краткие файлы быстрее загружаются в браузере"], "answer": 2, "explanation": "CLAUDE.md загружается на каждом ходу. Краткость гарантирует, что важные правила остаются заметными. Долгосрочное состояние принадлежит handoff.md, decision-log.md и другим файлам задач."}, {"question": "Что означает «review split» в операциях Claude Code?", "options": ["Разделение ревью кода на несколько pull request", "Разделение реализации и ревью на разные сессии для снижения загрязнения контекста", "Два человека проверяют один и тот же код", "Разделение бюджета ревью между командами"], "answer": 1, "explanation": "Review split означает не втискивать планирование, реализацию и ревью в одну сессию. Раздельные сессии снижают загрязнение контекста и усталость от согласований."}, {"question": "Что сохраняется после выполнения /compact в Claude Code?", "options": ["Всё — /compact только сокращает отображение", "Только последние 5 сообщений", "То, что указывают Compact Instructions: последние изменённые файлы, результаты тестов, отклонённые альтернативы, следующее действие и точки риска", "Ничего — /compact сбрасывает всю сессию"], "answer": 2, "explanation": "Compact Instructions управляют тем, какая информация выживает при сжатии. Без них важный контекст может быть потерян. Хорошие инструкции сохраняют состояние, необходимое следующему ходу для немедленного продолжения."}], "part3": [{"question": "Что такое «Context Rot» в сессиях Claude Code?", "options": ["Когда истекает срок действия API-ключа Claude", "Когда файлы на диске повреждаются", "Когда ранние инструкции ослабевают по мере роста контекста, разбавленные последующим содержимым", "Когда диалог случайно удаляется"], "answer": 2, "explanation": "Context rot возникает по мере роста диалога — важные ранние сигналы разбавляются накопленным последующим содержимым, что приводит к деградации качества, хотя модель ничего не «забыла»."}, {"question": "Каковы три типа изоляции, которые harness должен проектировать одновременно?", "options": ["Изоляция входа, изоляция выхода, изоляция отображения", "Изоляция контекста, изоляция состояния файлов, изоляция согласований", "Сетевая изоляция, дисковая изоляция, изоляция памяти", "Изоляция пользователя, изоляция модели, изоляция инструментов"], "answer": 1, "explanation": "Изоляция контекста предотвращает раздувание сессии, изоляция состояния файлов предотвращает перезапись и конфликты, изоляция согласований разделяет безопасные действия от опасных. Каждая предотвращает отдельный класс сбоев."}, {"question": "Почему навыки верификации часто дают более высокий ROI, чем навыки генерации?", "options": ["Потому что лицензия на верификацию дороже", "Потому что модели никогда не ошибаются при генерации", "Потому что «хорошо написанный черновик» дёшев, а «верифицированный прошедший результат» действительно ценен и труден в достижении", "Потому что верификация требует меньше вычислений"], "answer": 2, "explanation": "Генерация создаёт черновики; верификация подтверждает их работоспособность. Проверка завершения регистрации end-to-end, корректности состояний оформления заказа или работы CLI в TTY-среде ценнее генерации кода."}, {"question": "Что такое Prompt Cache и как им воспользоваться?", "options": ["Браузерный кеш, хранящий ответы Claude для офлайн-использования", "Скидка для частых пользователей API", "Механизм повторного использования вычислений при регулярной отправке одинаковых префиксов контекста — держите стабильный контент в начале", "Файл памяти, который Claude читает автоматически"], "answer": 2, "explanation": "Преимущества Prompt Cache достигаются за счёт сохранения стабильного префикса (CLAUDE.md, rules) согласованным между ходами. При совпадении префикса вычисления можно повторно использовать, экономя и стоимость, и время."}, {"question": "Когда следует использовать /compact в сессии Claude Code?", "options": ["В самом конце, когда сессия полностью завершена", "После сохранения важного состояния в файлы, до деградации сессии", "Только при появлении сообщения об ошибке", "Никогда — это удаляет важный контекст"], "answer": 1, "explanation": "Сжимайте после сохранения важного состояния в файлы — не как последнее средство, когда сессия уже сломана. Стратегическое сжатие в хороших контрольных точках поддерживает качество на протяжении длинных сессий."}], "part4": [{"question": "Когда следует продвигать повторяющуюся задачу до уровня Skill?", "options": ["Когда задача очень сложная", "Когда формат вывода повторяется, нужно сократить вариативность, а место хранения и порядок инструментов нужно зафиксировать", "Когда хотите впечатлить команду автоматизацией", "Только когда Anthropic предоставит официальный шаблон Skill"], "answer": 1, "explanation": "Сигнал для создания Skill — повторяющийся формат вывода, необходимость консистентности и фиксированные места хранения / последовательности инструментов. Разовые исследования лучше оставить как диалоги."}, {"question": "В чём ключевое различие между MCP и Connector?", "options": ["MCP бесплатный, Connectors платные", "MCP — более старая технология, Connectors — более новая", "Connectors — пользовательские подключения приложений; MCP даёт контроль на уровне разработчика над структурой инструментов, форматом ответа и проектно-специфической активацией", "Никакой разницы — это одна и та же функция"], "answer": 2, "explanation": "Connectors — простые UI-подключения (как магазин приложений). MCP обеспечивает более глубокий контроль: какие серверы, какие инструменты доступны, форматы ответов и проектно-ограниченная активация. Используйте Connectors для быстрых подключений, MCP — для системного проектирования."}, {"question": "Почему поле «description» у Skill так важно?", "options": ["Оно появляется в маркетинговых материалах", "Оно определяет размер файла Skill", "Оно действует как правило маршрутизации — расплывчатые описания вызывают undertriggering или overtriggering", "Используется только в документационных целях"], "answer": 2, "explanation": "Description — это то, что Claude читает при старте сессии для решения, активировать ли Skill. Если оно расплывчато, Skill либо никогда не срабатывает (undertriggering), либо срабатывает для посторонних задач (overtriggering)."}, {"question": "Что следует проверить перед установкой внешнего Skill?", "options": ["Только количество звёзд на GitHub", "Получает ли он внешние URL, использует ли сильные инструменты (Bash/сеть), соответствует ли заявленной цели, работает ли рядом с конфиденциальными данными, можно ли быстро отключить", "Только файл README", "Ничего — все опубликованные Skills безопасны"], "answer": 1, "explanation": "Внешние Skills могут содержать вызовы инструментов, доступ к файлам и получение внешних URL. К ним следует относиться как к небольшим программным установкам, требующим проверки безопасности, а не просто как к импорту документов."}, {"question": "С чем сравниваются Hook в автомобильной аналогии?", "options": ["С рулевым колесом — вы управляете направлением", "С педалью газа — они ускоряют работу", "С сигналами ремня безопасности и автоматическим торможением — они меняют реальное поведение, в отличие от дорожных знаков, которые можно игнорировать", "С зеркалом заднего вида — они помогают видеть, что произошло"], "answer": 2, "explanation": "Промпты — как дорожные знаки (можно игнорировать). Hook — как сигналы ремня безопасности и автоматическое торможение — они принудительно применяют правила на системном уровне, меняя реальное поведение независимо от соответствия модели."}], "part5": [{"question": "Каков рекомендуемый первый шаг внедрения практически для любой роли?", "options": ["Сразу настроить полный конвейер автоматизации", "Установить все доступные Plugin'ы и MCP-подключения", "Начать со сбора и организации информации — исследовательские брифы, заметки совещаний, структурирование документов", "Заменить членов команды ИИ-агентами"], "answer": 2, "explanation": "Для всех ролей (PM, маркетинг, продажи, инжиниринг, исследования) первый шаг — всегда сбор и организация информации: задачи с наименьшим риском и наибольшей частотой, которые формируют доверие к рабочему процессу."}, {"question": "Для операторов агентств/команд, ведущих нескольких клиентов, какой принцип наиболее критичен?", "options": ["Скорость доставки", "Использование самой новой модели", "Изоляция контекста клиентов — предотвращение утечки данных и контекста между клиентами", "Максимизация числа установленных Plugin'ов"], "answer": 2, "explanation": "Изоляция контекста клиентов — главный приоритет. Одна граница папки предотвращает больше инцидентов, чем один умный промпт. Скорость важна меньше, чем уверенность в том, что данные клиента A никогда не появятся в выводе для клиента B."}, {"question": "Что человек всегда должен оставлять под своим контролем, вне зависимости от роли?", "options": ["Каждую правку каждого черновика", "Все решения по именованию файлов", "Конечную ответственность: решения об одобрении, внешние коммуникации и суждения с реальными последствиями", "Подсчёт token'ов и управление стоимостью"], "answer": 2, "explanation": "ИИ ускоряет повторяющееся структурирование и черновое написание. Человек должен сохранять: интерпретацию рынка (PM), утверждение тона бренда (маркетинг), финальную отправку (продажи), решения о развёртывании (инжиниринг) и правовую оценку (комплаенс)."}, {"question": "Что такое «output contract» в сценарном справочнике?", "options": ["Юридическое соглашение между пользователем и Anthropic", "Предварительно согласованное соглашение о том, какому формату и местоположению должен соответствовать результат", "Ограничение числа token'ов, которые Claude может вывести", "Ценообразование на вывод API Claude"], "answer": 1, "explanation": "Output contract определяет, где сохраняются результаты, в каком формате и какой структуре они должны соответствовать. Это предотвращает разрозненность или непоследовательность результатов между запусками."}, {"question": "Какие задачи в настоящее время демонстрируют наиболее сильные сигналы внедрения ИИ?", "options": ["Физический труд и сложные личные переговоры", "Программирование, ввод данных, поддержка клиентов, повторяющееся ревью документов и адаптация контента для разных каналов", "Только разработка программного обеспечения", "Задачи, не требующие надзора человека"], "answer": 1, "explanation": "Высокое внедрение коррелирует с: цифровым текстом, структурированными суждениями, существующими цифровыми данными, воспроизводимыми форматами и чёткими критериями качества. Физический труд и профессиональные суждения с высокими ставками внедряются медленнее."}], "part6": [{"question": "Какова наиболее эффективная стратегия памяти для сессий Claude Code?", "options": ["Сохранять весь транскрипт переписки после каждой сессии", "Полагаться на встроенную память Claude, чтобы он всё помнил", "Обновлять handoff.md в конце каждой сессии с текущим состоянием, следующими шагами и нерешёнными рисками", "Использовать /memory для постоянного хранения всей информации"], "answer": 2, "explanation": "Самая простая и эффективная стратегия памяти: обновлять handoff.md в конце сессии. Эта единственная привычка предотвращает 80% путаницы «где я остановился?». Переписка одноразова; файлы — настоящая память."}, {"question": "Почему планы должны записываться в файлы, а не храниться в переписке?", "options": ["Файлы дешевле по token'ам переписки", "Файлы переживают границы сессий, могут независимо просматриваться, поддерживают версионирование и удерживают переписку в фокусе на выполнении", "Claude не может понимать планы в формате переписки", "Нет разницы между планами в файлах и планами в переписке"], "answer": 1, "explanation": "Планы на основе файлов сохраняются между сессиями, допускают независимую проверку человеком, поддерживают версионирование Git и удерживают переписку в фокусе на выполнении, а не на перепланировании."}, {"question": "Каков ключевой принцип запуска параллельных сессий Claude?", "options": ["Запускать как можно больше сессий для максимальной скорости", "Использовать одни и те же файлы и директории для всех сессий", "Сначала определить роли: кто что делает, каких файлов касается каждая сессия и как результаты сводятся воедино", "Параллельные сессии не рекомендуются"], "answer": 2, "explanation": "Параллельность без ясности ролей порождает хаос. Перед запуском параллельных сессий определите обязанности, границы файлов и стратегии слияния. Неструктурированная параллельность хуже последовательной работы."}, {"question": "Что нужно проверить перед установкой любого внешнего инструмента (Skill, Plugin, MCP-сервер)?", "options": ["Только количество скачиваний", "Дату последнего обслуживания, качество README, необходимые разрешения безопасности, соотношение затрат и пользы и лёгкость отключения", "Наличие красивого логотипа", "Ничего — маркетплейс сам контролирует качество"], "answer": 1, "explanation": "Пять критериев: актуальность поддержки, качество документации, чувствительные к безопасности разрешения, соотношение затрат и пользы и обратимость. Инструменты «на потом» накапливаются, не становясь операционными активами."}, {"question": "Что означает операция «в стиле OpenClaw» в сообществе?", "options": ["Использование продукта конкретного конкурента", "Всегда активная, многоканальная рабочая система с постоянным состоянием, Scheduled Tasks и возможностями Remote Control", "Бесплатный уровень использования Claude", "Конкретный фреймворк для разработки"], "answer": 1, "explanation": "«В стиле OpenClaw» описывает операционную цель: всегда доступен, сессии не прерываются, работа запускается по времени/событию, встроенные Skill'и и Remote Control с границами безопасности. В экосистеме Claude это достигается сочетанием Claude Code + Hook'и + MCP + Remote Control + Scheduled Tasks."}], "part7": [{"question": "Каковы три режима разрешений в модели управления Claude Code?", "options": ["Read, Write, Execute", "Admin, User, Guest", "Allow (выполнять автоматически), Ask (приостановить для человека), Deny (заблокировать полностью)", "Public, Private, Protected"], "answer": 2, "explanation": "Модель разрешений использует allow/ask/deny, оцениваемые по порядку: deny → ask → allow, применяется первое совпадающее правило. Это даёт детальный контроль над тем, что Claude может делать автономно."}, {"question": "Каковы четыре уровня управления?", "options": ["Frontend, Backend, Database, Network", "Документный уровень (CLAUDE.md/правила), Уровень настроек (разрешения), Уровень выполнения (Hook'и/одобрения), Трассировочный уровень (журналы/решения)", "User, Team, Organization, Enterprise", "Input, Processing, Output, Storage"], "answer": 1, "explanation": "Документный уровень определяет знания, уровень настроек — границы, уровень выполнения — средства контроля во время исполнения, а трассировочный уровень фиксирует, что произошло и почему. Все четыре вместе образуют полную систему управления."}, {"question": "Почему аудируемость важна для автоматизации с ИИ?", "options": ["Это требуется только по закону", "Это делает демо более профессиональными", "Та же автоматизация с журналами аудита становится инфраструктурой; без них — остаётся демо, которое не масштабируется", "Аудируемость не важна для большинства команд"], "answer": 2, "explanation": "Аудируемость означает возможность объяснить: что было прочитано, что создано, кто одобрил и что осталось. Без неё автоматизация не может перейти от индивидуальных демо к надёжной командной инфраструктуре."}, {"question": "В чём разница между наблюдаемостью и аудируемостью?", "options": ["Это одно и то же", "Наблюдаемость для разработчиков, аудируемость для менеджеров", "Наблюдаемость показывает текущее состояние системы (панели); аудируемость объясняет, что произошло и почему (записи событий для подотчётности)", "Наблюдаемость дороже аудируемости"], "answer": 2, "explanation": "Наблюдаемость — панель для операционной эффективности (использование, затраты, паттерны). Аудируемость — запись событий для подотчётности (кто что сделал, почему, с каким одобрением). Организациям нужны обе."}, {"question": "Каков ключевой принцип финальной главы книги о работе с Claude Code?", "options": ["Всегда использовать самые продвинутые функции", "Один тонкий завершённый результат плюс структура для его воссоздания превосходит любое количество впечатляющих демо", "Скорость важнее качества", "Только разработчики должны использовать Claude Code"], "answer": 1, "explanation": "Вывод: завершённый тонкий сайт или рабочий процесс автоматизации — с брифом, шаблоном, review split и handoff — который можно воссоздать на следующей неделе, ценнее любого сложного незаконченного плана."}], "glossary": [{"question": "Что такое «Context Assembly»?", "options": ["Установка всех доступных Plugin'ов сразу", "Процесс отбора и сбора только релевантных правил, файлов и описаний инструментов для текущей задачи в входной контекст", "Написание самого длинного возможного промпта", "Копирование всей кодовой базы в переписку"], "answer": 1, "explanation": "Context Assembly — это процесс отбора, а не сваливания. Он означает сбор только того, что нужно текущей задаче — больше контекста не значит лучше контекст."}, {"question": "Что означает «Resume Hygiene»?", "options": ["Чистка резюме/CV перед собеседованием", "Перезагрузка компьютера перед использованием Claude", "Сохранение только того, что нужно следующей сессии, и отбрасывание накопившегося шума перед возобновлением работы", "Использование антисептика во время набора текста"], "answer": 2, "explanation": "Resume Hygiene означает очистку состояния перед возобновлением — сохранение существенного контекста при отбрасывании шума из предыдущей сессии. Длинные сессии не лучше по определению; чистые handoff'ы — лучше."}, {"question": "Чем Hook отличается от инструкции в промпте?", "options": ["Hook'и дороже в запуске", "Hook'и применяют правила на системном уровне (автоматическое торможение), тогда как инструкции промпта — это предложения, которые можно игнорировать (дорожные знаки)", "Hook'и работают только в Cowork, но не в Claude Code", "Нет практической разницы"], "answer": 1, "explanation": "Промпты запрашивают поведение; Hook'и применяют его. Промпт «запускай lint после редактирования» можно пропустить. Hook, настроенный на запуск lint после каждого редактирования файла, всегда выполняется."}, {"question": "Каково соотношение между Skill, Plugin и MCP?", "options": ["Это три названия одной функции", "Skill определяет процедуры, MCP подключается к внешним инструментам, Plugin упаковывает всё для развёртывания в команде", "Plugin — самый дешёвый, MCP — средний, Skill — премиум", "Их всегда нужно использовать вместе"], "answer": 1, "explanation": "Skill'ы — «как это делать» (процедуры), MCP — «путь к внешним инструментам» (подключения), Plugin'ы — «коробка, которая всё развёртывает» (пакеты для команд). Они дополняют друг друга."}, {"question": "Когда термин Claude Code вызывает замешательство, какая трёхбакетная ментальная модель помогает?", "options": ["Стоимость, Скорость, Качество", "Ввод, Обработка, Вывод", "Механика (как работа выполняется), Безопасность (как предотвращаются ошибки), Непрерывность (как сессии сохраняются)", "Frontend, Backend, Database"], "answer": 2, "explanation": "Почти все термины Claude Code попадают в три категории: механика (agentic loop, context assembly, tool orchestration), безопасность (разрешения, Hook'и, approval gate'ы) или непрерывность (session memory, handoff, resume hygiene)."}]}}, "zh": {"ui": {"title": "Claude Code 学习指南", "search_placeholder": "搜索...", "next": "下一页 →", "prev": "← 上一页", "quiz_title": "自我检测", "progress": "进度", "expand_all": "全部展开", "collapse_all": "全部收起", "retry": "重试", "score": "{correct}/{total} 题正确", "mark_complete": "标记为已读", "completed": "已完成"}, "parts": {"part1": {"title": "第一部分：基础构建", "sections": {"1_1": {"title": "为何生态系统备受关注", "content": "<p>AI 领域的竞争已从“哪个模型更聪明”转向“哪款工具能以最低摩擦连接文件、测试、Git、浏览器和外部服务”。这正是 Claude Code、Codex 与 Gemini CLI 被放在一起讨论的原因——竞争焦点已是<strong>工作路径</strong>，而非基准分数。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>Claude Code 不只是一款编码应用，它是一个融合了记忆化上下文、工具编排、权限门控与可恢复会话的<em>工作 harness</em>。Cowork、Skills、Plugins 与定时任务，都是这一核心 harness 向非编码工作的延伸。\n      </div>\n\n      <p>研究证实了这一方向。METR 报告指出，智能体任务的时间跨度正在快速增长；Anthropic 也指出，真正的性能差距来自任务结构与验证习惯，而非模型名称。问题已不再是“模型有多聪明？”，而是“谁能更快掌握委派规则与验证 harness？”</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>从这个问题开始：“我的任务是问答型、文档型还是实现型？”这一个问题决定了你应该使用 Chat、Projects、Cowork 还是 Claude Code。\n      </div>\n\n      <table>\n        <tr><th>快速变化的内容</th><th>持续稳定的内容</th></tr>\n        <tr><td>菜单位置、套餐层级、预览状态、功能名称</td><td>使用哪条工作路径、如何分离文件与验证、在哪里设置人工检查点</td></tr>\n      </table>"}, "1_2": {"title": "四个核心术语", "content": "<p>在深入探讨之前，先熟记这四个术语。每一章都以它们为基础。</p>\n\n      <table>\n        <tr><th>术语</th><th>含义</th></tr>\n        <tr><td><strong>Memoized Context（记忆化上下文）</strong></td><td>跨轮次保存的背景信息，让你无需每次重新说明</td></tr>\n        <tr><td><strong>Tool Orchestration（工具编排）</strong></td><td>决定使用哪些工具、按什么顺序使用的层级</td></tr>\n        <tr><td><strong>Permission Gate（权限门控）</strong></td><td>在执行前区分允许、询问和拒绝的边界</td></tr>\n        <tr><td><strong>Resumable Session（可恢复会话）</strong></td><td>即使断线也能从上次中断处继续的能力</td></tr>\n      </table>\n\n      <p>这四个概念构成一条流水线：<strong>用户请求 → Memoized Context → Tool Orchestration → Permission Gate → 执行与验证 → Resumable Session → 下一个任务</strong>。无论工作流多复杂，本质上都是这五个阶段的变体。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>“Memoized”并不等于“memorized（背诵）”，它的意思是“计算一次，多次复用”——就像设置了背景规则，每轮对话都能持续生效，无需重复发送。\n      </div>"}, "1_3": {"title": "Harness 概念", "content": "<p><strong>Harness</strong> 是定义 Claude 可以读取、修改和验证什么内容的外层结构。可以把它想象成为同事布置工作空间：把参考资料放在桌上，决定哪些抽屉可以打开，并附上一张完成前必须核对的清单。</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>发出“修复登录 bug”而不设定任何边界。一个强健的 harness 请求应该是：“只读取 <code>auth/</code>，不要碰 <code>.env</code>，通过登录测试，留下一段 3 行的修改说明。”\n      </div>\n\n      <p><strong>Harness 工程</strong>并不是关于编写更聪明的提示词——它是关于设计 Claude 运行的工作空间。包括：哪些文件始终加载、设置了什么权限、必须通过哪些测试、以及结果保存在哪里。</p>\n\n      <p>《2026 年国际 AI 安全报告》证实：随着模型能力的提升，harness 和验证结构会变得<em>更加</em>重要，而非减少。现实世界的任务涉及资源约束、信息不完整、异常情况和审批流程，单靠模型的原始智能无法独立处理。</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>即使是初学者也可以开始构建 harness：在 <code>CLAUDE.md</code> 中写入基本规则，在 <code>settings.json</code> 中设置允许/拒绝范围，用 <code>plan.md</code> 拆解大型任务，并在 <code>handoff.md</code> 中保存会话状态。\n      </div>"}, "1_4": {"title": "工作界面：Chat、Projects、Cowork、Claude Code", "content": "<p>同一个 Claude 模型在不同界面下的表现截然不同。选错界面不是技能问题——是路由问题。</p>\n\n      <table>\n        <tr><th>界面</th><th>最适合</th><th>受影响因素</th></tr>\n        <tr><td><strong>Chat</strong></td><td>快速问答、整理思路</td><td>问题质量</td></tr>\n        <tr><td><strong>Projects</strong></td><td>持久化背景知识</td><td>文件夹结构、模板</td></tr>\n        <tr><td><strong>Cowork</strong></td><td>文档委派——研究、简报、文件整理</td><td>文件夹结构、模板</td></tr>\n        <tr><td><strong>Claude Code</strong></td><td>实现与验证——代码、测试、代码审查</td><td>规则文件、验证循环</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>三个常见误区：(1)“同一个模型在哪里用都一样”——错，界面至关重要。(2)“Cowork 是简单模式，Claude Code 是困难模式”——错，两者的区别在于委派方式，而非难度。(3)“同时尝试所有界面”——错，先精通一个再扩展。\n      </div>\n\n      <p><strong>各界面适合的初始任务：</strong></p>\n      <ul>\n        <li><strong>Chat：</strong>“用 5 句话总结这份报告，并提出 3 个问题。”</li>\n        <li><strong>Projects：</strong>“读取这个文件夹，创建一份单页背景知识摘要。”</li>\n        <li><strong>Cowork：</strong>“读取会议记录，将每周简报草稿保存到 <code>outputs/</code>。”</li>\n        <li><strong
