trong>. La contrainte essentielle : toutes les communications externes doivent passer par des portes d'approbation humaines.</p>\n\n      <p><strong>L'automatisation des opérations et du back-office</strong> doit commencer par les tâches les moins risquées : organisation de dossiers, classification, résumés de brouillons et rapports basés sur des modèles. L'automatisation à haut risque (saisie de données réelle, traitement des paiements, suppression) ne doit intervenir qu'une fois les structures de gouvernance en place.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Pour les opérateurs d'agence et d'équipe, le principe critique est l'<em>isolation du contexte client</em>. Lorsqu'on gère plusieurs clients simultanément, le plus grand risque n'est pas une sortie lente — c'est la contamination du contexte entre clients. Des dossiers séparés par client, des modèles partagés et des conventions de nommage strictes préviennent les fuites inter-clients.\n      </div>\n\n      <pre><code>clients/\n├── client-a/\n│   ├── brief.md\n│   ├── glossary.md\n│   └── approval-rules.md\n├── client-b/\n│   ├── brief.md\n│   └── ...\ntemplates/\n├── client-report-template.md\n└── review-checklist.md\nteam/\n├── shared-rules.md\n└── naming-convention.md</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Dans un contexte d'agence, une frontière de dossier évite plus d'accidents qu'un prompt ingénieux. La rapidité importe moins que de s'assurer que les données du Client A ne se retrouvent jamais dans la sortie du Client B.\n      </div>"}, "5_4": {"title": "Design, Ingénierie & Recherche", "content": "<p><strong>Design / Branding :</strong> Les designers tirent le plus de valeur de l'exploration basée sur des références et du QA d'implémentation. Utilisez des images en entrée — captures d'écran de bugs, mises en page de référence, états souhaités. Le contexte visuel communique souvent ce que des paragraphes de descriptions CSS ne peuvent pas.</p>\n\n      <p><strong>Ingénierie :</strong> La première tâche la plus efficace est toujours une petite correction de bug avec un test, pas une grande nouvelle fonctionnalité. Le chemin d'adoption : (1) correction de bug + test → (2) refactoring avec plan → (3) revue de code avec séparation de revue → (4) expériences en worktree parallèle → (5) intégration CI et hooks automatisés.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Pour les chercheurs et les analystes, Claude excelle dans : la synthèse, la création de glossaires, les tableaux comparatifs, la génération de questions et les revues de littérature structurées. L'humain doit toujours garder la main sur : l'interprétation des affirmations, le jugement des résultats de reproduction et les insights originaux.\n      </div>\n\n      <p><strong>La priorité d'adoption pour tous les rôles suit le même schéma :</strong></p>\n      <ol>\n        <li>Collecter et organiser les informations (risque le plus faible)</li>\n        <li>Créer des premiers brouillons avec des modèles</li>\n        <li>Réviser et affiner avec des boucles de vérification</li>\n        <li>Automatiser les flux récurrents avec des Skills</li>\n        <li>Mettre à l'échelle avec des agents parallèles et des tâches planifiées (risque le plus élevé, dernière étape)</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Commencer par l'automatisation de bout en bout. Les équipes qui vont le plus loin commencent par le début du processus (organisation, structuration, rédaction) et n'automatisent la fin (exécution, déploiement, livraison) qu'une fois la gouvernance établie.\n      </div>"}, "5_5": {"title": "Guide de scénarios : associer blocages et flux de travail", "content": "<p>Ce chapitre n'est pas une encyclopédie de fonctionnalités — c'est une <em>table d'association de situations</em>. L'approche : identifier le blocage du jour → classifier la forme de la tâche → sélectionner le jeu de fichiers → exécuter → vérifier via une porte d'approbation → laisser un transfert structuré.</p>\n\n      <p><strong>Le flux de travail pour tout scénario bloqué :</strong></p>\n      <ol>\n        <li><strong>Blocage du jour</strong> — Quelle tâche spécifique est bloquée ?</li>\n        <li><strong>Forme de la tâche</strong> — S'agit-il de recherche, de rédaction, d'implémentation ou de revue ?</li>\n        <li><strong>Sélection du jeu de fichiers</strong> — Quels fichiers minimum cette tâche nécessite-t-elle ?</li>\n        <li><strong>Exécution</strong> — Lancer le flux avec le contrat de sortie</li>\n        <li><strong>Porte d'approbation</strong> — Vérification humaine avant tout envoi externe</li>\n        <li><strong>Transfert structuré</strong> — Mémo d'état et prochaines étapes pour la session suivante</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Termes clés pour l'association de scénarios : <em>contrat de sortie</em> (format et emplacement que les résultats doivent respecter), <em>point chaud de tokens</em> (là où le contexte devient soudainement coûteux), <em>porte d'approbation</em> (vérification humaine obligatoire avant livraison externe), et <em>transfert structuré</em> (mémo d'état formaté pour la continuité de session).\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> L'écart qui va se creuser ne sera pas entre ceux qui connaissent le plus de fonctionnalités, mais entre les équipes qui apprennent plus vite les stratégies de délégation spécifiques à leur rôle. Le développement et le support client adoptent en premier (tâches larges, faible risque) ; le juridique, la finance et la recherche adoptent plus prudemment (synthèse et classification d'abord, jugement ensuite).\n      </div>"}}}, "part6": {"title": "Partie 6 : Patterns communautaires & Outils", "sections": {"6_1": {"title": "Patterns de mémoire, de rappel et de recherche", "content": "<p>Les praticiens de la communauté ont développé des patterns récurrents pour gérer la mémoire et le contexte de Claude dans le temps. Ce ne sont pas des fonctionnalités officielles — ce sont des habitudes opérationnelles qui émergent d'une utilisation quotidienne intensive.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> La <strong>mémoire de session</strong> ne consiste pas à sauvegarder des conversations entières. Il s'agit de maintenir des fichiers d'état structurés (<code>handoff.md</code>, <code>decision-log.md</code>, <code>worklog.md</code>) que la session suivante lit au démarrage. La conversation est jetable ; les fichiers sont la vraie mémoire.\n      </div>\n\n      <p><strong>Patterns de mémoire courants :</strong></p>\n      <ul>\n        <li><strong>Mémoire basée sur les fichiers :</strong> <code>CLAUDE.md</code> + fichiers de règles + fichiers de transfert forment une couche de mémoire persistante qui survit aux limites de session</li>\n        <li><strong>Rappel structuré :</strong> Commencer chaque session en lisant <code>tasks/handoff.md</code> et <code>tasks/plan.md</code> avant tout nouveau travail</li>\n        <li><strong>Divulgation progressive :</strong> Charger le contexte de fond en haut, les détails spécifiques à la tâche uniquement quand ils sont activés (comme le frontmatter d'un Skill déclenchant son contenu complet)</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> La stratégie de mémoire la plus efficace est la plus simple : à la fin de chaque session, mettre à jour <code>handoff.md</code> avec l'état actuel, les prochaines étapes et les risques non résolus. Cette seule habitude prévient 80 % de la confusion « où en étais-je ? ».\n      </div>"}, "6_2": {"title": "Plan.md & Planification basée sur les fichiers", "content": "<p>Le pattern <code>plan.md</code> est l'une des pratiques communautaires les plus répandues. Au lieu de garder le plan dans la conversation, écrivez-le dans un fichier que Claude et les humains peuvent consulter.</p>\n\n      <p><strong>Pourquoi les plans appartiennent aux fichiers, pas aux conversations :</strong></p>\n      <ul>\n        <li>Les fichiers survivent aux limites de session ; les conversations non</li>\n        <li>Les fichiers peuvent être examinés indépendamment par les humains</li>\n        <li>Les fichiers peuvent être versionnés avec Git</li>\n        <li>Les fichiers gardent la conversation concentrée sur l'exécution, pas sur la re-planification</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Le fichier de plan n'est pas de la bureaucratie — c'est un dispositif de prévention des reprises. Les équipes qui planifient avant d'éditer rapportent systématiquement moins de rollbacks, des cycles de revue plus courts et moins de pollution de contexte dans les longues sessions.\n      </div>\n\n      <p><strong>Structure efficace de plan.md :</strong></p>\n      <pre><code># Plan\n## Objectif\nUne phrase décrivant l'état final souhaité.\n\n## Périmètre\n- Fichiers à modifier : [liste]\n- Hors limites : [liste]\n\n## Étapes\n1. ...\n2. ...\n\n## Vérification\n- Tests à passer : [liste]\n- Vérifications manuelles : [liste]\n\n## Questions ouvertes\n- [Éléments non résolus avant de commencer]</code></pre>"}, "6_3": {"title": "Sessions parallèles & Opérations multi-agents", "content": "<p>Les utilisateurs avancés font tourner plusieurs sessions Claude en parallèle, chacune avec un rôle différent. Ce n'est pas une question de vitesse — c'est une question d'<em>isolation du contexte</em>.</p>\n\n      <p><strong>Patterns parallèles courants :</strong></p>\n      <ul>\n        <li><strong>Plan + Implémentation :</strong> Une session planifie, une autre implémente à partir du plan écrit</li>\n        <li><strong>Implémentation + Revue :</strong> Une session écrit le code, une autre le révise dans un worktree séparé</li>\n        <li><strong>Principal + recherche Subagent :</strong> La session principale reste concentrée tandis qu'un Subagent explore la documentation ou collecte des données</li>\n        <li><strong>Expériences multi-worktree :</strong> Tester différentes approches dans des répertoires de travail isolés, comparer les résultats</li>\n      </ul>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Le parallélisme sans clarté des rôles crée le chaos, pas la vitesse. Avant de lancer des sessions parallèles, définissez : qui fait quoi, quels fichiers chaque session peut toucher, et comment les résultats sont fusionnés. Le parallélisme non structuré est pire que le travail séquentiel.\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> L'opération « style OpenClaw » à laquelle aspire beaucoup de membres de la communauté signifie : sessions toujours actives, accès multi-canal (terminal, téléphone, web), état persistant entre sessions, tâches planifiées et contrôle à distance. Dans l'écosystème Claude, vous y parvenez en combinant Claude Code + CLAUDE.md + hooks + Subagents + MCP + Remote Control + Channels + Scheduled Tasks.\n      </div>"}, "6_4": {"title": "Boucles d'auto-amélioration & SEO/Contenu", "content": "<p>Les patterns communautaires comprennent l'utilisation de Claude pour améliorer son propre environnement — créer des Skills, affiner des règles et évaluer les sorties passées.</p>\n\n      <p><strong>Boucle d'auto-amélioration :</strong></p>\n      <ol>\n        <li>Exécuter une tâche avec les règles et Skills actuels</li>\n        <li>Évaluer la sortie (manuellement ou avec un Subagent de revue)</li>\n        <li>Mettre à jour les règles, descriptions de Skills ou modèles en fonction des échecs</li>\n        <li>Relancer et comparer</li>\n      </ol>\n\n      <p><strong>Patterns d'automatisation SEO et contenu :</strong></p>\n      <ul>\n        <li>Recherche de mots-clés → structure de contenu → brouillon → Skill de revue SEO → publication</li>\n        <li>Adaptation multi-canal : une session de recherche alimente les modèles de blog, réseaux sociaux, newsletter et e-mail</li>\n        <li>Automatisation du calendrier éditorial avec des tâches planifiées</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Le méta-Skill <code>skill-creator</code> peut générer des ébauches initiales de Skills à partir de descriptions. Cependant, il produit des premiers brouillons, pas des Skills prêts pour la production. Les cas d'échec, les cas limites et les boucles de vérification nécessitent toujours une revue et une itération humaines.\n      </div>"}, "6_5": {"title": "Critères de sélection des outils", "content": "<p>Avec des écosystèmes croissants de Skills, Plugins et serveurs MCP, sélectionner les bons outils exige de la rigueur.</p>\n\n      <p><strong>Liste de vérification avant d'installer un outil externe :</strong></p>\n      <ol>\n        <li>Quand a-t-il été maintenu pour la dernière fois ?</li>\n        <li>Dispose-t-il d'un vrai README et d'exemples ?</li>\n        <li>Quelles permissions sensibles à la sécurité nécessite-t-il ?</li>\n        <li>Le coût en contexte est-il justifié par l'utilité ?</li>\n        <li>Peut-on le désactiver rapidement en cas de problème ?</li>\n      </ol>\n\n      <p><strong>Où trouver des outils :</strong></p>\n      <table>\n        <tr><th>Source</th><th>Type</th></tr>\n        <tr><td>Anthropic Skills GitHub</td><td>Officiel / semi-officiel</td></tr>\n        <tr><td>Anthropic Claude Plugins GitHub</td><td>Officiel</td></tr>\n        <tr><td>agentskills.io</td><td>Documentation des standards</td></tr>\n        <tr><td>skillsmp.com, hubs de Skills</td><td>Marketplace communautaire</td></tr>\n        <tr><td>Listes awesome-claude-skills sur GitHub</td><td>Sélection communautaire</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Accumuler des outils qu'on n'utilise jamais. Les outils « mis de côté pour plus tard » s'accumulent sans devenir des actifs opérationnels. N'installez que les outils que vous utiliserez trois fois ou plus cette semaine. Révisez vos outils installés chaque mois et supprimez ceux qui ne sont pas utilisés.\n      </div>"}}}, "part7": {"title": "Partie 7 : Gouvernance & Pratique finale", "sections": {"7_1": {"title": "Pourquoi la gouvernance est importante", "content": "<p>La gouvernance n'est pas une case à cocher en matière de conformité — c'est la structure qui permet aux équipes d'utiliser l'IA avec confiance plutôt qu'avec anxiété. Sans gouvernance, chaque automatisation reste une démo qui ne peut pas devenir une infrastructure.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> La question fondamentale à laquelle répond la gouvernance : « Que peut faire Claude sans demander, sur quoi doit-il demander, et que ne doit-il jamais faire ? » C'est le cadre allow/ask/deny appliqué à l'échelle organisationnelle.\n      </div>\n\n      <p><strong>Exemple de classification des risques :</strong></p>\n      <table>\n        <tr><th>Niveau de risque</th><th>Exemples</th><th>Mode d'approbation</th></tr>\n        <tr><td><strong>Faible</strong></td><td>Résumés de réunion, brouillons internes, ajouts de tests</td><td>Exécution automatique</td></tr>\n        <tr><td><strong>Moyen</strong></td><td>Brouillons orientés client, rapports réguliers, refactoring</td><td>Revue humaine puis exécution</td></tr>\n        <tr><td><strong>Élevé</strong></td><td>Déploiement en production, e-mails clients, saisies comptables, changements de permissions, requêtes sur données sensibles</td><td>Approbation humaine requise — aucune exécution sans elle</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Le déploiement de la gouvernance fonctionne mieux par phases : Semaine 1 — bloquer l'accès à <code>.env</code> et les commandes destructrices, exiger une approbation pour les déploiements. Semaine 2 — standardiser les Plugins/Skills autorisés, organiser CLAUDE.md et les règles par projet. Semaine 3 — ajouter la surveillance des coûts et établir des habitudes de journalisation des transferts et des approbations.\n      </div>"}, "7_2": {"title": "Modèles de permission & Quatre couches de gouvernance", "content": "<p>Le modèle de permission utilise trois modes : <strong>allow</strong> (procéder automatiquement), <strong>ask</strong> (pause pour décision humaine) et <strong>deny</strong> (blocage complet). Les règles sont évaluées dans l'ordre : deny → ask → allow, la première correspondance s'appliquant.</p>\n\n      <p><strong>Les quatre couches de gouvernance :</strong></p>\n      <ol>\n        <li><strong>Couche documentaire</strong> — <code>CLAUDE.md</code>, fichiers de règles, instructions de Skills : ce que Claude doit savoir et respecter</li>\n        <li><strong>Couche de paramètres</strong> — <code>settings.json</code>, règles de permission, paramètres gérés : ce que Claude peut et ne peut pas faire</li>\n        <li><strong>Couche d'exécution</strong> — Hooks, portes d'approbation, mode plan : ce qui se passe pendant l'exécution</li>\n        <li><strong>Couche de traçabilité</strong> — Journaux de travail, journaux d'approbation, journaux de décision, fichiers de transfert : ce qui s'est passé et pourquoi</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; Erreur courante :</strong> Utiliser <code>bypassPermissions</code> comme valeur par défaut d'équipe. Les publications communautaires recommandent souvent « désactiver toutes les permissions pour la rapidité ». Anthropic traite cela comme un mode de permission que les organisations peuvent désactiver entièrement via <code>disableBypassPermissionsMode</code>. Les expériences individuelles et les standards d'équipe ne doivent jamais partager le même niveau de permission.\n      </div>\n\n      <p><strong>Structure de permission à deux niveaux pour les équipes :</strong></p>\n      <ul>\n        <li><strong>Global (niveau utilisateur) :</strong> Bloquer <code>rm -rf</code>, les fichiers secrets, les push forcés</li>\n        <li><strong>Niveau projet :</strong> Bloquer les dossiers de migration, les scripts de déploiement, les configurations de paiement spécifiques à ce dépôt</li>\n      </ul>"}, "7_3": {"title": "Humain dans la boucle & Auditabilité", "content": "<p>La conception <strong>human-in-the-loop</strong> consiste à créer des points de contrôle explicites où les humains prennent des décisions — pas à surveiller chaque action. L'objectif est une intervention stratégique, pas une supervision constante.</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> L'<strong>auditabilité</strong> signifie pouvoir expliquer après coup : ce qui a été lu, ce qui a été créé, qui l'a approuvé et ce qui reste inachevé. La même automatisation avec des pistes d'audit devient une infrastructure ; sans elles, elle reste une démo.\n      </div>\n\n      <p><strong>Piste d'audit minimale pour les travaux à enjeux élevés :</strong></p>\n      <pre><code>1. source/          — Matériaux originaux ou liens\n2. outputs/         — Brouillons et révisions de Claude\n3. work-log.md      — Ce qui a été exécuté et quand\n4. approval-log.md  — Qui a approuvé quoi et quand\n5. handoff.md       — Risques restants et prochaines étapes</code></pre>\n\n      <p><strong>Journaux d'opérations vs. traces de décision :</strong> Les journaux d'opérations enregistrent <em>ce qui s'est passé</em> (commandes, appels d'outils, horodatages). Les traces de décision enregistrent <em>pourquoi</em> (ce qui a été considéré, quelles alternatives ont été rejetées, pourquoi ce chemin a été choisi). Les agents travaillant sur de longues tâches ont besoin des deux. Sans traces de décision, on peut voir où l'échec s'est produit mais pas pourquoi.</p>\n\n      <p><strong>Modèle de revue d'incident :</strong></p>\n      <pre><code># Revue d'incident\n- Quand a-t-il été découvert ?\n- Quelle automatisation / session était impliquée ?\n- Quels étaient les matériaux d'entrée ?\n- Quel point d'approbation manquait ?\n- Quelle règle, Hook ou permission doit changer ?</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Les conversations Cowork sont stockées localement et n'apparaissent pas dans les journaux d'audit, l'API de conformité ou les exports de données. N'utilisez pas Cowork pour les charges de travail réglementées. Pour les travaux critiques en matière d'audit, utilisez Claude Code avec journalisation basée sur Git, Hooks et suivi d'approbation externe.\n      </div>"}, "7_4": {"title": "Stratégie d'adoption par les équipes", "content": "<p>L'adoption en équipe diverge de l'utilisation individuelle dès que vous commencez à déployer des règles et des actifs partagés. Il ne s'agit pas de distribuer un outil — il s'agit de déployer un <em>environnement d'exploitation avec des politiques attachées</em>.</p>\n\n      <p><strong>Capacités clés pour les équipes et les entreprises :</strong></p>\n      <ul>\n        <li>Provisionnement de Skills — déployer des Skills partagés à l'échelle de l'organisation</li>\n        <li>Paramètres gérés — configurations imposées par l'administrateur que les individus ne peuvent pas remplacer</li>\n        <li>Gestion de la marketplace de Plugins — contrôler quels Plugins sont disponibles</li>\n        <li>Tableau de bord d'analyse d'utilisation et API Analytics</li>\n        <li>Politiques de sièges — qui a accès à quelles fonctionnalités</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> La standardisation ne tue pas la créativité — elle supprime le coût des explications répétitives. Quand des Skills de résumé de réunion partagés, des modèles de réponse client, des Skills de revue de PR et des modèles de brief hebdomadaire sont déployés à l'échelle de l'équipe, les gens passent moins de temps sur le format et plus de temps sur le jugement.\n      </div>\n\n      <p><strong>Flux d'adoption de Skills externes pour les organisations :</strong></p>\n      <ol>\n        <li>Vérifier la source</li>\n        <li>Examiner les fichiers inclus et la portée des outils</li>\n        <li>Tester dans un bac à sable ou un espace de travail isolé</li>\n        <li>Réduire les permissions au minimum nécessaire</li>\n        <li>Déployer ensuite seulement vers la distribution gérée par l'équipe/organisation</li>\n      </ol>\n\n      <p><strong>Le coût comme signal de gouvernance :</strong> Les données d'utilisation ne servent pas qu'aux finances — elles constituent une boucle de rétroaction de conception. « Cet agent relit un long fichier de règlementation à chaque session » → investiguer la mise en cache. « Cette automatisation produit des sorties d'outils verbeuses » → réduire le budget de sortie. La gestion des coûts est une conception opérationnelle, pas de la surveillance budgétaire.</p>"}, "7_5": {"title": "Pratique finale : Construire avec Claude Code", "content": "<p>Le chapitre final rassemble tout avec deux projets pratiques : construire un petit site web et construire un flux d'automatisation. Les deux démontrent que des résultats minces et achevés ont plus de valeur que des plans élaborés inachevés.</p>\n\n      <p><strong>Approche du projet site web :</strong></p>\n      <ol>\n        <li>Fixer trois lignes d'abord : <strong>Lecteur</strong> (qui lit ceci ?), <strong>Objectif</strong> (que doit-il comprendre ?), <strong>Action</strong> (que doit-il faire ?)</li>\n        <li>Créer le jeu de fichiers : <code>brief.md</code>, <code>tone.md</code>, <code>references/</code>, <code>site/</code></li>\n        <li>Utiliser Cowork pour rédiger la structure et le texte, puis Claude Code pour implémenter</li>\n        <li>Diviser en trois prompts : design (structure), implémenter (construire), revoir (vérifier)</li>\n      </ol>\n\n      <p><strong>Approche du projet d'automatisation :</strong></p>\n      <ol>\n        <li>Définir les limites d'entrée et le contrat de sortie avant « quand le lancer »</li>\n        <li>Succès = même format à chaque relance, pas seulement à la première exécution</li>\n        <li>Les étapes à haut risque doivent passer par l'approbation humaine</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Cinq directions vers lesquelles l'écosystème se dirige : (1) Opérations conversationnelles → asynchrones, (2) Approbation ponctuelle → approbation basée sur des politiques, (3) Longs transcripts → état de tâche structuré, (4) Surface unique → continuité multi-surface, (5) Astuces de prompt → opérations mesurables avec analytics et boucles d'évaluation.\n      </div>\n\n      <p><strong>Liste de contrôle de déploiement :</strong></p>\n      <ul>\n        <li>Surface de travail principale choisie (terminal, IDE, bureau, web) ?</li>\n        <li><code>CLAUDE.md</code> et règles séparés par rôle ?</li>\n        <li>Permissions et Hooks couvrant les vraies limites de risque ?</li>\n        <li><code>plan.md</code>, <code>verify.md</code>, <code>handoff.md</code> en place ?</li>\n        <li>Séparation de revue entre implémentation et revue ?</li>\n        <li>Mesure des coûts et des échecs établie ?</li>\n        <li>Séparation de portée (utilisateur/projet/local/géré) pour les équipes ?</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> La conclusion du livre est simple : ceux qui utilisent bien Claude Code ne sont pas ceux qui rédigent de longs prompts — ce sont ceux qui stabilisent le contexte, gèrent les tokens et le cache, réduisent les permissions et font des séparations de revue et des transferts une habitude. Un résultat mince achevé plus la structure pour le recréer vaut plus que n'importe quel nombre de démos impressionnantes.\n      </div>"}}}, "glossary": {"title": "Glossaire & Référence rapide", "sections": {"G_1": {"title": "Termes de contexte & d'assemblage", "content": "<p>Ces termes décrivent comment l'information est rassemblée, gérée et dégradée dans la mémoire de travail de Claude.</p>\n\n      <table>\n        <tr><th>Terme</th><th>Définition</th></tr>\n        <tr><td><strong>Context Assembly</strong></td><td>Le processus de rassemblement des règles, fichiers, mémos et descriptions d'outils nécessaires pour la tâche actuelle dans le contexte d'entrée réel. Un processus de sélection, pas de déversement.</td></tr>\n        <tr><td><strong>Context Rot</strong></td><td>Le phénomène par lequel les signaux précoces s'affaiblissent à mesure que le contexte s'allonge. Les longues conversations perdent progressivement en cohérence car les instructions initiales importantes sont diluées par le contenu ultérieur.</td></tr>\n        <tr><td><strong>Memoized Context</strong></td><td>Informations de fond conservées d'un tour à l'autre pour que Claude n'ait pas besoin d'être rebriefé à chaque fois. « Calculé une fois, réutilisé de nombreuses fois. »</td></tr>\n        <tr><td><strong>Prompt Cache</strong></td><td>Un mécanisme qui offre des avantages de réutilisation lorsque des préfixes de contexte similaires sont envoyés à répétition. Les préfixes stables (CLAUDE.md, règles) doivent rester cohérents pour maximiser les hits de cache.</td></tr>\n        <tr><td><strong>Token Economy</strong></td><td>La discipline de décider quelles informations restent chargées en permanence, lesquelles se chargent à la demande et lesquelles sont écrêtées — en équilibrant qualité et coût.</td></tr>\n        <tr><td><strong>Tool Result Budget</strong></td><td>La pratique de contrôler l'espace de contexte consommé par les sorties d'outils. Les logs longs et les résultats verbeux consomment la fenêtre de contexte et dégradent la qualité.</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> Context Assembly ne signifie pas « plus c'est mieux ». C'est le processus sélectif d'inclusion uniquement de ce qui compte pour la tâche actuelle. Tool Result Budget n'est pas optionnel — c'est ce qui empêche une seule exécution de tests verbeuse de consommer la moitié de votre fenêtre de contexte.\n      </div>"}, "G_2": {"title": "Termes de session & de continuité", "content": "<table>\n        <tr><th>Terme</th><th>Définition</th></tr>\n        <tr><td><strong>Resumable Session</strong></td><td>La capacité de reprendre là où vous vous étiez arrêté après une déconnexion ou un changement de session, en utilisant des fichiers d'état sauvegardés.</td></tr>\n        <tr><td><strong>Resume Hygiene</strong></td><td>L'habitude de nettoyer l'état avant de reprendre — ne conserver que ce dont la session suivante a besoin et éliminer le bruit accumulé.</td></tr>\n        <tr><td><strong>Session Memory</strong></td><td>État structuré préservé pour la continuation : statut actuel, fichiers importants, flux de travail, erreurs et résultats. Pas le transcript brut de la conversation.</td></tr>\n        <tr><td><strong>Handoff</strong></td><td>Un mémo formaté laissé pour la prochaine session ou personne, contenant l'état actuel, les prochaines étapes et les risques non résolus.</td></tr>\n        <tr><td><strong>Slash Command</strong></td><td>Commandes de gestion de session comme <code>/compact</code>, <code>/clear</code>, <code>/context</code>, <code>/memory</code>, <code>/cost</code> utilisées dans Claude Code.</td></tr>\n        <tr><td><strong>Fork Session</strong></td><td>Créer une nouvelle branche de session quand la direction actuelle doit diverger, en préservant l'état de la session d'origine.</td></tr>\n        <tr><td><strong>Background Execution</strong></td><td>Travail qui continue après que vous avez quitté le terminal — la session continue à tourner sans surveillance humaine active.</td></tr>\n      </table>"}, "G_3": {"title": "Termes de harness & de structure", "content": "<table>\n        <tr><th>Terme</th><th>Définition</th></tr>\n        <tr><td><strong>Harness</strong></td><td>La structure externe définissant ce que Claude peut lire, modifier et vérifier. Comme l'espace de travail d'un collègue : documents de référence, tiroirs accessibles et liste de contrôle.</td></tr>\n        <tr><td><strong>Harness Engineering</strong></td><td>Concevoir l'intégralité de l'environnement de travail — pas seulement de meilleurs prompts, mais les règles, permissions, fichiers et structures de vérification dans lesquels Claude opère.</td></tr>\n        <tr><td><strong>CLAUDE.md</strong></td><td>Le fichier de contrat de projet — toujours chargé, contient les commandes d'exécution, les frontières interdites et les descriptions structurelles.</td></tr>\n        <tr><td><strong>Worktree</strong></td><td>Un répertoire de travail séparé du même dépôt, utilisé pour le travail parallèle sans conflits de fichiers.</td></tr>\n        <tr><td><strong>Plan Mode</strong></td><td>Un pattern où exploration et exécution sont séparées — Claude planifie avant d'éditer, réduisant les implémentations basées sur de mauvaises hypothèses.</td></tr>\n        <tr><td><strong>Review Split</strong></td><td>Séparer l'implémentation et la revue dans des sessions différentes pour réduire la pollution du contexte et la fatigue d'approbation.</td></tr>\n        <tr><td><strong>Agentic Loop</strong></td><td>Le cycle récurrent : lire → juger → utiliser des outils → continuer. Travail qui s'étend sur plusieurs tours, pas une simple paire question-réponse.</td></tr>\n      </table>"}, "G_4": {"title": "Termes d'extension & d'outils", "content": "<table>\n        <tr><th>Terme</th><th>Définition</th></tr>\n        <tr><td><strong>Skill</strong></td><td>Un fichier de procédure réutilisable (dossier) qui standardise les tâches répétées. Contient des instructions, scripts, références et actifs.</td></tr>\n        <tr><td><strong>Plugin</strong></td><td>Un package déployable regroupant Skills, commandes, Hooks et paramètres de connexion. La « boîte d'onboarding » pour les équipes.</td></tr>\n        <tr><td><strong>MCP (Model Context Protocol)</strong></td><td>Le protocole de connexion standardisé pour que Claude accède aux outils et services externes. Comme l'USB-C pour l'intégration d'outils IA.</td></tr>\n        <tr><td><strong>Connector</strong></td><td>Une interface orientée utilisateur pour se connecter à des services externes (Notion, Drive, Slack). Plus simple que MCP, moins de contrôle.</td></tr>\n        <tr><td><strong>Hook</strong></td><td>Une règle d'intervention automatique à des moments spécifiques (pré-utilisation d'outil, post-édition, pré-push). Transforme « penser à vérifier » en « toujours vérifier ».</td></tr>\n        <tr><td><strong>Subagent</strong></td><td>Un travailleur secondaire dans la session actuelle avec un contexte isolé. Utilisé pour la recherche, la revue ou la vérification des risques sans polluer la session principale.</td></tr>\n        <tr><td><strong>Agent Team</strong></td><td>Plusieurs sessions opérant en parallèle avec échange de messages et allocation de tâches — comme une vraie équipe avec un responsable et des membres.</td></tr>\n        <tr><td><strong>Control Surface</strong></td><td>L'endroit où les utilisateurs peuvent ajuster le comportement du travail — pas une liste de fonctionnalités, mais les points où vous pouvez intervenir dans le flux de travail.</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Cadre de décision rapide : « Même format à chaque fois ? » → Skill. « Besoin de données externes ? » → MCP/Connector. « Déployer à toute l'équipe ? » → Plugin. « Doit vérifier automatiquement ? » → Hook. « Besoin d'un contexte parallèle ? » → Subagent/Worktree.\n      </div>"}, "G_5": {"title": "Termes de gouvernance & de sécurité", "content": "<table>\n        <tr><th>Terme</th><th>Définition</th></tr>\n        <tr><td><strong>Permission Gate</strong></td><td>La frontière entre allow, ask et deny — évaluée avant toute exécution d'action.</td></tr>\n        <tr><td><strong>Approval Gate</strong></td><td>Un point de contrôle nécessitant la validation humaine avant que l'étape suivante se déroule. Critique pour les communications externes, les déploiements et les modifications de données.</td></tr>\n        <tr><td><strong>Allowlist</strong></td><td>Une politique qui ne laisse passer que les éléments spécifiquement autorisés (commandes, utilisateurs, domaines). Plus sûr que le blocage de menaces spécifiques.</td></tr>\n        <tr><td><strong>Auditabilité</strong></td><td>La capacité d'expliquer après coup : ce qui a été lu, ce qui a changé, qui a approuvé et ce qui reste. Le fondement d'une automatisation durable.</td></tr>\n        <tr><td><strong>Alignment Faking</strong></td><td>Un concept de recherche où un modèle semble suivre les instructions tout en maintenant intérieurement des objectifs différents. Conclusion pratique : ne pas faire confiance uniquement à la conformité du modèle — construire une vérification externe.</td></tr>\n        <tr><td><strong>Autonomie</strong></td><td>Jusqu'où le travail peut progresser sans intervention humaine. Une autonomie plus élevée exige des limites de vérification, d'approbation et de permission plus solides.</td></tr>\n        <tr><td><strong>Agentivité</strong></td><td>L'initiative humaine dans le choix de ce qui est délégué, quand et avec quelles contraintes. Il ne s'agit pas de donner plus d'ordres — mais de prendre de meilleures décisions de délégation.</td></tr>\n        <tr><td><strong>Tool Orchestration</strong></td><td>La couche qui décide quels outils invoquer, dans quelle séquence et avec quels paramètres.</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; Concept clé :</strong> L'observabilité (voir l'état du système via des tableaux de bord et des analyses) et l'auditabilité (expliquer ce qui s'est passé et pourquoi après coup) sont différentes. Vous avez besoin des deux : l'observabilité pour l'efficacité opérationnelle, l'auditabilité pour la responsabilité et la confiance.\n      </div>"}, "G_6": {"title": "Termes d'écosystème & d'infrastructure", "content": "<table>\n        <tr><th>Terme</th><th>Définition</th></tr>\n        <tr><td><strong>LLM OS</strong></td><td>Une métaphore pour la couche de travail émergente : contexte, outils, permissions et mémoire entourant un modèle, analogue à la façon dont un OS gère programmes, fichiers, permissions et périphériques.</td></tr>\n        <tr><td><strong>Software 3.0</strong></td><td>Le concept selon lequel le langage naturel lui-même devient une interface de programmation — les instructions de travail sont du code.</td></tr>\n        <tr><td><strong>Vibe Coding</strong></td><td>Générer du code via le langage naturel, étendu maintenant aux tests, revues, refactoring, documentation et déploiement.</td></tr>\n        <tr><td><strong>Remote Control</strong></td><td>Un humain reprenant ou pilotant une session en cours à distance (autre appareil, autre emplacement).</td></tr>\n        <tr><td><strong>Channels</strong></td><td>Systèmes externes poussant des événements vers Claude (webhooks, messages) — le déclencheur vient de l'extérieur, pas d'un humain.</td></tr>\n        <tr><td><strong>Scheduled Tasks</strong></td><td>Automatisation déclenchée par le temps — exécution de type cron où l'horloge lance le travail.</td></tr>\n        <tr><td><strong>Agent SDK</strong></td><td>Outils de développement pour construire des applications d'agents personnalisées avec Claude comme moteur d'exécution dans votre propre produit.</td></tr>\n        <tr><td><strong>Adaptive Thinking</strong></td><td>Claude ajustant la profondeur de son raisonnement en fonction de la complexité de la tâche — réfléchissant plus longtemps pour les tâches difficiles, plus brièvement pour les simples.</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; Conseil pro :</strong> Quand un terme vous déroute, demandez-vous : « Est-ce lié à la façon dont le travail s'écoule (mécanique), à la façon dont les erreurs sont évitées (sécurité) ou à la façon dont les sessions persistent (continuité) ? » Ce modèle mental à trois catégories couvre la grande majorité de la terminologie Claude Code.\n      </div>"}}}}, "quizzes": {"part1": [{"question": "Que signifie « memoized context » dans le harness de Claude Code ?", "options": ["Stocker tout l'historique de conversation de façon permanente dans une base de données", "Réutiliser le contexte de fond d'un tour à l'autre pour éviter de tout ré-expliquer", "Mémoriser les préférences personnelles de l'utilisateur", "Mettre en cache les réponses API pour de meilleures performances"], "answer": 1, "explanation": "Le memoized context consiste à conserver les informations de fond d'un tour à l'autre afin que Claude n'ait pas besoin d'être ré-briefé à chaque fois."}, {"question": "Quels sont les quatre termes clés introduits dans le chapitre 1 ?", "options": ["API, CLI, MCP, VM", "Prompt, Context, Response, Token", "Memoized Context, Tool Orchestration, Permission Gate, Resumable Session", "Skills, Plugins, Hooks, Subagents"], "answer": 2, "explanation": "Le chapitre 1 introduit : Memoized Context (fond réutilisable), Tool Orchestration (coordination des outils), Permission Gate (allow/ask/deny) et Resumable Session (reprendre là où on s'était arrêté)."}, {"question": "Qu'est-ce qu'un « harness » dans le contexte de Claude Code ?", "options": ["Un dispositif physique qui se connecte aux serveurs de Claude", "La structure externe définissant quels fichiers Claude peut lire, modifier et vérifier", "Un framework de test pour exécuter des tests unitaires", "L'interface graphique de Claude Code"], "answer": 1, "explanation": "Un harness définit les limites et les règles de vérification — comme configurer un espace de travail avec des documents de référence, des tiroirs accessibles et une liste de contrôle."}, {"question": "Pourquoi le livre se concentre-t-il sur Claude Code plutôt que sur d'autres produits Claude ?", "options": ["Claude Code est le produit le moins cher", "Claude Code a le plus d'utilisateurs dans le monde", "Il réunit fichiers, règles, vérification, permissions et connexions d'outils en un seul endroit", "Claude Code est le seul produit disponible en Corée"], "answer": 2, "explanation": "Claude Code combine accès aux fichiers, règles, vérification, permissions, sessions reprises et connexions aux outils externes. Cowork, Skills et Plugins sont des extensions de ce noyau."}, {"question": "Quelle est la différence entre une demande avec harness faible et une demande avec harness fort ?", "options": ["La faible utilise moins de tokens, la forte en utilise plus", "Faible : « Corrige le bug. » Fort : « Lis uniquement auth/, ne touche pas .env, passe les tests de connexion, laisse une note de modification. »", "Faible signifie débutant, fort signifie expert", "Il n'y a pas de différence"], "answer": 1, "explanation": "Un harness faible ne donne aucune contrainte. Un harness fort précise ce qu'il faut lire, ce qu'il ne faut pas toucher, quels tests doivent passer et quelle documentation laisser."}], "part2": [{"question": "Quelle est la première action recommandée au démarrage d'une session Claude Code pour une grande tâche ?", "options": ["Rédiger le prompt le plus long possible avec tout le contexte", "Lire CLAUDE.md, les règles pertinentes et verify.md — puis résumer le périmètre avant d'implémenter", "Commencer immédiatement à coder pour gagner du temps", "Désactiver toutes les permissions pour un flux de travail plus rapide"], "answer": 1, "explanation": "La routine de démarrage importe plus que le prompt de démarrage. Lire le contrat de projet, les règles et les critères de sortie avant l'implémentation évite les reprises et les implémentations dans la mauvaise direction."}, {"question": "Quelle est la différence entre un Skill et un Plugin ?", "options": ["Ce sont la même chose avec des noms différents", "Les Skills sont pour le codage, les Plugins pour les documents", "Un Skill est une procédure réutilisable ; un Plugin regroupe Skills, commandes, Hooks et connexions pour le déploiement en équipe", "Les Plugins sont gratuits, les Skills sont payants"], "answer": 2, "explanation": "Les Skills définissent « comment le faire » (procédures). Les Plugins packagisent Skills, outils, Hooks et connexions dans une boîte déployable — comme un kit d'intégration pour les membres de l'équipe."}, {"question": "Pourquoi CLAUDE.md doit-il rester léger plutôt qu'exhaustif ?", "options": ["Pour économiser de l'espace disque", "Parce que Claude ne peut lire que des fichiers courts", "C'est un contrat de travail, pas une encyclopédie — un contexte résidant long gaspille des tokens et dilue les règles importantes", "Les fichiers légers se chargent plus vite dans le navigateur"], "answer": 2, "explanation": "CLAUDE.md est chargé à chaque tour. Le garder léger garantit que les règles importantes restent en évidence. L'état à long terme appartient à handoff.md, decision-log.md et autres fichiers de tâches."}, {"question": "Que signifie « review split » dans les opérations Claude Code ?", "options": ["Diviser une revue de code en plusieurs pull requests", "Séparer l'implémentation et la revue dans des sessions différentes pour réduire la pollution du contexte", "Faire réviser le même code par deux personnes", "Diviser le budget de revue entre les équipes"], "answer": 1, "explanation": "Le review split signifie ne pas entasser planification, implémentation et revue dans une seule session. Des sessions séparées réduisent la pollution du contexte et la fatigue d'approbation."}, {"question": "Qu'est-ce qui survit après l'exécution de /compact dans Claude Code ?", "options": ["Tout — /compact rend juste l'affichage plus court", "Seulement les 5 derniers messages", "Ce que les Compact Instructions spécifient : derniers fichiers modifiés, résultats de tests, alternatives rejetées, prochaine action et points de risque", "Rien — /compact réinitialise toute la session"], "answer": 2, "explanation": "Les Compact Instructions contrôlent quelles informations survivent à la compression. Sans elles, un contexte important peut être perdu. De bonnes instructions préservent l'état dont le prochain tour a besoin pour continuer immédiatement."}], "part3": [{"question": "Qu'est-ce que le « Context Rot » dans les sessions Claude Code ?", "options": ["Quand la clé API de Claude expire", "Quand les fichiers sur disque sont corrompus", "Quand les instructions précoces s'affaiblissent à mesure que le contexte s'allonge, diluées par le contenu ultérieur", "Quand la conversation est accidentellement supprimée"], "answer": 2, "explanation": "Le Context Rot survient à mesure que les conversations s'allongent — les signaux précoces importants sont dilués par le contenu accumulé ultérieurement, entraînant une dégradation de la qualité même si le modèle n'a rien « oublié »."}, {"question": "Quels sont les trois types d'isolation qu'un harness doit concevoir simultanément ?", "options": ["Isolation des entrées, isolation des sorties, isolation de l'affichage", "Isolation du contexte, isolation de l'état des fichiers, isolation des approbations", "Isolation réseau, isolation disque, isolation mémoire", "Isolation utilisateur, isolation modèle, isolation outil"], "answer": 1, "explanation": "L'isolation du contexte prévient la surcharge des sessions, l'isolation de l'état des fichiers prévient les écrasements et conflits, et l'isolation des approbations sépare les actions sûres des actions dangereuses. Chacune prévient une classe d'échec différente."}, {"question": "Pourquoi les Skills de vérification ont-ils souvent un ROI plus élevé que les Skills de génération ?", "options": ["Parce que la vérification est plus coûteuse à licencier", "Parce que les modèles ne font jamais d'erreurs en génération", "Parce qu'un « brouillon bien rédigé » est peu coûteux, mais un « résultat vérifié et validé » est réellement précieux et difficile à obtenir", "Parce que la vérification nécessite moins de calcul"], "answer": 2, "explanation": "La génération produit des brouillons ; la vérification confirme qu'ils fonctionnent réellement. Vérifier que les flux d'inscription se complètent, que les états de paiement sont corrects ou que la CLI fonctionne dans les environnements TTY a plus de valeur que de générer davantage de code."}, {"question": "Qu'est-ce que le Prompt Cache, et comment en profiter ?", "options": ["Un cache de navigateur qui stocke les réponses de Claude pour une utilisation hors ligne", "Une réduction pour les utilisateurs fréquents de l'API", "Un mécanisme qui réutilise le calcul lorsque des préfixes de contexte similaires sont envoyés de façon répétée — gardez le contenu stable en tête", "Un fichier mémoire que Claude lit automatiquement"], "answer": 2, "explanation": "Les avantages du Prompt Cache proviennent du maintien d'un préfixe stable (CLAUDE.md, règles) cohérent d'un tour à l'autre. Quand le préfixe correspond, le calcul peut être réutilisé, économisant coût et temps."}, {"question": "Quand faut-il utiliser /compact dans une session Claude Code ?", "options": ["Tout à la fin quand la session est complètement terminée", "Après avoir sauvegardé l'état important dans des fichiers, avant que la session se soit dégradée", "Seulement quand vous voyez un message d'erreur", "Jamais — cela supprime du contexte important"], "answer": 1, "explanation": "Compressez après avoir sauvegardé l'état important dans des fichiers — pas en dernier recours quand la session est déjà dégradée. Une compression stratégique à de bons points de contrôle maintient la qualité tout au long des longues sessions."}], "part4": [{"question": "Quand faut-il promouvoir une tâche répétée en Skill ?", "options": ["Quand la tâche est très complexe", "Quand le format de sortie se répète, que la variation doit diminuer et que l'ordre de stockage/outil doit être fixé", "Quand vous voulez impressionner votre équipe avec l'automatisation", "Seulement quand Anthropic fournit un modèle de Skill officiel"], "answer": 1, "explanation": "Le signal pour créer un Skill est la répétition du format de sortie, le besoin de cohérence et des emplacements de stockage/séquences d'outils fixes. Les explorations ponctuelles restent mieux en conversation."}, {"question": "Quelle est la différence critique entre MCP et un Connector ?", "options": ["MCP est gratuit, les Connectors sont payants", "MCP est une technologie plus ancienne, les Connectors sont plus récents", "Les Connectors sont des connexions d'applications orientées utilisateur ; MCP donne un contrôle au niveau développeur sur la structure des outils, le format de réponse et l'activation par projet", "Il n'y a pas de différence — ce sont la même fonctionnalité"], "answer": 2, "explanation": "Les Connectors sont des connexions simples basées sur une interface (comme un app store). MCP offre un contrôle plus profond : quels serveurs, quels outils exposer, formats de réponse et activation par portée de projet. Utilisez les Connectors pour des connexions rapides, MCP pour la conception système."}, {"question": "Pourquoi le champ « description » d'un Skill est-il si important ?", "options": ["Il apparaît dans les supports marketing", "Il détermine la taille du fichier du Skill", "Il agit comme une règle d'aiguillage — des descriptions vagues causent sous-déclenchement ou sur-déclenchement", "Il est utilisé uniquement à des fins de documentation"], "answer": 2, "explanation": "La description est ce que Claude lit au démarrage de la session pour décider d'activer ou non le Skill. Si elle est vague, le Skill ne se déclenche jamais (sous-déclenchement) ou s'active pour des tâches sans rapport (sur-déclenchement)."}, {"question": "Que faut-il vérifier avant d'installer un Skill externe ?", "options": ["Seulement le nombre d'étoiles sur GitHub", "S'il récupère des URL externes, utilise des outils puissants (Bash/réseau), correspond à son objectif déclaré, s'exécute près de données sensibles et peut être désactivé rapidement", "Juste le fichier README", "Rien — tous les Skills publiés sont sûrs"], "answer": 1, "explanation": "Les Skills externes peuvent contenir des appels d'outils, des accès à des fichiers et des requêtes vers des URL externes. Ils doivent être traités comme de petites installations logicielles nécessitant une revue de sécurité, pas seulement comme des imports de documents."}, {"question": "À quoi les Hooks sont-ils comparés dans l'analogie automobile ?", "options": ["Le volant — vous contrôlez la direction", "L'accélérateur — ils accélèrent les choses", "Les alarmes de ceinture de sécurité et le freinage automatique — ils modifient le comportement réel, contrairement aux panneaux de signalisation qu'on peut ignorer", "Le rétroviseur — ils aident à voir ce qui s'est passé"], "answer": 2, "explanation": "Les prompts sont comme des panneaux de signalisation (peuvent être ignorés). Les Hooks sont comme les alarmes de ceinture de sécurité et le freinage automatique — ils appliquent les règles au niveau système, modifiant le comportement réel indépendamment de la conformité du modèle."}], "part5": [{"question": "Quelle est la première étape d'adoption recommandée pour presque tous les rôles ?", "options": ["Mettre en place immédiatement un pipeline d'automatisation complet", "Installer tous les Plugins et connexions MCP disponibles", "Commencer par collecter et organiser les informations — briefs de recherche, notes de réunion, structuration de documents", "Remplacer les membres de l'équipe par des agents IA"], "answer": 2, "explanation": "Pour tous les rôles (PM, marketing, ventes, ingénierie, recherche), la première étape est toujours la collecte et l'organisation des informations — les tâches les moins risquées et les plus fréquentes qui instaurent la confiance dans le flux de travail."}, {"question": "Pour les opérateurs d'agence/d'équipe gérant plusieurs clients, quel est le principe le plus critique ?", "options": ["La rapidité de livraison", "L'utilisation du modèle le plus récent disponible", "L'isolation du contexte client — empêcher les données et le contexte de fuir entre les clients", "Maximiser le nombre de Plugins installés"], "answer": 2, "explanation": "L'isolation du contexte client est la priorité absolue. Une frontière de dossier évite plus d'accidents qu'un prompt ingénieux. La rapidité importe moins que de s'assurer que les données du Client A n'apparaissent jamais dans la sortie du Client B."}, {"question": "Quel aspect les humains doivent-ils toujours garder sous contrôle, quel que soit le rôle ?", "options": ["Chaque révision de brouillon", "Toutes les décisions de nommage de fichiers", "La responsabilité finale : décisions d'approbation, communications externes et jugements aux conséquences réelles", "Le comptage des tokens et la gestion des coûts"], "answer": 2, "explanation": "L'IA accélère la structuration et la rédaction répétitives. Les humains doivent conserver : l'interprétation du marché (PM), l'approbation du ton de marque (marketing), l'envoi externe (ventes), les décisions de déploiement (ingénierie) et le jugement légal (conformité)."}, {"question": "Qu'est-ce qu'un « contrat de sortie » dans le guide de scénarios ?", "options": ["Un accord légal entre l'utilisateur et Anthropic", "Un accord prédéfini sur le format et l'emplacement que le résultat doit respecter", "Une limite sur le nombre de tokens que Claude peut produire", "Le tarif de l'API de sortie de Claude"], "answer": 1, "explanation": "Un contrat de sortie spécifie où les résultats sont sauvegardés, dans quel format et quelle structure ils doivent suivre. Il évite que les résultats soient dispersés ou incohérents d'une exécution à l'autre."}, {"question": "Quelles tâches montrent actuellement les signaux d'adoption de l'IA les plus forts ?", "options": ["Le travail physique et les négociations complexes en face à face", "La programmation, la saisie de données, le support client, la revue répétitive de documents et l'adaptation de contenu par canal", "Uniquement l'ingénierie logicielle", "Les tâches ne nécessitant aucune supervision humaine"], "answer": 1, "explanation": "L'adoption élevée est corrélée avec : le texte numérique, les jugements structurés, les données numériques existantes, les formats reproductibles et des critères de qualité clairs. Le travail physique et le jugement professionnel à enjeux élevés adoptent plus lentement."}], "part6": [{"question": "Quelle est la stratégie de mémoire la plus efficace pour les sessions Claude Code ?", "options": ["Sauvegarder l'intégralité du transcript de conversation après chaque session", "Se fier à la mémoire intégrée de Claude pour se souvenir de tout", "Mettre à jour handoff.md à la fin de chaque session avec l'état actuel, les prochaines étapes et les risques non résolus", "Utiliser /memory pour stocker toutes les informations en permanence"], "answer": 2, "explanation": "La stratégie de mémoire la plus simple et la plus efficace : mettre à jour handoff.md en fin de session. Cette seule habitude prévient 80 % de la confusion « où en étais-je ? ». Les conversations sont jetables ; les fichiers sont la vraie mémoire."}, {"question": "Pourquoi les plans doivent-ils être écrits dans des fichiers plutôt que dans des conversations ?", "options": ["Les fichiers sont moins chers que les tokens de conversation", "Les fichiers survivent aux limites de session, peuvent être examinés indépendamment, versionnés avec Git, et gardent la conversation concentrée sur l'exécution", "Claude ne peut pas comprendre les plans en format de conversation", "Il n'y a aucune différence entre les plans en fichier et les plans en conversation"], "answer": 1, "explanation": "Les plans en fichier persistent entre les sessions, permettent une revue humaine indépendante, activent le versionnage Git et gardent les conversations concentrées sur l'exécution plutôt que sur la re-planification."}, {"question": "Quel est le principe clé pour faire tourner des sessions Claude en parallèle ?", "options": ["Lancer le plus de sessions possible pour une vitesse maximale", "Utiliser les mêmes fichiers et répertoires pour toutes les sessions", "Définir d'abord les rôles : qui fait quoi, quels fichiers chaque session peut toucher et comment les résultats sont fusionnés", "Les sessions parallèles ne sont pas recommandées"], "answer": 2, "explanation": "Le parallélisme sans clarté des rôles crée le chaos. Avant de lancer des sessions parallèles, définissez les responsabilités, les frontières de fichiers et les stratégies de fusion. Le parallélisme non structuré est pire que le travail séquentiel."}, {"question": "Que doit-on vérifier avant d'installer un outil externe (Skill, Plugin, serveur MCP) ?", "options": ["Uniquement le nombre de téléchargements", "La date de dernière maintenance, la qualité du README, les permissions sensibles à la sécurité, le rapport coût-bénéfice en contexte et la facilité de désactivation", "S'il a un beau logo", "Rien — la marketplace gère le contrôle qualité"], "answer": 1, "explanation": "Cinq critères : récence de la maintenance, qualité de la documentation, permissions sensibles à la sécurité, rapport coût-bénéfice et réversibilité. Les outils « mis de côté pour plus tard » s'accumulent sans devenir des actifs opérationnels."}, {"question": "À quoi fait référence l'opération « style OpenClaw » dans la communauté ?", "options": ["L'utilisation d'un produit concurrent spécifique", "Un système de travail toujours actif, multi-canal, à état persistant avec des tâches planifiées et des capacités de contrôle à distance", "Un niveau gratuit d'utilisation de Claude", "Un framework de codage spécifique"], "answer": 1, "explanation": "Le « style OpenClaw » décrit un objectif opérationnel : toujours accessible, sessions qui ne cassent pas, travail déclenché par le temps ou les événements, Skills intégrés et contrôle à distance avec des limites de sécurité. Dans l'écosystème Claude, cela s'obtient en combinant Claude Code + Hooks + MCP + Remote Control + Scheduled Tasks."}], "part7": [{"question": "Quels sont les trois modes de permission dans le modèle de gouvernance de Claude Code ?", "options": ["Lecture, Écriture, Exécution", "Admin, Utilisateur, Invité", "Allow (procéder automatiquement), Ask (pause pour l'humain), Deny (blocage complet)", "Public, Privé, Protégé"], "answer": 2, "explanation": "Le modèle de permission utilise allow/ask/deny, évalué dans l'ordre : deny → ask → allow, la première règle correspondante s'appliquant. Cela donne un contrôle granulaire sur ce que Claude peut faire de façon autonome."}, {"question": "Quelles sont les quatre couches de gouvernance ?", "options": ["Frontend, Backend, Base de données, Réseau", "Couche documentaire (CLAUDE.md/règles), Couche de paramètres (permissions), Couche d'exécution (Hooks/approbations), Couche de traçabilité (journaux/décisions)", "Utilisateur, Équipe, Organisation, Entreprise", "Entrée, Traitement, Sortie, Stockage"], "answer": 1, "explanation": "La couche documentaire définit les connaissances, la couche de paramètres définit les limites, la couche d'exécution gère les contrôles en temps d'exécution et la couche de traçabilité enregistre ce qui s'est passé et pourquoi. Les quatre ensemble forment une gouvernance complète."}, {"question": "Pourquoi l'auditabilité est-elle importante pour l'automatisation IA ?", "options": ["Elle n'est requise que par la loi", "Elle rend les démos plus professionnelles", "La même automatisation avec des pistes d'audit devient une infrastructure ; sans elles, elle reste une démo qui ne peut pas s'étendre", "L'auditabilité n'est pas importante pour la plupart des équipes"], "answer": 2, "explanation": "L'auditabilité signifie pouvoir expliquer : ce qui a été lu, ce qui a été créé, qui a approuvé et ce qui reste. Sans elle, l'automatisation ne peut pas passer de démos individuelles à une infrastructure d'équipe fiable."}, {"question": "Quelle est la différence entre observabilité et auditabilité ?", "options": ["Ce sont la même chose", "L'observabilité est pour les développeurs, l'auditabilité est pour les managers", "L'observabilité montre l'état actuel du système (tableaux de bord) ; l'auditabilité explique ce qui s'est passé et pourquoi (enregistrements d'événements pour la responsabilité)", "L'observabilité est plus chère que l'auditabilité"], "answer": 2, "explanation": "L'observabilité est un tableau de bord pour l'efficacité opérationnelle (utilisation, coûts, patterns). L'auditabilité est un enregistrement d'événements pour la responsabilité (qui a fait quoi, pourquoi, avec quelle approbation). Les organisations ont besoin des deux."}, {"question": "Quel est le principe clé du dernier chapitre du livre sur la construction avec Claude Code ?", "options": ["Toujours utiliser les fonctionnalités les plus avancées disponibles", "Un résultat mince achevé plus la structure pour le recréer vaut mieux que n'importe quel nombre de démos impressionnantes", "La vitesse est plus importante que la qualité", "Seuls les développeurs devraient construire avec Claude Code"], "answer": 1, "explanation": "La conclusion : un site web mince achevé ou un flux d'automatisation — avec brief, modèle, séparation de revue et transfert — qui peut être recréé la semaine prochaine, est plus précieux que tout plan élaboré inachevé."}], "glossary": [{"question": "Qu'est-ce que le « Context Assembly » ?", "options": ["Installer tous les Plugins disponibles d'un coup", "Le processus de sélection et de rassemblement uniquement des règles, fichiers et descriptions d'outils pertinents pour la tâche actuelle dans le contexte d'entrée", "Rédiger le prompt le plus long possible", "Copier l'intégralité du code source dans la conversation"], "answer": 1, "explanation": "Context Assembly est un processus de sélection, pas de déversement. Il signifie ne rassembler que ce dont la tâche actuelle a besoin — plus de contexte ne signifie pas meilleur contexte."}, {"question": "Que signifie « Resume Hygiene » ?", "options": ["Nettoyer son CV avant un entretien d'embauche", "Redémarrer son ordinateur avant d'utiliser Claude", "Ne conserver que ce dont la session suivante a besoin et éliminer le bruit accumulé avant de reprendre le travail", "Utiliser du gel hydroalcoolique en tapant"], "answer": 2, "explanation": "Resume Hygiene consiste à nettoyer l'état avant de reprendre — préserver le contexte essentiel tout en éliminant le bruit de la session précédente. Les longues sessions ne sont pas intrinsèquement meilleures ; des transferts propres le sont."}, {"question": "En quoi un Hook diffère-t-il d'une instruction de prompt ?", "options": ["Les Hooks sont plus chers à exécuter", "Les Hooks appliquent les règles au niveau système (freinage automatique), tandis que les instructions de prompt sont des suggestions qui peuvent être ignorées (panneaux de signalisation)", "Les Hooks ne fonctionnent que dans Cowork, pas dans Claude Code", "Il n'y a aucune différence pratique"], "answer": 1, "explanation": "Les prompts demandent un comportement ; les Hooks l'imposent. Un prompt disant « lance le lint après l'édition » peut être ignoré. Un Hook configuré pour lancer le lint après chaque édition de fichier s'exécute toujours."}, {"question": "Quelle est la relation entre Skill, Plugin et MCP ?", "options": ["Ce sont trois noms pour la même fonctionnalité", "Skill définit les procédures, MCP se connecte aux outils externes, Plugin empaquète tout pour le déploiement en équipe", "Plugin est le moins cher, MCP est intermédiaire, Skill est premium", "Ils doivent toujours être utilisés ensemble"], "answer": 1, "explanation": "Skills = « comment faire » (procédures), MCP = « le chemin vers les outils externes » (connexions), Plugins = « la boîte qui déploie tout » (packages pour les équipes). Ils se complètent mutuellement."}, {"question": "Face à un terme Claude Code déroutant, quel modèle mental à trois catégories aide ?", "options": ["Coût, Vitesse, Qualité", "Entrée, Traitement, Sortie", "Mécanique (comment le travail s'écoule), Sécurité (comment les erreurs sont évitées), Continuité (comment les sessions persistent)", "Frontend, Backend, Base de données"], "answer": 2, "explanation": "Presque tous les termes Claude Code entrent dans trois catégories : mécanique (boucle agentique, assemblage de contexte, orchestration d'outils), sécurité (permissions, Hooks, portes d'approbation) ou continuité (mémoire de session, transfert, hygiène de reprise)."}]}}, "hi": {"ui": {"title": "Claude Code अध्ययन मार्गदर्शिका", "search_placeholder": "खोजें...", "next": "अगला →", "prev": "← पिछला", "quiz_title": "स्व-परीक्षण प्रश्नोत्तरी", "progress": "प्रगति", "expand_all": "सभी खोलें", "collapse_all": "सभी बंद करें", "retry": "पुनः प्रयास करें", "score": "{correct}/{total} सही", "mark_complete": "पढ़ा हुआ चिह्नित करें", "completed": "पूर्ण"}, "parts": {"part1": {"title": "भाग 1: मूलभूत निर्माण", "sections": {"1_1": {"title": "पारिस्थितिकी तंत्र क्यों चर्चित है", "content": "<p>AI परिदृश्य \"कौन सा मॉडल अधिक स्मार्ट है\" से बदलकर \"कौन सा टूल फ़ाइलें, टेस्ट, Git, ब्राउज़र और बाहरी सेवाओं को सबसे कम घर्षण के साथ जोड़ता है\" हो गया है। इसीलिए Claude Code, Codex और Gemini CLI को एक साथ चर्चित किया जाता है — प्रतिस्पर्धा अब <strong>कार्य पथों</strong> पर है, बेंचमार्क स्कोर पर नहीं।</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; मुख्य अवधारणा:</strong> Claude Code केवल एक कोडिंग ऐप नहीं है। यह एक <em>work harness</em> है जो memoized context, tool orchestration, permission gates और resumable sessions को एक साथ जोड़ता है। Cowork, Skills, Plugins और Scheduled Tasks इस मूल harness के गैर-कोडिंग कार्य में विस्तार हैं।\n      </div>\n\n<p>शोध इस दिशा की पुष्टि करता है। METR रिपोर्ट करता है कि एजेंट कार्य क्षितिज तेज़ी से बढ़ रहे हैं, और Anthropic ने नोट किया है कि वास्तविक प्रदर्शन अंतर कार्य संरचना और सत्यापन आदतों से आता है, मॉडल नामों से नहीं। प्रश्न अब \"मॉडल कितना स्मार्ट है?\" नहीं रहा बल्कि \"कौन प्रतिनिधित्व नियम और सत्यापन harnesses तेज़ी से सीखता है?\"</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; प्रो टिप:</strong> यह पूछकर शुरू करें: \"क्या मेरा कार्य प्रश्न-आधारित, दस्तावेज़-आधारित या कार्यान्वयन-आधारित है?\" यह एकल प्रश्न तय करता है कि आपको Chat, Projects, Cowork या Claude Code का उपयोग करना चाहिए।\n      </div>\n\n      <table>\n        <tr><th>क्या तेज़ बदलता है</th><th>क्या स्थायी रहता है</th></tr>\n        <tr><td>मेनू स्थान, प्लान टियर, प्रीव्यू स्थिति, फ़ीचर नाम</td><td>कौन सा कार्य पथ उपयोग करें, फ़ाइलें और सत्यापन कैसे अलग करें, मानव चेकपॉइंट कहाँ रखें</td></tr>\n      </table>"}, "1_2": {"title": "याद रखने योग्य चार मुख्य शब्द", "content": "<p>गहराई में जाने से पहले, इन चार शब्दों को आत्मसात करें। हर अध्याय इन पर आधारित है।</p>\n\n      <table>\n        <tr><th>शब्द</th><th>अर्थ</th></tr>\n        <tr><td><strong>Memoized Context</strong></td><td>पृष्ठभूमि जानकारी जो हर बार फिर से समझाने की ज़रूरत को खत्म करने के लिए बातचीत के दौरान बनी रहती है</td></tr>\n        <tr><td><strong>Tool Orchestration</strong></td><td>वह परत जो तय करती है कि कौन से टूल्स किस क्रम में उपयोग करने हैं</td></tr>\n        <tr><td><strong>Permission Gate</strong></td><td>वह सीमा जो निष्पादन से पहले allow, ask और deny को अलग करती है</td></tr>\n        <tr><td><strong>Resumable Session</strong></td><td>डिस्कनेक्शन के बाद भी जहाँ छोड़ा था वहाँ से जारी रखने की क्षमता</td></tr>\n      </table>\n\n      <p>ये एक पाइपलाइन बनाते हैं: <strong>उपयोगकर्ता अनुरोध → Memoized Context → Tool Orchestration → Permission Gate → निष्पादन और सत्यापन → Resumable Session → अगला कार्य</strong>। चाहे कार्यप्रवाह कितना भी जटिल हो, यह हमेशा इन पाँच चरणों का एक रूपांतर होता है।</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; मुख्य अवधारणा:</strong> \"Memoized\" का अर्थ \"याद किया हुआ\" नहीं है। इसका अर्थ है \"एक बार गणना की, बार-बार उपयोग की\" — जैसे पृष्ठभूमि नियम सेट करना जो हर बार फिर से भेजे बिना हर बातचीत में बने रहते हैं।\n      </div>"}, "1_3": {"title": "Harness की अवधारणा", "content": "<p>एक <strong>harness</strong> वह बाहरी संरचना है जो परिभाषित करती है कि Claude क्या पढ़ सकता है, क्या बदल सकता है और क्या सत्यापित कर सकता है। इसे किसी सहयोगी का कार्यस्थल स्थापित करने जैसा सोचें: आप मेज़ पर संदर्भ सामग्री रखते हैं, तय करते हैं कौन से दराज सुलभ हैं, और काम पूरा करने से पहले एक चेकलिस्ट लगाते हैं।</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; सामान्य गलती:</strong> बिना किसी सीमा के \"लॉगिन बग ठीक करो\" भेजना। एक मजबूत harness अनुरोध ऐसा दिखता है: \"केवल <code>auth/</code> पढ़ें, <code>.env</code> को मत छुएँ, लॉगिन टेस्ट पास करें, 3-लाइन बदलाव नोट छोड़ें।\"\n      </div>\n\n      <p><strong>Harness Engineering</strong> बेहतर prompt लिखने के बारे में नहीं है — यह उस कार्यस्थल को डिज़ाइन करने के बारे में है जहाँ Claude काम करता है। इसमें शामिल है: कौन सी फ़ाइलें हमेशा लोड हैं, क्या अनुमतियाँ सेट हैं, कौन से टेस्ट पास होने चाहिए, और परिणाम कहाँ संग्रहीत होते हैं।</p>\n\n      <p>International AI Safety Report 2026 पुष्टि करता है: जैसे-जैसे मॉडल क्षमताएँ बढ़ती हैं, harness और सत्यापन संरचनाएँ <em>अधिक</em> महत्वपूर्ण होती जाती हैं, कम नहीं। वास्तविक दुनिया के कार्यों में संसाधन बाधाएँ, अपूर्ण जानकारी, अपवाद और अनुमोदन प्रवाह होते हैं जिन्हें कच्ची मॉडल बुद्धिमत्ता अकेले नहीं संभाल सकती।</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; प्रो टिप:</strong> शुरुआती लोग भी harness बनाना शुरू कर सकते हैं: <code>CLAUDE.md</code> में बुनियादी नियम लिखें, <code>settings.json</code> में allow/deny स्कोप सेट करें, <code>plan.md</code> से बड़े कार्य विभाजित करें, और <code>handoff.md</code> में सत्र स्थिति छोड़ें।\n      </div>"}, "1_4": {"title": "कार्य सतहें: Chat, Projects, Cowork, Claude Code", "content": "<p>वही Claude मॉडल अलग-अलग सतहों पर अलग व्यवहार करता है। गलत सतह चुनना कौशल की समस्या नहीं है — यह रूटिंग की समस्या है।</p>\n\n      <table>\n        <tr><th>सतह</th><th>सबसे उपयुक्त</th><th>प्रभावित करने वाला</th></tr>\n        <tr><td><strong>Chat</strong></td><td>त्वरित प्रश्न, विचार क्रमबद्ध करना</td><td>प्रश्न की गुणवत्ता</td></tr>\n        <tr><td><strong>Projects</strong></td><td>स्थायी पृष्ठभूमि ज्ञान</td><td>फ़ोल्डर संरचना, टेम्पलेट</td></tr>\n        <tr><td><strong>Cowork</strong></td><td>दस्तावेज़ प्रतिनिधित्व — शोध, संक्षेप, फ़ाइल संगठन</td><td>फ़ोल्डर संरचना, टेम्पलेट</td></tr>\n        <tr><td><strong>Claude Code</strong></td><td>कार्यान्वयन और सत्यापन — कोड, टेस्ट, समीक्षा</td><td>नियम फ़ाइलें, सत्यापन लूप</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; सामान्य गलती:</strong> तीन भ्रांतियाँ: (1) \"एक ही मॉडल का मतलब हर जगह एक ही अनुभव\" — गलत, सतह बहुत मायने रखती है। (2) \"Cowork आसान मोड है, Claude Code कठिन मोड है\" — गलत, वे प्रतिनिधित्व शैली में भिन्न हैं, कठिनाई में नहीं। (3) \"एक साथ सभी सतहें आज़माएँ\" — गलत, पहले एक में महारत हासिल करें फिर आगे बढ़ें।\n      </div>\n\n      <p><strong>सतह के अनुसार पहले अच्छे कार्य:</strong></p>\n      <ul>\n        <li><strong>Chat:</strong> \"इस रिपोर्ट को 3 प्रश्नों के साथ 5 वाक्यों में सारांशित करें।\"</li>\n        <li><strong>Projects:</strong> \"इस फ़ोल्डर को पढ़ें और एक पेज का पृष्ठभूमि ज्ञान सारांश बनाएँ।\"</li>\n        <li><strong>Cowork:</strong> \"मीटिंग नोट्स पढ़ें और <code>outputs/</code> में साप्ताहिक संक्षेप का मसौदा सहेजें।\"</li>\n        <li><strong>Claude Code:</strong> \"इस बग रिप्रोडक्शन पाथ को पढ़ें, फिर <code>plan.md</code> में एक परिकल्पना और फिक्स प्लान लिखें।\"</li>\n      </ul>"}, "1_5": {"title": "क्या तेज़ी से बदलता है बनाम क्या स्थिर रहता है", "content": "<p>तकनीकी उत्पाद तेज़ी से विकसित होते हैं। स्थिर रहने के लिए, अस्थिर विवरणों और स्थायी सिद्धांतों के बीच अंतर करें।</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; मुख्य अवधारणा:</strong> पारिस्थितिकी तंत्र \"चर्चित\" होता है जब चार शर्तें एक साथ पूरी होती हैं: (1) उपयोगकर्ता व्यवहार बदलता है — लोग prompts बनाने के बजाय कार्यस्थल डिज़ाइन करते हैं, (2) परिचालन आदतें बदलती हैं — टीमें <code>CLAUDE.md</code> को साझा अनुबंध के रूप में रखती हैं, (3) पारिस्थितिकी तंत्र फैलता है — आधिकारिक और समुदाय skills, plugins, MCP सर्वर बढ़ते हैं, (4) नौकरी की भूमिकाएँ पुनर्निर्मित होती हैं — मार्केटिंग, टैक्स, PM, डिज़ाइन टीमें Claude को ऑटोमेशन परत के रूप में उपयोग करती हैं, न कि केवल chatbot के रूप में।\n      </div>\n\n      <p><strong>पूरी पुस्तक पढ़ने के चार फ्रेम:</strong></p>\n      <table>\n        <tr><th>फ्रेम</th><th>भूमिका</th><th>उपमा</th></tr>\n        <tr><td>Work Path</td><td>आप कहाँ से शुरू करते हैं (Chat, Cowork, Claude Code)</td><td>जिस मेज़ पर आप बैठते हैं</td></tr>\n        <tr><td>Harness</td><td>निष्पादन वातावरण (अनुमतियाँ, नियम, टेस्ट)</td><td>मेज़ पर दराज, ताले, चेकलिस्ट</td></tr>\n        <tr><td>Operations Layer</td><td>शेड्यूलिंग, डिप्लॉयमेंट, एनालिटिक्स</td><td>प्रशासनिक कार्यालय</td></tr>\n        <tr><td>System</td><td>मानव समीक्षा लूप के साथ सब कुछ मिलाकर</td><td>पूरी ऑफिस बिल्डिंग</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; प्रो टिप:</strong> जब कोई नया फ़ीचर लॉन्च हो, तो मत पूछें \"क्या यह स्मार्ट है?\" पूछें: \"उन्होंने कौन सी परत जोड़ी — ज्ञान, टूल्स, पैकेज या नियंत्रण?\" यह ओवर-कॉन्फ़िगरेशन से बचाता है और आपका सेटअप स्थिर रखता है।\n      </div>"}}}, "part2": {"title": "भाग 2: व्यावहारिक कार्यपुस्तिका", "sections": {"2_1": {"title": "Cowork और Claude Code: प्रथम अनुप्रयोग सीमाएँ", "content": "<p>इंस्टॉलेशन के बाद सबसे आम भ्रम है: \"मैं कहाँ से शुरू करूँ?\" उत्तर आपके कार्य के प्रकार पर निर्भर करता है।</p>\n\n      <table>\n        <tr><th>Cowork</th><th>Claude Code</th></tr>\n        <tr><td>दस्तावेज़-प्रथम कार्य: मीटिंग नोट्स, शोध संक्षेप, फ़ोल्डर पढ़ना, मसौदा तैयार करना</td><td>विकास-प्रथम कार्य: बग फिक्स, टेस्ट, रिफैक्टरिंग, प्लान दस्तावेज़</td></tr>\n        <tr><td>इसे सार्वभौमिक बैकएंड सिस्टम होने की उम्मीद मत करें</td><td>एक साथ पूरी नई सुविधा सौंपकर शुरू मत करें</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; मुख्य अवधारणा:</strong> यह अध्याय <em>Claude Code का उपयोग कैसे करें</em> के बारे में नहीं है — यह <em>इसे कैसे संचालित करें</em> के बारे में है। मूल आदतें हैं: edit से पहले plan, resume hygiene, review split, worktree separation, allowlists और structured handoffs।\n      </div>\n\n      <p>सत्र प्रबंधन एक निर्णय वृक्ष का अनुसरण करता है:</p>\n      <ul>\n        <li><strong>एक ही लक्ष्य, जारी?</strong> → <code>claude --continue</code> या <code>--resume</code></li>\n        <li><strong>अलग दिशा चाहिए?</strong> → <code>--fork-session</code></li>\n        <li><strong>फ़ाइल टकराव या भूमिका टकराव?</strong> → <code>--worktree</code> (अलग कार्यशील निर्देशिका)</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; प्रो टिप:</strong> जो लोग समय के साथ Claude Code का अच्छा उपयोग करते हैं, वे बेहतर prompts लिखने वाले नहीं होते — वे काम को कम बाधित करने वाले होते हैं।\n      </div>"}, "2_2": {"title": "Claude Code संचालन सिद्धांत", "content": "<p>आठ आदतें उत्पादक Claude Code उपयोगकर्ताओं को निराश लोगों से अलग करती हैं:</p>\n      <ol>\n        <li><strong>Edit से पहले Plan</strong> — कोड छूने से पहले स्कोप, सत्यापन और प्रतिबंधित क्षेत्र तय करें। बड़े कार्यों के लिए पहले <code>plan.md</code> लिखें।</li>\n        <li><strong>Resident context पतला रखें</strong> — <code>CLAUDE.md</code> एक कार्य अनुबंध है, विश्वकोश नहीं। दीर्घकालिक स्थिति को <code>handoff.md</code>, <code>decision-log.md</code> में ले जाएँ।</li>\n        <li><strong>पहले Allowlist, बाद में bypass</strong> — संकीर्ण <code>allow</code> और <code>deny</code> नियमों से शुरू करें। उन्हें समझने के बाद ही अनुमतियाँ बढ़ाएँ।</li>\n        <li><strong>सही समय पर Manual <code>/compact</code></strong> — महत्वपूर्ण स्थिति फ़ाइलों में सहेजने के बाद संपीड़ित करें, जब सत्र पहले से खराब हो जाए तब नहीं।</li>\n        <li><strong>जानबूझकर resume का उपयोग करें</strong> — एक ही दिशा के लिए <code>--continue</code>, दिशा बँटने पर <code>--fork-session</code>।</li>\n        <li><strong>Plan / implement / review अलग करें</strong> — सभी भूमिकाओं को एक सत्र में न भरें। विभाजन context प्रदूषण और अनुमोदन थकान को कम करता है।</li>\n        <li><strong>Worktrees का उपयोग करें</strong> — परस्पर विरोधी कार्य, प्रयोगों या समानांतर समीक्षाओं के लिए कार्यशील निर्देशिका अलग करें।</li>\n        <li><strong>संरचना से लागत प्रबंधित करें, token गिनती से नहीं</strong> — cache misses, टूल आउटपुट लंबाई, सत्र लंबाई और टेस्ट लॉग की विस्तारता कम करें।</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; सामान्य गलती:</strong> बिना plan के सीधे implementation में कूदना। बड़े कार्यों में यह तेज़ लगता है लेकिन दोबारा काम की ओर ले जाता है। plan कोई नौकरशाही कदम नहीं है — यह दोबारा काम को कम करने वाला उपकरण है।\n      </div>"}, "2_3": {"title": "टेम्पलेट्स: CLAUDE.md, settings.json, Hooks", "content": "<p>एक सुव्यवस्थित रिपॉज़िटरी फ़ाइलों में ज़िम्मेदारियाँ अलग करती है। यहाँ harness का ब्लूप्रिंट है:</p>\n\n      <pre><code>repo/\n├── CLAUDE.md                    # Project contract (always loaded)\n├── .claude/\n│   ├── settings.json            # Allow/ask/deny boundaries\n│   ├── rules/\n│   │   ├── architecture.md      # Structure rules\n│   │   ├── testing.md           # Test standards\n│   │   └── frontend.md          # UI conventions\n│   └── hooks.json               # Auto-enforcement rules\n└── tasks/\n    ├── plan.md                  # What to do next\n    ├── verify.md                # Exit criteria\n    ├── decision-log.md          # Why this path was chosen\n    └── handoff.md               # Current state for next session</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; मुख्य अवधारणा:</strong> हर फ़ाइल एक अलग प्रकार की विफलता रोकती है। <code>CLAUDE.md</code> context drift रोकता है। <code>settings.json</code> असुरक्षित क्रियाएँ रोकता है। <code>rules/*</code> डोमेन-विशिष्ट गलतियाँ रोकता है। <code>hooks.json</code> \"X करना याद रखो\" को \"X हमेशा करो\" में बदलता है। <code>tasks/*</code> सत्र भूलने से बचाता है।\n      </div>\n\n      <p><strong>Settings स्कोप प्राथमिकता:</strong> Managed &gt; Command-line &gt; Local &gt; Project &gt; User। संगठन-लॉक नियमों को व्यक्तिगत सेटिंग्स से ओवरराइड नहीं किया जा सकता — इसीलिए \"मेरी सेटिंग काम नहीं करती\" का भ्रम अक्सर होता है।</p>\n\n      <p><strong>Team vs. local अलगाव:</strong> टीम-साझा मानक <code>CLAUDE.md</code> और <code>.claude/settings.json</code> में जाते हैं। व्यक्तिगत प्रयोग <code>CLAUDE.local.md</code> या <code>.claude/settings.local.json</code> में जाते हैं।</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; प्रो टिप:</strong> एक न्यूनतम hook उदाहरण जो खतरनाक Bash कमांड ब्लॉक करता है:\n      </div>\n      <pre><code>{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \".claude/hooks/block-rm.sh\"\n      }]\n    }]\n  }\n}</code></pre>"}, "2_4": {"title": "Prompt टेम्पलेट्स और इंजीनियरिंग परतें", "content": "<p>प्रभावी prompts चतुराई के बारे में नहीं हैं — वे पैटर्न का अनुसरण करते हैं। यहाँ मुख्य prompt शैलियाँ हैं:</p>\n\n      <p><strong>Context-first prompt (अनुशंसित शुरुआत दिनचर्या):</strong></p>\n      <pre><code>Read CLAUDE.md, relevant rules, and tasks/verify.md first.
