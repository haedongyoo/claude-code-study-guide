/* ============================================================
   Claude Code Study Guide — State Management Foundation
   ============================================================ */

// Safe JSON.parse helper
function safeParse(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}

// State management
const State = {
  lang: localStorage.getItem('lang') || 'en',
  theme: localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'),
  currentPart: localStorage.getItem('currentPart') || 'part1',
  progress: safeParse('progress', {}),
  collapsed: safeParse('collapsed', {}),
  quizScores: safeParse('quizScores', {}),
  save(key) {
    if (key === 'lang' || key === 'theme' || key === 'currentPart') {
      localStorage.setItem(key, this[key]);
    } else {
      localStorage.setItem(key, JSON.stringify(this[key]));
    }
  }
};

// Data stores
const I18N = {};
const PARTS = {};
const QUIZZES = {};
const SEARCH_INDEX = [];

// Part metadata
const PART_ORDER = ['part1', 'part2', 'part3', 'part4', 'part5', 'part6', 'part7', 'glossary'];
const PART_META = {
  part1: { chapters: 'Ch 1\u20132', titleKey: 'parts.part1.title' },
  part2: { chapters: 'Ch 3\u20134', titleKey: 'parts.part2.title' },
  part3: { chapters: 'Ch 5', titleKey: 'parts.part3.title' },
  part4: { chapters: 'Ch 6', titleKey: 'parts.part4.title' },
  part5: { chapters: 'Ch 7\u20138', titleKey: 'parts.part5.title' },
  part6: { chapters: 'Ch 9\u201310', titleKey: 'parts.part6.title' },
  part7: { chapters: 'Ch 11\u201312', titleKey: 'parts.part7.title' },
  glossary: { chapters: 'Appendix', titleKey: 'parts.glossary.title' }
};

/* ============================================================
   Data Loading
   ============================================================ */

async function loadI18N(lang) {
  if (I18N[lang]) return I18N[lang];
  if (typeof INLINED !== 'undefined' && INLINED_I18N && INLINED_I18N[lang]) {
    I18N[lang] = INLINED_I18N[lang];
    return I18N[lang];
  }
  try {
    const res = await fetch(`i18n/${lang}.json`);
    if (!res.ok) throw new Error(res.status);
    I18N[lang] = await res.json();
    return I18N[lang];
  } catch {
    if (lang !== 'en') return loadI18N('en');
    return null;
  }
}

async function loadPart(partId) {
  if (PARTS[partId]) return PARTS[partId];
  if (typeof INLINED !== 'undefined') {
    const tpl = document.getElementById('tpl-' + partId);
    if (tpl) { PARTS[partId] = tpl.innerHTML; return PARTS[partId]; }
  }
  try {
    const res = await fetch(`parts/${partId}.html`);
    if (!res.ok) throw new Error(res.status);
    PARTS[partId] = await res.text();
    return PARTS[partId];
  } catch {
    return '<p>Content not available.</p>';
  }
}

async function loadQuiz(partId) {
  if (QUIZZES[partId]) return QUIZZES[partId];
  if (typeof INLINED !== 'undefined' && INLINED_QUIZZES && INLINED_QUIZZES[partId]) {
    QUIZZES[partId] = INLINED_QUIZZES[partId];
    return QUIZZES[partId];
  }
  try {
    const res = await fetch(`quizzes/${partId}-quiz.json`);
    if (!res.ok) throw new Error(res.status);
    QUIZZES[partId] = await res.json();
    return QUIZZES[partId];
  } catch {
    return [];
  }
}

/* ============================================================
   i18n — translation helper & DOM updater
   ============================================================ */

function t(key) {
  const data = I18N[State.lang] || I18N['en'] || {};
  return key.split('.').reduce((o, k) => o && o[k], data) || key;
}

function applyI18N() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const val = t(el.dataset.i18nHtml);
    if (val && val !== el.dataset.i18nHtml) {
      el.innerHTML = val;
    }
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  const langCurrent = document.getElementById('lang-current');
  if (langCurrent) langCurrent.textContent = State.lang.toUpperCase();
}

/* ============================================================
   Theme Toggle
   ============================================================ */

function applyTheme() {
  document.documentElement.classList.toggle('dark', State.theme === 'dark');
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = State.theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
}

document.getElementById('theme-toggle')?.addEventListener('click', () => {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  State.save('theme');
  applyTheme();
});

/* ============================================================
   Language Switcher
   ============================================================ */

const langToggle = document.getElementById('lang-trigger');
const langMenu = document.getElementById('lang-menu');

langToggle?.addEventListener('click', () => {
  const isOpen = langMenu.classList.contains('open');
  langMenu.classList.toggle('open', !isOpen);
  langToggle.setAttribute('aria-expanded', !isOpen);
});

langMenu?.addEventListener('click', async (e) => {
  const li = e.target.closest('[data-lang]');
  if (!li) return;
  State.lang = li.dataset.lang;
  State.save('lang');
  await loadI18N(State.lang);
  applyI18N();
  updateLangMenuActive();
  renderSidebar();
  renderTabBar();

  // Re-render quiz with translated questions if available
  const quizQuestions = await loadQuiz(State.currentPart);
  const langData = I18N[State.lang];
  const translatedQuiz = (langData && langData.quizzes && langData.quizzes[State.currentPart])
    ? langData.quizzes[State.currentPart]
    : quizQuestions;
  renderQuiz(translatedQuiz, State.currentPart);

  langMenu.classList.remove('open');
  langToggle?.setAttribute('aria-expanded', 'false');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.lang-dropdown')) {
    langMenu?.classList.remove('open');
    langToggle?.setAttribute('aria-expanded', 'false');
  }
});

function updateLangMenuActive() {
  langMenu?.querySelectorAll('[data-lang]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === State.lang);
  });
}

/* ============================================================
   Sidebar Rendering
   ============================================================ */

function renderSidebar() {
  const nav = document.getElementById('nav-list');
  if (!nav) return;

  nav.innerHTML = PART_ORDER.map(id => {
    const title = t(PART_META[id].titleKey);
    const chapters = PART_META[id].chapters;
    const isActive = id === State.currentPart;
    return `
      <li class="nav-item ${isActive ? 'active' : ''}" data-part="${id}">
        <span>${title}</span>
        <span class="nav-item-chapters">${chapters}</span>
      </li>
    `;
  }).join('');

  updateProgressDisplay();
}

function updateProgressDisplay() {
  // Count all section checkboxes across all loaded parts to get accurate total
  const allCheckboxIds = new Set();
  for (const partId of PART_ORDER) {
    const html = PARTS[partId];
    if (!html) continue;
    const matches = html.matchAll(/data-section-id="([^"]+)"/g);
    for (const m of matches) allCheckboxIds.add(m[1]);
  }
  // Also include any keys already in State.progress
  for (const key of Object.keys(State.progress)) allCheckboxIds.add(key);

  const total = allCheckboxIds.size || 1;
  const completed = Object.values(State.progress).filter(Boolean).length;
  const pct = Math.round((completed / Math.max(total, 1)) * 100);

  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.width = `${pct}%`;

  const label = document.getElementById('progress-label');
  if (label) label.textContent = `${pct}% complete`;
}

document.getElementById('nav-list')?.addEventListener('click', async (e) => {
  const navItem = e.target.closest('.nav-item');
  if (navItem) {
    await navigateTo(navItem.dataset.part);
  }
});

/* ============================================================
   Accordion Collapse/Expand
   ============================================================ */

function applyCollapsedState() {
  const article = document.getElementById('article-area');
  if (!article) return;

  article.querySelectorAll('.accordion').forEach(acc => {
    const sectionId = acc.dataset.section;
    if (!sectionId) return;
    const key = `${State.currentPart}.${sectionId}`;
    const isCollapsed = State.collapsed[key];

    if (isCollapsed) {
      acc.classList.remove('open');
    } else {
      // Default to open if no saved state
      acc.classList.add('open');
    }

    // Update icon
    const icon = acc.querySelector('.accordion-icon');
    if (icon) icon.textContent = acc.classList.contains('open') ? '\u25BE' : '\u25B8';
  });
}

// Event delegation for accordion header clicks
document.getElementById('article-area')?.addEventListener('click', (e) => {
  // Don't toggle when clicking the section checkbox
  if (e.target.closest('.section-checkbox') || e.target.closest('.section-check')) return;

  const header = e.target.closest('.accordion-header');
  if (!header) return;

  const accordion = header.closest('.accordion');
  if (!accordion) return;

  accordion.classList.toggle('open');

  const sectionId = accordion.dataset.section;
  if (sectionId) {
    const key = `${State.currentPart}.${sectionId}`;
    State.collapsed[key] = !accordion.classList.contains('open');
    State.save('collapsed');
  }

  // Update icon
  const icon = accordion.querySelector('.accordion-icon');
  if (icon) icon.textContent = accordion.classList.contains('open') ? '\u25BE' : '\u25B8';
});

// Expand All / Collapse All button handler
document.getElementById('article-area')?.addEventListener('click', (e) => {
  const btn = e.target.closest('.expand-all-btn');
  if (!btn) return;

  const article = document.getElementById('article-area');
  if (!article) return;

  const accordions = article.querySelectorAll('.accordion');
  const allOpen = Array.from(accordions).every(a => a.classList.contains('open'));
  const shouldOpen = !allOpen;

  accordions.forEach(acc => {
    acc.classList.toggle('open', shouldOpen);
    const sectionId = acc.dataset.section;
    if (sectionId) {
      const key = `${State.currentPart}.${sectionId}`;
      State.collapsed[key] = !shouldOpen;
    }
    const icon = acc.querySelector('.accordion-icon');
    if (icon) icon.textContent = shouldOpen ? '\u25BE' : '\u25B8';
  });

  State.save('collapsed');

  // Update button text
  btn.textContent = shouldOpen ? (t('ui.collapse_all') !== 'ui.collapse_all' ? t('ui.collapse_all') : 'Collapse All')
    : (t('ui.expand_all') !== 'ui.expand_all' ? t('ui.expand_all') : 'Expand All');
});

/* ============================================================
   Progress Tracking
   ============================================================ */

function applyProgressCheckboxes() {
  const article = document.getElementById('article-area');
  if (!article) return;

  article.querySelectorAll('.section-checkbox').forEach(cb => {
    const id = cb.dataset.sectionId;
    if (id) cb.checked = !!State.progress[id];
  });
}

// Event delegation for checkbox changes
document.getElementById('article-area')?.addEventListener('change', (e) => {
  if (!e.target.classList.contains('section-checkbox')) return;

  const id = e.target.dataset.sectionId;
  if (!id) return;

  State.progress[id] = e.target.checked;
  State.save('progress');
  renderSidebar();
});

/* ============================================================
   Quiz Rendering and Scoring
   ============================================================ */

function renderQuiz(questions, partId) {
  const section = document.getElementById('quiz-section');
  if (!section) return;

  if (!questions || questions.length === 0) {
    section.style.display = 'none';
    section.innerHTML = '';
    return;
  }

  // Don't auto-show quiz — user clicks "Take Quiz" button to reveal
  section.style.display = 'none';

  let answered = 0;
  let correct = 0;
  const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

  const scoreId = `quiz-score-${partId}`;
  const retryId = `quiz-retry-${partId}`;

  section.innerHTML = `
    <h3 class="quiz-title">${t('ui.quiz_title')}: ${t(PART_META[partId]?.titleKey) || partId}</h3>
    <div class="quiz-score" id="${scoreId}" style="display:none;">
      <span class="quiz-score-text"></span>
      <button class="quiz-retry-btn" id="${retryId}">${t('ui.retry')}</button>
    </div>
    ${questions.map((q, qi) => `
      <div class="quiz-card" data-question="${qi}">
        <div class="quiz-card-number">${qi + 1} / ${questions.length}</div>
        <div class="quiz-card-question">${q.question}</div>
        <div class="quiz-options">
          ${q.options.map((opt, oi) => `
            <button class="quiz-option" data-question-idx="${qi}" data-option-idx="${oi}">
              <span class="quiz-option-letter">${letters[oi] || oi}</span>
              <span>${opt}</span>
            </button>
          `).join('')}
        </div>
        <div class="quiz-explanation" id="quiz-expl-${partId}-${qi}">${q.explanation}</div>
      </div>
    `).join('')}
  `;

  // Event delegation for quiz option clicks
  section.onclick = (e) => {
    const optionBtn = e.target.closest('.quiz-option');

    // Handle retry button
    const retryBtn = e.target.closest('.quiz-retry-btn');
    if (retryBtn) {
      renderQuiz(questions, partId);
      return;
    }

    if (!optionBtn) return;

    const qi = parseInt(optionBtn.dataset.questionIdx, 10);
    const oi = parseInt(optionBtn.dataset.optionIdx, 10);
    const card = optionBtn.closest('.quiz-card');
    if (!card) return;

    // If already answered this question, ignore
    if (card.classList.contains('answered')) return;
    card.classList.add('answered');

    const q = questions[qi];
    const isCorrect = oi === q.answer;

    // Mark the selected option
    optionBtn.classList.add(isCorrect ? 'correct' : 'incorrect');

    // Always highlight the correct answer
    const allOptions = card.querySelectorAll('.quiz-option');
    allOptions.forEach((btn, idx) => {
      btn.disabled = true;
      if (idx === q.answer) btn.classList.add('correct');
    });

    // Show explanation
    const expl = document.getElementById(`quiz-expl-${partId}-${qi}`);
    if (expl) expl.classList.add('visible');

    // Track score
    answered++;
    if (isCorrect) correct++;

    // Check if all questions answered
    if (answered === questions.length) {
      State.quizScores[partId] = { correct, total: questions.length };
      State.save('quizScores');

      const scoreEl = document.getElementById(scoreId);
      if (scoreEl) {
        scoreEl.style.display = 'flex';
        const text = scoreEl.querySelector('.quiz-score-text');
        if (text) text.textContent = `${correct}/${questions.length} correct`;
      }
    }
  };
}

/* ============================================================
   Client-Side Search
   ============================================================ */

function buildSearchIndex() {
  SEARCH_INDEX.length = 0;

  for (const partId of PART_ORDER) {
    const html = PARTS[partId];
    if (!html) continue;

    // Parse HTML to extract accordion sections
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const accordions = doc.querySelectorAll('.accordion');

    accordions.forEach(acc => {
      const sectionId = acc.dataset.section || '';
      const header = acc.querySelector('.accordion-header');
      const body = acc.querySelector('.accordion-body');

      // Get heading text from header (exclude checkbox label text)
      const headingSpans = header?.querySelectorAll('span:not(.accordion-icon)');
      let heading = '';
      headingSpans?.forEach(s => {
        if (!s.closest('.section-check')) heading += s.textContent.trim() + ' ';
      });
      heading = heading.trim();

      const bodyText = body?.textContent?.trim() || '';
      const raw = bodyText.substring(0, 200);

      SEARCH_INDEX.push({
        partId,
        section: sectionId,
        heading,
        text: (heading + ' ' + bodyText).toLowerCase(),
        raw
      });
    });
  }
}

let searchDebounceTimer = null;

function openSearch() {
  const overlay = document.getElementById('search-overlay');
  if (!overlay) return;
  overlay.classList.add('open');
  const input = document.getElementById('search-input');
  if (input) {
    input.value = '';
    input.focus();
  }
  renderSearchResults('');
}

function closeSearch() {
  const overlay = document.getElementById('search-overlay');
  if (!overlay) return;
  overlay.classList.remove('open');
}

function renderSearchResults(query) {
  const container = document.getElementById('search-results');
  if (!container) return;

  if (!query || query.length < 2) {
    container.innerHTML = '<div class="search-empty">Type to search across all parts and topics.</div>';
    return;
  }

  const lowerQuery = query.toLowerCase();
  const matches = SEARCH_INDEX.filter(entry => entry.text.includes(lowerQuery));

  if (matches.length === 0) {
    container.innerHTML = '<div class="search-empty">No results found.</div>';
    return;
  }

  container.innerHTML = matches.map(m => {
    const partTitle = t(PART_META[m.partId]?.titleKey) || m.partId;
    // Create snippet with <mark> highlighting
    let snippet = m.raw;
    const idx = snippet.toLowerCase().indexOf(lowerQuery);
    if (idx !== -1) {
      const before = snippet.substring(0, idx);
      const match = snippet.substring(idx, idx + query.length);
      const after = snippet.substring(idx + query.length);
      snippet = `${escapeHtml(before)}<mark>${escapeHtml(match)}</mark>${escapeHtml(after)}`;
    } else {
      snippet = escapeHtml(snippet);
    }

    return `
      <div class="search-result" data-part="${m.partId}" data-section="${m.section}">
        <div class="search-result-title">${escapeHtml(partTitle)} &rsaquo; ${escapeHtml(m.heading)}</div>
        <div class="search-result-preview">${snippet}</div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Search trigger click
document.getElementById('search-trigger')?.addEventListener('click', openSearch);

// Keyboard shortcut: / to open search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && !e.target.closest('input, textarea, [contenteditable]')) {
    e.preventDefault();
    openSearch();
  }
  if (e.key === 'Escape') {
    closeSearch();
  }
});

// Close on click outside dialog
document.getElementById('search-overlay')?.addEventListener('click', (e) => {
  if (e.target.id === 'search-overlay') {
    closeSearch();
  }
});

// Search input handler (debounced 300ms)
document.getElementById('search-input')?.addEventListener('input', (e) => {
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    renderSearchResults(e.target.value.trim());
  }, 300);
});

// Click on search result: navigate and scroll to section
document.getElementById('search-results')?.addEventListener('click', async (e) => {
  const result = e.target.closest('.search-result');
  if (!result) return;

  const partId = result.dataset.part;
  const section = result.dataset.section;

  closeSearch();

  if (partId) {
    await navigateTo(partId);

    // Expand and scroll to the matching section
    if (section) {
      const article = document.getElementById('article-area');
      const accordion = article?.querySelector(`.accordion[data-section="${section}"]`);
      if (accordion) {
        accordion.classList.add('open');
        const icon = accordion.querySelector('.accordion-icon');
        if (icon) icon.textContent = '\u25BE';

        // Update collapsed state
        const key = `${partId}.${section}`;
        State.collapsed[key] = false;
        State.save('collapsed');

        accordion.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
  }
});

/* ============================================================
   Part Navigation + Tab Bar
   ============================================================ */

async function navigateTo(partId) {
  State.currentPart = partId;
  State.save('currentPart');

  const html = await loadPart(partId);
  const article = document.getElementById('article-area');
  if (article) {
    article.innerHTML = html + `
      <div class="quiz-trigger-wrap">
        <button class="quiz-trigger-btn" id="quiz-trigger-btn">${t('ui.quiz_title')} →</button>
      </div>`;
  }

  // Apply accordion and progress state after inserting HTML
  applyCollapsedState();
  applyProgressCheckboxes();

  applyI18N();
  renderSidebar();
  renderTabBar();

  // Load and render quiz (use translated quizzes if available)
  let questions = await loadQuiz(partId);
  const langData = I18N[State.lang];
  if (langData && langData.quizzes && langData.quizzes[partId]) {
    questions = langData.quizzes[partId];
  }
  renderQuiz(questions, partId);

  // Wire up "Take Quiz" button
  document.getElementById('quiz-trigger-btn')?.addEventListener('click', () => {
    const qs = document.getElementById('quiz-section');
    if (qs) {
      qs.style.display = 'block';
      qs.scrollIntoView({ behavior: 'smooth' });
    }
  });

  // Close sidebar on mobile after navigation
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('open');

  window.scrollTo(0, 0);
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  if (!bar) return;

  bar.innerHTML = PART_ORDER.map(id => {
    const title = t(PART_META[id].titleKey)
      .replace(/^Part \d+: /, '')
      .replace('Glossary & Quick Reference', 'Glossary');
    const isActive = id === State.currentPart;
    return `<button class="tab ${isActive ? 'active' : ''}" data-part="${id}">${title}</button>`;
  }).join('');
}

document.getElementById('tab-bar')?.addEventListener('click', (e) => {
  const tab = e.target.closest('[data-part]');
  if (tab) navigateTo(tab.dataset.part);
});

document.getElementById('nav-prev')?.addEventListener('click', () => {
  const idx = PART_ORDER.indexOf(State.currentPart);
  if (idx > 0) navigateTo(PART_ORDER[idx - 1]);
});

document.getElementById('nav-next')?.addEventListener('click', () => {
  const idx = PART_ORDER.indexOf(State.currentPart);
  if (idx < PART_ORDER.length - 1) navigateTo(PART_ORDER[idx + 1]);
});

/* ============================================================
   Hamburger Toggle (Mobile Sidebar)
   ============================================================ */

document.getElementById('hamburger')?.addEventListener('click', () => {
  document.getElementById('sidebar')?.classList.toggle('open');
  document.getElementById('sidebar-overlay')?.classList.toggle('open');
});

document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('open');
});

/* ============================================================
   Init
   ============================================================ */

async function init() {
  applyTheme();
  await loadI18N(State.lang);

  // Preload all parts for search index
  await Promise.all(PART_ORDER.map(id => loadPart(id)));

  // Build search index from all loaded parts
  buildSearchIndex();

  applyI18N();
  updateLangMenuActive();
  renderSidebar();
  renderTabBar();

  const article = document.getElementById('article-area');
  if (article) {
    article.innerHTML = (PARTS[State.currentPart] || '') + `
      <div class="quiz-trigger-wrap">
        <button class="quiz-trigger-btn" id="quiz-trigger-btn">${t('ui.quiz_title')} →</button>
      </div>`;
  }

  // Apply interactive state to initial content
  applyCollapsedState();
  applyProgressCheckboxes();

  // Load and render quiz for initial part (use translated quizzes if available)
  let questions = await loadQuiz(State.currentPart);
  const initLangData = I18N[State.lang];
  if (initLangData && initLangData.quizzes && initLangData.quizzes[State.currentPart]) {
    questions = initLangData.quizzes[State.currentPart];
  }
  renderQuiz(questions, State.currentPart);

  // Wire up "Take Quiz" button
  document.getElementById('quiz-trigger-btn')?.addEventListener('click', () => {
    const qs = document.getElementById('quiz-section');
    if (qs) {
      qs.style.display = 'block';
      qs.scrollIntoView({ behavior: 'smooth' });
    }
  });

  window.scrollTo(0, 0);
}

init();

</script>
<template id="tpl-glossary"><section class="part" data-part="glossary">
  <div class="part-header">
    <h2 data-i18n="parts.glossary.title">Glossary &amp; Quick Reference</h2>
    <p class="part-subtitle">Appendix</p>
    <div class="part-controls">
      <button class="expand-all-btn" data-i18n="ui.expand_all">Expand All</button>
    </div>
  </div>

  <div class="accordion" data-section="G.1">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>G.1 Context &amp; Assembly Terms</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="glossary.G.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.glossary.sections.G_1.content">
      <p>These terms describe how information is gathered, managed, and degraded within Claude's working memory.</p>

      <table>
        <tr><th>Term</th><th>Definition</th></tr>
        <tr><td><strong>Context Assembly</strong></td><td>The process of gathering rules, files, memos, and tool descriptions needed for the current task into the actual input context. A selection process, not a dumping process.</td></tr>
        <tr><td><strong>Context Rot</strong></td><td>The phenomenon where early signals weaken as the context grows longer. Long conversations gradually lose coherence because important early instructions get diluted by later content.</td></tr>
        <tr><td><strong>Memoized Context</strong></td><td>Background information held across turns so Claude doesn't need re-briefing each time. "Computed once, reused many times."</td></tr>
        <tr><td><strong>Prompt Cache</strong></td><td>A mechanism that provides reuse benefits when similar context prefixes are sent repeatedly. Stable prefixes (CLAUDE.md, rules) should remain consistent to maximize cache hits.</td></tr>
        <tr><td><strong>Token Economy</strong></td><td>The discipline of deciding what information stays permanently loaded, what loads on demand, and what gets trimmed — balancing quality against cost.</td></tr>
        <tr><td><strong>Tool Result Budget</strong></td><td>The practice of controlling how much context space tool outputs consume. Long logs and verbose results eat the context window and degrade quality.</td></tr>
      </table>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Context Assembly is not "more is better." It is the selective process of including only what matters for the current task. Tool Result Budget is not optional — it is what prevents a single verbose test run from consuming half your context window.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="G.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>G.2 Session &amp; Continuity Terms</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="glossary.G.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.glossary.sections.G_2.content">
      <table>
        <tr><th>Term</th><th>Definition</th></tr>
        <tr><td><strong>Resumable Session</strong></td><td>The ability to pick up where you left off after disconnection or session change, using saved state files.</td></tr>
        <tr><td><strong>Resume Hygiene</strong></td><td>The habit of cleaning up state before resuming — keeping only what the next session needs and discarding accumulated noise.</td></tr>
        <tr><td><strong>Session Memory</strong></td><td>Structured state preserved for continuation: current status, important files, workflow, errors, and results. Not the raw conversation transcript.</td></tr>
        <tr><td><strong>Handoff</strong></td><td>A formatted memo left for the next session or person, containing current state, next steps, and unresolved risks.</td></tr>
        <tr><td><strong>Slash Command</strong></td><td>Session management commands like <code>/compact</code>, <code>/clear</code>, <code>/context</code>, <code>/memory</code>, <code>/cost</code> used within Claude Code.</td></tr>
        <tr><td><strong>Fork Session</strong></td><td>Creating a new session branch when the current direction needs to diverge, preserving the original session state.</td></tr>
        <tr><td><strong>Background Execution</strong></td><td>Work that continues after you leave the terminal — the session keeps running without active human monitoring.</td></tr>
      </table>
    </div>
  </div>

  <div class="accordion" data-section="G.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>G.3 Harness &amp; Structure Terms</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="glossary.G.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.glossary.sections.G_3.content">
      <table>
        <tr><th>Term</th><th>Definition</th></tr>
        <tr><td><strong>Harness</strong></td><td>The outer structure defining what Claude can read, modify, and verify. Like a colleague's workspace: reference materials, accessible drawers, and a checklist.</td></tr>
        <tr><td><strong>Harness Engineering</strong></td><td>Designing the entire work environment — not just better prompts, but the rules, permissions, files, and verification structures Claude operates within.</td></tr>
        <tr><td><strong>CLAUDE.md</strong></td><td>The project contract file — always loaded, contains execution commands, forbidden boundaries, and structural descriptions.</td></tr>
        <tr><td><strong>Worktree</strong></td><td>A separate working directory from the same repository, used for parallel work without file conflicts.</td></tr>
        <tr><td><strong>Plan Mode</strong></td><td>A pattern where exploration and execution are separated — Claude plans before editing, reducing wrong-assumption implementations.</td></tr>
        <tr><td><strong>Review Split</strong></td><td>Separating implementation and review into different sessions to reduce context pollution and approval fatigue.</td></tr>
        <tr><td><strong>Agentic Loop</strong></td><td>The recurring cycle: read → judge → use tools → continue. Work that spans multiple turns, not a single question-answer pair.</td></tr>
      </table>
    </div>
  </div>

  <div class="accordion" data-section="G.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>G.4 Extension &amp; Tool Terms</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="glossary.G.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.glossary.sections.G_4.content">
      <table>
        <tr><th>Term</th><th>Definition</th></tr>
        <tr><td><strong>Skill</strong></td><td>A reusable procedure file (folder) that standardizes repeated tasks. Contains instructions, scripts, references, and assets.</td></tr>
        <tr><td><strong>Plugin</strong></td><td>A deployable package bundling skills, commands, hooks, and connection settings. The "onboarding box" for teams.</td></tr>
        <tr><td><strong>MCP (Model Context Protocol)</strong></td><td>The standardized connection protocol for Claude to reach external tools and services. Like USB-C for AI tool integration.</td></tr>
        <tr><td><strong>Connector</strong></td><td>A user-facing interface for connecting to external services (Notion, Drive, Slack). Simpler than MCP, less control.</td></tr>
        <tr><td><strong>Hook</strong></td><td>An automatic intervention rule at specific moments (pre-tool-use, post-edit, pre-push). Turns "remember to check" into "always check."</td></tr>
        <tr><td><strong>Subagent</strong></td><td>A secondary worker within the current session with isolated context. Used for research, review, or risk-checking without polluting the main session.</td></tr>
        <tr><td><strong>Agent Team</strong></td><td>Multiple sessions operating in parallel with message exchange and task allocation — like a real team with a lead and members.</td></tr>
        <tr><td><strong>Control Surface</strong></td><td>Where users can adjust work behavior — not a feature list, but the points where you can intervene in the workflow.</td></tr>
      </table>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Quick decision framework: "Same format every time?" → Skill. "Need external data?" → MCP/Connector. "Deploy to the whole team?" → Plugin. "Must verify automatically?" → Hook. "Need parallel context?" → Subagent/Worktree.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="G.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>G.5 Governance &amp; Safety Terms</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="glossary.G.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.glossary.sections.G_5.content">
      <table>
        <tr><th>Term</th><th>Definition</th></tr>
        <tr><td><strong>Permission Gate</strong></td><td>The boundary between allow, ask, and deny — evaluated before any action executes.</td></tr>
        <tr><td><strong>Approval Gate</strong></td><td>A checkpoint requiring human sign-off before the next step proceeds. Critical for external communications, deployments, and data modifications.</td></tr>
        <tr><td><strong>Allowlist</strong></td><td>A policy that only passes specifically permitted items (commands, users, domains). Safer than blocking specific threats.</td></tr>
        <tr><td><strong>Auditability</strong></td><td>The ability to explain later: what was read, what was changed, who approved, and what remains. The foundation of sustainable automation.</td></tr>
        <tr><td><strong>Alignment Faking</strong></td><td>A research concept where a model appears to follow instructions while internally maintaining different objectives. The practical takeaway: don't trust model compliance alone — build external verification.</td></tr>
        <tr><td><strong>Autonomy</strong></td><td>How far work can proceed without human intervention. Higher autonomy requires stronger verification, approval, and permission boundaries.</td></tr>
        <tr><td><strong>Agency</strong></td><td>Human initiative in choosing what to delegate, when, and with what constraints. Not about giving more commands — about making better delegation decisions.</td></tr>
        <tr><td><strong>Tool Orchestration</strong></td><td>The layer deciding which tools to invoke, in what sequence, and with what parameters.</td></tr>
      </table>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Observability (seeing system state via dashboards and analytics) and auditability (explaining what happened and why after the fact) are different. You need both: observability for operational efficiency, auditability for accountability and trust.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="G.6">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>G.6 Ecosystem &amp; Infrastructure Terms</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="glossary.G.6"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.glossary.sections.G_6.content">
      <table>
        <tr><th>Term</th><th>Definition</th></tr>
        <tr><td><strong>LLM OS</strong></td><td>A metaphor for the emerging work layer: context, tools, permissions, and memory surrounding a model, analogous to how an OS manages programs, files, permissions, and devices.</td></tr>
        <tr><td><strong>Software 3.0</strong></td><td>The concept that natural language itself is becoming a programming interface — work instructions are code.</td></tr>
        <tr><td><strong>Vibe Coding</strong></td><td>Generating code through natural language, extended now to include testing, reviewing, refactoring, documentation, and deployment.</td></tr>
        <tr><td><strong>Remote Control</strong></td><td>A human resuming or steering a running session from a distance (different device, different location).</td></tr>
        <tr><td><strong>Channels</strong></td><td>External systems pushing events into Claude (webhooks, messages) — the trigger comes from outside, not from a human.</td></tr>
        <tr><td><strong>Scheduled Tasks</strong></td><td>Time-triggered automation — cron-like execution where the clock starts the work.</td></tr>
        <tr><td><strong>Agent SDK</strong></td><td>Developer tools for building custom agent applications with Claude as the execution engine inside your own product.</td></tr>
        <tr><td><strong>Adaptive Thinking</strong></td><td>Claude adjusting its reasoning depth based on task complexity — thinking longer for hard tasks, shorter for simple ones.</td></tr>
      </table>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> When confused by a term, ask: "Is this about how work flows (mechanics), how mistakes are prevented (safety), or how sessions persist (continuity)?" This three-bucket mental model covers the vast majority of Claude Code terminology.
      </div>
    </div>
  </div>
</section>

<template id="tpl-part1"><section class="part" data-part="part1">
  <div class="part-header">
    <h2 data-i18n="parts.part1.title">Part 1: Building Fundamentals</h2>
    <p class="part-subtitle">Chapters 1–2</p>
    <div class="part-controls">
      <button class="expand-all-btn" data-i18n="ui.expand_all">Expand All</button>
    </div>
  </div>

  <div class="accordion" data-section="1.1">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>1.1 Why the Ecosystem Is Hot</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part1.1.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part1.sections.1_1.content">
      <p>The AI landscape shifted from "which model is smarter" to "which tool connects files, tests, Git, browser, and external services with the least friction." This is why Claude Code, Codex, and Gemini CLI are discussed together — the competition is now about <strong>work paths</strong>, not benchmark scores.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Claude Code is not just a coding app. It is a <em>work harness</em> combining memoized context, tool orchestration, permission gates, and resumable sessions. Cowork, Skills, Plugins, and Scheduled Tasks are extensions of this core harness into non-coding work.
      </div>

      <p>Research confirms this direction. METR reports that agent task horizons are growing rapidly, and Anthropic notes that the real performance gap comes from task structure and verification habits, not model names. The question is no longer "how smart is the model?" but "who learns delegation rules and verification harnesses faster?"</p>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Start by asking: "Is my task question-based, document-based, or implementation-based?" This single question determines whether you should use Chat, Projects, Cowork, or Claude Code.
      </div>

      <table>
        <tr><th>What Changes Fast</th><th>What Lasts</th></tr>
        <tr><td>Menu locations, plan tiers, preview status, feature names</td><td>Which work path to use, how to separate files and verification, where to place human checkpoints</td></tr>
      </table>
    </div>
  </div>

  <div class="accordion" data-section="1.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>1.2 Four Key Terms to Remember</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part1.1.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part1.sections.1_2.content">
      <p>Before diving deeper, internalize these four terms. Every chapter builds on them.</p>

      <table>
        <tr><th>Term</th><th>Meaning</th></tr>
        <tr><td><strong>Memoized Context</strong></td><td>Background info held across turns so you don't re-explain every time</td></tr>
        <tr><td><strong>Tool Orchestration</strong></td><td>The layer that decides which tools to use, in what order</td></tr>
        <tr><td><strong>Permission Gate</strong></td><td>The boundary that separates allow, ask, and deny before execution</td></tr>
        <tr><td><strong>Resumable Session</strong></td><td>The ability to pick up where you left off, even after disconnection</td></tr>
      </table>

      <p>These form a pipeline: <strong>User Request → Memoized Context → Tool Orchestration → Permission Gate → Execution & Verification → Resumable Session → Next Task</strong>. No matter how complex a workflow gets, it is always a variation of these five stages.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> "Memoized" doesn't mean "memorized." It means "computed once, reused many times" — like setting background rules that persist across every turn without re-sending them.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="1.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>1.3 The Harness Concept</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part1.1.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part1.sections.1_3.content">
      <p>A <strong>harness</strong> is the outer structure that defines what Claude can read, modify, and verify. Think of it as setting up a colleague's workspace: you place reference materials on the desk, decide which drawers are accessible, and attach a checklist to complete before finishing.</p>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Sending "Fix the login bug" with no boundaries. A strong harness request looks like: "Read only <code>auth/</code>, don't touch <code>.env</code>, pass login tests, leave a 3-line change note."
      </div>

      <p><strong>Harness Engineering</strong> is not about writing smarter prompts — it is about designing the workspace where Claude operates. It includes: which files are always loaded, what permissions are set, what tests must pass, and where results are stored.</p>

      <p>The International AI Safety Report 2026 confirms: as model capabilities rise, harness and verification structures become <em>more</em> important, not less. Real-world tasks involve resource constraints, incomplete information, exceptions, and approval flows that raw model intelligence cannot handle alone.</p>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Even beginners can start building a harness: write basic rules in <code>CLAUDE.md</code>, set allow/deny scopes in <code>settings.json</code>, split big tasks with <code>plan.md</code>, and leave session state in <code>handoff.md</code>.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="1.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>1.4 Work Surfaces: Chat, Projects, Cowork, Claude Code</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part1.1.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part1.sections.1_4.content">
      <p>The same Claude model behaves differently depending on which surface you use. Choosing the wrong surface is not a skill problem — it is a routing problem.</p>

      <table>
        <tr><th>Surface</th><th>Best For</th><th>Influenced By</th></tr>
        <tr><td><strong>Chat</strong></td><td>Quick questions, idea sorting</td><td>Question quality</td></tr>
        <tr><td><strong>Projects</strong></td><td>Persistent background knowledge</td><td>Folder structure, templates</td></tr>
        <tr><td><strong>Cowork</strong></td><td>Document delegation — research, briefs, file organization</td><td>Folder structure, templates</td></tr>
        <tr><td><strong>Claude Code</strong></td><td>Implementation and verification — code, tests, reviews</td><td>Rule files, verification loops</td></tr>
      </table>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Three misconceptions: (1) "Same model means same experience everywhere" — wrong, the surface matters enormously. (2) "Cowork is easy mode, Claude Code is hard mode" — wrong, they differ by delegation style, not difficulty. (3) "Try all surfaces at once" — wrong, master one first then expand.
      </div>

      <p><strong>Good first tasks by surface:</strong></p>
      <ul>
        <li><strong>Chat:</strong> "Summarize this report in 5 sentences with 3 questions."</li>
        <li><strong>Projects:</strong> "Read this folder and create a one-page background knowledge summary."</li>
        <li><strong>Cowork:</strong> "Read meeting notes and save a weekly brief draft to <code>outputs/</code>."</li>
        <li><strong>Claude Code:</strong> "Read this bug reproduction path, then write a hypothesis and fix plan in <code>plan.md</code>."</li>
      </ul>
    </div>
  </div>

  <div class="accordion" data-section="1.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>1.5 What Changes Fast vs. What Stays</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part1.1.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part1.sections.1_5.content">
      <p>Technology products evolve rapidly. To stay grounded, distinguish between volatile details and lasting principles.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> The ecosystem is "hot" when four conditions are met simultaneously: (1) user behavior changes — people design workspaces instead of crafting prompts, (2) operational habits change — teams maintain <code>CLAUDE.md</code> as shared contracts, (3) the ecosystem expands — official and community skills, plugins, MCP servers multiply, (4) job roles are redesigned — marketing, tax, PM, design teams use Claude as an automation layer, not just a chatbot.
      </div>

      <p><strong>The four frames for reading the entire book:</strong></p>
      <table>
        <tr><th>Frame</th><th>Role</th><th>Analogy</th></tr>
        <tr><td>Work Path</td><td>Where you start (Chat, Cowork, Claude Code)</td><td>The desk you sit at</td></tr>
        <tr><td>Harness</td><td>The execution environment (permissions, rules, tests)</td><td>Drawers, locks, checklists on the desk</td></tr>
        <tr><td>Operations Layer</td><td>Scheduling, deployment, analytics</td><td>The admin office</td></tr>
        <tr><td>System</td><td>Everything combined with human review loops</td><td>The entire office building</td></tr>
      </table>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> When a new feature launches, don't ask "Is it smarter?" Ask: "Which layer did they add — knowledge, tools, packages, or controls?" This prevents over-configuration and keeps your setup stable.
      </div>
    </div>
  </div>
</section>

<template id="tpl-part2"><section class="part" data-part="part2">
  <div class="part-header">
    <h2 data-i18n="parts.part2.title">Part 2: Practical Playbook</h2>
    <p class="part-subtitle">Chapters 3–4</p>
    <div class="part-controls">
      <button class="expand-all-btn" data-i18n="ui.expand_all">Expand All</button>
    </div>
  </div>

  <div class="accordion" data-section="2.1">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>2.1 Cowork &amp; Claude Code: First Application Boundaries</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part2.2.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part2.sections.2_1.content">
      <p>The most common confusion after installation is: "Where do I start?" The answer depends on your task type.</p>

      <table>
        <tr><th>Cowork</th><th>Claude Code</th></tr>
        <tr><td>Document-first tasks: meeting notes, research briefs, folder reading, draft generation</td><td>Development-first tasks: bug fixes, tests, refactoring, plan documents</td></tr>
        <tr><td>Don't expect it to be a universal backend system</td><td>Don't start by delegating an entire new feature at once</td></tr>
      </table>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> This chapter is not about <em>how to use</em> Claude Code — it is about <em>how to operate</em> it. The core habits are: plan-before-edit, resume hygiene, review split, worktree separation, allowlists, and structured handoffs.
      </div>

      <p>Session management follows a decision tree:</p>
      <ul>
        <li><strong>Same goal, continuing?</strong> → <code>claude --continue</code> or <code>--resume</code></li>
        <li><strong>Need a different direction?</strong> → <code>--fork-session</code></li>
        <li><strong>File conflicts or role conflicts?</strong> → <code>--worktree</code> (separate working directory)</li>
      </ul>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> People who use Claude Code well over time are not people who write better prompts — they are people who make work less interruptible.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="2.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>2.2 Claude Code Operating Principles</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part2.2.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part2.sections.2_2.content">
      <p>Eight habits separate productive Claude Code users from frustrated ones:</p>
      <ol>
        <li><strong>Plan before edit</strong> — Fix scope, verification, and no-go zones before touching code. For big tasks, write <code>plan.md</code> first.</li>
        <li><strong>Keep resident context thin</strong> — <code>CLAUDE.md</code> is a work contract, not an encyclopedia. Move long-term state to <code>handoff.md</code>, <code>decision-log.md</code>.</li>
        <li><strong>Allowlist first, bypass later</strong> — Start with narrow <code>allow</code> and <code>deny</code> rules. Only widen permissions after understanding them.</li>
        <li><strong>Manual <code>/compact</code> at the right time</strong> — Compress after saving important state to files, not after the session has already degraded.</li>
        <li><strong>Use resume deliberately</strong> — <code>--continue</code> for same direction, <code>--fork-session</code> when direction splits.</li>
        <li><strong>Separate plan / implement / review</strong> — Don't cram all roles into one session. Split reduces context pollution and approval fatigue.</li>
        <li><strong>Use worktrees</strong> — For conflicting work, experiments, or parallel reviews, separate the working directory.</li>
        <li><strong>Manage cost by structure, not token counting</strong> — Reduce cache misses, tool output length, session length, and test log verbosity.</li>
      </ol>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Jumping straight to implementation without a plan. In big tasks, this feels fast but leads to rework. The plan is not a bureaucratic step — it is a device that reduces rework.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="2.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>2.3 Templates: CLAUDE.md, settings.json, Hooks</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part2.2.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part2.sections.2_3.content">
      <p>A well-organized repository separates responsibilities across files. Here is the harness blueprint:</p>

      <pre><code>repo/
├── CLAUDE.md                    # Project contract (always loaded)
├── .claude/
│   ├── settings.json            # Allow/ask/deny boundaries
│   ├── rules/
│   │   ├── architecture.md      # Structure rules
│   │   ├── testing.md           # Test standards
│   │   └── frontend.md          # UI conventions
│   └── hooks.json               # Auto-enforcement rules
└── tasks/
    ├── plan.md                  # What to do next
    ├── verify.md                # Exit criteria
    ├── decision-log.md          # Why this path was chosen
    └── handoff.md               # Current state for next session</code></pre>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Each file prevents a different type of failure. <code>CLAUDE.md</code> prevents context drift. <code>settings.json</code> prevents unsafe actions. <code>rules/*</code> prevents domain-specific mistakes. <code>hooks.json</code> turns "remember to do X" into "always do X." <code>tasks/*</code> prevents session amnesia.
      </div>

      <p><strong>Settings scope priority:</strong> Managed &gt; Command-line &gt; Local &gt; Project &gt; User. Organization-locked rules cannot be overridden by individual settings — this is why "my setting doesn't work" confusion often happens.</p>

      <p><strong>Team vs. local separation:</strong> Team-shared standards go in <code>CLAUDE.md</code> and <code>.claude/settings.json</code>. Personal experiments go in <code>CLAUDE.local.md</code> or <code>.claude/settings.local.json</code>.</p>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> A minimal hook example that blocks dangerous Bash commands:
      </div>
      <pre><code>{
  "hooks": {
    "PreToolUse": [{
      "matcher": "Bash",
      "hooks": [{
        "type": "command",
        "command": ".claude/hooks/block-rm.sh"
      }]
    }]
  }
}</code></pre>
    </div>
  </div>

  <div class="accordion" data-section="2.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>2.4 Prompt Templates &amp; Engineering Layers</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part2.2.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part2.sections.2_4.content">
      <p>Effective prompts are not about cleverness — they follow patterns. Here are the key prompt styles:</p>

      <p><strong>Context-first prompt (recommended start routine):</strong></p>
      <pre><code>Read CLAUDE.md, relevant rules, and tasks/verify.md first.
Do NOT implement yet. Summarize:
1. Task type
2. Modification scope
3. Off-limits areas
4. Verification commands
Then proceed only after approval.</code></pre>

      <p><strong>Shortcut-prevention prompt (for coding tasks):</strong></p>
      <pre><code>Goal: maintainable implementation, not just passing tests.
Rules:
1. No hardcoding or special-casing to pass tests.
2. If tests conflict with requirements, report first.
3. If using external code, explain why before importing.
4. Separate direct implementation from external references.
5. After changes, report what passed and what's unverified.</code></pre>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> The three engineering layers: (1) <strong>Prompt Engineering</strong> — crafting better instructions, (2) <strong>Context Engineering</strong> — choosing what to show Claude, (3) <strong>Harness Engineering</strong> — designing the entire work environment. Most people stop at layer 1. The real gains come from layers 2 and 3.
      </div>

      <p><strong>Compact Instructions template</strong> — controls what survives after <code>/compact</code>:</p>
      <pre><code>## Compact Instructions
When compacting, always preserve:
- Last modified files and why
- Passed tests, failed tests, untested items
- Rejected alternatives and reasons
- The ONE thing next turn should do immediately
- Risk points requiring human review</code></pre>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Good compression instructions don't make summaries pretty — they make the next session able to continue immediately.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="2.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>2.5 Evaluation Loops &amp; Session Commands</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part2.2.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part2.sections.2_5.content">
      <p>Six slash commands form your session management toolkit:</p>

      <table>
        <tr><th>Command</th><th>When to Use</th></tr>
        <tr><td><code>/clear</code></td><td>Wipe accumulated conversation and restart fresh</td></tr>
        <tr><td><code>/compact [focus]</code></td><td>Summarize long conversation, specifying what to keep</td></tr>
        <tr><td><code>/context</code></td><td>Check what is consuming context space</td></tr>
        <tr><td><code>/memory</code></td><td>See which memory files and CLAUDE.md layers are loaded</td></tr>
        <tr><td><code>/init</code></td><td>Auto-generate a CLAUDE.md draft for a new repository</td></tr>
        <tr><td><code>/cost</code></td><td>Check current token usage and cost</td></tr>
      </table>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Weekly evaluation should track: which CLAUDE.md / rules / hook versions were active, which skills or templates were used, what changed from last week, and whether pass rates and human correction amounts improved. Change rules and hooks — not just prompts — to find your optimal configuration.
      </div>

      <p><strong>Recommended learning path for official resources:</strong></p>
      <ol>
        <li>Release notes → what's possible now</li>
        <li>Claude Help Center → product paths (Cowork, Skills, Connectors)</li>
        <li>Claude Code Docs → advanced features (plugins, hooks, agent teams)</li>
        <li>API / Agent SDK docs → building custom agent applications</li>
        <li>GitHub repositories → real examples and structures</li>
      </ol>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Reading demo posts as specifications, or official docs as operational tips. Keep the roles separate: official docs confirm facts and boundaries; community posts reveal patterns and failure modes; repositories show actual structure.
      </div>
    </div>
  </div>
</section>
