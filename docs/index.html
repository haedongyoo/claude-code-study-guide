>Claude Code：</strong>“读取这个 bug 复现路径，然后在 <code>plan.md</code> 中写出假设和修复计划。”</li>\n      </ul>"}, "1_5": {"title": "快速变化与保持稳定的内容", "content": "<p>技术产品演进迅速。为了保持清醒，要区分易变的细节与持久的原则。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>当以下四个条件同时满足时，生态系统就进入了“热”状态：(1) 用户行为改变——人们开始设计工作空间而非打磨提示词；(2) 操作习惯改变——团队将 <code>CLAUDE.md</code> 作为共同契约来维护；(3) 生态系统扩展——官方和社区的 Skills、Plugins、MCP 服务器不断涌现；(4) 岗位职责重塑——市场、税务、PM、设计团队将 Claude 作为自动化层而非聊天机器人来使用。\n      </div>\n\n      <p><strong>理解本书的四个框架：</strong></p>\n      <table>\n        <tr><th>框架</th><th>作用</th><th>类比</th></tr>\n        <tr><td>工作路径</td><td>你的起点（Chat、Cowork、Claude Code）</td><td>你坐的那张桌子</td></tr>\n        <tr><td>Harness</td><td>执行环境（权限、规则、测试）</td><td>桌上的抽屉、锁和清单</td></tr>\n        <tr><td>运营层</td><td>调度、部署、分析</td><td>行政办公室</td></tr>\n        <tr><td>系统</td><td>一切加上人工审查循环</td><td>整栋办公楼</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>当新功能上线时，不要问“它更聪明了吗？”而要问：“他们在哪一层新增了什么——知识、工具、套件还是控制？”这样能避免过度配置，保持设置的稳定。\n      </div>"}}}, "part2": {"title": "第二部分：实践手册", "sections": {"2_1": {"title": "Cowork 与 Claude Code：首要应用边界", "content": "<p>安装后最常见的困惑是：“从哪里开始？”答案取决于你的任务类型。</p>\n\n      <table>\n        <tr><th>Cowork</th><th>Claude Code</th></tr>\n        <tr><td>文档优先的任务：会议记录、研究简报、文件夹读取、草稿生成</td><td>开发优先的任务：bug 修复、测试、重构、计划文档</td></tr>\n        <tr><td>不要期望它成为通用后端系统</td><td>不要一开始就把整个新功能全部委派出去</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>本章不是关于<em>如何使用</em> Claude Code——而是关于<em>如何运营</em>它。核心习惯是：先计划再编辑、恢复规范、审查分离、worktree 隔离、白名单管理，以及结构化交接。\n      </div>\n\n      <p>会话管理遵循一棵决策树：</p>\n      <ul>\n        <li><strong>目标相同，继续进行？</strong> → <code>claude --continue</code> 或 <code>--resume</code></li>\n        <li><strong>需要不同方向？</strong> → <code>--fork-session</code></li>\n        <li><strong>文件冲突或角色冲突？</strong> → <code>--worktree</code>（独立工作目录）</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>长期用好 Claude Code 的人，不是那些能写出更好提示词的人——而是那些让工作更少被打断的人。\n      </div>"}, "2_2": {"title": "Claude Code 操作原则", "content": "<p>八个习惯区分了高效的 Claude Code 用户与沮丧的用户：</p>\n      <ol>\n        <li><strong>先计划再编辑</strong> — 在动代码之前确定范围、验证方式和禁区。大型任务先写 <code>plan.md</code>。</li>\n        <li><strong>保持常驻上下文精简</strong> — <code>CLAUDE.md</code> 是工作契约，不是百科全书。将长期状态移至 <code>handoff.md</code>、<code>decision-log.md</code>。</li>\n        <li><strong>先建白名单，再考虑绕过</strong> — 从严格的 <code>allow</code> 和 <code>deny</code> 规则开始。只有在充分理解后才扩大权限。</li>\n        <li><strong>在恰当时机手动执行 <code>/compact</code></strong> — 在将重要状态保存到文件之后压缩，而不是等到会话已经降级才动手。</li>\n        <li><strong>有意图地使用恢复</strong> — 同方向时用 <code>--continue</code>，方向分叉时用 <code>--fork-session</code>。</li>\n        <li><strong>分离计划／实现／审查</strong> — 不要把所有角色塞进一个会话。分离能减少上下文污染和审批疲劳。</li>\n        <li><strong>使用 worktrees</strong> — 对于存在冲突的工作、实验或并行审查，隔离工作目录。</li>\n        <li><strong>通过结构管理成本，而非计数 token</strong> — 减少缓存未命中、工具输出长度、会话长度和测试日志冗余。</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>没有计划就直接开始实现。在大型任务中，这感觉很快，但会导致返工。计划不是官僚步骤——它是减少返工的装置。\n      </div>"}, "2_3": {"title": "模板：CLAUDE.md、settings.json、Hooks", "content": "<p>一个组织良好的代码库会将职责分散到各个文件中。以下是 harness 蓝图：</p>\n\n      <pre><code>repo/\n├── CLAUDE.md                    # 项目契约（始终加载）\n├── .claude/\n│   ├── settings.json            # Allow/ask/deny 边界\n│   ├── rules/\n│   │   ├── architecture.md      # 架构规则\n│   │   ├── testing.md           # 测试标准\n│   │   └── frontend.md          # UI 规范\n│   └── hooks.json               # 自动执行规则\n└── tasks/\n    ├── plan.md                  # 下一步要做什么\n    ├── verify.md                # 退出标准\n    ├── decision-log.md          # 为何选择这条路\n    └── handoff.md               # 下一个会话的当前状态</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>每个文件预防不同类型的失败。<code>CLAUDE.md</code> 防止上下文漂移。<code>settings.json</code> 防止不安全操作。<code>rules/*</code> 防止领域特定错误。<code>hooks.json</code> 将“记得要做 X”变成“总是做 X”。<code>tasks/*</code> 防止会话失忆。\n      </div>\n\n      <p><strong>settings 作用域优先级：</strong>Managed &gt; Command-line &gt; Local &gt; Project &gt; User。组织锁定的规则不能被个人设置覆盖——这就是为什么“我的设置不生效”的困惑经常出现。</p>\n\n      <p><strong>团队与本地的分离：</strong>团队共享标准放在 <code>CLAUDE.md</code> 和 <code>.claude/settings.json</code> 中。个人实验放在 <code>CLAUDE.local.md</code> 或 <code>.claude/settings.local.json</code> 中。</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>一个阻断危险 Bash 命令的最小化 Hook 示例：\n      </div>\n      <pre><code>{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \".claude/hooks/block-rm.sh\"\n      }]\n    }]\n  }\n}</code></pre>"}, "2_4": {"title": "提示词模板与工程层级", "content": "<p>有效的提示词不在于聪明——而在于遵循模式。以下是关键的提示词风格：</p>\n\n      <p><strong>上下文优先的提示词（推荐的启动流程）：</strong></p>\n      <pre><code>先读取 CLAUDE.md、相关规则和 tasks/verify.md。\n尚不实现。总结：\n1. 任务类型\n2. 修改范围\n3. 禁区\n4. 验证命令\n获得批准后再继续。</code></pre>\n\n      <p><strong>防走捷径的提示词（用于编码任务）：</strong></p>\n      <pre><code>目标：可维护的实现，而不仅仅是通过测试。\n规则：\n1. 不硬编码或特殊处理来通过测试。\n2. 如果测试与需求冲突，先上报。\n3. 如果使用外部代码，在导入前说明原因。\n4. 将直接实现与外部引用分开。\n5. 修改后，报告通过了什么，以及哪些未经验证。</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>三个工程层级：(1) <strong>Prompt Engineering（提示词工程）</strong>——打磨更好的指令；(2) <strong>Context Engineering（上下文工程）</strong>——选择向 Claude 展示什么；(3) <strong>Harness Engineering（Harness 工程）</strong>——设计整个工作环境。大多数人止步于第一层。真正的收益来自第二层和第三层。\n      </div>\n\n      <p><strong>压缩指令模板</strong>——控制 <code>/compact</code> 之后保留什么：</p>\n      <pre><code>## Compact Instructions\n压缩时，始终保留：\n- 最后修改的文件及原因\n- 通过的测试、失败的测试、未测试的项目\n- 被拒绝的替代方案及原因\n- 下一轮应立即执行的唯一事项\n- 需要人工审查的风险点</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>好的压缩指令不是让摘要变得好看——而是让下一个会话能够立即继续。\n      </div>"}, "2_5": {"title": "评估循环与会话命令", "content": "<p>六个斜杠命令构成你的会话管理工具箱：</p>\n\n      <table>\n        <tr><th>命令</th><th>使用时机</th></tr>\n        <tr><td><code>/clear</code></td><td>清除积累的对话，重新开始</td></tr>\n        <tr><td><code>/compact [focus]</code></td><td>总结长对话，指定保留内容</td></tr>\n        <tr><td><code>/context</code></td><td>检查哪些内容正在消耗上下文空间</td></tr>\n        <tr><td><code>/memory</code></td><td>查看已加载的记忆文件和 CLAUDE.md 层级</td></tr>\n        <tr><td><code>/init</code></td><td>为新代码库自动生成 CLAUDE.md 草稿</td></tr>\n        <tr><td><code>/cost</code></td><td>查看当前 token 使用量和成本</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>每周评估应追踪：哪些 CLAUDE.md / rules / Hook 版本处于活跃状态，使用了哪些 Skills 或模板，与上周相比有什么变化，以及通过率和人工纠正量是否有所改善。修改规则和 Hooks——而不仅仅是提示词——以找到最优配置。\n      </div>\n\n      <p><strong>官方资源的推荐学习路径：</strong></p>\n      <ol>\n        <li>更新日志 → 当前可用的功能</li>\n        <li>Claude 帮助中心 → 产品路径（Cowork、Skills、Connectors）</li>\n        <li>Claude Code 文档 → 高级功能（Plugins、Hooks、智能体团队）</li>\n        <li>API / Agent SDK 文档 → 构建自定义智能体应用</li>\n        <li>GitHub 代码库 → 真实示例和结构</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>将演示文章当作规范来读，或将官方文档当作操作技巧来读。保持角色分离：官方文档确认事实和边界；社区文章揭示模式和故障模式；代码库展示真实结构。\n      </div>"}}}, "part3": {"title": "第三部分：系统设计", "sections": {"3_1": {"title": "上下文工程深度解析", "content": "<p><strong>上下文工程（Context Engineering）</strong>是一门选择 Claude 在任意时刻应看到哪些信息的学科。它不是关于写更长的提示词——而是关于组装合适的上下文窗口。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong><em>上下文组装（Context Assembly）</em> = 将当前任务所需的规则、文件、备忘录和工具描述汇集到实际输入中。这是一个选择过程，而非倾倒过程。上下文越多并不等于上下文越好。\n      </div>\n\n      <p>每一轮对话中填充上下文窗口的内容（即使是一行提示词也如此）：</p>\n      <ul>\n        <li>你当前的问题</li>\n        <li>最近的对话历史</li>\n        <li>Claude 已读取的文件</li>\n        <li><code>CLAUDE.md</code> 和规则文件</li>\n        <li>工具执行结果</li>\n        <li>Claude 自身最近的输出</li>\n      </ul>\n\n      <p><strong>上下文腐化（Context Rot）</strong>发生在上下文增长过长导致早期信号减弱的时候。长对话会逐渐失去连贯性——不是因为模型忘记了，而是因为重要的早期指令被后续的噪音所稀释。</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>将整个代码库加载到上下文中。即使只是修复一个 bug，一些用户也会倾倒所有文件。这样更慢、更贵，结果质量也更低。只向 Claude 展示它需要的函数和 20 行错误日志。\n      </div>\n\n      <p><strong>需要同时设计的三种隔离：</strong></p>\n      <ol>\n        <li><strong>上下文隔离</strong> — 不要把调查、规划、实现和审查混在一个长会话里。使用 Subagent 或独立会话。</li>\n        <li><strong>文件状态隔离</strong> — 对容易产生冲突的工作使用 worktrees 或独立输出文件夹。</li>\n        <li><strong>审批隔离</strong> — 通过权限和 Hooks 将频繁允许的操作与需要始终审查的操作分开。</li>\n      </ol>"}, "3_2": {"title": "Harness 工程", "content": "<p>Harness 工程超越了提示词调优。它涵盖整个工作空间：权限、文件夹结构、测试策略、会话恢复规则、交接协议、worktree 隔离和远程控制设置。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>Harness 同时设计三件事：(1) Claude 知道什么（上下文），(2) Claude 能做什么（工具和权限），(3) Claude 必须验证什么（测试和退出标准）。缺少任意一项都会产生不同类型的失败。\n      </div>\n\n      <p><strong>启动流程比启动提示词更重要：</strong></p>\n      <ol>\n        <li>检查常驻契约——读取 <code>CLAUDE.md</code>、相关规则、当前分支</li>\n        <li>对任务分类——是调查、实现还是审查？</li>\n        <li>编写计划——范围、禁区、验证命令</li>\n        <li>确认退出标准——检查 <code>tasks/verify.md</code></li>\n        <li>然后才开始实际工作</li>\n      </ol>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>Subagent 和 worktrees 从不同角度解决同一问题。Subagent 隔离<em>上下文</em>（将研究或审查委派给临时工作者）。Worktrees 隔离<em>文件状态</em>（物理上分离工作目录）。简短调查用 Subagent；并行实验用 worktrees。\n      </div>\n\n      <p>Subagent 最有效的用途之一不是让代码运行更快，而是<em>模拟不同的用户角色</em>：挑剔的高级工程师、新维护者、安全审查员、运维人员。不同的视角能发现破坏信任的问题，如缺失的 README、状态命令中的副作用，以及可观测性缺口。</p>"}, "3_3": {"title": "验证结构", "content": "<p>验证是区分演示与生产环境的关键。一个好的验证计划能回答：“这个任务完成前必须通过什么？”</p>\n\n      <p><strong><code>tasks/verify.md</code> 模板：</strong></p>\n      <pre><code># Verification Plan\n## Must Pass\n- [ ] Unit tests: `pnpm test -- signup`\n- [ ] Lint: `pnpm lint`\n- [ ] Type check: `pnpm typecheck`\n## Must Review (human)\n- [ ] Manual browser check on mobile\n- [ ] CTA text approved by stakeholder\n## Must Not Break\n- [ ] Existing auth flow unchanged\n- [ ] No new dependencies added</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>验证类 Skills（检查注册流程是否端到端可用、结账状态是否正确、CLI 是否在 TTY 环境中正常工作）的 ROI 往往高于生成类 Skills。“写得好的草稿”成本低廉——“经过验证的通过结果”昂贵且有价值。\n      </div>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>将测试通过视为目标，而非可维护的实现。模型可能会硬编码数值或添加特殊情况来让测试变绿。你的验证提示词应明确禁止走捷径，并要求在测试似乎有误时上报。\n      </div>"}, "3_4": {"title": "Token 经济与成本管理", "content": "<p>Token 既是计费单位，也是衡量任务扩散范围的信号。即使是一行提示词，发送的内容也远不止于此：问题、对话历史、已加载文件、CLAUDE.md、规则、工具输出，以及最近的模型输出，全部进入上下文窗口。</p>\n\n      <table>\n        <tr><th>Token 类型</th><th>包含内容</th></tr>\n        <tr><td><strong>输入 token</strong></td><td>提示词、文件、对话历史、规则文件、工具输出</td></tr>\n        <tr><td><strong>输出 token</strong></td><td>解释、代码、摘要、工具调用结果</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>“节省 token”不是关于吝啬——而是通过设计让 Claude 只读它需要的内容。<strong>Prompt Cache</strong> 在相似背景被反复发送时提供复用收益。构建你的上下文，使稳定的前缀（CLAUDE.md、规则）保持一致且可缓存。\n      </div>\n\n      <p><strong>成本通过结构管理，而非计数：</strong></p>\n      <ul>\n        <li>减少工具输出冗余（不要倾倒整个日志）</li>\n        <li>保持会话专注——不要混入无关任务</li>\n        <li>在战略节点使用 <code>/compact</code>，而非作为最后手段</li>\n        <li>将调查和实现分入不同会话</li>\n        <li>用 <code>/cost</code> 追踪成本以建立直觉</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong><strong>工具结果预算（Tool Result Budget）</strong>的概念是指控制工具输出消耗多少上下文。一个倾倒 500 行输出的测试套件会迅速吃掉你的上下文。将工具配置为返回摘要，而非原始日志。\n      </div>"}, "3_5": {"title": "会话管理与恢复规范", "content": "<p><strong>恢复规范（Resume Hygiene）</strong>意味着只保留下一个会话需要的内容，丢弃积累的噪音。长会话不必然更好——它们会积累上下文腐化。</p>\n\n      <p><strong>会话记忆模板：</strong></p>\n      <pre><code># Current State\n- 我现在正在做什么\n\n# Task Specification\n- 用户实际请求的内容\n\n# Files and Functions\n- 重要文件及其重要原因\n\n# Workflow\n- 常用命令及顺序\n\n# Errors &amp; Corrections\n- 失败的尝试——不要重复这些\n\n# Key Results\n- 已确认的结果和答案\n\n# Worklog\n- 最近的步骤（保持非常简短）</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>当信息收敛到五个类别时，长会话才能存活：当前状态、文件、工作流、错误和结果。其余都是噪音。<code>Errors &amp; Corrections</code> 部分不是耻辱日志——它是防止重复失败的装置。\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>将状态栏（<code>/statusline</code>）用作仪表板。它显示工作目录、Git 分支和上下文使用量。当上下文使用量攀升时，将状态保存到文件并开启新会话——不要硬撑到质量下降。\n      </div>"}}}, "part4": {"title": "第四部分：扩展与自动化", "sections": {"4_1": {"title": "Skills：教会 Claude 可复用的操作流程", "content": "<p>当你第十次解释同一个流程——会议记录格式、每周简报结构、代码审查清单——就是创建 <strong>Skill</strong> 的时候了。Skill 是一份可复用的工作手册，能降低解释成本。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>Skills 不是提示词片段。它们是包含主文档（<code>SKILL.md</code>）、辅助脚本、参考文件和资产的文件夹结构。官方指南推荐<em>渐进式披露</em>：前置元数据和描述先加载；只有当 Skill 激活时，详细内容才加载。\n      </div>\n\n      <table>\n        <tr><th>升级为 Skill 的时机……</th><th>保留为对话的时机……</th></tr>\n        <tr><td>输出格式重复、变化需要缩小、存储位置和工具顺序需要固定</td><td>话题经常变化、是一次性的头脑风暴探索</td></tr>\n      </table>\n\n      <p><strong>Projects 与 Skills 的区别：</strong>Projects 是始终存在的背景知识。Skills 是当匹配任务到来时激活的流程。有背景没流程会导致输出不一致；有流程没背景会导致结果空洞。</p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>Skill 的 <code>description</code> 字段不是介绍段落——它是路由规则。如果描述模糊，Skill 要么从不触发（触发不足），要么为无关任务触发（过度触发）。描述应这样写：“当用户要求每周竞争对手简报、市场综述或行业趋势摘要时，使用此 Skill。”\n      </div>"}, "4_2": {"title": "Skill 类型与设计模板", "content": "<p>无论具体领域如何，Skills 会归入几个常见角色：</p>\n      <ul>\n        <li><strong>库/SDK 参考</strong> — 固化内部或复杂外部库的使用模式</li>\n        <li><strong>验证/测试</strong> — 标准化检查流程（Playwright 流程、CLI 测试）</li>\n        <li><strong>数据管道</strong> — 整理数据来源和报告路径</li>\n        <li><strong>周期性操作</strong> — 每周回顾、站会、工单创建</li>\n        <li><strong>脚手架</strong> — 生成初始服务或处理器结构</li>\n        <li><strong>质量门控</strong> — 审查标准、测试规则、安全清单</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>试图做所有事情的 Skills（“研究、编码、测试和部署”）看起来强大，但很脆弱。精准解决一个瓶颈的 Skills 存活时间最长。验证类 Skills 的 ROI 往往高于生成类 Skills。\n      </div>\n\n      <p><strong>Skill 设计模板：</strong></p>\n      <pre><code>---\nname: weekly-brief\ndescription: >\n  Use for weekly competitor briefs, recurring market checks,\n  and industry trend summary requests.\ndisable-model-invocation: false\n---\n# Goal\nCreate a weekly competitor brief using only the last 7 days of evidence.\n\n# Input Sources\n- Competitor list: `references/competitors.md`\n- Template: `assets/weekly-brief-template.md`\n\n# Steps\n1. Read competitor list and template\n2. Search for changes in the last 7 days\n3. Draft brief following template structure\n4. Flag uncertain items separately\n5. Save to `outputs/weekly-brief-YYYY-MM-DD.md`\n\n# Rules\n- Max 3 action items\n- Sources and dates required\n- No speculation — mark unknowns as \"Needs verification\"</code></pre>"}, "4_3": {"title": "Plugins：面向团队的角色包", "content": "<p><strong>Plugin</strong> 将多个 Skills、命令、Hooks 和连接设置打包成一个可部署的包。如果 Skill 是工作手册，Plugin 就是你交给新团队成员的入职礼盒。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>“Plugin”这个词根据不同界面有不同含义。<strong>Claude Code plugins</strong> 打包命令、智能体、Hooks、Skills、MCP 和 LSP，用于开发工作流。<strong>Cowork plugins</strong> 打包 Skills、连接器、斜杠命令和子智能体，用于知识工作角色。名称相同，安装体验不同。\n      </div>\n\n      <p><strong>演进路径：</strong>MCP 连接外部工具 → Skills 定义流程 → Plugins 将一切打包用于部署。一句话总结：<em>Skills 是“如何做”，MCP 是“到达的路径”，Plugins 是“部署的盒子”。</em></p>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>将外部 Skills 和 Plugins 仅仅视为文档。它们可能包含工具调用、文件访问、外部 URL 获取和执行脚本。在安装任何外部 Skill 之前，检查：(1) 它会获取外部 URL 吗？(2) 它使用 Bash、文件写入或网络吗？(3) 它的文件与其声明的用途匹配吗？(4) 它会在敏感数据附近运行吗？(5) 你能快速禁用它吗？\n      </div>"}, "4_4": {"title": "MCP：外部工具连接", "content": "<p><strong>模型上下文协议（MCP）</strong>是 Claude 连接外部工具和服务的标准化方式——就像 AI 工具集成的 USB-C 接口。</p>\n\n      <p><strong>MCP 与 Connector 的区别：</strong></p>\n      <table>\n        <tr><th>Connector</th><th>MCP</th></tr>\n        <tr><td>面向用户——从设置界面搜索并连接</td><td>面向开发者——设计服务器、工具接口和响应格式</td></tr>\n        <tr><td>类似应用商店连接</td><td>类似设计内部接线板</td></tr>\n        <tr><td>当连接本身就是目标时最适用</td><td>当需要控制连接后的工具结构时最适用</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>快速决策：“我只想连接并使用它” → Connector。“我想控制公开哪些工具、响应格式，以及哪些项目激活它” → MCP。混淆两者会导致要么过度设计简单连接，要么低估复杂自动化的需求。\n      </div>"}, "4_5": {"title": "Hooks、子智能体与控制界面", "content": "<p><strong>Hooks</strong> 将“记得检查”变成“始终检查”。它们是在特定时刻——工具使用前、编辑后、推送前等——自动介入的规则。</p>\n\n      <p>如果提示词是路标（“请小心驾驶”），Hooks 就是安全带警报和自动刹车。路标可以被忽视；安全系统会改变实际行为。这就是为什么随着团队规模扩大，Hooks 变得更加重要。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>Hook 类型包括命令 Hook（Shell 脚本）、基于提示词的 Hook、基于智能体的 Hook 和 HTTP Hook。对于团队，仅限管理的 Hooks 和 HTTP Hook 白名单提供了远超个人 Shell 脚本的组织级控制。\n      </div>\n\n      <p><strong>Subagent</strong> 隔离上下文。当主会话同时处理探索、实现、审查和文档时，上下文会变得嘈杂。将研究或审查委派给 Subagent 能让主会话保持专注。想象一下：团队负责人将事实核查委派给分析师，而不是亲自去做。</p>\n\n      <p><strong>远程控制 / Channels / 定时任务</strong>都会重新启动工作，但触发方式不同：</p>\n      <table>\n        <tr><th>功能</th><th>谁按下了按钮</th></tr>\n        <tr><td>远程控制</td><td>人类，从远处操作</td></tr>\n        <tr><td>Channels</td><td>外部系统（webhook、消息）</td></tr>\n        <tr><td>定时任务</td><td>时间本身（类似 cron）</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>四条实用规则：(1) 如果你一直在重复相同的解释，将其提取到 Skill 或规则文件中。(2) 如果你一直在连接外部工具，在添加更多 MCP 连接之前先缩小权限范围。(3) 如果验证一直被遗忘，将其推送到 Hooks。(4) 如果需要并行处理，在启动完整智能体团队之前先尝试小型 Subagent 或 worktree。\n      </div>"}}}, "part5": {"title": "第五部分：基于角色的操作手册", "sections": {"5_1": {"title": "产品经理、战略与创始人", "content": "<p>产品经理、战略人员和创始人有一个共同起点：快速整理研究成果并做出决策。最初的成果来自<strong>研究简报</strong>、会议记录整理和决策文档——而非全面自动化。</p>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>对产品经理而言，理想的 Claude 导入路径是：(1) 会议记录摘要 → (2) 每周研究简报 → (3) PRD 草稿生成 → (4) 带模板的竞品分析。每一步都在前一步的文件结构基础上构建。\n      </div>\n\n      <p><strong>创始人 / 个人运营者最小文件集：</strong></p>\n      <pre><code>workspace/\n├── about-me.md          # 背景、行业、目标\n├── working-rules.md     # 语气、禁忌话题、优先级\n├── projects/\n│   └── current/\n│       ├── brief.md     # 本周重点\n│       └── competitors.md\n├── templates/\n│   └── weekly-brief.md\n└── outputs/</code></pre>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>对战略人员而言，人类必须始终主导：市场解读、优先级决策和利益相关方对齐。Claude 加速的是研究和结构化——而非判断本身。\n      </div>\n\n      <p><strong>人类必须保留的内容：</strong>市场解读、优先级设定和利益相关方谈判。Claude 负责收集研究资料、结构化草稿和保持格式一致。</p>"}, "5_2": {"title": "市场营销与内容", "content": "<p>营销团队在优先建立品牌声音文件和内容模板之后，能从 Claude 获得最快的回报。没有 <code>brand-voice.md</code> 和 <code>anti-ai-writing-style.md</code>，每篇内容都需要大量的语气校正。</p>\n\n      <p><strong>内容运营导入路径：</strong></p>\n      <ol>\n        <li>话题研究与内容结构大纲</li>\n        <li>结合品牌声音模板的初稿</li>\n        <li>多渠道适配（博客 → 社交媒体 → 新闻邮件）</li>\n        <li>结合结构化模板的 SEO 优化</li>\n        <li>定期内容日历自动化</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>说\"用我们公司的语气写\"，却不提供 <code>brand-voice.md</code>。Claude 无法凭空感知你的品牌。请创建一个包含以下内容的文件：常用词汇、禁用词汇、句子长度指南、正式程度，以及 2–3 段展示理想语气的示例段落。\n      </div>\n\n      <p><strong>人类必须保留的内容：</strong>最终信息决策、品牌语气审批和对外发布签字。Claude 负责研究整合、结构起草和格式适配。</p>"}, "5_3": {"title": "销售、客户成功与运营", "content": "<p>销售和客户成功团队从<strong>客户简报</strong>和<strong>跟进邮件草稿</strong>中获益最多。关键约束：所有对外沟通必须经过人工审批门控。</p>\n\n      <p><strong>运营和后台自动化</strong>应从最低风险的任务开始：文件夹整理、分类、草稿摘要和基于模板的报告。高风险自动化（实际数据录入、支付处理、删除操作）只应在治理结构就位后才引入。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>对代理商和团队运营者而言，关键原则是<em>客户上下文隔离</em>。同时管理多个客户时，最大的风险不是输出缓慢——而是客户之间的上下文污染。为每个客户设立独立文件夹、共享模板，并遵守严格的命名规范，可以防止跨客户泄漏。\n      </div>\n\n      <pre><code>clients/\n├── client-a/\n│   ├── brief.md\n│   ├── glossary.md\n│   └── approval-rules.md\n├── client-b/\n│   ├── brief.md\n│   └── ...\ntemplates/\n├── client-report-template.md\n└── review-checklist.md\nteam/\n├── shared-rules.md\n└── naming-convention.md</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>在代理商场景中，一个文件夹边界能比一句聪明的提示词预防更多事故。速度没有确保客户 A 的数据绝不泄漏到客户 B 的输出中更重要。\n      </div>"}, "5_4": {"title": "设计、工程与研究", "content": "<p><strong>设计 / 品牌：</strong>设计师从基于参考资料的探索和实现 QA 中获得最大价值。使用图像作为输入——bug 截图、参考布局、期望状态。视觉上下文往往能传达几段 CSS 描述所无法表达的信息。</p>\n\n      <p><strong>工程：</strong>最强的第一个任务始终是带测试的小型 bug 修复，而非大型新功能。导入路径：(1) bug 修复 + 测试 → (2) 带计划的重构 → (3) 带审查分离的代码审查 → (4) 并行 worktree 实验 → (5) CI 集成和自动化 Hooks。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>对研究人员和分析师而言，Claude 擅长：摘要、术语表创建、对比表、问题生成和结构化文献综述。人类必须始终主导：声明解读、复现结果判断和原创洞见。\n      </div>\n\n      <p><strong>所有角色的导入优先级遵循相同模式：</strong></p>\n      <ol>\n        <li>收集和整理信息（最低风险）</li>\n        <li>结合模板创建初稿</li>\n        <li>通过验证循环审查和优化</li>\n        <li>用 Skills 自动化重复工作流</li>\n        <li>用并行智能体和定时任务扩展规模（最高风险，最后一步）</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>从端到端自动化开始。走得最远的团队，总是先从流程的前端（整理、结构化、起草）入手，只在治理结构建立后才自动化后端（执行、部署、交付）。\n      </div>"}, "5_5": {"title": "场景指南：将阻碍映射到工作流", "content": "<p>第 8 章不是功能百科全书——它是一张<em>情境匹配表</em>。方法：识别今日阻碍 → 对任务形态分类 → 选择文件集 → 执行 → 通过审批门控验证 → 留下结构化交接。</p>\n\n      <p><strong>任何阻塞场景的工作流：</strong></p>\n      <ol>\n        <li><strong>今日阻碍</strong> — 哪个具体任务卡住了？</li>\n        <li><strong>任务形态</strong> — 是研究、起草、实现还是审查？</li>\n        <li><strong>文件集选择</strong> — 此任务最少需要哪些文件？</li>\n        <li><strong>执行</strong> — 按输出契约运行工作流</li>\n        <li><strong>审批门控</strong> — 任何内容对外发出前先经人工检查</li>\n        <li><strong>结构化交接</strong> — 为下一个会话留存状态和后续步骤</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>情境匹配的关键术语：<em>输出契约</em>（结果必须遵循的格式和位置）、<em>token 热点</em>（上下文突然变得昂贵的地方）、<em>审批门控</em>（对外交付前必须经过的人工检查）和<em>结构化交接</em>（用于会话连续性的格式化状态备忘录）。\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>未来的差距不会在于谁掌握了更多功能，而在于哪些团队能更快学会特定角色的委派策略。开发和客户支持最先导入（任务范围广、风险低）；法律、财务和研究则更谨慎（先摘要和分类，判断判断步骤靠后）。\n      </div>"}}}, "part6": {"title": "第六部分：社区模式与工具", "sections": {"6_1": {"title": "记忆、回调与搜索模式", "content": "<p>社区实践者已开发出一套管理 Claude 记忆和上下文的常见模式。这些不是官方功能——而是在大量日常使用中涌现出的操作习惯。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong><strong>会话记忆（Session Memory）</strong>不是保存完整对话记录，而是维护结构化状态文件（<code>handoff.md</code>、<code>decision-log.md</code>、<code>worklog.md</code>），供下一个会话在启动时读取。对话是可丢弃的；文件才是真正的记忆。\n      </div>\n\n      <p><strong>常见记忆模式：</strong></p>\n      <ul>\n        <li><strong>基于文件的记忆：</strong><code>CLAUDE.md</code> + 规则文件 + 交接文件，构成跨越会话边界的持久记忆层</li>\n        <li><strong>结构化回调：</strong>每次会话开始时先读取 <code>tasks/handoff.md</code> 和 <code>tasks/plan.md</code>，然后再开始新工作</li>\n        <li><strong>渐进式披露：</strong>在顶部加载背景，仅在激活时才加载任务特定细节（如 Skill 前言触发完整 Skill 内容）</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>最有效的记忆策略也是最简单的：每次会话结束时，用当前状态、后续步骤和未解决的风险更新 <code>handoff.md</code>。这一个习惯能消除 80% 的\"我上次做到哪了？\"困惑。\n      </div>"}, "6_2": {"title": "Plan.md 与基于文件的规划", "content": "<p><code>plan.md</code> 模式是社区中被最广泛采用的实践之一。相比将计划留在对话中，把它写入文件，让 Claude 和人类都可以参考。</p>\n\n      <p><strong>为什么计划应该放在文件而非对话中：</strong></p>\n      <ul>\n        <li>文件跨越会话边界存活；对话不行</li>\n        <li>文件可以被人类独立审查</li>\n        <li>文件可以用 Git 进行版本控制</li>\n        <li>文件让对话专注于执行，而非反复规划</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>计划文件不是官僚流程——它是防止返工的装置。先规划再编辑的团队，持续报告更少回滚、更短的审查周期，以及更少的长会话上下文污染。\n      </div>\n\n      <p><strong>有效的 plan.md 结构：</strong></p>\n      <pre><code># Plan\n## Goal\n一句话描述期望的最终状态。\n\n## Scope\n- Files to modify: [list]\n- Off-limits: [list]\n\n## Steps\n1. ...\n2. ...\n\n## Verification\n- Tests to pass: [list]\n- Manual checks: [list]\n\n## Open Questions\n- [开始前的任何未解决事项]</code></pre>"}, "6_3": {"title": "并行会话与多智能体操作", "content": "<p>高级用户会并行运行多个 Claude 会话，每个会话承担不同角色。这不是为了速度——而是为了<em>上下文隔离</em>。</p>\n\n      <p><strong>常见并行模式：</strong></p>\n      <ul>\n        <li><strong>计划 + 实现：</strong>一个会话规划，另一个根据书面计划实现</li>\n        <li><strong>实现 + 审查：</strong>一个会话写代码，另一个在独立 worktree 中审查</li>\n        <li><strong>主会话 + Subagent 研究：</strong>主会话保持专注，同时 Subagent 探索文档或收集数据</li>\n        <li><strong>多 worktree 实验：</strong>在隔离的工作目录中测试不同方案，然后对比结果</li>\n      </ul>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>没有角色清晰度的并行只会制造混乱，而非速度。在启动并行会话之前，请定义：各会话负责什么，每个会话可以操作哪些文件，以及结果如何合并。无结构的并行比顺序工作更糟。\n      </div>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>许多社区成员向往的\"OpenClaw 风格\"操作意味着：始终在线的会话、多渠道访问（终端、手机、网页）、跨会话的持久状态、定时任务和远程控制。在 Claude 生态中，这通过组合 Claude Code + CLAUDE.md + Hooks + Subagent + MCP + Remote Control + Channels + Scheduled Tasks 来实现。\n      </div>"}, "6_4": {"title": "自我改进与 SEO / 内容循环", "content": "<p>社区模式包括使用 Claude 改善自身环境——创建 Skills、优化规则和评估过去的输出。</p>\n\n      <p><strong>自我改进循环：</strong></p>\n      <ol>\n        <li>用当前规则和 Skills 执行任务</li>\n        <li>评估输出（手动或用审查 Subagent）</li>\n        <li>根据失败情况更新规则、Skill 描述或模板</li>\n        <li>重新运行并对比</li>\n      </ol>\n\n      <p><strong>SEO 和内容自动化模式：</strong></p>\n      <ul>\n        <li>关键词研究 → 内容结构 → 草稿 → SEO 审查 Skill → 发布</li>\n        <li>多渠道适配：一次研究会话为博客、社交、新闻邮件和电子邮件模板提供素材</li>\n        <li>结合定时任务实现内容日历自动化</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>元 Skill <code>skill-creator</code> 可以根据描述生成初始 Skill 草稿。但它产出的是初稿，而非生产就绪的 Skills。失败案例、边界条件和验证循环仍需人工审查和迭代。\n      </div>"}, "6_5": {"title": "工具选型标准", "content": "<p>随着 Skills、Plugins 和 MCP 服务器的生态日益增长，选择合适工具需要保持纪律。</p>\n\n      <p><strong>安装任何外部工具前的评估清单：</strong></p>\n      <ol>\n        <li>上次维护是什么时候？</li>\n        <li>有真实的 README 和示例吗？</li>\n        <li>它需要哪些安全敏感权限？</li>\n        <li>上下文成本是否值得这份效用？</li>\n        <li>出问题时能快速禁用吗？</li>\n      </ol>\n\n      <p><strong>工具来源：</strong></p>\n      <table>\n        <tr><th>来源</th><th>类型</th></tr>\n        <tr><td>Anthropic Skills GitHub</td><td>官方 / 半官方</td></tr>\n        <tr><td>Anthropic Claude Plugins GitHub</td><td>官方</td></tr>\n        <tr><td>agentskills.io</td><td>标准文档</td></tr>\n        <tr><td>skillsmp.com、Skill 枢纽</td><td>社区市场</td></tr>\n        <tr><td>GitHub 上的 awesome-claude-skills 列表</td><td>社区精选</td></tr>\n      </table>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>收集从不使用的工具。\"留着以后用\"的工具会堆积，却无法成为真正的运营资产。只安装本周会使用三次或以上的工具。每月检查已安装工具，移除未使用的。\n      </div>"}}}, "part7": {"title": "第七部分：治理与综合实践", "sections": {"7_1": {"title": "为何治理至关重要", "content": "<p>治理不是合规性的复选框——它是让团队能自信而非焦虑地使用 AI 的结构。没有治理，每一个自动化都只是一个无法成为基础设施的演示。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>治理回答的核心问题是：\"Claude 无需询问可以做什么，必须询问什么，以及绝不能做什么？\"这是在组织层面应用的允许 / 询问 / 拒绝框架。\n      </div>\n\n      <p><strong>风险分级示例：</strong></p>\n      <table>\n        <tr><th>风险级别</th><th>示例</th><th>审批模式</th></tr>\n        <tr><td><strong>低</strong></td><td>会议摘要、内部草稿、添加测试</td><td>自动执行</td></tr>\n        <tr><td><strong>中</strong></td><td>面向客户的草稿、定期报告、重构</td><td>人工审查后执行</td></tr>\n        <tr><td><strong>高</strong></td><td>生产部署、客户邮件、记账条目、权限变更、敏感数据查询</td><td>必须获得人工批准——未获批准不得执行</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>治理推广最好分阶段进行：第 1 周——屏蔽 <code>.env</code> 访问和破坏性命令，要求部署审批。第 2 周——标准化允许的 Plugins / Skills，按项目整理 CLAUDE.md 和规则。第 3 周——增加成本监控，建立交接 / 审批日志习惯。\n      </div>"}, "7_2": {"title": "权限模型与四层治理架构", "content": "<p>权限模式使用三种模式：<strong>允许</strong>（自动进行）、<strong>询问</strong>（暂停等待人工决策）和<strong>拒绝</strong>（完全阻止）。规则按顺序评估：拒绝 → 询问 → 允许，第一条匹配规则生效。</p>\n\n      <p><strong>四个治理层：</strong></p>\n      <ol>\n        <li><strong>文档层</strong> — <code>CLAUDE.md</code>、规则文件、Skill 说明：Claude 应了解和遵循的内容</li>\n        <li><strong>设置层</strong> — <code>settings.json</code>、权限规则、托管设置：Claude 能做和不能做的事</li>\n        <li><strong>运行时层</strong> — Hooks、审批门控、Plan Mode：执行期间发生的事</li>\n        <li><strong>追踪层</strong> — 工作日志、审批日志、决策日志、交接文件：发生了什么以及为何</li>\n      </ol>\n\n      <div class=\"callout callout-warning\">\n        <strong>&#9888;&#65039; 常见错误：</strong>将 <code>bypassPermissions</code> 作为团队默认设置。社区帖子常建议\"关掉所有权限以求速度\"。Anthropic 将此视为一种权限模式，组织可通过 <code>disableBypassPermissionsMode</code> 完全禁用。个人实验和团队标准绝不应共享相同的权限级别。\n      </div>\n\n      <p><strong>团队的双层权限结构：</strong></p>\n      <ul>\n        <li><strong>全局（用户级）：</strong>屏蔽 <code>rm -rf</code>、敏感文件和强制推送</li>\n        <li><strong>项目级：</strong>屏蔽此代码库特有的迁移文件夹、部署脚本和支付配置</li>\n      </ul>"}, "7_3": {"title": "人工审核与可审计性", "content": "<p><strong>人在回路（Human-in-the-loop）</strong>设计意味着在人类做出决策的地方构建明确的检查点——而非对每一个操作都盯着。目标是战略性干预，而非持续监督。</p>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong><strong>可审计性（Auditability）</strong>意味着事后能够解释：读取了什么、创建了什么、谁批准了，以及还有什么未完成。同样的自动化，有审计追踪的能成为基础设施；没有的，只能是演示。\n      </div>\n\n      <p><strong>高风险工作的最低审计追踪：</strong></p>\n      <pre><code>1. source/          — 原始材料或链接\n2. outputs/         — Claude 的草稿和修订版\n3. work-log.md      — 执行了什么以及何时\n4. approval-log.md  — 谁批准了什么以及何时\n5. handoff.md       — 剩余风险和后续步骤</code></pre>\n\n      <p><strong>操作日志 vs. 决策追踪：</strong>操作日志记录<em>发生了什么</em>（命令、工具调用、时间戳）。决策追踪记录<em>为什么</em>（考虑了什么、拒绝了哪些替代方案、为何选择这条路）。在长任务上工作的智能体两者都需要。没有决策追踪，你能看到失败发生在哪里，却看不出原因。</p>\n\n      <p><strong>事故复盘模板：</strong></p>\n      <pre><code># Incident Review\n- 何时被发现？\n- 涉及哪个自动化 / 会话？\n- 输入材料是什么？\n- 缺少了哪个审批节点？\n- 哪条规则、Hook 或权限需要修改？</code></pre>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>Cowork 对话存储在本地，不会出现在审计日志、合规 API 或数据导出中。不要将 Cowork 用于受监管的工作负载。对于需要审计的工作，请使用带有基于 Git 日志、Hooks 和外部审批追踪的 Claude Code。\n      </div>"}, "7_4": {"title": "团队采用策略", "content": "<p>一旦你开始部署共享规则和资产，团队导入就与个人使用产生了分歧。这不是分发工具——而是部署一个<em>附带策略的运营环境</em>。</p>\n\n      <p><strong>团队 / 企业核心能力：</strong></p>\n      <ul>\n        <li>Skills 配给——在组织范围内部署共享 Skills</li>\n        <li>托管设置——管理员强制的配置，个人无法覆盖</li>\n        <li>Plugin 市场管理——控制哪些 Plugins 可用</li>\n        <li>使用量分析仪表板和分析 API</li>\n        <li>席位策略——谁可以访问哪些功能</li>\n      </ul>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>标准化不会扼杀创造力——它消除的是重复解释的成本。当共享会议摘要 Skill、客户回复模板、PR 审查 Skill 和每周简报模板在全团队部署后，大家花在格式上的时间减少，花在判断上的时间增多。\n      </div>\n\n      <p><strong>组织的外部 Skill 导入流程：</strong></p>\n      <ol>\n        <li>验证来源</li>\n        <li>审查包含的文件和工具范围</li>\n        <li>在沙盒或隔离工作区中测试</li>\n        <li>将权限缩减到最低必要级别</li>\n        <li>然后才部署到团队 / 组织托管分发</li>\n      </ol>\n\n      <p><strong>将成本作为治理信号：</strong>使用数据不只是财务部门的事——它是设计反馈循环。\"这个智能体每次会话都重新读取一份冗长的法规文件\" → 研究缓存。\"这个自动化产生冗长的工具输出\" → 削减输出预算。成本管理是运营设计，而非预算管控。</p>"}, "7_5": {"title": "综合实践：使用 Claude Code 进行构建", "content": "<p>最后一章将所有内容整合为两个实践项目：构建一个小型网站和构建一个自动化工作流。两者都证明了一点：精简但完整的成果比宏大却未完成的计划更有价值。</p>\n\n      <p><strong>网站项目方法：</strong></p>\n      <ol>\n        <li>先定义三行内容：<strong>读者</strong>（谁来读？）、<strong>目标</strong>（他们应理解什么？）、<strong>行动</strong>（他们应做什么？）</li>\n        <li>创建文件集：<code>brief.md</code>、<code>tone.md</code>、<code>references/</code>、<code>site/</code></li>\n        <li>用 Cowork 起草结构和文案，再用 Claude Code 实现</li>\n        <li>拆分为三个提示词：设计（结构）、实现（构建）、审查（验证）</li>\n      </ol>\n\n      <p><strong>自动化项目方法：</strong></p>\n      <ol>\n        <li>在确定\"何时运行\"之前先定义输入边界和输出契约</li>\n        <li>成功 = 重复运行时格式一致，而非仅第一次成功</li>\n        <li>高风险步骤必须经由人工审批路由</li>\n      </ol>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>生态系统的五个发展方向：(1) 对话式 → 异步操作，(2) 弹出式审批 → 基于策略的审批，(3) 长对话记录 → 结构化任务状态，(4) 单一界面 → 多界面连续性，(5) 提示词技巧 → 带分析和评估循环的可度量运营。\n      </div>\n\n      <p><strong>部署检查清单：</strong></p>\n      <ul>\n        <li>已选择主要工作界面（终端、IDE、桌面、网页）？</li>\n        <li><code>CLAUDE.md</code> 和规则已按角色分离？</li>\n        <li>权限和 Hooks 覆盖了真实的风险边界？</li>\n        <li><code>plan.md</code>、<code>verify.md</code>、<code>handoff.md</code> 已就位？</li>\n        <li>实现与审查之间的审查分离已完成？</li>\n        <li>成本和失败度量已建立？</li>\n        <li>团队的范围分离（用户 / 项目 / 本地 / 托管）已完成？</li>\n      </ul>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>本书的结论很简单：用好 Claude Code 的人，不是那些写出长提示词的人——而是那些稳定上下文、管理 token 和缓存、收窄权限，并将审查分离和交接变成习惯的人。一个精简但完整的成果，加上可以重现它的结构，胜过任何数量的精彩演示。\n      </div>"}}}, "glossary": {"title": "词汇表与快速参考", "sections": {"G_1": {"title": "上下文与组装术语", "content": "<p>这些术语描述信息如何在 Claude 的工作记忆中被收集、管理和衰退。</p>\n\n      <table>\n        <tr><th>术语</th><th>定义</th></tr>\n        <tr><td><strong>Context Assembly（上下文组装）</strong></td><td>将当前任务所需的规则、文件、备忘录和工具描述收集到实际输入上下文中的过程。是一个选择过程，而非倾倒过程。</td></tr>\n        <tr><td><strong>Context Rot（上下文腐化）</strong></td><td>随着上下文增长，早期信号减弱的现象。长对话逐渐失去连贯性，因为重要的早期指令被后续内容稀释。</td></tr>\n        <tr><td><strong>Memoized Context（记忆化上下文）</strong></td><td>跨轮次保存的背景信息，让 Claude 无需每次重新接收简报。\"计算一次，多次复用。\"</td></tr>\n        <tr><td><strong>Prompt Cache（提示词缓存）</strong></td><td>当相似的上下文前缀被反复发送时提供复用收益的机制。稳定的前缀（CLAUDE.md、规则）应保持一致，以最大化缓存命中率。</td></tr>\n        <tr><td><strong>Token Economy（token 经济）</strong></td><td>决定哪些信息永久加载、哪些按需加载、哪些需要裁剪的学科——在质量与成本之间寻求平衡。</td></tr>\n        <tr><td><strong>Tool Result Budget（工具结果预算）</strong></td><td>控制工具输出消耗多少上下文空间的实践。冗长的日志和详细的结果会占满上下文窗口并降低质量。</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>上下文组装不是\"越多越好\"。它是只包含当前任务所需内容的选择过程。Tool Result Budget 不是可选的——它是防止单次冗长测试运行消耗一半上下文窗口的关键。\n      </div>"}, "G_2": {"title": "会话与延续性术语", "content": "<table>\n        <tr><th>术语</th><th>定义</th></tr>\n        <tr><td><strong>Resumable Session（可恢复会话）</strong></td><td>使用已保存的状态文件，在断线或会话切换后从上次中断处继续的能力。</td></tr>\n        <tr><td><strong>Resume Hygiene（恢复规范）</strong></td><td>恢复前清理状态的习惯——只保留下一个会话所需的内容，丢弃积累的噪音。</td></tr>\n        <tr><td><strong>Session Memory（会话记忆）</strong></td><td>为延续性而保存的结构化状态：当前状态、重要文件、工作流、错误和结果。不是原始对话记录。</td></tr>\n        <tr><td><strong>Handoff（交接）</strong></td><td>为下一个会话或下一个人留下的格式化备忘录，包含当前状态、后续步骤和未解决的风险。</td></tr>\n        <tr><td><strong>Slash Command（斜杠命令）</strong></td><td>在 Claude Code 中使用的会话管理命令，如 <code>/compact</code>、<code>/clear</code>、<code>/context</code>、<code>/memory</code>、<code>/cost</code>。</td></tr>\n        <tr><td><strong>Fork Session（会话分叉）</strong></td><td>当当前方向需要分叉时创建新的会话分支，同时保留原始会话状态。</td></tr>\n        <tr><td><strong>Background Execution（后台执行）</strong></td><td>你离开终端后仍继续运行的工作——会话无需人类主动监控即可持续执行。</td></tr>\n      </table>"}, "G_3": {"title": "Harness 与结构术语", "content": "<table>\n        <tr><th>术语</th><th>定义</th></tr>\n        <tr><td><strong>Harness</strong></td><td>定义 Claude 可以读取、修改和验证什么内容的外层结构。就像同事的工作空间：参考资料、可访问的抽屉和一张清单。</td></tr>\n        <tr><td><strong>Harness Engineering（Harness 工程）</strong></td><td>设计整个工作环境——不仅仅是更好的提示词，而是 Claude 运行所在的规则、权限、文件和验证结构。</td></tr>\n        <tr><td><strong>CLAUDE.md</strong></td><td>项目契约文件——始终加载，包含执行命令、禁止边界和结构描述。</td></tr>\n        <tr><td><strong>Worktree</strong></td><td>来自同一代码库的独立工作目录，用于无文件冲突的并行工作。</td></tr>\n        <tr><td><strong>Plan Mode（计划模式）</strong></td><td>将探索与执行分离的模式——Claude 在编辑前先规划，减少基于错误假设的实现。</td></tr>\n        <tr><td><strong>Review Split（审查分离）</strong></td><td>将实现和审查分入不同会话，以减少上下文污染和审批疲劳。</td></tr>\n        <tr><td><strong>Agentic Loop（智能体循环）</strong></td><td>循环周期：读取 → 判断 → 使用工具 → 继续。跨越多轮的工作，而非单次问答对。</td></tr>\n      </table>"}, "G_4": {"title": "扩展与工具术语", "content": "<table>\n        <tr><th>术语</th><th>定义</th></tr>\n        <tr><td><strong>Skill</strong></td><td>标准化重复任务的可复用流程文件（文件夹）。包含说明、脚本、参考资料和资源。</td></tr>\n        <tr><td><strong>Plugin</strong></td><td>将 Skills、命令、Hooks 和连接设置打包为可部署的软件包。团队的\"入职礼盒\"。</td></tr>\n        <tr><td><strong>MCP（Model Context Protocol，模型上下文协议）</strong></td><td>Claude 连接外部工具和服务的标准化协议。如同 AI 工具集成的 USB-C 接口。</td></tr>\n        <tr><td><strong>Connector</strong></td><td>连接外部服务（Notion、Drive、Slack）的用户界面。比 MCP 更简单，控制更少。</td></tr>\n        <tr><td><strong>Hook</strong></td><td>在特定时刻（工具使用前、编辑后、推送前）自动干预的规则。将\"记得检查\"变成\"总是检查\"。</td></tr>\n        <tr><td><strong>Subagent</strong></td><td>当前会话中上下文独立的次级工作者。用于研究、审查或风险检查，而不污染主会话。</td></tr>\n        <tr><td><strong>Agent Team（智能体团队）</strong></td><td>多个会话并行运行，互相传递消息和分配任务——就像一个有组长和成员的真实团队。</td></tr>\n        <tr><td><strong>Control Surface（控制界面）</strong></td><td>用户可以调整工作行为的地方——不是功能列表，而是你可以干预工作流的节点。</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>快速决策框架：\"每次格式相同？\" → Skill。\"需要外部数据？\" → MCP / Connector。\"部署给全团队？\" → Plugin。\"必须自动验证？\" → Hook。\"需要并行上下文？\" → Subagent / Worktree。\n      </div>"}, "G_5": {"title": "治理与安全术语", "content": "<table>\n        <tr><th>术语</th><th>定义</th></tr>\n        <tr><td><strong>Permission Gate（权限门控）</strong></td><td>允许、询问和拒绝之间的边界——在任何操作执行前评估。</td></tr>\n        <tr><td><strong>Approval Gate（审批门控）</strong></td><td>下一步继续前需要人工签字的检查点。对于对外沟通、部署和数据修改至关重要。</td></tr>\n        <tr><td><strong>Allowlist（白名单）</strong></td><td>只允许通过明确许可项目（命令、用户、域名）的策略。比屏蔽特定威胁更安全。</td></tr>\n        <tr><td><strong>Auditability（可审计性）</strong></td><td>事后能够解释的能力：读取了什么、更改了什么、谁批准了，以及还有什么未完成。可持续自动化的基础。</td></tr>\n        <tr><td><strong>Alignment Faking（对齐伪装）</strong></td><td>一个研究概念，指模型表面上遵循指令，内部却维持着不同目标。实践启示：不要仅凭模型合规性——要构建外部验证。</td></tr>\n        <tr><td><strong>Autonomy（自主性）</strong></td><td>工作在无人干预情况下可以进行多远。更高的自主性需要更强的验证、审批和权限边界。</td></tr>\n        <tr><td><strong>Agency（能动性）</strong></td><td>人类在选择委派什么、何时委派、带什么约束方面的主动性。不是下达更多命令——而是做出更好的委派决策。</td></tr>\n        <tr><td><strong>Tool Orchestration（工具编排）</strong></td><td>决定调用哪些工具、按什么顺序、带什么参数的层级。</td></tr>\n      </table>\n\n      <div class=\"callout callout-concept\">\n        <strong>&#128204; 核心概念：</strong>可观测性（通过仪表板和分析查看系统状态）和可审计性（事后解释发生了什么以及为什么）是不同的。两者都需要：可观测性用于运营效率，可审计性用于问责和信任。\n      </div>"}, "G_6": {"title": "生态系统与基础设施术语", "content": "<table>\n        <tr><th>术语</th><th>定义</th></tr>\n        <tr><td><strong>LLM OS</strong></td><td>对新兴工作层的一个比喻：围绕模型的上下文、工具、权限和记忆，类比操作系统管理程序、文件、权限和设备的方式。</td></tr>\n        <tr><td><strong>Software 3.0</strong></td><td>自然语言本身正在成为编程接口的概念——工作指令即代码。</td></tr>\n        <tr><td><strong>Vibe Coding</strong></td><td>通过自然语言生成代码，现已延伸至包括测试、审查、重构、文档和部署。</td></tr>\n        <tr><td><strong>Remote Control（远程控制）</strong></td><td>人类从远处（不同设备、不同位置）恢复或引导正在运行的会话。</td></tr>\n        <tr><td><strong>Channels（渠道）</strong></td><td>将事件推入 Claude 的外部系统（Webhook、消息）——触发来自外部，而非来自人类。</td></tr>\n        <tr><td><strong>Scheduled Tasks（定时任务）</strong></td><td>时间触发的自动化——类似 cron 的执行，由时钟启动工作。</td></tr>\n        <tr><td><strong>Agent SDK</strong></td><td>以 Claude 作为执行引擎，在你自己的产品中构建自定义智能体应用的开发者工具。</td></tr>\n        <tr><td><strong>Adaptive Thinking（自适应思考）</strong></td><td>Claude 根据任务复杂度调整推理深度——难任务思考更久，简单任务更简短。</td></tr>\n      </table>\n\n      <div class=\"callout callout-tip\">\n        <strong>&#128161; 专业提示：</strong>对某个术语感到困惑时，问自己：\"这是关于工作如何流动（机制）、如何防止错误（安全），还是会话如何持续（连续性）？\"这个三桶心智模型覆盖了绝大多数 Claude Code 术语。\n      </div>"}}}}, "quizzes": {"part1": [{"question": "在 Claude Code harness 中，“memoized context（记忆化上下文）”是什么意思？", "options": ["将所有聊天记录永久存储在数据库中", "跨轮次复用背景上下文，这样你就不必每次重新解释", "记住用户的个人偏好", "缓存 API 响应以提升性能"], "answer": 1, "explanation": "Memoized context 是指跨轮次保存背景信息，这样 Claude 就不需要每次重新获得简报。"}, {"question": "第一章介绍的四个核心术语是什么？", "options": ["API、CLI、MCP、VM", "Prompt、Context、Response、Token", "Memoized Context、Tool Orchestration、Permission Gate、Resumable Session", "Skills、Plugins、Hooks、Subagents"], "answer": 2, "explanation": "第一章介绍：Memoized Context（可复用背景）、Tool Orchestration（工具协调）、Permission Gate（允许/询问/拒绝）和 Resumable Session（从中断处继续）。"}, {"question": "在 Claude Code 语境中，“harness”是什么？", "options": ["连接到 Claude 服务器的物理设备", "定义 Claude 可以读取、修改和验证哪些文件的外层结构", "运行单元测试的测试框架", "Claude Code 的图形用户界面"], "answer": 1, "explanation": "Harness 定义边界和验证规则——就像布置一个工作空间：桌上的参考资料、可打开的抽屉，以及一份核对清单。"}, {"question": "为什么本书聚焦于 Claude Code 而非其他 Claude 产品？", "options": ["Claude Code 是最便宜的产品", "Claude Code 在全球拥有最多用户", "它将文件、规则、验证、权限和工具连接整合到一处", "Claude Code 是韩国唯一可用的产品"], "answer": 2, "explanation": "Claude Code 将文件访问、规则、验证、权限、可恢复会话和外部工具连接结合在一起。Cowork、Skills、Plugins 都是这一核心的延伸。"}, {"question": "弱 harness 请求与强 harness 请求的区别是什么？", "options": ["弱请求使用更少 token，强请求使用更多", "弱请求：“修复 bug。” 强请求：“只读取 auth/，不要碰 .env，通过登录测试，留下修改说明。”", "弱意味着初学者，强意味着专家", "没有区别"], "answer": 1, "explanation": "弱 harness 不设定任何边界。强 harness 指定读取什么、不碰什么、必须通过哪些测试，以及留下什么文档。"}], "part2": [{"question": "在开始一个大型任务的 Claude Code 会话时，推荐的第一步操作是什么？", "options": ["写一个尽可能长的提示词，包含所有上下文", "读取 CLAUDE.md、相关规则和 verify.md——然后在实现前总结范围", "立即开始编码以节省时间", "关闭所有权限以加快工作流"], "answer": 1, "explanation": "启动流程比启动提示词更重要。在实现之前读取项目契约、规则和退出标准，能防止返工和方向性错误。"}, {"question": "Skill 和 Plugin 的区别是什么？", "options": ["它们是同一个东西，只是名称不同", "Skills 用于编码，Plugins 用于文档", "Skill 是可复用的流程；Plugin 将 Skills、命令、Hooks 和连接打包用于团队部署", "Plugins 免费，Skills 收费"], "answer": 2, "explanation": "Skills 定义“如何做”（流程）。Plugins 将 Skills、工具、Hooks 和连接打包成可部署的盒子——就像团队成员的入职套件。"}, {"question": "为什么应该保持 CLAUDE.md 精简而非全面？", "options": ["为了节省磁盘空间", "因为 Claude 只能读取短文件", "它是工作契约，而非百科全书——过长的常驻上下文会浪费 token 并稀释重要规则", "精简文件在浏览器中加载更快"], "answer": 2, "explanation": "CLAUDE.md 每轮都会加载。保持精简确保重要规则始终突出。长期状态应放在 handoff.md、decision-log.md 和其他任务文件中。"}, {"question": "Claude Code 操作中的“审查分离（review split）”是什么意思？", "options": ["将代码审查拆分为多个 pull request", "将实现和审查分入不同会话，以减少上下文污染", "让两个人审查相同的代码", "在团队之间分配审查预算"], "answer": 1, "explanation": "审查分离意味着不要把规划、实现和审查塞进一个会话。独立会话减少上下文污染和审批疲劳。"}, {"question": "在 Claude Code 中运行 /compact 后，什么内容会保留下来？", "options": ["全部内容——/compact 只是让显示更短", "只有最后 5 条消息", "压缩指令中指定的内容：最后修改的文件、测试结果、被拒绝的替代方案、下一步操作和风险点", "什么都不剩——/compact 会重置整个会话"], "answer": 2, "explanation": "压缩指令控制哪些信息在压缩后保留。没有它们，重要上下文可能丢失。好的指令保留下一轮需要立即继续的状态。"}], "part3": [{"question": "Claude Code 会话中的“上下文腐化（Context Rot）”是什么？", "options": ["Claude 的 API 密钥过期时", "磁盘上的文件损坏时", "当上下文越来越长，早期指令被后续内容稀释而减弱时", "对话被意外删除时"], "answer": 2, "explanation": "上下文腐化发生在对话增长时——重要的早期信号被积累的后续内容稀释，即使模型并没有“忘记”任何东西，质量也会下降。"}, {"question": "Harness 应同时设计的三种隔离类型是什么？", "options": ["输入隔离、输出隔离、显示隔离", "上下文隔离、文件状态隔离、审批隔离", "网络隔离、磁盘隔离、内存隔离", "用户隔离、模型隔离、工具隔离"], "answer": 1, "explanation": "上下文隔离防止会话臃肿，文件状态隔离防止覆盖和冲突，审批隔离将安全操作与危险操作分开。每种隔离防止不同类型的失败。"}, {"question": "为什么验证类 Skills 的 ROI 通常高于生成类 Skills？", "options": ["因为验证的许可证更昂贵", "因为模型在生成时从不出错", "因为“写得好的草稿”成本低廉，而“经过验证的通过结果”真正有价值且难以实现", "因为验证需要的算力更少"], "answer": 2, "explanation": "生成产出草稿；验证确认它们实际可用。检查注册流程是否完整、结账状态是否正确、CLI 是否在 TTY 环境中工作，比生成更多代码更有价值。"}, {"question": "Prompt Cache 是什么，你如何从中受益？", "options": ["存储 Claude 响应供离线使用的浏览器缓存", "针对频繁 API 用户的折扣", "当相似上下文前缀被反复发送时复用计算的机制——将稳定内容放在前面", "Claude 自动读取的记忆文件"], "answer": 2, "explanation": "Prompt Cache 的收益来自跨轮次保持稳定前缀（CLAUDE.md、规则）的一致性。当前缀匹配时，计算可以被复用，节省成本和时间。"}, {"question": "在 Claude Code 会话中，何时应该使用 /compact？", "options": ["在会话完全结束时", "在将重要状态保存到文件之后、会话降级之前", "只有在看到错误消息时", "从不——它会删除重要上下文"], "answer": 1, "explanation": "在将重要状态保存到文件之后进行压缩——而不是作为会话已经崩溃时的最后手段。在良好检查点进行策略性压缩能在整个长会话中保持质量。"}], "part4": [{"question": "何时应将重复性任务升级为 Skill？", "options": ["当任务非常复杂时", "当输出格式重复、需要缩小变化、且存储/工具顺序需要固定时", "当你想用自动化给团队留下深刻印象时", "只有当 Anthropic 提供官方 Skill 模板时"], "answer": 1, "explanation": "创建 Skill 的信号是重复的输出格式、一致性需求，以及固定的存储位置/工具顺序。一次性探索最好保留为对话形式。"}, {"question": "MCP 和 Connector 之间的关键区别是什么？", "options": ["MCP 免费，Connectors 收费", "MCP 是较旧的技术，Connectors 是较新的", "Connectors 是面向用户的应用连接；MCP 提供开发者级别的控制，包括工具结构、响应格式和项目特定激活", "没有区别——它们是同一个功能"], "answer": 2, "explanation": "Connectors 是简单的基于 UI 的连接（类似应用商店）。MCP 提供更深层的控制：哪些服务器、公开哪些工具、响应格式和项目范围激活。简单连接用 Connectors，系统设计用 MCP。"}, {"question": "为什么 Skill 的“description”字段如此重要？", "options": ["它出现在营销材料中", "它决定 Skill 的文件大小", "它充当路由规则——模糊的描述会导致触发不足或过度触发", "它只用于文档目的"], "answer": 2, "explanation": "description 是 Claude 在会话开始时读取的内容，用于决定是否激活 Skill。如果模糊，Skill 要么从不触发（触发不足），要么为无关任务触发（过度触发）。"}, {"question": "安装外部 Skill 之前应检查什么？", "options": ["只看 GitHub 上的星标数", "它是否获取外部 URL、使用强工具（Bash/网络）、与其声明用途匹配、在敏感数据附近运行，以及能否快速禁用", "只看 README 文件", "什么都不用——所有已发布的 Skills 都是安全的"], "answer": 1, "explanation": "外部 Skills 可能包含工具调用、文件访问和外部 URL 获取。它们应该被视为需要安全审查的小型软件安装，而非仅仅是文档导入。"}, {"question": "在汽车类比中，Hooks 被比作什么？", "options": ["方向盘——你控制方向", "油门——让事情更快", "安全带警报和自动刹车——它们改变实际行为，而不像可以被忽视的路标", "后视镜——帮助你看到发生了什么"], "answer": 2, "explanation": "提示词就像路标（可以被忽视）。Hooks 就像安全带警报和自动刹车——它们在系统层面执行规则，无论模型是否合规都会改变实际行为。"}], "part5": [{"question": "对几乎所有角色而言，推荐的第一个导入步骤是什么？", "options": ["立即建立完整的自动化流水线", "安装所有可用的 Plugin 和 MCP 连接", "从收集和整理信息开始——研究简报、会议记录、文档结构化", "用 AI 智能体取代团队成员"], "answer": 2, "explanation": "对所有角色（PM、市场营销、销售、工程、研究）而言，第一步始终是信息收集和整理——这是风险最低、频率最高的任务，有助于在工作流中建立信任。"}, {"question": "对同时管理多个客户的代理商 / 团队运营者而言，最关键的原则是什么？", "options": ["交付速度", "使用最新版本的模型", "客户上下文隔离——防止客户之间的数据和上下文泄漏", "最大化已安装 Plugin 的数量"], "answer": 2, "explanation": "客户上下文隔离是首要优先级。一个文件夹边界比一句聪明的提示词能预防更多事故。速度没有确保客户 A 的数据绝不出现在客户 B 的输出中更重要。"}, {"question": "无论担任什么角色，人类应始终保留对哪些事项的控制权？", "options": ["每一次草稿修订", "所有文件命名决策", "最终责任：审批决策、对外沟通，以及具有现实后果的判断", "token 计数和成本管理"], "answer": 2, "explanation": "AI 加速重复性的结构化和起草工作。人类必须保留：市场解读（PM）、品牌语气审批（市场营销）、对外发送确认（销售）、部署决策（工程）和法律判断（合规）。"}, {"question": "场景指南中的“输出契约”是什么？", "options": ["用户与 Anthropic 之间的法律协议", "关于结果必须遵循的格式和位置的预定义约定", "对 Claude 输出 token 数量的限制", "Claude API 输出的定价"], "answer": 1, "explanation": "输出契约规定结果保存在哪里、采用什么格式，以及必须遵循什么结构。它防止结果在多次运行中分散或不一致。"}, {"question": "目前哪些任务显示出最强的 AI 导入信号？", "options": ["体力劳动和复杂的面对面谈判", "编程、数据录入、客户支持、重复性文件审查和渠道特定内容适配", "仅限软件工程", "不需要人工监督的任务"], "answer": 1, "explanation": "高导入率与以下因素相关：数字文本、结构化判断、现有数字数据、可重复格式和明确的质量标准。体力工作和高风险专业判断的导入速度更慢。"}], "part6": [{"question": "Claude Code 会话中最有效的记忆策略是什么？", "options": ["每次会话后保存完整的对话记录", "依赖 Claude 内置的记忆来记住所有内容", "每次会话结束时，用当前状态、后续步骤和未解决的风险更新 handoff.md", "使用 /memory 永久存储所有信息"], "answer": 2, "explanation": "最简单也最有效的记忆策略：在会话结束时更新 handoff.md。这一个习惯能消除 80% 的'我上次做到哪了？'困惑。对话是可丢弃的；文件才是真正的记忆。"}, {"question": "为什么计划应该写在文件里，而不是留在对话中？", "options": ["文件比对话 token 更便宜", "文件跨越会话边界存活，可以独立审查，支持版本控制，并让对话专注于执行", "Claude 无法理解对话格式的计划", "文件计划和对话计划没有区别"], "answer": 1, "explanation": "基于文件的计划跨越会话持续存在，允许人类独立审查，支持 Git 版本控制，并让对话专注于执行而非反复规划。"}, {"question": "运行并行 Claude 会话的关键原则是什么？", "options": ["尽可能运行更多会话以获得最大速度", "所有会话使用相同的文件和目录", "先定义角色：谁负责什么、各会话可以操作哪些文件、结果如何合并", "不推荐并行会话"], "answer": 2, "explanation": "没有角色清晰度的并行只会制造混乱。在启动并行会话之前，请定义职责、文件边界和合并策略。无结构的并行比顺序工作更糟。"}, {"question": "安装任何外部工具（Skill、Plugin、MCP 服务器）前应检查什么？", "options": ["只看下载量", "最近维护日期、README 质量、所需安全权限、上下文成本与效用之比，以及禁用的便捷程度", "是否有漂亮的 logo", "什么都不用——市场负责质量控制"], "answer": 1, "explanation": "五个标准：维护近期性、文档质量、安全敏感权限、成本收益比和可逆性。“留着以后用”的工具会堆积，却无法成为真正的运营资产。"}, {"question": "社区中的“OpenClaw 风格”操作指的是什么？", "options": ["使用某个竞争对手的产品", "始终在线、多渠道、持久状态的工作系统，具备定时任务和远程控制能力", "Claude 的免费使用层级", "特定的编码框架"], "answer": 1, "explanation": "“OpenClaw 风格”描述的是一个运营目标：始终可访问、会话不中断、时间 / 事件触发的工作、内嵌 Skills 和带安全边界的远程控制。在 Claude 生态中，这通过组合 Claude Code + Hooks + MCP + Remote Control + Scheduled Tasks 来实现。"}], "part7": [{"question": "Claude Code 治理模型中的三种权限模式是什么？", "options": ["读取、写入、执行", "管理员、用户、访客", "允许（自动进行）、询问（暂停等待人工）、拒绝（完全阻止）", "公开、私有、受保护"], "answer": 2, "explanation": "权限模式使用允许 / 询问 / 拒绝，按顺序评估：拒绝 → 询问 → 允许，第一条匹配规则生效。这对 Claude 能自主做什么提供了精细控制。"}, {"question": "四个治理层是什么？", "options": ["前端、后端、数据库、网络", "文档层（CLAUDE.md / 规则）、设置层（权限）、运行时层（Hooks / 审批）、追踪层（日志 / 决策）", "用户、团队、组织、企业", "输入、处理、输出、存储"], "answer": 1, "explanation": "文档层定义知识，设置层定义边界，运行时层处理执行时控制，追踪层记录发生了什么以及为什么。四层合在一起构成完整的治理。"}, {"question": "为什么可审计性对 AI 自动化很重要？", "options": ["仅法律有此要求", "让演示看起来更专业", "同样的自动化，有审计追踪的能成为基础设施；没有的，只能是无法扩展的演示", "对大多数团队来说可审计性并不重要"], "answer": 2, "explanation": "可审计性意味着能够解释：读取了什么、创建了什么、谁批准了，以及还有什么未完成。没有它，自动化就无法从个人演示过渡到可靠的团队基础设施。"}, {"question": "可观测性和可审计性的区别是什么？", "options": ["两者是同一回事", "可观测性面向开发者，可审计性面向管理者", "可观测性展示当前系统状态（仪表板）；可审计性解释发生了什么以及为什么（用于问责的事件记录）", "可观测性比可审计性更贵"], "answer": 2, "explanation": "可观测性是用于运营效率的仪表板（使用量、成本、模式）。可审计性是用于问责的事件记录（谁做了什么、为什么、经过什么审批）。组织两者都需要。"}, {"question": "本书最后一章关于用 Claude Code 构建的核心原则是什么？", "options": ["始终使用最高级的功能", "一个精简但完整的成果，加上可以重现它的结构，胜过任何数量的精彩演示", "速度比质量更重要", "只有开发者才应该用 Claude Code 构建"], "answer": 1, "explanation": "结论：一个完整的精简网站或自动化工作流——带有简报、模板、审查分离和交接——并且下周能够重现，比任何宏大但未完成的计划都更有价值。"}], "glossary": [{"question": "什么是“上下文组装（Context Assembly）”？", "options": ["一次性安装所有可用 Plugin", "将当前任务所需的相关规则、文件和工具描述选择并收集到输入上下文中的过程", "编写尽可能长的提示词", "将整个代码库复制到对话中"], "answer": 1, "explanation": "上下文组装是一个选择过程，而非倾倒过程。它意味着只收集当前任务所需的内容——上下文越多并不等于上下文越好。"}, {"question": "“恢复规范（Resume Hygiene）”是什么意思？", "options": ["面试前清理你的简历", "使用 Claude 前重启电脑", "在恢复工作前只保留下一个会话所需的内容，丢弃积累的噪音", "打字时使用免洗洗手液"], "answer": 2, "explanation": "恢复规范意味着在恢复前清理状态——保留必要上下文，丢弃上一个会话的噪音。长会话并不天然更好；干净的交接才是关键。"}, {"question": "Hook 与提示词指令有何不同？", "options": ["Hook 运行成本更高", "Hook 在系统层面执行规则（自动刹车），而提示词指令是可以被忽略的建议（路标）", "Hook 只在 Cowork 中有效，在 Claude Code 中无效", "两者没有实质区别"], "answer": 1, "explanation": "提示词请求行为；Hook 强制执行。说“编辑后运行 lint”的提示词可能被跳过。配置为在每次文件编辑后运行 lint 的 Hook 则总是执行。"}, {"question": "Skill、Plugin 和 MCP 之间是什么关系？", "options": ["三者是同一功能的不同名称", "Skill 定义流程，MCP 连接外部工具，Plugin 将一切打包供团队部署", "Plugin 最便宜，MCP 中等，Skill 最高级", "三者必须始终一起使用"], "answer": 1, "explanation": "Skill 是“如何做”（流程），MCP 是“通往外部工具的路径”（连接），Plugin 是“部署一切的礼盒”（团队包）。三者相互补充。"}, {"question": "对 Claude Code 术语感到困惑时，哪个三桶心智模型有帮助？", "options": ["成本、速度、质量", "输入、处理、输出", "机制（工作如何流动）、安全（如何防止错误）、连续性（会话如何持续）", "前端、后端、数据库"], "answer": 2, "explanation": "几乎所有 Claude Code 术语都属于三类之一：机制（智能体循环、上下文组装、工具编排）、安全（权限、Hooks、审批门控）或连续性（会话记忆、交接、恢复规范）。"}]}}};
const INLINED_QUIZZES = {"glossary": [{"question": "What is 'Context Assembly'?", "options": ["Installing all available plugins at once", "The process of selecting and gathering only the relevant rules, files, and tool descriptions for the current task into the input context", "Writing the longest possible prompt", "Copying the entire codebase into the conversation"], "answer": 1, "explanation": "Context Assembly is a selection process, not a dumping process. It means gathering only what the current task needs — more context is not better context."}, {"question": "What does 'Resume Hygiene' mean?", "options": ["Cleaning your resume/CV before a job interview", "Restarting your computer before using Claude", "Keeping only what the next session needs and discarding accumulated noise before resuming work", "Using hand sanitizer while typing"], "answer": 2, "explanation": "Resume Hygiene means cleaning up state before resuming — preserving essential context while discarding noise from the previous session. Long sessions aren't inherently better; clean handoffs are."}, {"question": "How does a Hook differ from a prompt instruction?", "options": ["Hooks are more expensive to run", "Hooks enforce rules at the system level (automatic braking), while prompt instructions are suggestions that can be ignored (road signs)", "Hooks only work in Cowork, not Claude Code", "There is no practical difference"], "answer": 1, "explanation": "Prompts request behavior; hooks enforce it. A prompt saying 'run lint after editing' can be skipped. A hook configured to run lint after every file edit always executes."}, {"question": "What is the relationship between Skill, Plugin, and MCP?", "options": ["They are three names for the same feature", "Skill defines procedures, MCP connects to external tools, Plugin packages everything for team deployment", "Plugin is the cheapest, MCP is mid-tier, Skill is premium", "They must always be used together"], "answer": 1, "explanation": "Skills are 'how to do it' (procedures), MCP is 'the path to reach external tools' (connections), and Plugins are 'the box that deploys it all' (packages for teams). They complement each other."}, {"question": "When confused by a Claude Code term, what three-bucket mental model helps?", "options": ["Cost, Speed, Quality", "Input, Process, Output", "Mechanics (how work flows), Safety (how mistakes are prevented), Continuity (how sessions persist)", "Frontend, Backend, Database"], "answer": 2, "explanation": "Nearly all Claude Code terms fall into three categories: mechanics (agentic loop, context assembly, tool orchestration), safety (permissions, hooks, approval gates), or continuity (session memory, handoff, resume hygiene)."}], "part1": [{"question": "What does 'memoized context' mean in the Claude Code harness?", "options": ["Storing all chat history permanently in a database", "Reusing background context across turns so you don't re-explain every time", "Memorizing the user's personal preferences", "Caching API responses for faster performance"], "answer": 1, "explanation": "Memoized context means holding background information across turns so Claude doesn't need to be re-briefed each time."}, {"question": "What are the four key terms introduced in Chapter 1?", "options": ["API, CLI, MCP, VM", "Prompt, Context, Response, Token", "Memoized Context, Tool Orchestration, Permission Gate, Resumable Session", "Skills, Plugins, Hooks, Subagents"], "answer": 2, "explanation": "Chapter 1 introduces: Memoized Context (reusable background), Tool Orchestration (coordinating tools), Permission Gate (allow/ask/deny), and Resumable Session (picking up where you left off)."}, {"question": "What is a 'harness' in the context of Claude Code?", "options": ["A physical device that connects to Claude's servers", "The outer structure defining what files Claude can read, modify, and verify", "A testing framework for running unit tests", "The graphical user interface of Claude Code"], "answer": 1, "explanation": "A harness defines boundaries and verification rules — like setting up a workspace with reference materials, accessible drawers, and a checklist."}, {"question": "Why does the book focus on Claude Code rather than other Claude products?", "options": ["Claude Code is the cheapest product", "Claude Code has the most users globally", "It brings together files, rules, verification, permissions, and tool connections in one place", "Claude Code is the only product available in Korea"], "answer": 2, "explanation": "Claude Code combines file access, rules, verification, permissions, reusable sessions, and external tool connections. Cowork, Skills, Plugins are extensions of this core."}, {"question": "What is the difference between a weak harness request and a strong harness request?", "options": ["Weak uses fewer tokens, strong uses more", "Weak: 'Fix the bug.' Strong: 'Read only auth/, don't touch .env, pass login tests, leave a change note.'", "Weak means beginner, strong means expert", "There is no difference"], "answer": 1, "explanation": "A weak harness gives no boundaries. A strong harness specifies what to read, what not to touch, what tests must pass, and what documentation to leave."}], "part2": [{"question": "What is the recommended first action when starting a Claude Code session for a big task?", "options": ["Write the longest possible prompt with all context", "Read CLAUDE.md, relevant rules, and verify.md — then summarize scope before implementing", "Immediately start coding to save time", "Turn off all permissions for faster workflow"], "answer": 1, "explanation": "The start routine matters more than the start prompt. Reading the project contract, rules, and exit criteria before implementation prevents rework and wrong-direction implementations."}, {"question": "What is the difference between a Skill and a Plugin?", "options": ["They are the same thing with different names", "Skills are for coding, Plugins are for documents", "A Skill is a reusable procedure; a Plugin bundles skills, commands, hooks, and connections for team deployment", "Plugins are free, Skills are paid"], "answer": 2, "explanation": "Skills define 'how to do it' (procedures). Plugins package skills, tools, hooks, and connections into a deployable box — like an onboarding kit for team members."}, {"question": "Why should CLAUDE.md be kept thin rather than comprehensive?", "options": ["To save disk space", "Because Claude can only read short files", "It's a work contract, not an encyclopedia — long resident context wastes tokens and dilutes important rules", "Thin files load faster in the browser"], "answer": 2, "explanation": "CLAUDE.md is loaded on every turn. Keeping it thin ensures important rules stay prominent. Long-term state belongs in handoff.md, decision-log.md, and other task files."}, {"question": "What does 'review split' mean in Claude Code operations?", "options": ["Splitting a code review into multiple pull requests", "Separating implementation and review into different sessions to reduce context pollution", "Having two people review the same code", "Splitting the review budget between teams"], "answer": 1, "explanation": "Review split means not cramming planning, implementation, and review into one session. Separate sessions reduce context pollution and approval fatigue."}, {"question": "What survives after running /compact in Claude Code?", "options": ["Everything — /compact just makes the display shorter", "Only the last 5 messages", "Whatever the Compact Instructions specify: last modified files, test results, rejected alternatives, next action, and risk points", "Nothing — /compact resets the entire session"], "answer": 2, "explanation": "Compact Instructions control what information survives compression. Without them, important context may be lost. Good instructions preserve state that the next turn needs to continue immediately."}], "part3": [{"question": "What is 'Context Rot' in Claude Code sessions?", "options": ["When Claude's API key expires", "When files on disk become corrupted", "When early instructions weaken as the context grows longer, diluted by later content", "When the conversation is accidentally deleted"], "answer": 2, "explanation": "Context rot occurs as conversations grow — important early signals get diluted by accumulated later content, causing quality degradation even though the model hasn't 'forgotten' anything."}, {"question": "What are the three types of isolation a harness should design simultaneously?", "options": ["Input isolation, output isolation, display isolation", "Context isolation, file state isolation, approval isolation", "Network isolation, disk isolation, memory isolation", "User isolation, model isolation, tool isolation"], "answer": 1, "explanation": "Context isolation prevents session bloat, file state isolation prevents overwrites and conflicts, and approval isolation separates safe actions from dangerous ones. Each prevents a different class of failure."}, {"question": "Why are verification skills often higher ROI than generation skills?", "options": ["Because verification is more expensive to license", "Because models never make mistakes in generation", "Because a 'well-written draft' is cheap, but a 'verified passing result' is genuinely valuable and hard to achieve", "Because verification requires less compute"], "answer": 2, "explanation": "Generation produces drafts; verification confirms they actually work. Checking that signup flows complete, checkout states are correct, or CLI works in TTY environments is more valuable than generating more code."}, {"question": "What is the Prompt Cache, and how do you benefit from it?", "options": ["A browser cache that stores Claude's responses for offline use", "A discount for frequent API users", "A mechanism that reuses computation when similar context prefixes are sent repeatedly — keep stable content at the front", "A memory file that Claude reads automatically"], "answer": 2, "explanation": "Prompt Cache benefits come from keeping the stable prefix (CLAUDE.md, rules) consistent across turns. When the prefix matches, computation can be reused, saving both cost and time."}, {"question": "When should you use /compact in a Claude Code session?", "options": ["At the very end when the session is completely done", "After saving important state to files, before the session has degraded", "Only when you see an error message", "Never — it deletes important context"], "answer": 1, "explanation": "Compress after saving important state to files — not as a last resort when the session is already broken. Strategic compression at good checkpoints maintains quality throughout long sessions."}], "part4": [{"question": "When should you promote a repeated task to a Skill?", "options": ["When the task is very complex", "When output format repeats, variation needs to shrink, and storage/tool order needs fixing", "When you want to impress your team with automation", "Only when Anthropic provides an official skill template"], "answer": 1, "explanation": "The signal for creating a skill is repeated output format, the need for consistency, and fixed storage locations/tool sequences. One-time explorations are better left as conversations."}, {"question": "What is the critical difference between MCP and a Connector?", "options": ["MCP is free, Connectors are paid", "MCP is older technology, Connectors are newer", "Connectors are user-facing app connections; MCP gives developer-level control over tool structure, response format, and project-specific activation", "There is no difference — they are the same feature"], "answer": 2, "explanation": "Connectors are simple UI-based connections (like an app store). MCP provides deeper control: which servers, which tools to expose, response formats, and project-scoped activation. Use Connectors for quick connections, MCP for system design."}, {"question": "Why is a skill's 'description' field so important?", "options": ["It appears in m
