<template id="tpl-part3"><section class="part" data-part="part3">
  <div class="part-header">
    <h2 data-i18n="parts.part3.title">Part 3: System Design</h2>
    <p class="part-subtitle">Chapter 5</p>
    <div class="part-controls">
      <button class="expand-all-btn" data-i18n="ui.expand_all">Expand All</button>
    </div>
  </div>

  <div class="accordion" data-section="3.1">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>3.1 Context Engineering Deep Dive</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part3.3.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part3.sections.3_1.content">
      <p><strong>Context Engineering</strong> is the discipline of choosing what information Claude sees at any given moment. It is not about writing longer prompts — it is about assembling the right context window.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> <em>Context Assembly</em> = gathering the rules, files, memos, and tool descriptions needed for the current task into the actual input. It is a selection process, not a dumping process. More context is not better context.
      </div>

      <p>What fills the context window on every turn (even a one-line prompt):</p>
      <ul>
        <li>Your current question</li>
        <li>Recent conversation history</li>
        <li>Files Claude has read</li>
        <li><code>CLAUDE.md</code> and rule files</li>
        <li>Tool execution results</li>
        <li>Claude's own recent output</li>
      </ul>

      <p><strong>Context Rot</strong> occurs when the context grows so long that early signals weaken. Long conversations gradually lose coherence — not because the model forgets, but because important early instructions get diluted by later noise.</p>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Loading the entire repository into context. Even when fixing a single bug, some users dump every file. This is slower, more expensive, and produces lower quality results. Show Claude only the function and the 20 lines of error log it needs.
      </div>

      <p><strong>Three isolations to design simultaneously:</strong></p>
      <ol>
        <li><strong>Context isolation</strong> — Don't mix investigation, planning, implementation, and review in one long session. Use subagents or separate sessions.</li>
        <li><strong>File state isolation</strong> — Use worktrees or separate output folders for conflict-prone work.</li>
        <li><strong>Approval isolation</strong> — Separate frequently-allowed actions from always-review actions via permissions and hooks.</li>
      </ol>
    </div>
  </div>

  <div class="accordion" data-section="3.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>3.2 Harness Engineering</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part3.3.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part3.sections.3_2.content">
      <p>Harness Engineering goes beyond prompt tuning. It encompasses the entire workspace: permissions, folder structure, test policies, session resume rules, handoff protocols, worktree isolation, and remote control setup.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> A harness designs three things at once: (1) what Claude knows (context), (2) what Claude can do (tools and permissions), (3) what Claude must verify (tests and exit criteria). Missing any one of these creates a different class of failure.
      </div>

      <p><strong>The start routine matters more than the start prompt:</strong></p>
      <ol>
        <li>Check resident contract — read <code>CLAUDE.md</code>, relevant rules, current branch</li>
        <li>Classify the task — investigation, implementation, or review?</li>
        <li>Write the plan — scope, off-limits areas, verification commands</li>
        <li>Confirm exit criteria — check <code>tasks/verify.md</code></li>
        <li>Only then begin actual work</li>
      </ol>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Subagents and worktrees solve the same problem from different angles. Subagents isolate <em>context</em> (delegate research or review to a temporary worker). Worktrees isolate <em>file state</em> (physically separate working directories). Use subagents for brief investigations; use worktrees for parallel experiments.
      </div>

      <p>One of the most effective subagent uses is not making code faster, but <em>simulating different user roles</em>: a skeptical senior engineer, a new maintainer, a security reviewer, an ops person. Different perspectives catch trust-breaking issues like missing READMEs, side effects in status commands, and observability gaps.</p>
    </div>
  </div>

  <div class="accordion" data-section="3.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>3.3 Verification Structures</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part3.3.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part3.sections.3_3.content">
      <p>Verification is what separates demos from production. A good verification plan answers: "What must pass before this task is done?"</p>

      <p><strong>The <code>tasks/verify.md</code> template:</strong></p>
      <pre><code># Verification Plan
## Must Pass
- [ ] Unit tests: `pnpm test -- signup`
- [ ] Lint: `pnpm lint`
- [ ] Type check: `pnpm typecheck`
## Must Review (human)
- [ ] Manual browser check on mobile
- [ ] CTA text approved by stakeholder
## Must Not Break
- [ ] Existing auth flow unchanged
- [ ] No new dependencies added</code></pre>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Verification skills (checking that signup flows work end-to-end, that checkout states are correct, that CLI works in TTY environments) often have higher ROI than generation skills. A "well-written draft" is cheap — a "verified passing result" is expensive and valuable.
      </div>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Treating test passage as the goal rather than maintainable implementation. Models can hardcode values or add special cases to make tests green. Your verification prompt should explicitly forbid shortcuts and require reporting when tests seem wrong.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="3.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>3.4 Token Economics &amp; Cost Management</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part3.3.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part3.sections.3_4.content">
      <p>Tokens are both a billing unit and a signal for how wide your task has spread. Even a one-line prompt sends much more: the question, conversation history, loaded files, CLAUDE.md, rules, tool outputs, and recent model output all enter the context window.</p>

      <table>
        <tr><th>Token Type</th><th>What It Includes</th></tr>
        <tr><td><strong>Input tokens</strong></td><td>Prompts, files, conversation history, rule files, tool outputs</td></tr>
        <tr><td><strong>Output tokens</strong></td><td>Explanations, code, summaries, tool call results</td></tr>
      </table>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> "Saving tokens" is not about being stingy — it is about designing so Claude reads only what it needs. The <strong>Prompt Cache</strong> provides reuse benefits when similar backgrounds are sent repeatedly. Structure your context so the stable prefix (CLAUDE.md, rules) stays consistent and cacheable.
      </div>

      <p><strong>Cost is managed by structure, not by counting:</strong></p>
      <ul>
        <li>Reduce tool output verbosity (don't dump entire logs)</li>
        <li>Keep sessions focused — don't mix unrelated tasks</li>
        <li>Use <code>/compact</code> at strategic points, not as a last resort</li>
        <li>Separate investigation from implementation into different sessions</li>
        <li>Track cost with <code>/cost</code> to build intuition</li>
      </ul>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> The <strong>Tool Result Budget</strong> concept means controlling how much context tool outputs consume. A test suite that dumps 500 lines of output eats your context fast. Configure tools to return summaries, not raw logs.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="3.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>3.5 Session Management &amp; Resume Hygiene</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part3.3.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part3.sections.3_5.content">
      <p><strong>Resume Hygiene</strong> means keeping only what the next session needs and discarding accumulated noise. Long sessions are not inherently better — they accumulate context rot.</p>

      <p><strong>Session Memory template:</strong></p>
      <pre><code># Current State
- What I'm doing right now

# Task Specification
- What the user actually requested

# Files and Functions
- Important files and why they matter

# Workflow
- Frequently used commands and order

# Errors &amp; Corrections
- Failed attempts — do NOT repeat these

# Key Results
- Confirmed results and answers

# Worklog
- Recent steps (keep very short)</code></pre>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Long sessions survive when information converges into five categories: current state, files, workflow, errors, and results. Everything else is noise. The <code>Errors &amp; Corrections</code> section is not a shame log — it is a re-failure prevention device.
      </div>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Use the status line (<code>/statusline</code>) as a dashboard. It shows working directory, Git branch, and context usage. When context usage climbs, save state to files and start a fresh session — don't push through until quality degrades.
      </div>
    </div>
  </div>
</section>
</template>
<template id="tpl-part4"><section class="part" data-part="part4">
  <div class="part-header">
    <h2 data-i18n="parts.part4.title">Part 4: Extensions &amp; Automation</h2>
    <p class="part-subtitle">Chapter 6</p>
    <div class="part-controls">
      <button class="expand-all-btn" data-i18n="ui.expand_all">Expand All</button>
    </div>
  </div>

  <div class="accordion" data-section="4.1">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>4.1 Skills: Teaching Claude Repeatable Procedures</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part4.4.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part4.sections.4_1.content">
      <p>When you explain the same procedure for the tenth time — meeting note format, weekly brief structure, code review checklist — it is time to create a <strong>Skill</strong>. A Skill is a reusable work manual that reduces explanation cost.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Skills are not prompt snippets. They are folder structures with a main document (<code>SKILL.md</code>), supporting scripts, reference files, and assets. The official guide recommends <em>progressive disclosure</em>: the frontmatter and description load first; details load only when the skill activates.
      </div>

      <table>
        <tr><th>Promote to Skill When...</th><th>Keep as Conversation When...</th></tr>
        <tr><td>Output format repeats, variation needs to shrink, storage location and tool order need fixing</td><td>The topic changes often, it's a one-time brainstorming exploration</td></tr>
      </table>

      <p><strong>Projects vs. Skills:</strong> Projects are background knowledge that's always present. Skills are procedures activated when a matching task arrives. Background without procedure leads to inconsistent output; procedure without context leads to empty results.</p>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> The skill's <code>description</code> field is not an introduction paragraph — it is a routing rule. If the description is vague, the skill either never triggers (undertriggering) or fires for unrelated tasks (overtriggering). Write descriptions like: "Use this skill when the user asks for a weekly competitor brief, market review, or industry trend summary."
      </div>
    </div>
  </div>

  <div class="accordion" data-section="4.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>4.2 Skill Types &amp; Design Template</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part4.4.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part4.sections.4_2.content">
      <p>Skills cluster into a few common roles regardless of their specific domain:</p>
      <ul>
        <li><strong>Library/SDK reference</strong> — Fixes usage patterns for internal or tricky external libraries</li>
        <li><strong>Verification/testing</strong> — Standardizes checking procedures (Playwright flows, CLI tests)</li>
        <li><strong>Data pipeline</strong> — Organizes data sources and report paths</li>
        <li><strong>Recurring operations</strong> — Weekly reviews, standups, ticket creation</li>
        <li><strong>Scaffolding</strong> — Generates initial service or handler structures</li>
        <li><strong>Quality gate</strong> — Review standards, test rules, security checklists</li>
      </ul>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Skills that try to do everything ("research, code, test, and deploy") seem powerful but are fragile. Skills that solve one bottleneck precisely survive longest. Verification skills often have higher ROI than generation skills.
      </div>

      <p><strong>Skill Design Template:</strong></p>
      <pre><code>---
name: weekly-brief
description: >
  Use for weekly competitor briefs, recurring market checks,
  and industry trend summary requests.
disable-model-invocation: false
---
# Goal
Create a weekly competitor brief using only the last 7 days of evidence.

# Input Sources
- Competitor list: `references/competitors.md`
- Template: `assets/weekly-brief-template.md`

# Steps
1. Read competitor list and template
2. Search for changes in the last 7 days
3. Draft brief following template structure
4. Flag uncertain items separately
5. Save to `outputs/weekly-brief-YYYY-MM-DD.md`

# Rules
- Max 3 action items
- Sources and dates required
- No speculation — mark unknowns as "Needs verification"</code></pre>
    </div>
  </div>

  <div class="accordion" data-section="4.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>4.3 Plugins: Role Packages for Teams</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part4.4.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part4.sections.4_3.content">
      <p>A <strong>Plugin</strong> bundles multiple skills, commands, hooks, and connection settings into a single deployable package. If a Skill is a work manual, a Plugin is the onboarding box you hand to a new team member.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> The word "plugin" means different things depending on the surface. <strong>Claude Code plugins</strong> bundle commands, agents, hooks, skills, MCP, and LSP for development workflows. <strong>Cowork plugins</strong> bundle skills, connectors, slash commands, and sub-agents for knowledge work roles. Same name, different installation experience.
      </div>

      <p><strong>The progression:</strong> MCP connects to external tools → Skills define procedures → Plugins package everything for deployment. In one line: <em>Skills are "how to do it," MCP is "the path to reach it," Plugins are "the box that deploys it."</em></p>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Treating external Skills and Plugins as just documents. They can contain tool calls, file access, external URL fetches, and execution scripts. Before installing any external skill, check: (1) Does it fetch external URLs? (2) Does it use Bash, file writes, or network? (3) Do its files match its stated purpose? (4) Will it run near sensitive data? (5) Can you disable it quickly?
      </div>
    </div>
  </div>

  <div class="accordion" data-section="4.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>4.4 MCP: External Tool Connections</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part4.4.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part4.sections.4_4.content">
      <p><strong>Model Context Protocol (MCP)</strong> is the standardized way Claude connects to external tools and services — like a USB-C port for AI tool integration.</p>

      <p><strong>MCP vs. Connector:</strong></p>
      <table>
        <tr><th>Connector</th><th>MCP</th></tr>
        <tr><td>User-facing — search and connect from a settings screen</td><td>Developer-facing — design server, tool interface, and response format</td></tr>
        <tr><td>Like an app store connection</td><td>Like designing the internal wiring panel</td></tr>
        <tr><td>Best when connection itself is the goal</td><td>Best when you need control over tool structure post-connection</td></tr>
      </table>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Quick decision: "I just want to connect and use it" → Connector. "I want to control which tools are exposed, response formats, and which projects activate it" → MCP. Mixing them up leads to either over-engineering simple connections or under-engineering complex automation.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="4.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>4.5 Hooks, Subagents &amp; Control Surfaces</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part4.4.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part4.sections.4_5.content">
      <p><strong>Hooks</strong> transform "remember to check" into "always check." They are automatic intervention rules at specific moments — pre-tool-use, post-edit, pre-push, etc.</p>

      <p>If prompts are road signs ("please drive carefully"), hooks are seatbelt alarms and automatic braking. Signs can be ignored; safety systems change actual behavior. This is why hooks matter more as teams scale.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Hook types include command hooks (shell scripts), prompt-based hooks, agent-based hooks, and HTTP hooks. For teams, managed-only hooks and HTTP hook allowlists provide organizational control that goes far beyond personal shell scripts.
      </div>

      <p><strong>Subagents</strong> isolate context. When the main session handles exploration, implementation, review, and documentation, context gets noisy. Delegating research or review to a subagent keeps the main session focused. Think: team lead delegates fact-checking to an analyst instead of doing it personally.</p>

      <p><strong>Remote Control / Channels / Scheduled Tasks</strong> all re-start work, but the trigger differs:</p>
      <table>
        <tr><th>Feature</th><th>Who Pushes the Button</th></tr>
        <tr><td>Remote Control</td><td>A human, from a distance</td></tr>
        <tr><td>Channels</td><td>An external system (webhook, message)</td></tr>
        <tr><td>Scheduled Tasks</td><td>Time itself (cron-like)</td></tr>
      </table>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Four practical rules: (1) If you keep repeating the same explanation, extract it to a Skill or rule file. (2) If you keep connecting external tools, narrow permission scope before adding more MCP connections. (3) If verification keeps being forgotten, push it to hooks. (4) If you need parallelism, try a small subagent or worktree before launching full agent teams.
      </div>
    </div>
  </div>
</section>

<template id="tpl-part5"><section class="part" data-part="part5">
  <div class="part-header">
    <h2 data-i18n="parts.part5.title">Part 5: Role-Based Playbooks</h2>
    <p class="part-subtitle">Chapters 7–8</p>
    <div class="part-controls">
      <button class="expand-all-btn" data-i18n="ui.expand_all">Expand All</button>
    </div>
  </div>

  <div class="accordion" data-section="5.1">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>5.1 PM, Strategy &amp; Founders</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part5.5.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part5.sections.5_1.content">
      <p>Product managers, strategists, and founders share a common starting point: organizing research and making decisions quickly. The first wins come from <strong>research briefs</strong>, meeting note structuring, and decision documentation — not from full automation.</p>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> For PMs, the ideal Claude adoption path is: (1) Meeting note summaries → (2) Weekly research briefs → (3) PRD draft generation → (4) Competitive analysis with templates. Each step builds on the previous file structure.
      </div>

      <p><strong>Founder / Solo Operator minimum file set:</strong></p>
      <pre><code>workspace/
├── about-me.md          # Background, industry, goals
├── working-rules.md     # Tone, forbidden topics, priorities
├── projects/
│   └── current/
│       ├── brief.md     # This week's focus
│       └── competitors.md
├── templates/
│   └── weekly-brief.md
└── outputs/</code></pre>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> For strategists, the human must always own: market interpretation, priority decisions, and stakeholder alignment. Claude accelerates the research and structuring — not the judgment.
      </div>

      <p><strong>What humans must keep:</strong> Market interpretation, priority setting, and stakeholder negotiation. Claude handles research gathering, draft structuring, and format consistency.</p>
    </div>
  </div>

  <div class="accordion" data-section="5.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>5.2 Marketing &amp; Content</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part5.5.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part5.sections.5_2.content">
      <p>Marketing teams get the fastest returns from Claude when they establish brand voice files and content templates first. Without <code>brand-voice.md</code> and <code>anti-ai-writing-style.md</code>, every piece of content requires extensive tone correction.</p>

      <p><strong>Content operations adoption path:</strong></p>
      <ol>
        <li>Topic research and content structure outlines</li>
        <li>First drafts with brand voice templates</li>
        <li>Multi-channel adaptation (blog → social → newsletter)</li>
        <li>SEO optimization with structured templates</li>
        <li>Regular content calendar automation</li>
      </ol>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Saying "write in our company tone" without providing a <code>brand-voice.md</code>. Claude cannot intuit your brand. Create a file with: preferred phrases, forbidden phrases, sentence length guidelines, formality level, and 2–3 example paragraphs showing the ideal tone.
      </div>

      <p><strong>What humans must keep:</strong> Final message decisions, brand tone approval, and external publication sign-off. Claude handles research synthesis, structural drafting, and format adaptation.</p>
    </div>
  </div>

  <div class="accordion" data-section="5.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>5.3 Sales, Customer Success &amp; Operations</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part5.5.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part5.sections.5_3.content">
      <p>Sales and customer success teams benefit most from <strong>account briefs</strong> and <strong>follow-up email drafts</strong>. The key constraint: all external communications must pass through human approval gates.</p>

      <p><strong>Operations and back-office automation</strong> should start with the lowest-risk tasks: folder organization, classification, draft summaries, and template-based reports. High-risk automation (actual data entry, payment processing, deletion) should only come after governance structures are in place.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> For agency and team operators, the critical principle is <em>client context isolation</em>. When managing multiple clients simultaneously, the biggest risk is not slow output — it is context contamination between clients. Separate folders per client, shared templates, and strict naming conventions prevent cross-client leakage.
      </div>

      <pre><code>clients/
├── client-a/
│   ├── brief.md
│   ├── glossary.md
│   └── approval-rules.md
├── client-b/
│   ├── brief.md
│   └── ...
templates/
├── client-report-template.md
└── review-checklist.md
team/
├── shared-rules.md
└── naming-convention.md</code></pre>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> In an agency context, one folder boundary prevents more accidents than one clever prompt. Speed matters less than making sure Client A's data never leaks into Client B's output.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="5.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>5.4 Design, Engineering &amp; Research</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part5.5.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part5.sections.5_4.content">
      <p><strong>Design/Branding:</strong> Designers get the most value from reference-based exploration and implementation QA. Use images as input — screenshots of bugs, reference layouts, desired states. Visual context often communicates what paragraphs of CSS descriptions cannot.</p>

      <p><strong>Engineering:</strong> The strongest first task is always a small bug fix with a test, not a large new feature. The adoption path: (1) bug fix + test → (2) refactoring with plan → (3) code review with review split → (4) parallel worktree experiments → (5) CI integration and automated hooks.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> For researchers and analysts, Claude excels at: summarization, glossary creation, comparison tables, question generation, and structured literature reviews. The human must always own: claim interpretation, reproduction result judgment, and original insight.
      </div>

      <p><strong>Adoption priority across all roles follows the same pattern:</strong></p>
      <ol>
        <li>Gather and organize information (lowest risk)</li>
        <li>Create first drafts with templates</li>
        <li>Review and refine with verification loops</li>
        <li>Automate recurring workflows with skills</li>
        <li>Scale with parallel agents and scheduled tasks (highest risk, last step)</li>
      </ol>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Starting with end-to-end automation. The teams that go farthest start with the front-end of the process (organizing, structuring, drafting) and only automate the back-end (execution, deployment, delivery) after governance is established.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="5.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>5.5 Scenario Guide: Matching Blockers to Workflows</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part5.5.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part5.sections.5_5.content">
      <p>Chapter 8 is not a feature encyclopedia — it is a <em>situation matching table</em>. The approach: identify today's blocker → classify the task shape → select the file set → execute → verify through approval gate → leave a structured handoff.</p>

      <p><strong>The workflow for any blocked scenario:</strong></p>
      <ol>
        <li><strong>Today's blocker</strong> — What specific task is stuck?</li>
        <li><strong>Task shape</strong> — Is it research, drafting, implementation, or review?</li>
        <li><strong>File set selection</strong> — Which minimum files does this task need?</li>
        <li><strong>Execution</strong> — Run the workflow with output contract</li>
        <li><strong>Approval gate</strong> — Human checks before anything goes external</li>
        <li><strong>Structured handoff</strong> — State and next steps for the next session</li>
      </ol>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Key terms for scenario matching: <em>output contract</em> (what format and location results must follow), <em>token hotspot</em> (where context suddenly gets expensive), <em>approval gate</em> (mandatory human check before external delivery), and <em>structured handoff</em> (formatted state memo for session continuity).
      </div>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> The gap ahead will widen not between people who know more features, but between teams that learn role-specific delegation strategies faster. Development and customer support adopt first (broad, low-risk tasks); legal, finance, and research adopt more cautiously (summary and classification first, judgment later).
      </div>
    </div>

  <div class="accordion" data-section="6.1">
    <button class="accordion-header">

      <span>6.1 Memory, Recall &amp; Search Patterns</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part6.6.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part6.sections.6_1.content">
      <p>Community practitioners have developed recurring patterns for managing Claude's memory and context over time. These are not official features — they are operational habits that emerge from heavy daily use.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> <strong>Session Memory</strong> is not about saving entire conversations. It is about maintaining structured state files (<code>handoff.md</code>, <code>decision-log.md</code>, <code>worklog.md</code>) that the next session reads on startup. The conversation is disposable; the files are the real memory.
      </div>

      <p><strong>Common memory patterns:</strong></p>
      <ul>
        <li><strong>File-based memory:</strong> <code>CLAUDE.md</code> + rule files + handoff files form a persistent memory layer that survives session boundaries</li>
        <li><strong>Structured recall:</strong> Starting each session by reading <code>tasks/handoff.md</code> and <code>tasks/plan.md</code> before any new work</li>
        <li><strong>Progressive disclosure:</strong> Loading background at the top, task-specific details only when activated (like skill frontmatter triggering full skill content)</li>
      </ul>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> The most effective memory strategy is the simplest: at the end of every session, update <code>handoff.md</code> with current state, next steps, and unresolved risks. This single habit prevents 80% of "where was I?" confusion.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="6.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>6.2 Plan.md &amp; File-Based Planning</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part6.6.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part6.sections.6_2.content">
      <p>The <code>plan.md</code> pattern is one of the most widely adopted community practices. Instead of keeping the plan in conversation, write it to a file that both Claude and humans can reference.</p>

      <p><strong>Why plans belong in files, not conversations:</strong></p>
      <ul>
        <li>Files survive session boundaries; conversations don't</li>
        <li>Files can be reviewed by humans independently</li>
        <li>Files can be version-controlled with Git</li>
        <li>Files keep the conversation focused on execution, not re-planning</li>
      </ul>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> The plan file is not bureaucracy — it is a rework-prevention device. Teams that plan before editing consistently report fewer rollbacks, shorter review cycles, and less context pollution in long sessions.
      </div>

      <p><strong>Effective plan.md structure:</strong></p>
      <pre><code># Plan
## Goal
One sentence describing the desired end state.

## Scope
- Files to modify: [list]
- Off-limits: [list]

## Steps
1. ...
2. ...

## Verification
- Tests to pass: [list]
- Manual checks: [list]

## Open Questions
- [Any unresolved items before starting]</code></pre>
    </div>
  </div>

  <div class="accordion" data-section="6.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>6.3 Parallel Sessions &amp; Multi-Agent Operations</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part6.6.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part6.sections.6_3.content">
      <p>Advanced users run multiple Claude sessions in parallel, each with a different role. This is not about speed — it is about <em>context isolation</em>.</p>

      <p><strong>Common parallel patterns:</strong></p>
      <ul>
        <li><strong>Plan + Implement:</strong> One session plans, another implements based on the written plan</li>
        <li><strong>Implement + Review:</strong> One session writes code, another reviews in a separate worktree</li>
        <li><strong>Main + Subagent research:</strong> Main session stays focused while a subagent explores documentation or gathers data</li>
        <li><strong>Multi-worktree experiments:</strong> Test different approaches in isolated working directories, compare results</li>
      </ul>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Parallelism without role clarity creates chaos, not speed. Before launching parallel sessions, define: who does what, which files each session can touch, and how results merge back. Unstructured parallelism is worse than sequential work.
      </div>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> The "OpenClaw-style" operation that many community members aspire to means: always-on sessions, multi-channel access (terminal, phone, web), persistent state across sessions, scheduled tasks, and remote control. In the Claude ecosystem, you achieve this by combining Claude Code + CLAUDE.md + hooks + subagents + MCP + Remote Control + Channels + Scheduled Tasks.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="6.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>6.4 Self-Improvement &amp; SEO/Content Loops</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part6.6.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part6.sections.6_4.content">
      <p>Community patterns include using Claude to improve its own environment — creating skills, refining rules, and evaluating past outputs.</p>

      <p><strong>Self-improvement loop:</strong></p>
      <ol>
        <li>Run a task with current rules and skills</li>
        <li>Evaluate the output (manually or with a review subagent)</li>
        <li>Update rules, skill descriptions, or templates based on failures</li>
        <li>Re-run and compare</li>
      </ol>

      <p><strong>SEO and content automation patterns:</strong></p>
      <ul>
        <li>Keyword research → content structure → draft → SEO review skill → publication</li>
        <li>Multi-channel adaptation: one research session feeds blog, social, newsletter, and email templates</li>
        <li>Content calendar automation with scheduled tasks</li>
      </ul>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> The meta-skill <code>skill-creator</code> can generate initial skill drafts from descriptions. However, it produces first drafts, not production-ready skills. Failure cases, edge conditions, and verification loops still require human review and iteration.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="6.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>6.5 Tool Selection Criteria</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part6.6.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part6.sections.6_5.content">
      <p>With growing ecosystems of skills, plugins, and MCP servers, selecting the right tools requires discipline.</p>

      <p><strong>Evaluation checklist before installing any external tool:</strong></p>
      <ol>
        <li>When was it last maintained?</li>
        <li>Does it have real README and examples?</li>
        <li>What security-sensitive permissions does it need?</li>
        <li>Is the context cost justified by the utility?</li>
        <li>Can you disable it quickly if something goes wrong?</li>
      </ol>

      <p><strong>Where to find tools:</strong></p>
      <table>
        <tr><th>Source</th><th>Type</th></tr>

        <tr><td>Anthropic Claude Plugins GitHub</td><td>Official</td></tr>
        <tr><td>agentskills.io</td><td>Standards documentation</td></tr>

        <tr><td>awesome-claude-skills lists on GitHub</td><td>Community curated</td></tr>
      </table>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Collecting tools you never use. "Saved for later" tools pile up without becoming operational assets. Only install tools you will use three or more times this week. Review your installed tools monthly and remove unused ones.

    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>7.1 Why Governance Matters</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part7.7.1"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part7.sections.7_1.content">
      <p>Governance is not a compliance checkbox — it is the structure that lets teams use AI with confidence instead of anxiety. Without governance, every automation is a demo that cannot become infrastructure.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> The core question governance answers: "What can Claude do without asking, what must it ask about, and what must it never do?" This is the allow/ask/deny framework applied at organizational scale.
      </div>

      <p><strong>Risk classification example:</strong></p>
      <table>
        <tr><th>Risk Level</th><th>Examples</th><th>Approval Mode</th></tr>
        <tr><td><strong>Low</strong></td><td>Meeting summaries, internal drafts, test additions</td><td>Auto-execute</td></tr>
        <tr><td><strong>Medium</strong></td><td>Customer-facing drafts, regular reports, refactoring</td><td>Human review then execute</td></tr>
        <tr><td><strong>High</strong></td><td>Production deployment, customer emails, accounting entries, permission changes, sensitive data queries</td><td>Human approval required — no execution without it</td></tr>
      </table>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Governance rollout works best in phases: Week 1 — block <code>.env</code> access and destructive commands, require approval for deployments. Week 2 — standardize allowed plugins/skills, organize CLAUDE.md and rules per project. Week 3 — add cost monitoring and establish handoff/approval logging habits.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="7.2">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>7.2 Permission Models &amp; Four Governance Layers</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part7.7.2"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part7.sections.7_2.content">
      <p>The permission model uses three modes: <strong>allow</strong> (proceed automatically), <strong>ask</strong> (pause for human decision), and <strong>deny</strong> (block completely). Rules are evaluated in order: deny → ask → allow, with the first match applying.</p>

      <p><strong>The four governance layers:</strong></p>
      <ol>
        <li><strong>Document layer</strong> — <code>CLAUDE.md</code>, rule files, skill instructions: what Claude should know and follow</li>
        <li><strong>Settings layer</strong> — <code>settings.json</code>, permission rules, managed settings: what Claude can and cannot do</li>
        <li><strong>Runtime layer</strong> — Hooks, approval gates, plan mode: what happens during execution</li>
        <li><strong>Trace layer</strong> — Work logs, approval logs, decision logs, handoff files: what happened and why</li>
      </ol>

      <div class="callout callout-warning">
        <strong>&#9888;&#65039; Common Mistake:</strong> Using <code>bypassPermissions</code> as a team default. Community posts often recommend "turn off all permissions for speed." Anthropic treats this as a permission mode that organizations can disable entirely via <code>disableBypassPermissionsMode</code>. Individual experiments and team standards should never share the same permission level.
      </div>

      <p><strong>Two-layer permission structure for teams:</strong></p>
      <ul>
        <li><strong>Global (user-level):</strong> Block <code>rm -rf</code>, secret files, force pushes</li>
        <li><strong>Project-level:</strong> Block migration folders, deployment scripts, payment configs specific to this repository</li>
      </ul>
    </div>
  </div>

  <div class="accordion" data-section="7.3">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>7.3 Human-in-the-Loop &amp; Auditability</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part7.7.3"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part7.sections.7_3.content">
      <p><strong>Human-in-the-loop</strong> design means building explicit checkpoints where humans make decisions — not hovering over every action. The goal is strategic intervention, not constant supervision.</p>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> <strong>Auditability</strong> means being able to explain later: what was read, what was created, who approved it, and what remains unfinished. Same automation with audit trails becomes infrastructure; without them, it remains a demo.
      </div>

      <p><strong>Minimum audit trail for high-stakes work:</strong></p>
      <pre><code>1. source/          — Original materials or links
2. outputs/         — Claude's drafts and revisions
3. work-log.md      — What was executed and when
4. approval-log.md  — Who approved what and when
5. handoff.md       — Remaining risks and next steps</code></pre>

      <p><strong>Operations logs vs. decision traces:</strong> Operations logs record <em>what happened</em> (commands, tool calls, timestamps). Decision traces record <em>why</em> (what was considered, what alternatives were rejected, why this path was chosen). Agents working on long tasks need both. Without decision traces, you can see where failure occurred but not why.</p>

      <p><strong>Incident review template:</strong></p>
      <pre><code># Incident Review
- When was it discovered?
- Which automation / session was involved?
- What were the input materials?
- Which approval point was missing?
- What rule, hook, or permission needs to change?</code></pre>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> Cowork conversations are stored locally and do not appear in Audit Logs, Compliance API, or Data Exports. Do not use Cowork for regulated workloads. For audit-critical work, use Claude Code with Git-based logging, hooks, and external approval tracking.
      </div>
    </div>
  </div>

  <div class="accordion" data-section="7.4">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>7.4 Team Adoption Strategy</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part7.7.4"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part7.sections.7_4.content">
      <p>Team adoption diverges from individual use the moment you start deploying shared rules and assets. It is not about distributing a tool — it is about deploying an <em>operating environment with policies attached</em>.</p>

      <p><strong>Key team/enterprise capabilities:</strong></p>
      <ul>
        <li>Skills provisioning — deploy shared skills organization-wide</li>
        <li>Managed settings — admin-enforced configurations that individuals cannot override</li>
        <li>Plugin marketplace management — control which plugins are available</li>
        <li>Usage analytics dashboard and Analytics API</li>
        <li>Seat policies — who gets access to which features</li>
      </ul>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Standardization does not kill creativity — it kills repetitive explanation cost. When shared meeting summary skills, client response templates, PR review skills, and weekly brief templates are deployed team-wide, people spend less time on format and more time on judgment.
      </div>

      <p><strong>External skill adoption flow for organizations:</strong></p>
      <ol>
        <li>Verify the source</li>
        <li>Review included files and tool scope</li>
        <li>Test in a sandbox or isolated workspace</li>
        <li>Reduce permissions to the minimum needed</li>
        <li>Only then deploy to team/organization-managed distribution</li>
      </ol>

      <p><strong>Cost as a governance signal:</strong> Usage data is not just for finance — it is a design feedback loop. "This agent re-reads a long regulation file every session" → investigate caching. "This automation produces verbose tool output" → trim the output budget. Cost management is operational design, not budget policing.</p>
    </div>
  </div>

  <div class="accordion" data-section="7.5">
    <button class="accordion-header">
      <span class="accordion-icon">&#9662;</span>
      <span>7.5 Final Practice: Building with Claude Code</span>
      <label class="section-check"><input type="checkbox" class="section-checkbox" data-section-id="part7.7.5"></label>
    </button>
    <div class="accordion-body" data-i18n-html="parts.part7.sections.7_5.content">
      <p>The final chapter brings everything together with two practical projects: building a small website and building an automation workflow. Both demonstrate that thin, completed results are more valuable than elaborate unfinished plans.</p>

      <p><strong>Website project approach:</strong></p>
      <ol>
        <li>Fix three lines first: <strong>Reader</strong> (who reads this?), <strong>Goal</strong> (what should they understand?), <strong>Action</strong> (what should they do?)</li>
        <li>Create file set: <code>brief.md</code>, <code>tone.md</code>, <code>references/</code>, <code>site/</code></li>
        <li>Use Cowork to draft structure and copy, then Claude Code to implement</li>
        <li>Split into three prompts: design (structure), implement (build), review (verify)</li>
      </ol>

      <p><strong>Automation project approach:</strong></p>
      <ol>
        <li>Define input boundaries and output contract before "when to run it"</li>
        <li>Success = same format on re-run, not just first-time success</li>
        <li>High-risk steps must route through human approval</li>
      </ol>

      <div class="callout callout-concept">
        <strong>&#128204; Key Concept:</strong> Five directions the ecosystem is heading: (1) Conversational → asynchronous operations, (2) Pop-up approval → policy-based approval, (3) Long transcripts → structured task state, (4) Single surface → multi-surface continuity, (5) Prompt tricks → measurable operations with analytics and evaluation loops.
      </div>

      <p><strong>Deployment checklist:</strong></p>
      <ul>
        <li>Primary work surface chosen (terminal, IDE, desktop, web)?</li>
        <li><code>CLAUDE.md</code> and rules separated by role?</li>
        <li>Permissions and hooks covering real risk boundaries?</li>
        <li><code>plan.md</code>, <code>verify.md</code>, <code>handoff.md</code> in place?</li>
        <li>Review split between implementation and review?</li>
        <li>Cost and failure measurement established?</li>
        <li>Scope separation (user/project/local/managed) for teams?</li>
      </ul>

      <div class="callout callout-tip">
        <strong>&#128161; Pro Tip:</strong> The book's conclusion is simple: people who use Claude Code well are not people who write long prompts — they are people who stabilize context, manage tokens and cache, narrow permissions, and make review splits and handoffs into habits. One thin completed result plus the structure to recreate it is worth more than any number of impressive demos.
      </div>
    </div>
  </div>
