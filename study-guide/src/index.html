<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Study Guide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ===== Header ===== -->
    <header class="header">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span class="hamburger-line"></span>
      </button>

      <h1 class="header-title" data-i18n="ui.title">Claude Code <span>Study Guide</span></h1>

      <div class="header-actions">
        <!-- Search trigger -->
        <button class="search-trigger" id="search-trigger" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7" cy="7" r="4.5"/>
            <line x1="10.2" y1="10.2" x2="14" y2="14"/>
          </svg>
          <span class="search-trigger-text">Search...</span>
          <kbd>/</kbd>
        </button>

        <!-- Language dropdown -->
        <div class="lang-dropdown" id="lang-dropdown">
          <button class="lang-trigger" id="lang-trigger" aria-haspopup="true" aria-expanded="false">
            <span id="lang-current">EN</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3,4.5 6,7.5 9,4.5"/>
            </svg>
          </button>
          <div class="lang-menu" id="lang-menu" role="menu">
            <button class="lang-option active" role="menuitem" data-lang="en">English</button>
            <button class="lang-option" role="menuitem" data-lang="ko">한국어</button>
            <button class="lang-option" role="menuitem" data-lang="ru">Русский</button>
            <button class="lang-option" role="menuitem" data-lang="hi">हिंदी</button>
            <button class="lang-option" role="menuitem" data-lang="zh">中文</button>
            <button class="lang-option" role="menuitem" data-lang="fr">Français</button>
          </div>
        </div>

        <!-- Theme toggle -->
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <span id="theme-icon">&#9789;</span>
        </button>
      </div>
    </header>

    <!-- ===== Layout Body ===== -->
    <div class="layout-body">

      <!-- Sidebar Overlay (mobile) -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav" id="sidebar-nav" aria-label="Study guide navigation">
          <ul class="nav-section" id="nav-list">
            <!-- Populated by JS -->
          </ul>
        </nav>
        <div class="sidebar-progress">
          <div class="sidebar-progress-label" id="progress-label" data-i18n="ui.progress">0% complete</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="content" id="content">
        <div class="content-inner">

          <!-- Tab bar (populated by JS with part navigation) -->
          <div class="tab-bar" id="tab-bar"></div>

          <!-- Article area (study tab) -->
          <div class="article-area" id="article-area">
            <!-- Content loaded by JS -->
          </div>

          <!-- Quiz section (hidden until user clicks Take Quiz) -->
          <div class="quiz-section" id="quiz-section" style="display:none">
          </div>

          <!-- Prev / Next navigation -->
          <nav class="nav-footer" id="nav-footer" aria-label="Part navigation">
            <button class="nav-prev" id="nav-prev">
              <span class="nav-direction" data-i18n="ui.prev">&larr; Previous</span>
              <span class="nav-label" id="nav-prev-label"></span>
            </button>
            <button class="nav-next" id="nav-next">
              <span class="nav-direction" data-i18n="ui.next">Next &rarr;</span>
              <span class="nav-label" id="nav-next-label"></span>
            </button>
          </nav>

        </div>
      </main>

    </div><!-- /layout-body -->

    <!-- ===== Search Overlay ===== -->
    <div class="search-overlay" id="search-overlay">
      <div class="search-dialog" role="dialog" aria-label="Search study guide">
        <div class="search-input-wrap">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7" cy="7" r="4.5"/>
            <line x1="10.2" y1="10.2" x2="14" y2="14"/>
          </svg>
          <input class="search-input" id="search-input" type="text" placeholder="Search topics, concepts..." data-i18n-placeholder="ui.search_placeholder" autocomplete="off" spellcheck="false">
        </div>
        <div class="search-results" id="search-results">
          <div class="search-empty">Type to search across all parts and topics.</div>
        </div>
      </div>
    </div>

  </div><!-- /app -->

  <footer class="site-footer">
    <p>&copy; Haedong Yoo. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
